have to be.\n\nA gap exists between the athletes who see the game clearly and the athletes who see it through a smear they never knew was there. Between the players whose signal arrives clean and the players whose signal was degraded at the cornea, dimmed at the retina, destabilized by tired eye muscles, or scrambled by eyes that won't team. That gap is not genetic. It's not talent. It's not toughness. In an enormous number of cases, it's a hardware problem that nobody ever checked for.\n\nThat's correctable. That's the whole point.\n\nNow I need to return to something personal, because this work is personal.\n\nI was a kid who played everything. Soccer, hockey, baseball, basketball, wrestling. An athlete who did everything right except the one thing that mattered most: nobody ever looked at my eyes. I didn't discover I needed an exam until I was in optometry school, learning the very anatomy this book just walked you through — the cornea, the lens, the retina, the optic nerve — before anyone had ever checked whether mine were delivering a clean signal. By then I had already played my games and taken my shots, never knowing whether my acquisition system was working the way it could.\n\nI can't get those years back. I'll never know what I might have been if my signal had been measured and corrected the way my strength was trained and my speed was timed.\n\nThat haunts me. Productively. Because it drove me to build a system so that no athlete would have to wonder.\n\nThe Noah West story in this book is not an outlier. It's a proof of concept. When you measure the acquisition system, when you find the specific broken link, when you correct the hardware before you train anything on top of it — change happens. Real, documented change. From the bottom of the population to the top. From unscouted to the biggest stages in the sport. From performing beneath the potential to performing inside it. And it started with the least glamorous intervention imaginable: an actual eye exam, and two diopters of astigmatism that nobody had ever bothered to find.\n\nThat kind of change is available to every athlete who steps onto a field, takes the ice, picks up a racket.\n\nBut only if we look. Only if we measure. Only if we correct before we train.\n\nWe spend fortunes on strength coaches and sport psychologists and biomechanists and sleep scientists. We measure vertical jump and reaction time. We track every metric there is. And we leave the very first system in the chain — the one that feeds all the others, the one that sets the ceiling — unexamined.\n\nThat's not a limitation of science. We have the science. That's not a limitation of evidence. We have the evidence. It's a gap between what we know and what we do.\n\nThis book is my attempt to close it — for the first stage, the one I've come to believe is the most overlooked of all. We have followed the photon as far as acquisition can take it, all the way to the crossing. The signal is delivered, as clean and fast and well-organized as the hardware allowed.\n\nWhat happens on the other side of that crossing — the routing, and everything downstream of it — is the rest of this series.\n\nThe photon is already on its way to your athlete's eye. The only question is whether the chain it's about to travel has been measured, corrected, and conditioned — or left to chance.\n\nGo look.\n\n— Dr. Joe LaPlaca, OD"};

// Build audiobook segments from the full prose by grouping paragraphs into sections
function _segmentsFromFullText(chapterId, chapterTitle) {
  const text = FULL_CHAPTER_TEXT[chapterId];
  if (!text) return [];
  // Split by double-newline into paragraphs
  const paras = text.split(/\n\n+/).filter(p => p.trim().length > 0);
  if (paras.length === 0) return [];
  // Group every 4 paragraphs into a section for audiobook navigation
  const segments = [];
  const PER_SECTION = 4;
  for (let i = 0; i < paras.length; i += PER_SECTION) {
    const chunk = paras.slice(i, i + PER_SECTION).join("\n\n");
    const idx = Math.floor(i / PER_SECTION) + 1;
    const total = Math.ceil(paras.length / PER_SECTION);
    segments.push({
      id: "section_" + idx,
      label: "Section " + idx + " of " + total,
      text: chunk
    });
  }
  return segments;
}

// Override getChapterSegments to prefer the full-text segments when available
const _originalGetChapterSegments = getChapterSegments;
getChapterSegments = function(chapter) {
  if (chapter && FULL_CHAPTER_TEXT[chapter.id]) {
    return _segmentsFromFullText(chapter.id, chapter.title);
  }
  return _originalGetChapterSegments(chapter);
};

    : "Part Two — The Journey of Light"));
  return (
    <div>
      <div className="chapter-header">
        <div className="chapter-act-label">{partLabel}</div>
        <div className="chapter-number">{chapter.number}</div>
        <div className="chapter-title">{chapter.title}</div>
        {c.hook && <div className="chapter-hook">{c.hook}</div>}
      </div>
      <AudiobookBar chapter={chapter} segments={segments} />
      <div className="content-block">
        <div className="block-label">A · The Full Chapter</div>
        <Prose text={fullText} highlights={highlights} />
      </div>
      {chapter.interactive && (
        <div className="content-block">
          <ExploreTeaser icon={"⚙"} title={"Explore: " + (chapter.interactiveLabel || chapter.title)} sub={chapter.exploreSub || "Open the interactive."} onExplore={onExplore} />
        </div>
      )}
      <div className="content-block">
        <div className="block-label">B · A.R.E.S. Connection</div>
        <AresPipeline activeStage={chapter.aresStage || "acquire"} />
      </div>
      {c.callout && (
        <div className="content-block">
          <div className="block-label">C · Clinical / Coaching Insight</div>
          <CalloutBlock content={c.callout} />
        </div>
      )}
      {c.summary && c.summary.length > 0 && (
        <div className="content-block">
          <div className="block-label">D · Chapter Summary</div>
          <ul className="summary-list">
            {c.summary.map((item, i) => (

    </div>
  );
}

  if (!chapter) return [];
  if (FULL_CHAPTER_TEXT[chapter.id] && (chapter.type === "framing" || chapter.type === "science")) {
    const blocks = [{ id: "opening", label: "A · Full Chapter" }, { id: "ares", label: "B · A.R.E.S." }];
    if (chapter.content && chapter.content.callout) blocks.push({ id: "callout", label: "C · Insight" });
    if (chapter.content && chapter.content.summary) blocks.push({ id: "summary", label: "D · Summary" });
    return blocks;
  }
  return _OriginalGetBlocks(chapter);
};
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
