<!DOCTYPE html>
<html lang="en">
<head>

<title>A.R.E.S. ACQUIRE — First Light: Photon to the Optic Chiasm</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

          content:{
            opening:"I played everything.\n\nSoccer, hockey, baseball, basketball, wrestling. I earned a first-degree black belt in Kyuki-Do before most kids had a driver's license. I was the kind of athlete who showed up to every practice early and left late, the kind of kid coaches loved because I would do whatever it took, learn whatever I needed, push through whatever wall was in front of me.\n\nAnd in all those years — all those games, all those practices, all those moments where seeing the field a fraction of a second earlier could have changed the outcome — nobody ever checked my eyes.\n\nNot once.\n\nThis was not because my family couldn't afford it. We were upper-middle-class, well-insured, well-educated. Vision wasn't on the checklist. In a household that invested in every other aspect of my athletic development, the single system that touches every decision, every movement, every reaction in every sport I played was the one system that nobody ever tested, trained, or even talked about.\n\nMy first eye exam happened during my first year of optometry school. Let me say that differently, because I need you to feel the weight of it: I was literally studying how the human visual system works — learning the anatomy of the cornea, the optics of the lens, the architecture of the retina, the physiology of the optic nerve — before anyone had ever looked at my eyes to see if they were working correctly.\n\nThat realization didn't just surprise me. It rewired me. Because the deeper I got into the science, the more I understood something that very few people in sports had put together: the visual system isn't just important for athletic performance. *It is the starting line of athletic performance.* Everything an athlete does begins with photons of light entering the eye and the system doing something useful with the information they carry. And if the acquisition of that information is degraded — blurred, dimmed, or scattered before it ever reaches the brain — then nothing downstream can fully compensate. Not speed. Not strength. Not coaching. Not desire.\n\nYou can have the fastest car on the track, but if the windshield is smeared, you're going to crash.\n\nI founded Ares Elite Sports Vision to close that gap. Not with gimmicks. With science. With measurement. With a system built on the actual biology of how light becomes information, how information becomes a decision, and how decisions become the actions that win or lose games.\n\nThe A.R.E.S. Performance Loop — Acquire, Route, Execute, Synchronize — is a framework for the complete chain of human performance. This book covers the first stage: *Acquire.* In this volume, I follow that first stage all the way down to the structure where it ends — the optic chiasm, the X-shaped crossing at the base of the brain.\n\nEverything before the chiasm is acquisition: the optics, the focusing, the capture, the first round of processing inside the retina. That's this book. Everything after the chiasm is routing — and that's where Book Two begins.\n\nI've watched an unscouted high school hockey player with uncorrected astigmatism transform, over five years, into a collegiate athlete competing on one of the biggest stages in college hockey. I've watched an IndyCar team's pit crew — across all three of their cars — sharpen their reaction times by 27 percent across an off-season. I've watched the skeptics go quiet — not because I convinced them with a pitch, but because the numbers did the convincing.\n\nThe eye exam I never had cost me something I'll never be able to measure. This book is my attempt to make sure no athlete pays that price again.",

            hook:"Before the brain can route, predict, or decide anything, photons have to be captured and conditioned. That front end is the subject of this book — and the part most likely to be quietly, invisibly broken.",
            opening:"There's a video clip every soccer fan has seen. Lionel Messi — not scoring, not dribbling past five defenders. He's just... standing near the center circle, looking almost disinterested. And then, in about two seconds, he receives the ball, takes a single touch, and plays a through ball to a teammate who hadn't yet started his run. The pass arrives perfectly. Goal.\n\nThe commentators call it genius. The highlight package calls it vision. I'm going to spend the next four books of this series unpacking *how* he does it — the scanning, the prediction, the pattern recognition, the decision that arrives before conscious thought. That is routing, execution, and synchronization.\n\nBut none of it — *none of it* — happens unless the very first step works. Before Messi's brain can route anything, photons have to bounce off 21 moving bodies, enter his eyes, get focused into a sharp image, get converted into electrical signals, get cleaned up and compressed, and get shipped intact toward his brain. That entire front-end process is the subject of this book.\n\nIt is the least glamorous part of the chain. It is also the part most likely to be quietly, invisibly broken. And here is the uncomfortable truth: **you cannot route, decide, or execute on information you never cleanly acquired.** Garbage in, garbage out — the oldest rule in information systems is also the first rule of athletic perception.",
            reframe:"Here's where I'm supposed to tell you that elite athletes have superhuman eyes. Better optics, sharper retinas, faster photoreceptors. I'm not going to, because the science says it isn't quite true — and the place where it's *not* true is exactly where the opportunity lives.\n\nStudies are consistent: elite athletes, *once corrected*, don't differ dramatically from a well-screened population on conventional eye-chart measures. The catch is in those two words — *once corrected.* Because an enormous fraction of athletes are operating below their own hardware ceiling, held there by an acquisition deficit no coach is trained to spot and no athlete knows they have. Uncorrected astigmatism that smears every fast target. Contrast sensitivity in the bottom tenth. A focusing system that can't hold through a possession. None of these read as \"blindness.\" The athlete sees. They just don't see *cleanly* — and they have no reference point for what clean would feel like, because they've never had it.\n\nThis is the distinction the whole book is built on: the difference between the *quality of your eyes* and the *quality of the signal your eyes deliver.* The first is mostly fixed. The second can be degraded by a dozen correctable problems — and it can be protected, corrected, and conditioned. That is what ACQUIRE is about.",
            chain:"Think of the path from the world to the brain as a chain of stations, each handling the visual signal in turn: the photon, the cornea and tear film, the pupil and aqueous humor, the lens, the vitreous, the retina and its cells, the macula and fovea, the optic nerve, and finally the optic chiasm. I call it the Acquisition Chain.\n\nHere is the critical property of a chain: its total fidelity is the *product* of every stage, not the sum. A signal that is 95% clean at each of ten stages is not 95% clean at the end — it's about 60%. Small losses compound. And a single badly broken link — uncorrected astigmatism at the cornea, say — can corrupt everything downstream no matter how perfect the rest of the chain is.\n\nThis is why \"20/20 vision\" is one of the most misleading numbers in sport. Twenty-twenty measures one property, at one distance, on a stationary chart, in good light. It tells you almost nothing about contrast, glare, focus stability, eye-teaming, or depth. An athlete can be 20/20 and still be hemorrhaging signal fidelity at three other links in the chain.",

          aresStage:"acquire",
          content:{
            hook:"Stand at the optic chiasm and look back. The chain is complete. From here on, the brain takes over.",
            opening:"A photon left an object out in the world. The tear film and cornea bent it sharply. The pupil set the aperture. The lens fine-tuned the focus. The vitreous carried the image undisturbed. The retina caught it, sharpened its edges, flagged its motion, and compressed it ~100:1. The macula and fovea concentrated detail at the center while the periphery watched for movement. The optic nerve bundled it all and carried it to the crossing.\n\nThat is the Acquisition Chain, end to end. Ten stations. The signal that arrives at the chiasm is now set. Fixed. Final. Whatever fidelity survived is all the brain will ever have.",
            mechanism:"Past the chiasm: the **optic tracts** carry the signal to the **lateral geniculate nucleus (LGN)** — a thalamic relay that receives MORE descending input from cortex than ascending input from the eye. That descending control is **attention, operating as a gain knob** on the signal. From there to **V1** for feature extraction (edges, orientations, local motion), then a split into two streams: the **dorsal** stream (where/how, fast, action — driven by M-pathway with a ~40 ms head start) and the **ventral** stream (what, slower, identity — driven by P-pathway). And on top of all of it: **prediction**. An expected event is fast-tracked; an unexpected one is flagged for attention.",
            sportTranslation:"The two costliest mistakes in the field run in both directions. **Routing problems blamed on the eyes** — prescription changes that won't fix attention. And **acquisition problems attacked with routing tools** — months of perceptual drills on top of an uncorrected refractive error. The order is non-negotiable: **fix the hardware first, then train the software**. The chiasm is the conceptual line that separates them.",

          content:{
            hook:"\"She doesn't have great anticipation.\" \"Low IQ.\" \"The game's too fast for him.\" These aren't diagnoses — they're descriptions of symptoms. A dozen different acquisition problems can produce the identical surface picture.",
            opening:"Coaches describe what they see on tape in language that is vivid, observational, and disconnected from what is actually happening inside the visual system. This chapter is a translation guide. Ten failure modes on the acquisition side of the chiasm. Each produces a specific behavioral signature that has been mislabeled for decades. Each is correctable or conditionable.",
            mechanism:"**1. Uncorrected Refractive Error.** \"He's not sharp.\" Cornea/lens optics don't match eye length. Fix: real refraction with cylinder.\n\n**2. Tear Film Instability.** \"Eyes get tired.\" Unstable tear film. Fix: surface management.\n\n**3. Low Contrast Sensitivity.** \"Loses the puck against the boards.\" Retinal processing deficit — this was Noah West. Fix: correction + targeted contrast training, tints.\n\n**4. Accommodative Dysfunction.** \"Slow to pick up the ball when play changes levels.\" Lens focusing system. Fix: facility training, rule out hyperopia.\n\n**5. Convergence Insufficiency.** \"Hesitates, doesn't commit, tentative late.\" Eye-teaming on near targets. Fix: vergence therapy.\n\n**6. Oculomotor Instability.** \"Tracking is off.\" Imprecise saccades or slow pursuit. Fix: oculomotor conditioning.\n\n**7. Impaired Stereo Depth.** \"Misjudges the hop.\" Reduced stereoacuity. Fix: clinical referral.\n\n**8. Poor Light & Glare Adaptation.** \"Doesn't travel well.\" Adaptation problems. Fix: tints, deliberate transitions.\n\n**9. Peripheral Field Compromise.** \"Doesn't see it coming.\" Could be early glaucoma. Fix: visual field testing, dilated exam.\n\n**10. Silent Ocular Pathology.** \"Slump.\" Actual eye disease. Fix: same-day eval for red flags.",
            sportTranslation:"All ten are degradations of the signal *before* the chiasm. Every one looks like indecision, lost confidence, low IQ from the sideline. Every one is correctable. Rule out these ten before invoking routing. Far more often than expected, you'll find a broken link in the first ten minutes — and that's Noah West, in the next chapter.",

        {
          id:"ch13", number:"Chapter 13", title:"The Noah West Story — A Five-Year Transformation",
          type:"science", interactive:"noahTimeline", interactiveLabel:"The Five-Year Arc",
          exploreHeading:"Walk Noah West's transformation year by year",
          exploreSub:"From an unscouted high school goalie with 13th-percentile contrast sensitivity to an elite Frozen Four competitor at the University of Michigan. Click each year to see the measured percentile gains across acuity, contrast, depth, perception span, and reaction time — and at the end, the cohort-level proof that this isn't a single outlier case.",
          aresStage:"acquire",
          content:{
            hook:"This chapter is the proof of concept. Not science. Not theory. Numbers — measured, documented, before and after.",
            opening:"On August 6, 2019, a high school kid walked into my office for the first time, and I had no idea I was about to document one of the most complete visual-cognitive transformations I would ever see.\n\nHis name was Noah West. He was a goalie. Talented, hardworking, and, according to everyone who knew him, destined for college hockey. He was also operating under a significant handicap that nobody had ever identified.\n\nLet me give you the numbers first, because numbers are how science works — and then I'll tell you the story.",
            mechanism:"**The initial evaluation, August 2019.** A high school hockey goalie. Visual acuity in the **32nd percentile**. Contrast sensitivity in the **13th percentile** — bottom seventh of the population. Depth perception in the **11th percentile**. Perception span 45th. Reaction time 299 ms. And buried under all of it: **2 diopters of uncorrected astigmatism, both eyes.**\n\nThirteenth-percentile contrast sensitivity. For a *goalie* whose entire job is to detect a small, dark, fast-moving object against a cluttered background of white boards, white ice, and white jerseys — this kid's contrast detection system was operating at the bottom seventh of the population. And nobody had ever checked.\n\n**The intervention, 2019–2020.** First: correct the astigmatism. There is no training around 2 diopters of uncorrected refractive error — no perceptual program, no neuro-training, no protocol fixes what isn't focusing correctly on the retina. We prescribed sport-specific astigmatic correction, custom-fitted to a goalie's hockey-specific distances and motion. The immediate report: for the first time, Noah could see the laces on a puck.\n\nThen: training. Four-phase progression — isolation, load, noise, transfer. Eye-tracking software for saccadic accuracy and smooth pursuit. FitLight reactive drills. VR scenarios for anticipatory gaze positioning. 45–60 minutes per session, three to four times per week off-season.\n\n**The complication, Spring 2021.** Robert Morris University — where Noah had committed on a full ride to play D1 hockey — abruptly eliminated both its men's and women's hockey programs. Noah was thrust into the transfer portal alongside dozens of displaced scholarship athletes.\n\n**The transfer, Summer 2021.** University of Michigan was looking for a goalie. What Noah had that interested them, beyond his play, was a documented trajectory of measurable improvement. Michigan made a calculated bet.\n\n**The transformation, 2021–2024.** July 2022 (one year post-transfer): contrast sensitivity at **34th percentile** (from 13). Perception span 97th. Reaction time 88th. April 2023 (two years post-transfer): contrast at the **96th percentile**. Perception 98th. Reaction 93rd. May 2024 (five years post-initial, after back-to-back Frozen Four appearances): visual acuity at **20/13** — elite-level corrected acuity. Perception 96th. MOT 88th. Near-far quickness 98th.\n\nFrom 13th-percentile contrast to 96th. From unscouted to Frozen Four.",
            sportTranslation:"To put the percentile gains in context: in elite-level fast-reaction sport, reaction time and contrast sensitivity cluster in tight bands that separate the professional from the merely good. Noah moved from the bottom quartile into those elite bands. The contrast gain was particularly large because he started from such a deficit — once the uncorrected astigmatism was corrected and the system was conditioned, the room to recover was enormous.\n\n**This isn't just one athlete.** In 2022–2023, the **Andretti IndyCar program** ran 27 drivers through comparable evaluation and training. Across the cohort: average reaction-time improvement of **27%**. Average multiple-object-tracking and perception-span gains in the 25–35% range. ~85% of gains retained across the off-season with minimal maintenance. Different sport, different athletes, same direction. Team-level evidence — a consistent, replicable pattern, not a single lucky case.\n\nThree things, specifically, made Noah's transformation possible. **Early identification** — evaluated and corrected at 17, while his nervous system still had ample plasticity. **Consistency** — trained steadily across five years, integrated into his athletic routine. **Integration with sport** — the training never lived in isolation; it was designed for transfer, and the transfer happened because the connection to actual on-ice outcomes was explicit.",
            aresConnection:"Noah West did not become elite *despite* his visual limitations. He became elite partly *because* those limitations were finally identified and addressed.\n\nWithout intervention, the counterfactual is bleak. At 17, he's a hardworking high school goalie with uncorrected astigmatism and bottom-quartile vision that nobody is looking for. Maybe he reaches college; maybe the development plateaus. He's working harder than his peers to extract the same information, fatiguing faster, inconsistent because his visual system is running at maximum just to keep pace. By his early twenties, the margin at the top of the sport is too thin to survive on a degraded signal, and he's probably done. Not for lack of work — because he couldn't see the game fast enough, and nobody ever helped him fix it.\n\nThe lesson of this chapter — the single sentence that summarizes the whole book — is this: **The signal is correctable and trainable, but only if you measure it first.** You cannot correct what you have not diagnosed. You cannot diagnose what you are not looking for.",
            callout:{
              clinical:"Document a comprehensive baseline at intake for every athlete: refraction with cylinder, contrast sensitivity (Pelli-Robson or equivalent — NOT just acuity), stereoacuity, near point of convergence, accommodative function, oculomotor measures, ocular health with disc evaluation and IOP. Re-test at standardized intervals so trajectory becomes visible. For young athletes with refractive correction needs: correct first, then evaluate. The Noah West gain pattern (13th-to-96th percentile contrast) is only possible because the underlying astigmatism was caught and corrected before perceptual training began.",
              coaching:"When you see a hardworking athlete who plateaus or seems to underperform their potential, run them through a real eye exam before you write them off as 'lacks talent' or 'doesn't have the mental side.' Most coaches have a Noah West on their roster — they just don't know which one. The cost of an exam is a fraction of the cost of writing off a player who couldn't see clearly."
            },
            summary:[
              "Initial 2019 baseline: 32nd percentile acuity, 13th contrast, 11th depth, 2 diopters uncorrected astigmatism.",
              "Intervention: correct astigmatism FIRST (no training around 2 D of uncorrected refractive error), then four-phase progression — isolation, load, noise, transfer.",
              "Five-year arc to 96th-percentile contrast, 20/13 acuity, elite-band reaction and perception scores.",
              "Cohort proof: Andretti IndyCar 27 drivers averaged 27% reaction-time improvement on the same protocol.",
              "Three enabling factors: early identification (age 17 plasticity), consistency over years, integration with sport.",
              "The lesson: perception is correctable and trainable — but only if you measure it first."
            ],
            quiz:[
              { question:"What was Noah West's MOST consequential measurement at initial evaluation — the one that explained his on-ice struggles?", options:["32nd percentile visual acuity","13th percentile contrast sensitivity — the bottom seventh of the population, devastating for a goalie tracking a dark puck","Reaction time of 299 ms","Perception span of 45"], correct:1, feedback:"Contrast sensitivity matters more than acuity for a goalie's specific task. 13th percentile means the puck is dramatically harder to separate from the busy background. And acuity (which screening tests) was 'only' 32nd percentile — masking the more serious deficit underneath." },
              { question:"What had to happen BEFORE any visual-cognitive training could pay off for Noah?", options:["Strength training","Correcting the 2 diopters of uncorrected astigmatism","Mental-skills coaching","Switching positions"], correct:1, feedback:"Fix the hardware first. There is no training around 2 D of uncorrected refractive error — every rep is on a smeared signal. Correction came first, training came second." },
              { question:"What does the Andretti IndyCar cohort data prove?", options:["Noah West is a one-off","The transformation pattern is replicable — 27 drivers averaged a 27% reaction-time improvement on comparable protocols","Reaction time is genetic","The protocol only works for hockey goalies"], correct:1, feedback:"Team-level evidence across 27 drivers in a different sport, same direction — the gain pattern is replicable, not anecdotal." }
            ]

    {
      id:"part5",
      label:"PART FIVE — CLOSING",
      chapters:[
        {
          id:"afterword", number:"Afterword", title:"The First Crossing",
          type:"afterword",
          content:{
            opening:"I'm going to return to where we started. The photon.\n\nEvery moment of athletic performance begins with light. A photon bounces off a player's body. It travels at 186,000 miles per second. It enters your eye through the cornea, passes through the lens, strikes the retina. In the time it takes me to finish this sentence, billions of photons will have done exactly that, and your brain will have decided, on the basis of the information they carry, what move to make.\n\nThree hundred milliseconds. From photon to decision. From perception to action.\n\nAnd buried inside those 300 milliseconds is a gap.\n\nA gap between the athletes who see everything and the athletes who see some things. A gap between the players who read the game and the players who react to the game. A gap between the elite and the very good.\n\nThat gap is not genetic. It's not talent. It's not something you're born with or born without.\n\n**It's trainable.**\n\nThis book has given you the science. The mechanisms. The specific systems that break, and how to fix them. The tools. The protocols. The evidence.\n\nNow I need to return to something personal, because this work is personal.\n\nI was a kid who played everything. Soccer, hockey, baseball, basketball, wrestling. An athlete who did everything right except the one thing that mattered most: nobody ever looked at my eyes.\n\nI didn't discover I needed an eye exam until I was in optometry school, studying the neuroscience of vision, learning the intricate pathways that turn photons into decisions and decisions into performance. And by then, I had already graduated from my sports. I had already made my choices, taken my shots, played my games without ever knowing whether my visual system was working optimally.\n\nI can't get those years back. I'll never know what I could have been if my visual system had been trained, measured, optimized, the way my strength was trained and my speed was measured.\n\nThat haunts me. Productively.\n\nBecause it drove me to build this system so that no athlete would have to wonder that question.\n\nThe Noah West story in this book is not an outlier. It's a proof of concept. When we measure the visual-cognitive system, when we identify the specific deficits, when we build targeted training protocols around those deficits — transformation happens. From 13th percentile to 96th percentile. From unscouted to Division I. From underneath the potential to performing within it.\n\nThat transformation is available to every athlete who walks into a gym, steps onto a field, takes the ice, picks up a racket.\n\n**But only if we look. Only if we measure. Only if we train.**\n\nThis book is my attempt to make that looking, measuring, and training systematic. To make it standard. To make it normal. To make it the expected thing that every serious athletic program does, the way they have trainers and nutritionists and strength coaches.\n\nBecause here's the truth I believe with absolute certainty: **the most significant untapped performance advantage in competitive sport today is the visual-cognitive acquisition system.**\n\nWe spend millions on strength coaches and sport psychologists and biomechanists and sleep scientists. We measure vertical jump and reaction time and VO2 max. We track every metric of athletic performance.\n\nAnd we leave the one system that feeds all the others completely untrained.\n\nThat's not a limitation of science. We have the science. That's not a limitation of evidence. We have the evidence.\n\nThat's a gap between what we know and what we're doing.\n\nThis book is my attempt to close it.\n\nFor the athletes and coaches and organizations that are ready to understand that perception is not luck, not talent, not something you're born with — perception is the first competitive advantage. Everything else is downstream.\n\nThe photon is already on its way to your eye. The signal is heading for the crossing.\n\nThe only question is: what will you have done with the chain it travels?",
            signature:"Dr. Joe LaPlaca, OD — Ares Elite Sports Vision"
          }
        },

          id:"glossary", number:"Reference", title:"Glossary",
          type:"glossary",
          content:{
            intro:"Every key term from the journey, photon to chiasm. Search by term or scan by category — each entry is a one-line definition you can return to.",
            entries:[
              { term:"ACQUIRE", category:"framework", def:"The first stage of the A.R.E.S. Performance Loop. The capture and conditioning of the visual signal, from the photon to the optic chiasm. The subject of this book." },
              { term:"A.R.E.S. Performance Loop", category:"framework", def:"The five-stage framework: Acquire → Route → Execute → Synchronize → Program. The complete chain of human visual-cognitive performance." },
              { term:"Accommodation", category:"optics", def:"The process by which the crystalline lens changes shape to shift focus between near and far targets. Driven by the ciliary muscle; amplitude declines steadily with age." },
              { term:"Accommodative facility", category:"optics", def:"The speed and accuracy with which the focusing system switches between distances. A trainable acquisition skill." },
              { term:"Acquisition Chain", category:"framework", def:"The ten-station chain from photon to optic chiasm. Total signal fidelity is the PRODUCT of every link — one broken station degrades the whole signal." },
              { term:"Acuity (visual)", category:"performance", def:"The sharpness of vision, measured most commonly by Snellen chart (e.g., 20/20). Tests one link in a ten-link chain — does NOT measure contrast, focus stability, eye-teaming, or depth." },
              { term:"Amacrine cells", category:"retina", def:"Retinal interneurons that handle timing and motion. Some are direction-selective — meaning motion detection BEGINS in the retina, before any cortical processing." },
              { term:"Aqueous humor", category:"anatomy", def:"The clear fluid filling the front of the eye. Produced by the ciliary body; nourishes the avascular cornea and lens; maintains intraocular pressure (10–21 mmHg)." },
              { term:"Astigmatism", category:"refractive", def:"A refractive error caused by an asymmetric (football-shaped) cornea or lens. Produces two focal points and a smeared image at all distances. Corrected with cylindrical lenses." },
              { term:"Axial length", category:"anatomy", def:"The front-to-back length of the eyeball. A mismatch between axial length and optical power produces myopia (too long) or hyperopia (too short)." },
              { term:"Bipolar cells", category:"retina", def:"Retinal cells that relay signals from photoreceptors toward ganglion cells. Two flavors: ON cells (respond to brightening) and OFF cells (respond to darkening) — the retina's first contrast computation." },
              { term:"Blind spot (physiological)", category:"anatomy", def:"The patch of each eye's visual field with no photoreceptors, located at the optic disc. The brain fills it in, which is why you've never consciously noticed it." },
              { term:"Chromatic aberration", category:"optics", def:"The failure of a lens to focus all wavelengths to the same point — different colors bend by different amounts. Sets a limit on maximum image sharpness." },
              { term:"Ciliary body", category:"anatomy", def:"The structure behind the iris that produces aqueous humor and houses the ciliary muscle." },
              { term:"Ciliary muscle", category:"anatomy", def:"The ring of muscle around the lens. Counterintuitively, it CONTRACTS to release the zonules and let the lens round up for near focus." },
              { term:"Cones", category:"cells", def:"Photoreceptors specialized for fine detail and color. ~6 million, concentrated in the fovea/macula. Three subtypes (long/medium/short wavelength); require good light to work well." },
              { term:"Contrast sensitivity", category:"performance", def:"The ability to distinguish objects from similar-brightness backgrounds. Computed in retinal bipolar/horizontal cell circuitry. Predicts sport performance more reliably than acuity." },
              { term:"Convergence", category:"anatomy", def:"The coordinated inward rotation of both eyes to fixate on a near target. Weak convergence is convergence insufficiency — a treatable binocular disorder." },
              { term:"Cornea", category:"anatomy", def:"The clear, dome-shaped front surface of the eye. Provides ~⅔ of the eye's focusing power; transparent due to its ordered collagen lattice; avascular and densely innervated." },
              { term:"Decussation (partial)", category:"anatomy", def:"The crossing at the optic chiasm where nasal retinal fibers cross to the opposite side and temporal fibers stay — re-sorting the signal from eye-based to space-based organization." },
              { term:"Diopter", category:"optics", def:"The unit of optical (focusing) power. The whole eye totals about 60 D; refractive errors and corrections are also measured in diopters." },
              { term:"Dorsal stream", category:"route", def:"Post-chiasm pathway running from V1 toward the parietal cortex. Handles 'where' and 'how' — motion, trajectory, action. Fast (M-pathway-driven). Largely subconscious." },
              { term:"Emmetropia", category:"refractive", def:"The matched optical state — eye length and optical power agree, light focuses precisely on the retina. The target every correction aims to restore." },
              { term:"Endothelium (corneal)", category:"anatomy", def:"The single layer of pump cells on the back of the cornea that keeps the stroma slightly dehydrated and therefore clear. Critically: these cells do NOT regenerate." },
              { term:"Fovea", category:"anatomy", def:"The ~1.5 mm cone-only pit at the center of the macula, covering 1–2° of visual field. Peak of human visual resolution. The 'thumbnail at arm's length' of sharp vision." },
              { term:"Foveola", category:"anatomy", def:"The ~0.35 mm at the very center of the fovea, where overlying neural layers are physically swept aside so light reaches the cones unobstructed. The eye's bullseye." },
              { term:"Ganglion cells", category:"cells", def:"The OUTPUT neurons of the retina. ~1.2 million fibers form the optic nerve. Three main types: M (magnocellular, motion), P (parvocellular, detail/color), K (koniocellular)." },
              { term:"Glaucoma", category:"pathology", def:"Progressive optic-nerve damage usually driven by elevated intraocular pressure. Painless. Attacks PERIPHERAL vision first — silently — and damage is permanent." },
              { term:"Horizontal cells", category:"retina", def:"Retinal cells that produce lateral inhibition — sampling a wide patch and suppressing neighbors. Sharpens edges and amplifies contrast before the signal leaves the eye." },
              { term:"Hyperopia (farsightedness)", category:"refractive", def:"Eye too short for its optics. Near light would focus behind the retina; young athletes compensate by accommodating constantly, paying with strain and late-game fade. Plus lens correction." },
              { term:"Intraocular pressure (IOP)", category:"performance", def:"The fluid pressure inside the eye, set by aqueous humor production vs. drainage. Normally 10–21 mmHg. Sustained elevation damages the optic nerve — glaucoma." },
              { term:"Iris", category:"anatomy", def:"The pigmented muscular diaphragm controlling pupil size via the sphincter and dilator muscles. Eye color is iris pigmentation." },
              { term:"Keratoconus", category:"pathology", def:"Progressive corneal thinning and bulging into a cone shape. Often begins in the teens or twenties. Must be screened before refractive surgery." },
              { term:"Lamina cribrosa", category:"anatomy", def:"The sieve-like mesh at the optic disc where ganglion-cell fibers pierce the sclera. The structural weak point where IOP damages fibers in glaucoma." },
              { term:"Lateral inhibition", category:"retina", def:"A neural mechanism in which one cell's activity suppresses its neighbors. In the retina, horizontal cells perform this — sharpening edges and amplifying contrast." },
              { term:"Lens (crystalline)", category:"anatomy", def:"The transparent, layered, adjustable focusing element behind the iris. Adds ~15–20 D in youth, changes shape to accommodate, grows throughout life, stiffens with age." },
              { term:"M-pathway (magnocellular)", category:"cells", def:"Fast, motion-sensitive ganglion-cell channel originating in M cells. Colorblind, coarse, fast. Feeds the dorsal stream. Carries a ~40 ms head start over the P-pathway." },
              { term:"Macula", category:"anatomy", def:"The cone-rich central region of the retina (~5.5 mm) responsible for detailed central vision. Yellow xanthophyll pigments filter blue light. Site of age-related macular degeneration." },
              { term:"Myelin", category:"cells", def:"The fatty insulation around nerve fibers enabling fast conduction. On the optic nerve, made by CNS cells (oligodendrocytes) — marking it as a brain tract, not a peripheral nerve." },
              { term:"Myopia (nearsightedness)", category:"refractive", def:"Eye too long for its optics. Distance light focuses in front of the retina, blurring distance vision. Corrected with minus lenses; progression in youth can be slowed with myopia control." },
              { term:"Optic chiasm", category:"anatomy", def:"The X-shaped crossing at the base of the brain where the optic nerves meet and partially decussate. The endpoint of ACQUIRE and the start of ROUTE." },
              { term:"Optic disc", category:"anatomy", def:"The spot where ganglion-cell fibers exit the eye. Site of the physiological blind spot. A clinical window onto optic-nerve and intracranial health." },
              { term:"Optic nerve", category:"anatomy", def:"The cable of ~1.2 million ganglion-cell fibers carrying the visual signal from the eye to the chiasm. A CNS tract — does not regenerate." },
              { term:"P-pathway (parvocellular)", category:"cells", def:"Slower, detail- and color-sensitive ganglion-cell channel originating in P cells. Concentrated centrally. Feeds the ventral stream." },
              { term:"Photon", category:"optics", def:"The smallest indivisible unit of light, carrying information in its wavelength and intensity. The first link in the Acquisition Chain — the only messenger the eye ever gets." },
              { term:"Photoreceptor", category:"cells", def:"A light-detecting cell in the retina — a rod or a cone. Performs phototransduction." },
              { term:"Phototransduction", category:"cells", def:"The conversion of captured light into an electrical signal by photoreceptors. The moment light becomes information." },
              { term:"Posterior vitreous detachment (PVD)", category:"pathology", def:"The age-related separation of the vitreous gel from the retina. Often causes floaters and flashes. Can occasionally cause a retinal tear — needs prompt evaluation." },
              { term:"Presbyopia", category:"refractive", def:"The age-related loss of accommodation, beginning in the mid-forties, as the lens stiffens and can no longer focus near targets. Corrected with reading glasses or multifocals." },
              { term:"Pupil", category:"anatomy", def:"The adjustable opening in the iris (not a structure — a hole). Sets the eye's aperture, trading light intake against depth of field and optical sharpness." },
              { term:"Pupillary light reflex", category:"performance", def:"The automatic constriction of both pupils in response to light — mediated through the midbrain. A quick check of front-end neural integrity." },
              { term:"Refractive error", category:"refractive", def:"A mismatch between optical power and eye length, blurring the image. Includes myopia, hyperopia, and astigmatism — the most common and most correctable acquisition deficit." },
              { term:"Retina", category:"anatomy", def:"The neural sheet lining the back of the eye — central nervous system tissue that captures, processes, and compresses the visual signal. Mostly peripheral and rod-dominant." },
              { term:"Retinal detachment", category:"pathology", def:"The lifting of the retina off the back wall of the eye, often after a tear. A true ocular emergency — signaled by sudden floaters, flashes, or a curtain across vision." },
              { term:"Retinal pigment epithelium (RPE)", category:"cells", def:"The single layer of pigmented support cells behind the photoreceptors. Absorbs stray light, feeds the receptors, recycles light-sensitive pigments. Failure is the heart of AMD." },
              { term:"Rods", category:"cells", def:"Photoreceptors specialized for dim light and motion detection. ~120 million, distributed across the periphery. Single-photon sensitive but colorblind and low-resolution." },
              { term:"ROUTE", category:"framework", def:"The second stage of the A.R.E.S. Performance Loop — what the brain does with the signal after the chiasm. The subject of Book Two." },
              { term:"Saccade", category:"performance", def:"A rapid, ballistic eye movement that redirects gaze (30–80 ms). Saccadic accuracy keeps the fovea landing on its target." },
              { term:"Sclera", category:"anatomy", def:"The tough white outer wall of the eye that maintains its shape." },
              { term:"Smooth pursuit", category:"performance", def:"The eye movement that smoothly tracks a moving target. Tracking gain (eye velocity / target velocity) measures its accuracy; doubles as a fatigue index." },
              { term:"Stereopsis / Stereoacuity", category:"performance", def:"Binocular depth perception computed from the disparity between the two eyes' images. Stereoacuity is its precision, measured in arc seconds." },
              { term:"Tear film", category:"anatomy", def:"The thin liquid layer coating the cornea — the eye's actual first optical surface. Instability (from wind, dryness, unblinking gaze) degrades image quality." },
              { term:"Vergence", category:"performance", def:"The coordinated inward (convergence) or outward (divergence) rotation of both eyes to stay aligned on a target across distances." },
              { term:"Ventral stream", category:"route", def:"Post-chiasm pathway running from V1 toward the temporal cortex. Handles 'what' — identity, recognition, color. Slower (P-pathway-driven). More deliberate." },
              { term:"Visible spectrum", category:"optics", def:"The narrow band of electromagnetic wavelengths the eye can detect, roughly 380 to 700 nanometers, mapping to colors violet through red." },
              { term:"Vitreous humor", category:"anatomy", def:"The clear gel filling ~80% of the eye, transmitting the focused image to the retina and maintaining eye shape. Liquefies and detaches with age." },
              { term:"Wavelength", category:"optics", def:"The distance between peaks of a light wave, determining perceived color and how strongly it scatters and bends." },
              { term:"Zonules", category:"anatomy", def:"The fine suspensory fibers connecting the lens to the ciliary muscle. They slacken (allowing the lens to round) or tighten (flattening it) during accommodation." }
            ]
          }
        }
      ]
    }
  ]
};

const DB_NAME = "ares_acquire";
const DB_VERSION = 1;
function openDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, DB_VERSION); req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains("progress")) db.createObjectStore("progress", { keyPath: "id" }); }; req.onsuccess = (e) => resolve(e.target.result); req.onerror = (e) => reject(e.target.error); }); }
async function saveProgress(id, data) { try { const db = await openDB(); const tx = db.transaction("progress", "readwrite"); tx.objectStore("progress").put({ id, ...data, updatedAt: Date.now() }); } catch (e) {} }

function renderRich(text, keyPrefix) {
  const nodes = [];
  const re = /(\*\*[^*]+\*\*|\*[^*]+\*)/g;
  let last = 0, m, i = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) nodes.push(text.slice(last, m.index));
    const seg = m[0];
    if (seg.startsWith("**")) nodes.push(<strong key={keyPrefix + "-b" + i}>{seg.slice(2, -2)}</strong>);
    else nodes.push(<em key={keyPrefix + "-i" + i}>{seg.slice(1, -1)}</em>);
    last = m.index + seg.length; i++;
  }
  if (last < text.length) nodes.push(text.slice(last));
  return nodes;
}

function applyHighlights(root, highlights) {
  if (!root) return;
  root.querySelectorAll(".ares-mark").forEach(mark => { const parent = mark.parentNode; while (mark.firstChild) parent.insertBefore(mark.firstChild, mark); parent.removeChild(mark); if (parent.normalize) parent.normalize(); });
  if (!highlights || highlights.length === 0) return;
  const sorted = highlights.slice().sort((a, b) => (b.text || "").length - (a.text || "").length);
  sorted.forEach(h => {
    if (!h.text || h.text.length < 3) return;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, { acceptNode: (n) => { if (n.parentNode && n.parentNode.closest && n.parentNode.closest(".ares-mark")) return NodeFilter.FILTER_REJECT; return NodeFilter.FILTER_ACCEPT; } });
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(node => {
      const text = node.textContent;
      const idx = text.indexOf(h.text);
      if (idx === -1) return;
      const before = text.slice(0, idx);
      const match = text.slice(idx, idx + h.text.length);
      const after = text.slice(idx + h.text.length);
      const parent = node.parentNode;
      if (before) parent.insertBefore(document.createTextNode(before), node);
      const mark = document.createElement("mark");
      mark.className = "ares-mark";
      mark.textContent = match;
      mark.dataset.hlId = h.id;
      parent.insertBefore(mark, node);
      if (after) parent.insertBefore(document.createTextNode(after), node);
      parent.removeChild(node);
    });
  });
}

function Prose({ text, highlights }) {
  const ref = useRef(null);
  useEffect(() => { applyHighlights(ref.current, highlights); }, [text, highlights]);
  return (<div className="prose" ref={ref}>{text.split("\n\n").map((para, i) => <p key={i}>{renderRich(para, "p" + i)}</p>)}</div>);
}

function ProgressRing({ progress = 0, size = 20, strokeWidth = 2 }) {
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (progress * circ);
  return (<svg className="nav-progress-ring" width={size} height={size} viewBox={"0 0 " + size + " " + size}><circle className="nav-progress-bg" cx={size/2} cy={size/2} r={r} /><circle className="nav-progress-fill" cx={size/2} cy={size/2} r={r} strokeDasharray={circ} strokeDashoffset={offset} /></svg>);
}

  return (<div>{questions.map((q, qi) => (<div className="quiz-question" key={qi}><div className="quiz-q-text">{q.question}</div>{q.options.map((opt, oi) => { let cls = "quiz-option"; if (answers[qi] === oi) cls += " selected"; if (submitted[qi] && oi === q.correct) cls += " correct"; if (submitted[qi] && answers[qi] === oi && oi !== q.correct) cls += " wrong"; return (<div key={oi} className={cls} onClick={() => select(qi, oi)}><div className="quiz-radio" /><span>{opt}</span></div>); })}{answers[qi] !== undefined && !submitted[qi] && (<button style={{ marginTop: 12, padding: "8px 20px", background: "var(--lp)", color: "white", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 500 }} onClick={() => submit(qi)}>Check Answer</button>)}{submitted[qi] && (<div className={"quiz-feedback show " + (answers[qi] === q.correct ? "correct" : "wrong")}>{q.feedback}</div>)}</div>))}</div>);
}

function AcquisitionChain() {
  const [sel, setSel] = useState(0);
  const d = CHAIN[sel];

function extractYouTubeId(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  const m = s.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function getChapterSegments(chapter) {

    return [c.opening && { id: "opening", label: "Opening", text: c.opening }, c.reframe && { id: "reframe", label: "The Reframe", text: c.reframe }, c.chain && { id: "chain", label: "The Acquisition Chain", text: c.chain }, c.handoff && { id: "handoff", label: "The Hand-Off", text: c.handoff }, c.callout && c.callout.clinical && { id: "clinical", label: "Clinical Lens", text: c.callout.clinical }, c.callout && c.callout.coaching && { id: "coaching", label: "Coaching Lens", text: c.callout.coaching }, c.summary && c.summary.length && { id: "summary", label: "Chapter Summary", text: c.summary.join(". ") }].filter(Boolean);

function isNaturalVoice(v) { if (!v || !v.name) return false; return /natural|premium|enhanced|neural|online|wavenet|studio|siri/i.test(v.name) || /samantha|karen|moira|tessa|veena|fiona|alex|daniel|catherine|kate|serena|allison|ava/i.test(v.name); }
function voiceLabel(v) { if (!v) return ""; let n = v.name.replace(/Microsoft |Google |Apple /g, ""); if (isNaturalVoice(v)) n = "★ " + n; return n.slice(0, 30); }
function browserHint() { const ua = (typeof navigator !== "undefined" && navigator.userAgent) || ""; if (/Edg\//.test(ua)) return null; if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return { msg: "For more natural voices, try Microsoft Edge — it ships with high-quality Neural voices.", strong: "Tip" }; if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return { msg: "On macOS, premium voices like Samantha and Ava sound dramatically better — download via System Settings → Accessibility.", strong: "Tip" }; return { msg: "Microsoft Edge offers free Neural voices that sound dramatically more natural.", strong: "Tip" }; }

function AudiobookBar({ chapter, segments }) {
  const [status, setStatus] = useState("idle");
  const [segIdx, setSegIdx] = useState(0);
  const [rate, setRate] = useState(1.0);
  const [voices, setVoices] = useState([]);
  const [voiceURI, setVoiceURI] = useState("");
  const [tipDismissed, setTipDismissed] = useState(() => { try { return localStorage.getItem("ares_audio_tip_dismissed") === "1"; } catch (e) { return false; } });
  const segIdxRef = useRef(0);
  const isRestarting = useRef(false);
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;
  useEffect(() => {
    if (!supported) return;
    const ss = window.speechSynthesis;
    const loadVoices = () => {
      const all = ss.getVoices();
      const en = all.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
      const list = en.length ? en : all;
      const sorted = list.slice().sort((a, b) => { const an = isNaturalVoice(a), bn = isNaturalVoice(b); if (an && !bn) return -1; if (!an && bn) return 1; return a.name.localeCompare(b.name); });
      setVoices(sorted);
      if (sorted.length && !voiceURI) { const stored = (() => { try { return localStorage.getItem("ares_audio_voice"); } catch (e) { return null; } })(); const fromStorage = stored && sorted.find(v => v.voiceURI === stored); const best = fromStorage || sorted.find(isNaturalVoice) || sorted[0]; if (best) setVoiceURI(best.voiceURI); }
    };
    loadVoices();
    ss.addEventListener("voiceschanged", loadVoices);
    return () => { ss.removeEventListener("voiceschanged", loadVoices); ss.cancel(); };
  }, [supported]);
  useEffect(() => { try { if (voiceURI) localStorage.setItem("ares_audio_voice", voiceURI); } catch (e) {} }, [voiceURI]);
  useEffect(() => { try { localStorage.setItem("ares_audio_rate", String(rate)); } catch (e) {} }, [rate]);
  useEffect(() => { try { const stored = parseFloat(localStorage.getItem("ares_audio_rate")); if (stored && !isNaN(stored)) setRate(stored); } catch (e) {} }, []);
  useEffect(() => { if (supported) window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; }, [chapter && chapter.id]);
  const strip = (t) => String(t).replace(/\*\*([^*]+)\*\*/g, "$1").replace(/\*([^*]+)\*/g, "$1").replace(/\s+/g, " ").trim();
  const speakSeg = (i) => { if (!supported) return; if (!segments || i >= segments.length) { setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; return; } setSegIdx(i); segIdxRef.current = i; const seg = segments[i]; const utter = new SpeechSynthesisUtterance(strip(seg.text)); utter.rate = rate; const v = voices.find(vv => vv.voiceURI === voiceURI); if (v) utter.voice = v; utter.onend = () => { if (!isRestarting.current) speakSeg(segIdxRef.current + 1); }; utter.onerror = () => { if (!isRestarting.current) speakSeg(segIdxRef.current + 1); }; window.speechSynthesis.speak(utter); };
  useEffect(() => { if (status !== "playing" || !supported) return; isRestarting.current = true; window.speechSynthesis.cancel(); const t = setTimeout(() => { isRestarting.current = false; speakSeg(segIdxRef.current); }, 80); return () => clearTimeout(t); }, [rate, voiceURI]);
  const start = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(0); };
  const pauseResume = () => { if (!supported) return; if (status === "playing") { window.speechSynthesis.pause(); setStatus("paused"); } else if (status === "paused") { window.speechSynthesis.resume(); setStatus("playing"); } };
  const stop = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; };
  const skip = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.min(segments.length, segIdxRef.current + 1)); };
  const back = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.max(0, segIdxRef.current - 1)); };
  const jumpTo = (i) => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(i); };
  const dismissTip = () => { setTipDismissed(true); try { localStorage.setItem("ares_audio_tip_dismissed", "1"); } catch (e) {} };
  if (!supported || !segments || segments.length === 0) return null;
  const currentVoice = voices.find(v => v.voiceURI === voiceURI);
  const naturalCount = voices.filter(isNaturalVoice).length;
  const tip = !tipDismissed && naturalCount === 0 ? browserHint() : null;
  return (
    <React.Fragment>
      {tip && (<div className="ab-tip"><span><strong>{tip.strong}:</strong> {tip.msg}</span><button className="ab-tip-close" onClick={dismissTip}>×</button></div>)}
      {status === "idle" ? (
        <div className="audiobook-bar idle"><button className="ab-cta" onClick={start}><span className="ab-cta-ico">{"🎧"}</span> Listen to this chapter</button><span className="ab-hint">Reads aloud, section by section{currentVoice && isNaturalVoice(currentVoice) && " · natural voice"}</span></div>
      ) : (
        <div className="audiobook-bar active">
          <div className="ab-current"><div className="ab-current-label">Now playing · section {segIdx + 1} of {segments.length}</div><div className="ab-current-title">{segments[segIdx] && segments[segIdx].label}</div></div>
          <div className="ab-controls">
            <button className="ab-btn" onClick={back} title="Previous">{"⏮"}</button>
            <button className="ab-btn primary" onClick={pauseResume} title={status === "playing" ? "Pause" : "Resume"}>{status === "playing" ? "⏸" : "▶"}</button>
            <button className="ab-btn" onClick={skip} title="Next">{"⏭"}</button>
            <button className="ab-btn" onClick={stop} title="Stop">{"⏹"}</button>
            <select className="ab-jump" value={segIdx} onChange={e => jumpTo(parseInt(e.target.value))}>{segments.map((s, i) => <option key={s.id} value={i}>{(i + 1) + ". " + s.label}</option>)}</select>
            <select className="ab-speed" value={rate} onChange={e => setRate(parseFloat(e.target.value))}>{[0.75, 1.0, 1.25, 1.5, 2.0].map(r => <option key={r} value={r}>{r}×</option>)}</select>
            {voices.length > 1 && (<select className="ab-voice" value={voiceURI} onChange={e => setVoiceURI(e.target.value)} title="Voice (★ = natural)">{voices.slice(0, 18).map((v) => <option key={v.voiceURI} value={v.voiceURI}>{voiceLabel(v)}</option>)}</select>)}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function HighlightActionPopup({ onHighlight, onNote }) {
  const [popup, setPopup] = useState(null);
  useEffect(() => {
    const handler = (e) => {
      if (e.target && e.target.closest && e.target.closest(".hl-popup")) return;
      setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) { setPopup(null); return; }
        const text = sel.toString().trim();
        if (text.length < 3 || text.length > 600) { setPopup(null); return; }
        const range = sel.getRangeAt(0);
        const container = range.commonAncestorContainer;
        const element = container.nodeType === 3 ? container.parentElement : container;
        if (!element || !element.closest(".prose")) { setPopup(null); return; }
        const rect = range.getBoundingClientRect();
        if (rect.width === 0) { setPopup(null); return; }
        setPopup({ text, x: rect.left + rect.width / 2, y: rect.top });
      }, 50);
    };
    const clear = () => setPopup(null);
    document.addEventListener("mouseup", handler);
    document.addEventListener("touchend", handler);
    document.addEventListener("scroll", clear, true);
    return () => { document.removeEventListener("mouseup", handler); document.removeEventListener("touchend", handler); document.removeEventListener("scroll", clear, true); };
  }, []);
  if (!popup) return null;
  return (<div className="hl-popup" style={{ left: popup.x, top: popup.y - 8 }}><button onClick={(e) => { e.stopPropagation(); onHighlight(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>★ Highlight</button><button onClick={(e) => { e.stopPropagation(); onNote(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>+ Note</button></div>);
}

function GlossaryView({ chapter }) {
  const c = chapter.content;
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("all");
  const categories = [
    { key: "all", label: "All" },
    { key: "framework", label: "Framework" },
    { key: "anatomy", label: "Anatomy" },
    { key: "cells", label: "Cells" },
    { key: "retina", label: "Retinal cells" },
    { key: "optics", label: "Optics" },
    { key: "refractive", label: "Refractive errors" },
    { key: "performance", label: "Performance" },
    { key: "pathology", label: "Pathology" },
    { key: "route", label: "ROUTE preview" }
  ];
  const filtered = c.entries.filter(e => {
    if (category !== "all" && e.category !== category) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return e.term.toLowerCase().includes(s) || e.def.toLowerCase().includes(s);
  }).slice().sort((a, b) => a.term.localeCompare(b.term));
  return (
    <div>
      <div className="chapter-header">
        <div className="chapter-act-label">Part Five — Reference</div>
        <div className="chapter-number">{chapter.number}</div>
        <div className="chapter-title">{chapter.title}</div>
        <div className="chapter-hook">{c.intro}</div>
      </div>
      <div className="gl-search-bar"><input type="search" placeholder="Search by term or definition…" value={search} onChange={e => setSearch(e.target.value)} className="gl-search" /></div>
      <div className="gl-categories">{categories.map(cat => (<button key={cat.key} className={"gl-cat " + (category === cat.key ? "active" : "")} onClick={() => setCategory(cat.key)}>{cat.label}</button>))}</div>
      <div className="gl-results">
        {filtered.length === 0 ? (<div className="gl-empty">No entries match "{search}". Try a different term or clear the filter.</div>) : (
          filtered.map(e => {
            const catObj = categories.find(c => c.key === e.category);
            return (<div key={e.term} className="gl-entry"><span className="gl-term">{e.term}</span>{catObj && catObj.key !== "all" && <span className="gl-cat-badge">{catObj.label}</span>}<div className="gl-def">{e.def}</div></div>);
          })
        )}
      </div>
      <div className="gl-footer">Showing <strong>{filtered.length}</strong> of <strong>{c.entries.length}</strong> entries</div>
    </div>
  );
}

function wavelengthToRGB(w) { let R = 0, G = 0, B = 0; if (w >= 380 && w < 440) { R = -(w - 440) / 60; G = 0; B = 1; } else if (w >= 440 && w < 490) { R = 0; G = (w - 440) / 50; B = 1; } else if (w >= 490 && w < 510) { R = 0; G = 1; B = -(w - 510) / 20; } else if (w >= 510 && w < 580) { R = (w - 510) / 70; G = 1; B = 0; } else if (w >= 580 && w < 645) { R = 1; G = -(w - 645) / 65; B = 0; } else if (w >= 645 && w <= 700) { R = 1; G = 0; B = 0; } let f = 1; if (w < 420) f = 0.3 + 0.7 * (w - 380) / 40; else if (w > 700) f = 0.3 + 0.7 * (780 - w) / 80; f = Math.min(1, Math.max(0.25, f)); const r = Math.round(255 * Math.pow(Math.max(0, R) * f, 0.8)); const g = Math.round(255 * Math.pow(Math.max(0, G) * f, 0.8)); const b = Math.round(255 * Math.pow(Math.max(0, B) * f, 0.8)); return "rgb(" + r + "," + g + "," + b + ")"; }
function wavelengthBand(w) { if (w < 450) return "Violet"; if (w < 490) return "Blue"; if (w < 520) return "Cyan"; if (w < 565) return "Green"; if (w < 590) return "Yellow"; if (w < 625) return "Orange"; return "Red"; }

function VisibleSpectrum() {

  const band = wavelengthBand(w);

  const presets = [{ wl: 555, label: "Peak photopic sensitivity", note: "Optic-yellow tennis balls sit here." },{ wl: 450, label: "Sky-scatter blue", note: "Shorter wavelengths scatter most." },{ wl: 640, label: "Red — penetrates haze", note: "Long wavelengths survive scatter best." },{ wl: 380, label: "Edge of violet", note: "Below 380 nm is ultraviolet." },{ wl: 700, label: "Edge of deep red", note: "Above 700 nm is infrared." }];
  const activeNote = presets.find(p => p.wl === w);
  const handleBar = (e) => { if (!barRef.current) return; const rect = barRef.current.getBoundingClientRect(); setW(Math.round(380 + Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * 320)); };

}

function CorneaCrossSection() {
  const [sel, setSel] = useState(0);
  const layers = [
    { key:"tear", name:"Tear Film", thickness:"~7 μm", h:14, color:"#7FD3F7", does:"Smoothest optical surface in the eye and the actual first refractive interface.", fail:"Dry eye, wind, unblinking concentration — breaks up between blinks.", cost:"Vision fluctuates with every blink." },

function PupilAperture() {

function AccommodationSimulator() {
  const [distance, setDistance] = useState(60);
  const [age, setAge] = useState(25);
  const distM = distance * 0.3048;
  const requiredD = distM > 100 ? 0 : 1 / distM;
  const availableD = Math.max(0, 18.5 - 0.3 * age);
  const deficit = requiredD - availableD;
  const lensRoundness = Math.min(1, Math.min(requiredD, availableD) / 14);
  const status = deficit <= 0 ? "comfortable" : deficit < 1 ? "limit" : "beyond";
  const ciliaryState = lensRoundness > 0.7 ? "Maximally contracted" : lensRoundness > 0.3 ? "Contracted" : lensRoundness > 0.08 ? "Slightly contracted" : "Relaxed";
  const zonuleState = lensRoundness > 0.7 ? "Fully slack" : lensRoundness > 0.3 ? "Loose" : lensRoundness > 0.08 ? "Partially taut" : "Taut";
  const presets = [{ label: "Scoreboard · 100 ft", value: 100 },{ label: "Pitcher's release · 60 ft", value: 60 },{ label: "Defender · 10 ft", value: 10 },{ label: "Hand-eye · 4 ft", value: 4 },{ label: "Playbook · 14 in", value: 14/12 }];
  const lensRx = 5 + (18 - 5) * lensRoundness;
  const ciliaryRing = 56 - lensRoundness * 8;
  const verdictText = status === "comfortable" ? "Comfortable. The lens has plenty of headroom." : status === "limit" ? "At the limit. The accommodative system is maxed out — fatigue will hit faster." : "Beyond the limit. The lens cannot round up enough for this distance at this age. This is presbyopia.";
  const distLabel = distance < 3 ? (distance * 12).toFixed(0) + " in" : distance.toFixed(0) + " ft";
  return (
    <div className="lens-wrap">
      <div className="lens-stage"><svg viewBox="0 0 360 200" className="lens-svg" preserveAspectRatio="xMidYMid meet"><defs><radialGradient id="lensGrad" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stopColor="rgba(232,224,247,0.6)" /><stop offset="100%" stopColor="rgba(139,111,192,0.3)" /></radialGradient></defs><circle cx="180" cy="100" r="80" fill="#1a1228" stroke="rgba(255,255,255,0.15)" strokeWidth="1" /><path d="M100,60 Q88,100 100,140" stroke="#7FD3F7" strokeWidth="2.5" fill="none" /><rect x="115" y="60" width="6" height="15" fill="#6B4FA0" /><rect x="115" y="125" width="6" height="15" fill="#6B4FA0" /><circle cx="140" cy={100 - ciliaryRing} r="4" fill="#A89BD0" /><circle cx="140" cy={100 + ciliaryRing} r="4" fill="#A89BD0" /><ellipse cx="140" cy="100" rx={lensRx} ry="30" fill="url(#lensGrad)" stroke="#E8E0F7" strokeWidth="1.5" style={{ transition: "rx 0.3s ease" }} /><path d="M260,40 Q275,100 260,160" stroke="#FFD93D" strokeWidth="2" fill="none" strokeDasharray="3 2" /><g opacity="0.7"><line x1="105" y1="65" x2={140 - lensRx} y2="85" stroke="#FFD93D" strokeWidth="1" /><line x1="105" y1="135" x2={140 - lensRx} y2="115" stroke="#FFD93D" strokeWidth="1" /><line x1={140 + lensRx} y1="90" x2={status === "beyond" ? 240 : 265} y2="100" stroke="#FFD93D" strokeWidth="1" /><line x1={140 + lensRx} y1="110" x2={status === "beyond" ? 240 : 265} y2="100" stroke="#FFD93D" strokeWidth="1" /><circle cx={status === "beyond" ? 240 : 265} cy="100" r="3" fill="#FFD93D" /></g></svg></div>
      <div className="lens-presets">{presets.map((p, i) => (<button key={i} className={"lens-preset " + (Math.abs(distance - p.value) < 0.1 ? "active" : "")} onClick={() => setDistance(p.value)}>{p.label}</button>))}</div>
      <div className="lens-controls"><div className="lens-ctrl"><label>Focus distance <span className="val">{distLabel}</span></label><input type="range" min="0.3" max="100" step="0.1" value={distance} onChange={e => setDistance(parseFloat(e.target.value))} /></div><div className="lens-ctrl"><label>Athlete age <span className="val">{age}</span></label><input type="range" min="10" max="70" value={age} onChange={e => setAge(parseInt(e.target.value))} /></div></div>
      <div className="lens-readout"><div className="lens-stat"><div className="k">Needed</div><div className="v">{requiredD.toFixed(2)} D</div></div><div className="lens-stat"><div className="k">Available at {age}</div><div className="v">{availableD.toFixed(1)} D</div></div><div className="lens-stat"><div className="k">Ciliary muscle</div><div className="v" style={{ fontSize: 13 }}>{ciliaryState}</div></div><div className="lens-stat"><div className="k">Zonules</div><div className="v" style={{ fontSize: 13 }}>{zonuleState}</div></div></div>
      <div className={"lens-verdict " + status}>{verdictText}</div>
    </div>
  );
}

function ChiasmDiagnostic() {
  const cases = [
    { id:1, quote:"He just doesn't see the open teammate. He'll dribble right into the trap.", side:"route", rationale:"Foveal commitment on the ball while peripheral context goes unused. Attention/gaze allocation — pure routing." },
    { id:2, quote:"She loses the puck against the boards in the second half.", side:"acquire", rationale:"Contrast sensitivity problem — likely retinal processing or uncorrected refractive error degrading the signal. Test contrast." },
    { id:3, quote:"Vision drops late in games. Says his eyes get tired. Headaches.", side:"acquire", rationale:"Classic hyperopia + accommodative fatigue. He passes screening at 20/20 because he's accommodating to compensate. Refraction with cylinder; consider plus correction." },
    { id:4, quote:"He bites on every pump fake. Just falls for it.", side:"route", rationale:"Attention capture by salient but irrelevant motion. Pure routing — predictive bias and bottom-up attentional override. Book Two material." },
    { id:5, quote:"Always a half-step late on the read, even when he's looking right at the right thing.", side:"investigate", rationale:"Could be either. ACQUIRE: dynamic acuity or accommodative facility (signal arrives slightly degraded or delayed). ROUTE: prediction/pattern matching lag (signal clean but interpretation slow). Run the baseline before deciding." },
    { id:6, quote:"His vision varies with wind and weather. Wide receivers love it; he hates it.", side:"acquire", rationale:"Tear film instability. Wind, dry conditions, long unblinking concentration break it up. Same-day reading aloud, treat the ocular surface." },
    { id:7, quote:"Bumps into doorframes on both his left AND right going into the locker room.", side:"urgent", rationale:"Bitemporal field changes point with remarkable precision to the optic chiasm — possible pituitary compression. ACQUIRE-stage emergency. Neuroimaging." },
    { id:8, quote:"Plays differently in different buildings. Sharp at home, off on the road.", side:"acquire", rationale:"Light and glare adaptation. Pupillary response and venue lighting interact with the eye's optics. Tints, filters, deliberate adaptation routines." },
    { id:9, quote:"Knows the playbook cold but freezes when the formation shifts.", side:"route", rationale:"Pattern recognition speed under novel input. Pure routing — building a richer library of stored patterns is a ROUTE training topic." },
    { id:10, quote:"His tracking is just off. Like his eyes can't keep up with the ball.", side:"acquire", rationale:"Oculomotor instability — saccadic dysmetria or low pursuit gain. Eye movements aren't delivering a stable image to the fovea. Trainable with oculomotor work." },
    { id:11, quote:"Mysterious slump. Just hasn't been the same since spring training. Nothing changed.", side:"investigate", rationale:"Could be silent pathology — early lens changes, retinal disease, or post-impact effects you haven't connected. Full ocular health workup before assuming it's mental." },
    { id:12, quote:"Loses the ball at the edge of his vision on his weak side. Gets blindsided.", side:"investigate", rationale:"Could be peripheral attention (ROUTE) — but you MUST rule out actual peripheral field loss first (early glaucoma is painless and silent). Visual field testing." }
  ];
  const [revealed, setRevealed] = useState({});
  const reveal = (id) => setRevealed(prev => ({ ...prev, [id]: true }));
  const reset = () => setRevealed({});
  const counts = cases.reduce((acc, c) => { if (revealed[c.id]) acc[c.side] = (acc[c.side] || 0) + 1; return acc; }, {});
  const revealedCount = Object.keys(revealed).length;
  return (
    <div className="chiasm-dx-wrap">
      <div className="cdx-intro">A coach describes an athlete. <strong style={{color:"var(--text)"}}>Which side of the chiasm does the problem live on?</strong> Click each card to flip and find out — ACQUIRE (this book) vs. ROUTE (Book Two) vs. INVESTIGATE (could be either) vs. URGENT (acquisition emergency). Building this reflex is the single most useful diagnostic skill in the field.</div>
      <div className="cdx-grid">
        {cases.map(c => (
          <button key={c.id} className={"cdx-card " + (revealed[c.id] ? "revealed " + c.side : "")} onClick={() => !revealed[c.id] && reveal(c.id)}>
            <div className="cdx-quote">{c.quote}</div>
            {!revealed[c.id] && <div className="cdx-prompt">Tap to diagnose →</div>}
            {revealed[c.id] && (
              <React.Fragment>
                <div className="cdx-verdict">
                  <div className={"cdx-tag " + c.side}>{c.side === "acquire" ? "ACQUIRE" : c.side === "route" ? "ROUTE" : c.side === "urgent" ? "⚠ URGENT" : "INVESTIGATE"}</div>
                </div>
                <div className="cdx-rationale">{c.rationale}</div>
              </React.Fragment>
            )}
          </button>
        ))}
      </div>
      {revealedCount > 0 && (
        <div className="cdx-summary">
          <div className="cdx-sum-label">Diagnosed so far ({revealedCount} of {cases.length})</div>
          <div className="cdx-sum-text">{counts.acquire || 0} ACQUIRE · {counts.route || 0} ROUTE · {counts.investigate || 0} INVESTIGATE · {counts.urgent || 0} URGENT</div>
          <button className="cdx-reset" onClick={reset}>Reset all</button>
        </div>
      )}
      <div className="cdx-legend">
        <div className="cdx-legend-item"><span className="cdx-tag acquire">ACQUIRE</span> Fix the hardware — this book</div>
        <div className="cdx-legend-item"><span className="cdx-tag route">ROUTE</span> Train the software — Book Two</div>
        <div className="cdx-legend-item"><span className="cdx-tag investigate">INVESTIGATE</span> Could be either — run the baseline first</div>
        <div className="cdx-legend-item"><span className="cdx-tag urgent">⚠ URGENT</span> Acquisition emergency — same-day referral</div>
      </div>
    </div>
  );
}

function FailureModeCards() {
  const modes = [
    { num:1, name:"Uncorrected Refractive Error", coach:"He's not sharp. Picks up the ball late.", actually:"Cornea/lens optics don't match eye length — myopia, hyperopia, or astigmatism. The most common acquisition failure by far, and the most invisible.", fix:"Real refraction by an optometrist, full prescription including cylinder. For developing youth myopes, consider myopia control (atropine, ortho-K)." },
    { num:2, name:"Tear Film Instability", coach:"Eyes get tired. Vision comes and goes.", actually:"Unstable tear film breaks up between blinks. Wind, dry arenas, open cockpits, long unblinking concentration drive it.", fix:"Tear-film management — preservative-free drops, environmental adjustments, sometimes contact lens reconsideration." },
    { num:3, name:"Low Contrast Sensitivity", coach:"Loses the puck against the boards. Loses the ball against the crowd.", actually:"Degraded contrast processing in the retina (bipolar/horizontal circuitry). Acuity can be 20/20 while contrast sensitivity is in the bottom decile — this was Noah West's actual finding.", fix:"Correct any refractive error first, rule out media problems (early lens changes scatter light). Then targeted contrast training. Tints can boost effective contrast in specific lighting." },
    { num:4, name:"Accommodative Dysfunction", coach:"Slow to pick up the ball when the play changes levels.", actually:"Slow or imprecise lens focusing — lag (under-focus) or poor facility (slow refocus). The moment after the depth changes is blurred while the lens catches up.", fix:"Rule out uncorrected hyperopia (chronic over-accommodation hides at 20/20). Then accommodative facility training with ±2.00 flippers produces gains in weeks." },
    { num:5, name:"Convergence Insufficiency", coach:"Hesitates. Doesn't commit. Tentative late in games.", actually:"The two eyes struggle to align on near targets. Depth perception degrades, strain compounds, vision gets fuzzy late.", fix:"Clinical referral. Vergence therapy has a strong evidence base — measurable gains in 4–6 weeks." },
    { num:6, name:"Oculomotor Instability", coach:"Tracking is off. Eyes can't keep up.", actually:"Imprecise saccades (dysmetria) or sluggish smooth pursuit (low gain). The fovea isn't landing where it should, so the image jitters or smears.", fix:"Oculomotor conditioning — saccade accuracy and pursuit-gain training. One of the more reliably conditionable links." },
    { num:7, name:"Impaired Stereo Depth", coach:"Misjudges the hop. Times it wrong on close plays. Bad hands when the hands are fine.", actually:"Reduced stereoacuity. Sometimes a long-standing eye-teaming or developmental issue (amblyopia history, strabismus).", fix:"Optometric evaluation. Correctable cases respond to vision therapy. Fixed cases need strategy adaptation (and the athlete should know it's hardware, not the hands)." },
    { num:8, name:"Poor Light & Glare Adaptation", coach:"Doesn't travel well. Slow coming out of the tunnel. Inconsistent venue to venue.", actually:"Sluggish pupillary and retinal adaptation, plus excess glare sensitivity. Lighter irises transmit more stray light, worsening glare.", fix:"Deliberate light-adaptation routines pre-competition. Sport-specific tints and filters. Glare management. Cheap, outsized consistency gains." },
    { num:9, name:"Peripheral Field Compromise", coach:"Doesn't see it coming from the side. Gets blindsided.", actually:"Genuine reduction in peripheral capacity. Sometimes a known field defect — sometimes early GLAUCOMA, which silently eats peripheral field while central vision and the eye chart stay normal.", fix:"Visual field testing and a dilated exam. No delay. If glaucoma, treat to halt further loss — the lost field doesn't come back." },
    { num:10, name:"Silent Ocular Pathology", coach:"He's in a slump. Off this season for no reason.", actually:"Actual eye disease — early lens changes (scatter and contrast loss), retinal disease, optic nerve pathology, or undisclosed emergency-sign symptoms (sudden floaters, flashes, curtain, post-trauma vision change).", fix:"Same-day clinical evaluation for any red-flag symptoms. Full ocular health workup for unexplained decline. The whole acquisition chain belongs in baseline; you can't fix what you haven't found." }
  ];
  const [open, setOpen] = useState({});
  const toggle = (num) => setOpen(prev => ({ ...prev, [num]: !prev[num] }));
  const openAll = () => { const all = {}; modes.forEach(m => all[m.num] = true); setOpen(all); };
  const closeAll = () => setOpen({});
  const openCount = Object.values(open).filter(Boolean).length;
  return (
    <div className="fm-wrap">
      <div className="cdx-intro">Ten failure modes on the acquisition side of the chiasm. Each card shows the coaching language coaches actually use, then translates it into the acquisition mechanism — and the intervention that fixes it. Click any card to expand.</div>
      <div className="fm-counter">
        <div className="fm-counter-text"><strong>{openCount}</strong> of {modes.length} expanded</div>
        <div className="fm-counter-actions">
          <button className="fm-counter-btn" onClick={openAll}>Open all</button>
          <button className="fm-counter-btn" onClick={closeAll}>Close all</button>
        </div>
      </div>
      <div className="fm-grid">
        {modes.map(m => (
          <div key={m.num} className={"fm-card " + (open[m.num] ? "open" : "")} onClick={() => toggle(m.num)}>
            <div className="fm-head">
              <div className="fm-num">{m.num}</div>
              <div className="fm-name">{m.name}</div>
              <div className="fm-chevron">▼</div>
            </div>
            <div className="fm-coach-preview">{m.coach}</div>
