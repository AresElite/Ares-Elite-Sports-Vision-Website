const BOOK = {
  title: "EXECUTE — The Motor Output Architecture",
  subtitle: "Book Three · From the Decision Release to Muscle Contraction",
  acts: [
    { id:"part1", label:"PART ONE — WHY THIS MATTERS",
      chapters:[
        { id:"foreword", number:"Foreword", title:"The Last Meter", type:"foreword",
          content:{ opening:"(Full foreword in Read mode.)", signature:"Dr. Joe LaPlaca, OD — Ares Elite Sports Vision" } },
        { id:"ch1", number:"Chapter 1", title:"Execution Is Not What You Think It Is",
          type:"framing", interactive:"executionChain", interactiveLabel:"The Execution Chain",
          exploreHeading:"Ten stations from the decision release to muscle contraction",
          exploreSub:"Tap any station to see what it does, how it fails, and what it costs an athlete.",
          aresStage:"execute",
          content:{ hook:"The visible movement is the *output* of a multi-station neural pipeline. The failure that produced the bad output is rarely at the same station that the eye sees the movement at.", opening:"(Read mode.)", reframe:"(Read mode.)", chain:"(Read mode.)", handoff:"(Read mode.)",
            callout:{ clinical:"Before any execute-stage assessment, verify ACQUIRE and ROUTE are clean. Motor measurements against degraded upstream input produce misleading results.", coaching:"'Bad mechanics' is a description of the surface. 'Which station is the bottleneck?' is the only question that produces specific intervention." },
            summary:["Motor execution is a composite of ten neural stations from DLPFC release to muscle fiber.","Execution Cost Matrix: Motor Program Fidelity × Calibration Quality × Robustness Under Load.","Most motor failures live upstream of the visible movement.","EXECUTE ends at muscle fiber contraction. Past it is SYNCHRONIZE — Book Four.","The diagnostic instinct: which station is the bottleneck?"],
            quiz:[{question:"Where does EXECUTE end?",options:["At the spinal motor neuron","At the corticospinal tract","At muscle fiber contraction","At the joint movement"],correct:2,feedback:"At muscle fiber contraction. Past that — tendon, joint, whole body — is SYNCHRONIZE."},{question:"The Execution Cost Matrix variables are:",options:["Strength × Speed × Endurance","Motor Program Fidelity × Calibration Quality × Robustness Under Load","Technique × Confidence × Effort","Reaction Time × Accuracy × Power"],correct:1,feedback:"Three variables interacting."},{question:"Most common mistake when an athlete looks 'mechanically off'?",options:["Coaching the visible movement","Treating surface symptom and missing upstream station","Assuming effort problem","All three happen routinely"],correct:3,feedback:"All three happen constantly. The fix is to localize before intervening."}]
          } }
      ] },
    { id:"part2", label:"PART TWO — THE JOURNEY OF THE COMMAND",
      chapters:[
        { id:"ch2", number:"Chapter 2", title:"Past the Decision — SMA & the Motor Program Library", type:"science", interactive:"motorProgramLibrary", interactiveLabel:"The Motor Program Library Builder", exploreHeading:"Watch a motor program library form — and the recall schema's accuracy expand", exploreSub:"Adjust practice variability, feedback quality, and volume.", aresStage:"execute",
          content:{ hook:"A motor program is not a memory of how a movement felt. It is a structured neural command sequence.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Library poverty in young athletes is a *developmental* diagnosis, not a deficit diagnosis. Give the timeline honestly.", coaching:"Variability of practice is non-negotiable. Practicing one parameter band produces brittle motor programs that fail outside the practiced envelope." },
            summary:["A motor program = structured neural command sequence encoding invariant features of an action class.","Schmidt's schema theory: GMP stores invariants; recall schema parameterizes for the current goal.","Distributed storage across SMA, M1, cerebellum, basal ganglia, spinal CPGs.","Variability of practice expands the recall schema's accurate range.","Retrieval interval (40–120 ms) shortens with recognition-contiguity training."],
            quiz:[{question:"What does the GMP actually store?",options:["Specific muscle activations","Invariants: relative timing, force, sequence","Memory of how it felt","Exact ideal parameters"],correct:1,feedback:"Invariants — the proportional structure that stays constant."},{question:"What expands the recall schema's range?",options:["Blocked practice","Variability of practice","Mental rehearsal","Identical reps"],correct:1,feedback:"Variability of practice."},{question:"Where are motor programs stored?",options:["SMA only","M1 only","Distributed across SMA, M1, cerebellum, basal ganglia, spinal cord","Cerebellum only"],correct:2,feedback:"Distributed; SMA is the temporal-sequencing hub."}] } },
        { id:"ch3", number:"Chapter 3", title:"The Action Gate — Basal Ganglia, EXECUTE Side", type:"science", interactive:"basalGangliaGate", interactiveLabel:"The Direct / Indirect / Hyperdirect Gate", exploreHeading:"Watch the three gating pathways select, suppress, and abort", exploreSub:"Adjust the direct-pathway drive, indirect-pathway suppression, dopaminergic vigor, and emergency-stop urgency.", aresStage:"execute",
          content:{ hook:"The basal ganglia don't make decisions. They decide whether to release the decisions already made — and with how much vigor.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Most basal-ganglia failures actually live upstream — in the cortical signals feeding the gate — rather than in the gate itself.", coaching:"Vigor is a regulated parameter, not a character trait. 'Be more aggressive' rarely changes what the dopamine system is signaling." },
            summary:["Three parallel pathways: direct (go), indirect (stop), hyperdirect (emergency stop).","The hyperdirect pathway is the substrate of the checked swing and similar mid-movement aborts.","Dopamine from the substantia nigra modulates action vigor.","Basal ganglia are also the brain's primary reinforcement learning system.","Failures: slow release, inadequate suppression, inappropriate vigor, failure to abort."],
            quiz:[{question:"Which pathway is the emergency stop?",options:["Direct","Indirect","Hyperdirect","All three equally"],correct:2,feedback:"Hyperdirect — cortex straight to subthalamic nucleus, the fastest of the three."},{question:"What modulates action vigor?",options:["Acetylcholine","Dopamine from substantia nigra","Serotonin","Norepinephrine"],correct:1,feedback:"Dopaminergic signaling from the substantia nigra pars compacta."},{question:"'She's tentative' is usually:",options:["Confidence problem","Basal ganglia vigor regulation under fatigue or arousal","Pure character","Coaching failure"],correct:1,feedback:"Vigor is a regulated parameter — and the gate is doing what its upstream signals are telling it."}] } },
        { id:"ch4", number:"Chapter 4", title:"The Final Command — Primary Motor Cortex & the Betz Cells", type:"science", interactive:"m1Plasticity", interactiveLabel:"The M1 Map Plasticity Simulator", exploreHeading:"Watch M1 territory expand with training and contract with disuse", exploreSub:"Adjust training intensity, weeks of work, and recent layoff length.", aresStage:"execute",
          content:{ hook:"M1 is the brain's most direct interface with the body. Two synapses past M1, the muscle moves.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Post-concussive M1 abnormalities (prolonged silent period on TMS) can persist past standard concussion clearance. Worth flagging when an athlete is 'almost back' but not quite.", coaching:"Layoff 'rust' lasts longer than the layoff feels like it should, because M1 territory contracts with disuse and has to re-expand with structured exposure." },
            summary:["M1 organized as a somatotopic homunculus. Hands and face get disproportionate territory.","Layer 5 Betz cells — some of the largest neurons in the brain — generate the descending corticospinal commands.","M1 maps are plastic in adults: expand with training, contract with disuse.","TMS provides noninvasive measurement of M1 excitability and connectivity.","Failures: insufficient representation, disuse contraction, post-concussive deficits, force precision failures."],
            quiz:[{question:"Layer 5 of M1 contains:",options:["Interneurons only","Sensory cells","Betz cells — the largest descending output neurons","Visual processing cells"],correct:2,feedback:"Betz cells, with axons running the length of the spinal cord."},{question:"M1 maps in adults are:",options:["Fixed at birth","Fixed after childhood","Plastic — expand with training, contract with disuse","Random and unstable"],correct:2,feedback:"Plastic in both directions, on a timescale of weeks to months."},{question:"What does TMS measure?",options:["Bone density","M1 excitability and corticospinal connectivity","Muscle fiber type","Joint range"],correct:1,feedback:"Motor evoked potentials index M1 excitability."}] } },
        { id:"ch5", number:"Chapter 5", title:"The Corticospinal Tract — Speed of Descent", type:"science", interactive:"corticospinalVelocity", interactiveLabel:"The Conduction Velocity Visualizer", exploreHeading:"Watch the descending signal traverse the corticospinal tract", exploreSub:"Adjust axon diameter, myelination quality, and post-concussive status.", aresStage:"execute",
          content:{ hook:"The fastest axons in the human nervous system descend from M1 at over 100 meters per second. The speed of that descent is partly trainable.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Prolonged silent period on TMS is a documented post-concussive marker. Persistent corticospinal abnormalities can survive standard concussion clearance protocols.", coaching:"Natural variation in conduction velocity is real, but practice-induced myelination is also real. Pathways used most often become the pathways with the fastest conduction." },
            summary:["The corticospinal tract is the longest single axonal pathway in the human body.","~85% of fibers cross at the pyramidal decussation. Left cortex controls right body.","Fastest fibers conduct at ~100 m/s; slowest at ~10 m/s.","Conduction velocity depends on axon diameter and myelination — partly biological, partly trainable.","Failures: slow conduction, asymmetric conduction, post-concussive prolonged silent period, internal capsule lesions."],
            quiz:[{question:"What fraction of corticospinal fibers cross at the decussation?",options:["~50%","~85%","~100%","~30%"],correct:1,feedback:"~85%. The crossed fibers form the lateral corticospinal tract."},{question:"What determines conduction velocity?",options:["Just neuron count","Axon diameter and myelination","Brain size","Muscle mass"],correct:1,feedback:"Bigger and better-myelinated = faster. Activity-dependent myelination is trainable."},{question:"Post-concussive prolonged silent period is detected by:",options:["MRI","fMRI","TMS","EEG"],correct:2,feedback:"TMS-evoked motor responses reveal the abnormality."}] } },
        { id:"ch6", number:"Chapter 6", title:"Spinal Motor Neurons & Central Pattern Generators", type:"science", interactive:"sizePrinciple", interactiveLabel:"The Size Principle Recruitment Stack", exploreHeading:"Drag force demand and watch motor units recruit in order of size", exploreSub:"See which fiber types fire at each force level — and what fatigue rate they bring.", aresStage:"execute",
          content:{ hook:"Much of what looks like 'natural athleticism' lives at the spinal level — and is disrupted when the cortex tries to micromanage what should be automatic.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Asymmetric motor unit recruitment after injury can persist for years after structural recovery. Worth probing in athletes who have had a layoff and feel 'off' on one side.", coaching:"The cortex's job in rhythmic sports is to *modulate* the spinal CPGs, not to micromanage each stride. Cortical over-control disrupts what should be automatic." },
            summary:["Alpha motor neurons are the final neural element of voluntary movement.","Motor unit = one motor neuron + the muscle fibers it innervates.","Henneman's size principle: motor units recruited in order of increasing size.","Type I (slow), Type IIa (fast oxidative), Type IIx (fast glycolytic).","CPGs produce coordinated rhythmic output autonomously; the cortex modulates.","Spinal reflexes (stretch, reciprocal inhibition, crossed extensor) provide stability faster than cortical processing."],
            quiz:[{question:"Henneman's size principle says:",options:["Larger muscles recruited first","Motor units recruited in order of increasing size","Smaller motor units fatigue first","All motor units fire together"],correct:1,feedback:"Type I first, then Type IIa, then Type IIx at near-maximal effort."},{question:"What do CPGs do?",options:["Process visual input","Produce coordinated rhythmic output autonomously","Store memories","Coordinate vision"],correct:1,feedback:"Cortex modulates rather than micromanages."},{question:"Which fiber type is recruited only at near-maximal effort?",options:["Type I","Type IIa","Type IIx","All equally"],correct:2,feedback:"Type IIx — fastest, strongest, fatigue-prone."}] } },
        { id:"ch7", number:"Chapter 7", title:"Muscle Synergies — The Body's Abbreviation System", type:"science", interactive:"kineticChain", interactiveLabel:"The Kinetic Chain Force Transfer", exploreHeading:"Watch force generated proximally transfer outward — or leak", exploreSub:"Adjust segment timing and synergy organization. See the distal output that results.", aresStage:"execute",
          content:{ hook:"The brain doesn't control 650 muscles individually. It controls a much smaller library of muscle synergies — and the elite athlete's synergies are *robust* under perturbation.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Kinetic chain leak is one of the most common findings in athletes who 'look the part but don't have the pop.' The tape looks clean; the output is below what the technique would predict. Synergy diagnosis lives between the visible mechanics and the output metrics.", coaching:"Synergy robustness — the ability to execute under varied conditions — is the property that distinguishes elite synergies from very good ones. It is built by varied-condition training, not blocked repetition." },
            summary:["The brain selects and parameterizes synergies, not individual muscle activations.","A synergy is a coordinated, triggerable activation pattern with fixed internal weighting.","Proximal-to-distal force transfer underwrites throwing, swinging, kicking, striking.","Synergy robustness emerges from varied-condition training.","Inter-limb synergies coordinate activation across both sides of the body.","Failures: synergy poverty, kinetic chain leak, fragile synergies, inter-limb miscoordination."],
            quiz:[{question:"What is a muscle synergy?",options:["A single muscle","A coordinated activation pattern across many muscles, triggerable as a unit","A reflex","An emotion"],correct:1,feedback:"Coordinated activation pattern with fixed internal weighting, parameterizable in amplitude."},{question:"Proximal-to-distal force transfer is:",options:["A spinal reflex","The synergistic structure underlying throwing, swinging, kicking, striking","Cerebellar timing","Reaction time"],correct:1,feedback:"The kinetic chain backbone in sport actions."},{question:"What produces synergy robustness?",options:["Strength training","Varied-condition practice","Visualization","Massed identical reps"],correct:1,feedback:"Robustness emerges from varied conditions; identical reps produce brittle synergies."}] } },
        { id:"ch8", number:"Chapter 8", title:"Anticipatory Postural Adjustments — The Unstable Platform", type:"science", interactive:"apaWindow", interactiveLabel:"The APA Timing Window", exploreHeading:"Watch the platform stabilize — too early, too late, or right on time", exploreSub:"Adjust APA amplitude and onset timing. See the kinetic chain efficiency that results.", aresStage:"execute",
          content:{ hook:"A hundred milliseconds before the visible movement begins, the body is already moving — making small, precisely timed adjustments that stabilize the platform for the main action.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"APAs are deeply under-tested in standard motor assessment. Athletes who look 'mechanically clean but underpowered' often have APA timing that has quietly drifted — and the deficit is invisible without specific measurement.", coaching:"The visible mechanics can be technically correct while the underlying APA is producing a platform the visible mechanics can't fully exploit. This is why 'good form, no pop' is a real and specific diagnosis." },
            summary:["APAs are small, precisely timed pre-movements 50–150 ms before main movement begins.","Produced by SMA + cerebellum + brainstem postural centers via a predictive model.","Two parameters: amplitude (force scaling) and timing (onset relative to prime mover).","A well-organized APA is the unseen prerequisite for clean kinetic-chain force transfer.","Failures: insufficient amplitude, timing drift, asymmetric APAs, pressure-induced collapse."],
            quiz:[{question:"APAs fire approximately:",options:["After the main movement","Simultaneously with it","50–150 ms before it","500 ms before it"],correct:2,feedback:"Pre-movement stabilization timed precisely with main-mover onset."},{question:"APA amplitude scales with:",options:["Athlete's mood","Force demand of the upcoming main movement","Time of day","Sport specifics"],correct:1,feedback:"More force demand = larger APA stabilization."},{question:"'Good mechanics, no pop' is often:",options:["Confidence problem","APA deficit producing platform instability","Pure strength deficit","Recovery issue"],correct:1,feedback:"The kinetic chain initiates from an unstable base; force leaks instead of transferring."}] } },
        { id:"ch9", number:"Chapter 9", title:"The Cerebellum, Reprised — Online Correction & Forward Models", type:"science", interactive:"cerebellarCorrection", interactiveLabel:"The Forward Model Correction Loop", exploreHeading:"Watch the cerebellum predict, detect error, and correct in flight", exploreSub:"Adjust model accuracy, correction speed, and sensory noise.", aresStage:"execute",
          content:{ hook:"The cerebellum doesn't just predict. During the movement itself, it compares prediction to reality, generates an error signal, and corrects in flight — at speeds the cortex cannot match.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Subtle dysmetria from concussion can produce motor precision deficits below the threshold of standard return-to-play testing. Specific dynamic-precision testing is warranted whenever an athlete is 'almost back' but the mechanics look slightly off.", coaching:"'Feel' in elite execution is largely the experience of well-tuned cerebellar online correction. Small errors are caught and corrected at speeds below conscious experience. When the loop is slow, the athlete reports the movement 'felt off' without being able to say what was off." },
            summary:["During execution, the cerebellum runs forward models (predicting outcomes) and inverse models (computing corrections).","Online correction at 50–100 ms — faster than conscious processing.","Cerebellar timing precision underwrites timing-critical sport actions.","Forward and inverse models learn through climbing-fiber error signals.","Models are domain-specific. Limited cross-sport transfer.","Failures: weak prediction, slow correction, timing drift, post-concussive dysmetria."],
            quiz:[{question:"What's a forward model?",options:["Prediction of sensory consequences of a motor command","Memory of past movements","Plan for future movements","Visual representation"],correct:0,feedback:"Continuous prediction during movement; compared against actual feedback."},{question:"Online correction operates at:",options:["~1 second","50–100 ms","~10 seconds","Same speed as conscious thought"],correct:1,feedback:"Below conscious processing speed."},{question:"Dysmetria signature in athletes is usually:",options:["Dramatic clinical deficit","Subtle precision errors that don't show on standard testing","No detectable effect","Random tremor"],correct:1,feedback:"Subtle — small but functionally meaningful precision deficits."}] } },
        { id:"ch10", number:"Chapter 10", title:"Proprioception — The Sensory Feedback Loop", type:"science", interactive:"proprioception", interactiveLabel:"The Proprioceptive Acuity Test", exploreHeading:"See where the brain thinks the body is — versus where it actually is", exploreSub:"Adjust spindle sensitivity, GTO sensitivity, and joint-receptor health. See estimation error.", aresStage:"execute",
          content:{ hook:"You have a sixth sense. It tells your brain, continuously, where every joint is. It is invisible from the inside. It is essential to every motor action.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Post-injury proprioceptive deficits can persist months to years past structural recovery. Joint-specific proprioceptive retraining is one of the most consistent re-injury risk reducers in sports medicine — and is widely under-applied.", coaching:"Athletes whose motor execution looks 'off' in ways that are hard to localize to specific muscle activations often have proprioceptive degradation as the underlying problem. Standard observation won't reveal it; specific testing will." },
            summary:["Proprioception is the sensory feedback closing the motor control loop.","Three receptor types: spindles (length, velocity), GTOs (force), joint receptors (angle).","Sensorimotor integration at spinal, brainstem, cerebellar, and cortical levels.","Proprioceptive acuity is measurable and trainable.","Injury degrades proprioception persistently; retraining the central processing reduces re-injury risk.","Failures: reduced acuity, post-injury deficits, integration problems, fatigue degradation."],
            quiz:[{question:"What do muscle spindles measure?",options:["Force","Length and stretch velocity","Joint angle","Temperature"],correct:1,feedback:"Spindles encode length and dynamic stretch."},{question:"Post-injury proprioceptive training primarily:",options:["Strengthens the joint","Trains the brain to use the joint's remaining proprioceptive signal","Removes scar tissue","Changes mood"],correct:1,feedback:"Central processing is what gets retrained; the receptors themselves may not fully recover."},{question:"Without accurate proprioception:",options:["The cerebellar correction loop has nothing accurate to correct against","Vision is impaired","Hearing is affected","Memory fails"],correct:0,feedback:"The entire motor control loop depends on proprioceptive fidelity."}] } },
        { id:"ch11", number:"Chapter 11", title:"The Neuromuscular Junction & Muscle Fiber — Where Intention Becomes Physics", type:"science", interactive:"crossBridge", interactiveLabel:"Excitation-Contraction Coupling", exploreHeading:"Watch the cross-bridge cycle build force — and degrade under fatigue", exploreSub:"Adjust motor unit firing rate, recruited unit count, and fatigue level.", aresStage:"execute",
          content:{ hook:"Two synapses past the brain, calcium floods a muscle fiber, actin and myosin engage, and intention finally becomes the mechanical force that moves the world. This is the last station.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"In healthy athletes, NMJ transmission is reliably near-perfect. Peripheral fatigue affecting NMJ + excitation-contraction coupling explains the late-game force decline that has nothing to do with cardiovascular condition.", coaching:"Fiber-type composition is partly genetic, partly trainable within the natural envelope. Optimize within the athlete's natural specialization rather than fighting it." },
            summary:["The NMJ is a near-100% reliable synapse between motor neuron and muscle fiber.","Acetylcholine release triggers muscle fiber action potential.","Excitation-contraction coupling: action potential → calcium release → actin-myosin cross-bridges.","Force regulation: rate coding (firing rate) + recruitment (additional units).","Type I (endurance), Type IIa (sustained high-intensity), Type IIx (explosive).","Failures: transmission failure (rare), excitation-contraction impairment, cross-bridge fatigue, fiber-type mismatch."],
            quiz:[{question:"What neurotransmitter is used at the NMJ?",options:["Glutamate","Acetylcholine","Dopamine","GABA"],correct:1,feedback:"Acetylcholine, binding nicotinic receptors on the muscle fiber."},{question:"Force is regulated by:",options:["Just recruitment","Just rate coding","Both rate coding and motor unit recruitment","Visualization"],correct:2,feedback:"Both, together — fine-grained control."},{question:"Type IIx fibers are recruited:",options:["Always","At low force demands","At near-maximal effort","Never in adults"],correct:2,feedback:"Highest-threshold units; only at near-maximal voluntary effort."}] } }
      ] },
    { id:"part3", label:"PART THREE — THE HAND-OFF",
      chapters:[
        { id:"ch12", number:"Chapter 12", title:"Past the Execution — Where EXECUTE Ends and SYNCHRONIZE Begins", type:"science", interactive:"executeSyncDx", interactiveLabel:"Which Side of the Muscle Contraction?", exploreHeading:"Train the diagnostic instinct that splits EXECUTE from SYNCHRONIZE", exploreSub:"Common athlete complaints. Click each to learn whether it's an EXECUTE problem or a SYNCHRONIZE problem.", aresStage:"execute",
          content:{ hook:"Stand at the muscle fiber and look back. The chain is complete. Past the contraction lies a different problem — and a different book.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Execution problems live in the *quality of an individual motor action*. Synchronization problems live in *coordination across multiple actions and systems*. Different diagnostics, different fixes.", coaching:"The most expensive late-stage diagnostic mistake is treating an integration problem with execution drills, or treating an execution problem with whole-system integration work." },
            summary:["The Execution Chain is complete at muscle fiber contraction.","Past the contraction: tendon-to-bone force transfer → joint coordination → whole-body integration → multi-system sync.","Execution problems show up in the quality of individual motor actions.","Synchronization problems show up in coordination across multiple actions and systems.","Different signatures, different fixes."],
            quiz:[{question:"A pitcher whose individual throw mechanics are clean but who can't string together a quality outing has:",options:["An EXECUTE problem","A SYNCHRONIZE problem (multi-action coordination)","An ACQUIRE problem","A confidence problem"],correct:1,feedback:"Individual action quality is clean; the failure is in the cross-action coordination."},{question:"A receiver whose individual route is clean but who can't coordinate with the quarterback's release has:",options:["EXECUTE","SYNCHRONIZE (multi-system)","ACQUIRE","ROUTE"],correct:1,feedback:"Action coordination across people — a SYNCHRONIZE problem."},{question:"A hitter whose form falls apart mid-swing has:",options:["EXECUTE — the action itself is breaking down","SYNCHRONIZE","ACQUIRE","ROUTE"],correct:0,feedback:"The individual motor action is breaking down — EXECUTE."}] } }
      ] },
    { id:"part4", label:"PART FOUR — WHEN EXECUTION BREAKS",
      chapters:[
        { id:"ch13", number:"Chapter 13", title:"Ten Execution Failure Modes", type:"science", interactive:"executionFailureCards", interactiveLabel:"The Ten Execution Failures", exploreHeading:"From sideline language to neural address", exploreSub:"Click each card to translate the coaching description into the actual execution failure — and the intervention direction.", aresStage:"execute",
          content:{ hook:"'His mechanics are off.' 'She can't find her stroke.' 'He loses his form late.' None of these are diagnoses — they are descriptions of surface symptoms. A dozen different execution failures can produce the identical surface picture.", opening:"(Read mode.)", mechanism:"(Read mode.)", sportTranslation:"(Read mode.)", aresConnection:"(Read mode.)",
            callout:{ clinical:"Use this chapter as a translation key when an athlete is referred for 'mechanics work.' Run the tiered baseline. Don't start EXECUTE-stage intervention before confirming ACQUIRE and ROUTE are clean.", coaching:"Memorize the ten. When you reach for 'effort,' 'character,' or 'technique' to explain a struggle, walk the list first. Most 'mental' or 'mechanical' problems have a specific upstream address." },
            summary:["Coaching descriptions of 'mechanical' problems often mask upstream-station failures.","Modes 1–2 sit at SMA / library: program poverty and narrow recall schema.","Mode 3 sits at the basal ganglia: vigor failure.","Modes 4–5 sit at the synergy/APA level: kinetic chain leak and platform instability.","Modes 6–7 sit at the cerebellar/proprioceptive layer: timing drift and precision degradation.","Modes 8–9 sit at NMJ/muscle and under-load: force regulation and synergy decomposition.","Mode 10 is reinvestment — the choke that surfaces under pressure.","Order of intervention: upstream first. Walk the chain front to back."],
            quiz:[{question:"'She freezes in big moments' — first suspect?",options:["Reinvestment at the DLPFC","Pure character","Strength deficit","Vision problem"],correct:0,feedback:"Reverting from automatic to deliberate processing — the canonical choke."},{question:"'He's throwing with his arm' — most likely:",options:["Kinetic chain leak (synergy problem)","Bad attitude","Pure strength","Reaction time"],correct:0,feedback:"Force generated proximally not transferring through the chain."},{question:"'He has good mechanics but no pop' — most often:",options:["APA deficiency producing platform instability","Just needs to lift more","Confidence","Random variance"],correct:0,feedback:"The kinetic chain initiates from a compromised base."}] } },
      ] },
    { id:"part5", label:"PART FIVE — CLOSING",
      chapters:[
        { id:"afterword", number:"Afterword", title:"The Last Meter, Completed", type:"afterword",
          content:{ opening:"(Full afterword in Read mode.)", signature:"Dr. Joe LaPlaca, OD — Ares Elite Sports Vision" }

        { id:"glossary", number:"Reference", title:"Glossary", type:"glossary",
          content:{
            intro:"Every key term from Book Three — DLPFC decision release through muscle fiber contraction. Search by term or scan by category.",
            entries:[
              { term:"EXECUTE", category:"framework", def:"The third stage of the A.R.E.S. Performance Loop. The neural pipeline from the DLPFC decision release to the contraction of muscle fiber." },
              { term:"The Execution Chain", category:"framework", def:"The ten-station chain from SMA to muscle fiber. Total motor fidelity is the product of every link." },
              { term:"Execution Cost Matrix (ECM)", category:"framework", def:"The organizing framework: motor output quality = (Motor Program Fidelity) × (Calibration Quality) × (Robustness Under Load)." },
              { term:"Motor Program Fidelity", category:"framework", def:"ECM variable. The quality and specificity of the stored motor program being executed." },
              { term:"Calibration Quality", category:"framework", def:"ECM variable. The accuracy of cerebellar and proprioceptive systems during execution." },
              { term:"Robustness Under Load", category:"framework", def:"ECM variable. The degree to which execution survives fatigue, pressure, and unexpected perturbation." },
              { term:"Execution Latency", category:"framework", def:"Total elapsed time from DLPFC decision release to muscle fiber contraction. Elite: 80–150 ms. Untrained: 150–300 ms." },
              { term:"Supplementary Motor Area (SMA)", category:"anatomy", def:"Medial frontal lobe structure. Motor program library and temporal sequencing hub." },
              { term:"Pre-SMA", category:"anatomy", def:"Just anterior to SMA. Higher-level motor program selection and switching." },
              { term:"Primary Motor Cortex (M1)", category:"anatomy", def:"Precentral gyrus. Final cortical command station; layer 5 Betz cells generate corticospinal output." },
              { term:"Betz Cells", category:"anatomy", def:"Largest neurons in layer 5 of M1; axons descend the corticospinal tract; can exceed 100 μm in diameter and 1 m in length." },
              { term:"Basal Ganglia", category:"anatomy", def:"Subcortical nuclei. Action selection gate and vigor regulation." },
              { term:"Direct Pathway", category:"anatomy", def:"Basal ganglia 'go' pathway. Facilitates motor program release." },
              { term:"Indirect Pathway", category:"anatomy", def:"Basal ganglia 'stop' pathway. Suppresses unwanted motor programs." },
              { term:"Hyperdirect Pathway", category:"anatomy", def:"Basal ganglia emergency stop. Substrate of the checked swing and similar aborts." },
              { term:"Substantia Nigra Pars Compacta", category:"anatomy", def:"Dopaminergic input to the basal ganglia. Regulates action vigor and carries reinforcement-learning signal." },
              { term:"Corticospinal Tract", category:"anatomy", def:"White-matter pathway from M1 to spinal cord. Longest single axonal pathway in the body." },
              { term:"Pyramidal Decussation", category:"anatomy", def:"Crossing of ~85% of corticospinal fibers in the lower medulla." },
              { term:"Cerebellum", category:"anatomy", def:"Subcortical structure. EXECUTE-side role: forward models, inverse models, online correction, timing precision." },
              { term:"Alpha Motor Neuron", category:"cells", def:"Large ventral-horn neuron whose axon innervates skeletal muscle fibers. The final neural element of voluntary movement." },
              { term:"Motor Unit", category:"cells", def:"One alpha motor neuron plus all the muscle fibers it innervates. Smallest functional unit of movement." },
              { term:"Size Principle (Henneman)", category:"cells", def:"Motor units recruited in order of increasing size as force demand rises." },
              { term:"Type I / Slow-Twitch", category:"cells", def:"Small, fatigue-resistant, slow to peak force. Recruited first." },
              { term:"Type IIa / Fast-Twitch Oxidative", category:"cells", def:"Medium, moderate fatigue, fast to peak force." },
              { term:"Type IIx / Fast-Twitch Glycolytic", category:"cells", def:"Largest, fast-fatigue, fastest to peak force. Recruited at near-maximal effort." },
              { term:"Central Pattern Generators (CPGs)", category:"cells", def:"Spinal neural circuits producing coordinated rhythmic output autonomously." },
              { term:"Stretch Reflex", category:"cells", def:"Two-synapse spinal reflex. Substrate of postural stability." },
              { term:"Purkinje Cells", category:"cells", def:"Principal output cells of cerebellar cortex." },
              { term:"Climbing Fibers", category:"cells", def:"Cerebellar inputs carrying error signals from the inferior olive." },
              { term:"Motor Program", category:"cognitive", def:"Stored neural command sequence encoding invariant features of a class of actions." },
              { term:"Generalized Motor Program (GMP)", category:"cognitive", def:"Schmidt's term. Stores invariant features: relative timing, relative force, sequence." },
              { term:"Recall Schema", category:"cognitive", def:"Learned rule translating movement goals into specific parameter values for the GMP." },
              { term:"Variability of Practice", category:"cognitive", def:"Practice across a range of parameter values. Expands the recall schema's accurate range." },
              { term:"Muscle Synergy", category:"cognitive", def:"Coordinated activation pattern triggerable as a unit with fixed internal weighting." },
              { term:"Proximal-to-Distal Force Transfer", category:"cognitive", def:"The synergy structure underlying throwing, swinging, kicking, striking." },
              { term:"Kinetic Chain", category:"cognitive", def:"Sequential coupling of body segments through which force is transferred." },
              { term:"Anticipatory Postural Adjustment (APA)", category:"cognitive", def:"Small, precisely timed pre-movement stabilizing the platform 50–150 ms before main movement." },
              { term:"Forward Model", category:"cognitive", def:"Internal simulation predicting the sensory consequences of a motor command." },
              { term:"Inverse Model", category:"cognitive", def:"Computation generating corrective adjustments from prediction errors." },
              { term:"Online Correction", category:"cognitive", def:"Cerebellar in-flight correction loop at 50–100 ms. Faster than conscious processing." },
              { term:"Automaticity", category:"cognitive", def:"Execution state in which motor programs run without conscious DLPFC involvement." },
              { term:"Reinvestment", category:"cognitive", def:"Reverting from automatic to deliberate DLPFC-driven micromanagement. Canonical execute-stage choke." },
              { term:"Proprioception", category:"sensory", def:"Sensory feedback reporting body position and movement." },
              { term:"Muscle Spindle", category:"sensory", def:"Stretch receptor in muscle. Encodes length and stretch velocity." },
              { term:"Golgi Tendon Organ (GTO)", category:"sensory", def:"Force receptor at the muscle-tendon junction." },
              { term:"Joint Receptors", category:"sensory", def:"Specialized sensors within and around joint capsules. Encode joint angle." },
              { term:"Neuromuscular Junction (NMJ)", category:"muscle", def:"Specialized synapse between alpha motor neuron and muscle fiber. Near-100% reliability." },
              { term:"Acetylcholine", category:"muscle", def:"Neurotransmitter at the NMJ. Released by motor neuron; binds nicotinic receptors on muscle." },
              { term:"Excitation-Contraction Coupling", category:"muscle", def:"Conversion of muscle fiber action potential into mechanical contraction via calcium release." },
              { term:"Sarcoplasmic Reticulum", category:"muscle", def:"Internal calcium storage in muscle fiber." },
              { term:"Cross-Bridge Cycle", category:"muscle", def:"Myosin attaches to actin, pulls through power stroke, releases, re-attaches. Molecular mechanism of contraction." },
              { term:"Rate Coding", category:"muscle", def:"Force regulation by varying motor neuron firing rate." },
              { term:"Motor Unit Recruitment", category:"muscle", def:"Force regulation by activating additional motor units." },
              { term:"Akinetopsia", category:"clinical", def:"Loss of motion perception. V5/MT damage signature." },
              { term:"Dysmetria", category:"clinical", def:"Movements that overshoot or undershoot. Cerebellar dysfunction signature." },
              { term:"Transcranial Magnetic Stimulation (TMS)", category:"clinical", def:"Noninvasive probe of M1 excitability via motor evoked potentials." },
              { term:"Motor Evoked Potential (MEP)", category:"clinical", def:"Muscle response to TMS stimulation of M1. Indexes corticospinal excitability." },
              { term:"Prolonged Silent Period", category:"clinical", def:"TMS marker associated with post-concussive motor cortex dysfunction." },
              { term:"Concussion-related execution deficits", category:"pathology", def:"Subtle cerebellar timing, proprioceptive, M1 excitability, and corticospinal abnormalities that often pass standard return-to-play testing." },
              { term:"Post-Injury Proprioceptive Deficit", category:"pathology", def:"Persistent proprioceptive degradation at a previously injured joint, often beyond structural recovery." },
              { term:"Aging-related motor decline", category:"pathology", def:"Documented in cerebellar function, motor unit number, and M1 plasticity starting in mid-life." },
              { term:"Muscle Fiber Contraction", category:"boundary", def:"The final station of EXECUTE. Past this point, the signal is mechanical force." },
              { term:"Muscle-to-Tendon Force Transfer", category:"boundary", def:"First post-EXECUTE step. Belongs to SYNCHRONIZE — Book Four." },
              { term:"Joint-Level Coordination", category:"boundary", def:"Coordination of forces across joints. Belongs to SYNCHRONIZE." },
              { term:"Whole-Body Integration", category:"boundary", def:"Coordination of multiple kinetic chains and limbs. Belongs to SYNCHRONIZE." },
              { term:"Multi-System Synchronization", category:"boundary", def:"Coordination of motor with perception, decision, emotion, arousal. Belongs to SYNCHRONIZE." }
            ]
          }
        }
      ] }
  ]
};

const DB_NAME = "ares_acquire";
const DB_VERSION = 1;
function openDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, DB_VERSION); req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains("progress")) db.createObjectStore("progress", { keyPath: "id" }); }; req.onsuccess = (e) => resolve(e.target.result); req.onerror = (e) => reject(e.target.error); }); }
async function saveProgress(id, data) { try { const db = await openDB(); const tx = db.transaction("progress", "readwrite"); tx.objectStore("progress").put({ id, ...data, updatedAt: Date.now() }); } catch (e) {} }

function renderRich(text, keyPrefix) {
  const nodes = [];
  const re = /(\*\*[^*]+\*\*|\*[^*]+\*)/g;
  let last = 0, m, i = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) nodes.push(text.slice(last, m.index));
    const seg = m[0];
    if (seg.startsWith("**")) nodes.push(<strong key={keyPrefix + "-b" + i}>{seg.slice(2, -2)}</strong>);
    else nodes.push(<em key={keyPrefix + "-i" + i}>{seg.slice(1, -1)}</em>);
    last = m.index + seg.length; i++;
  }
  if (last < text.length) nodes.push(text.slice(last));
  return nodes;
}

function applyHighlights(root, highlights) {
  if (!root) return;
  root.querySelectorAll(".ares-mark").forEach(mark => { const parent = mark.parentNode; while (mark.firstChild) parent.insertBefore(mark.firstChild, mark); parent.removeChild(mark); if (parent.normalize) parent.normalize(); });
  if (!highlights || highlights.length === 0) return;
  const sorted = highlights.slice().sort((a, b) => (b.text || "").length - (a.text || "").length);
  sorted.forEach(h => {
    if (!h.text || h.text.length < 3) return;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, { acceptNode: (n) => { if (n.parentNode && n.parentNode.closest && n.parentNode.closest(".ares-mark")) return NodeFilter.FILTER_REJECT; return NodeFilter.FILTER_ACCEPT; } });
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(node => {
      const text = node.textContent;
      const idx = text.indexOf(h.text);
      if (idx === -1) return;
      const before = text.slice(0, idx);
      const match = text.slice(idx, idx + h.text.length);
      const after = text.slice(idx + h.text.length);
      const parent = node.parentNode;
      if (before) parent.insertBefore(document.createTextNode(before), node);
      const mark = document.createElement("mark");
      mark.className = "ares-mark";
      mark.textContent = match;
      mark.dataset.hlId = h.id;
      parent.insertBefore(mark, node);
      if (after) parent.insertBefore(document.createTextNode(after), node);
      parent.removeChild(node);
    });
  });
}

function Prose({ text, highlights }) {
  const ref = useRef(null);
  useEffect(() => { applyHighlights(ref.current, highlights); }, [text, highlights]);
  return (<div className="prose" ref={ref}>{text.split("\n\n").map((para, i) => <p key={i}>{renderRich(para, "p" + i)}</p>)}</div>);
}

function ProgressRing({ progress = 0, size = 20, strokeWidth = 2 }) {
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (progress * circ);
  return (<svg className="nav-progress-ring" width={size} height={size} viewBox={"0 0 " + size + " " + size}><circle className="nav-progress-bg" cx={size/2} cy={size/2} r={r} /><circle className="nav-progress-fill" cx={size/2} cy={size/2} r={r} strokeDasharray={circ} strokeDashoffset={offset} /></svg>);
}

function QuizBlock({ questions }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState({});
  const select = (qi, oi) => { if (submitted[qi]) return; setAnswers({ ...answers, [qi]: oi }); };
  const submit = (qi) => setSubmitted({ ...submitted, [qi]: true });
  return (<div>{questions.map((q, qi) => (<div className="quiz-question" key={qi}><div className="quiz-q-text">{q.question}</div>{q.options.map((opt, oi) => { let cls = "quiz-option"; if (answers[qi] === oi) cls += " selected"; if (submitted[qi] && oi === q.correct) cls += " correct"; if (submitted[qi] && answers[qi] === oi && oi !== q.correct) cls += " wrong"; return (<div key={oi} className={cls} onClick={() => select(qi, oi)}><div className="quiz-radio" /><span>{opt}</span></div>); })}{answers[qi] !== undefined && !submitted[qi] && (<button style={{ marginTop: 12, padding: "8px 20px", background: "var(--lp)", color: "white", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 500 }} onClick={() => submit(qi)}>Check Answer</button>)}{submitted[qi] && (<div className={"quiz-feedback show " + (answers[qi] === q.correct ? "correct" : "wrong")}>{q.feedback}</div>)}</div>))}</div>);
}

function extractYouTubeId(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  const m = s.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function isNaturalVoice(v) { if (!v || !v.name) return false; return /natural|premium|enhanced|neural|online|wavenet|studio|siri/i.test(v.name) || /samantha|karen|moira|tessa|veena|fiona|alex|daniel|catherine|kate|serena|allison|ava/i.test(v.name); }
function voiceLabel(v) { if (!v) return ""; let n = v.name.replace(/Microsoft |Google |Apple /g, ""); if (isNaturalVoice(v)) n = "★ " + n; return n.slice(0, 30); }
function browserHint() { const ua = (typeof navigator !== "undefined" && navigator.userAgent) || ""; if (/Edg\//.test(ua)) return null; if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return { msg: "For more natural voices, try Microsoft Edge — it ships with high-quality Neural voices.", strong: "Tip" }; if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return { msg: "On macOS, premium voices like Samantha and Ava sound dramatically better — download via System Settings → Accessibility.", strong: "Tip" }; return { msg: "Microsoft Edge offers free Neural voices that sound dramatically more natural.", strong: "Tip" }; }

function AudiobookBar({ chapter, segments }) {
  const [status, setStatus] = useState("idle");
  const [segIdx, setSegIdx] = useState(0);
  const [rate, setRate] = useState(1.0);
  const [voices, setVoices] = useState([]);
  const [voiceURI, setVoiceURI] = useState("");
  const [tipDismissed, setTipDismissed] = useState(() => { try { return localStorage.getItem("ares_audio_tip_dismissed") === "1"; } catch (e) { return false; } });
  const segIdxRef = useRef(0);
  const isRestarting = useRef(false);
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;
  useEffect(() => {
    if (!supported) return;
    const ss = window.speechSynthesis;
    ss.cancel();
    const loadVoices = () => {
      const all = ss.getVoices();
      const en = all.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
      const list = en.length ? en : all;
      const sorted = list.slice().sort((a, b) => { const an = isNaturalVoice(a), bn = isNaturalVoice(b); if (an && !bn) return -1; if (!an && bn) return 1; return a.name.localeCompare(b.name); });
      setVoices(sorted);
      if (sorted.length && !voiceURI) { const stored = (() => { try { return localStorage.getItem("ares_audio_voice"); } catch (e) { return null; } })(); const fromStorage = stored && sorted.find(v => v.voiceURI === stored); const best = fromStorage || sorted.find(isNaturalVoice) || sorted[0]; if (best) setVoiceURI(best.voiceURI); }
    };
    loadVoices();
    ss.addEventListener("voiceschanged", loadVoices);
    return () => { ss.removeEventListener("voiceschanged", loadVoices); ss.cancel(); };
  }, [supported]);
  useEffect(() => { try { if (voiceURI) localStorage.setItem("ares_audio_voice", voiceURI); } catch (e) {} }, [voiceURI]);
  useEffect(() => { try { localStorage.setItem("ares_audio_rate", String(rate)); } catch (e) {} }, [rate]);
  useEffect(() => { try { const stored = parseFloat(localStorage.getItem("ares_audio_rate")); if (stored && !isNaN(stored)) setRate(stored); } catch (e) {} }, []);
  useEffect(() => { if (supported) window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; }, [chapter && chapter.id]);
  const strip = (t) => String(t).replace(/\*\*([^*]+)\*\*/g, "$1").replace(/\*([^*]+)\*/g, "$1").replace(/\s+/g, " ").trim();
  const speakSeg = (i) => { if (!supported) return; if (!segments || i >= segments.length) { setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; return; } setSegIdx(i); segIdxRef.current = i; const seg = segments[i]; const utter = new SpeechSynthesisUtterance(strip(seg.text)); utter.rate = rate; const v = voices.find(vv => vv.voiceURI === voiceURI); if (v) utter.voice = v; utter.onend = () => { if (!isRestarting.current) speakSeg(segIdxRef.current + 1); }; utter.onerror = () => { if (!isRestarting.current) speakSeg(segIdxRef.current + 1); }; window.speechSynthesis.speak(utter); };
  useEffect(() => { if (status !== "playing" || !supported) return; isRestarting.current = true; window.speechSynthesis.cancel(); const t = setTimeout(() => { isRestarting.current = false; speakSeg(segIdxRef.current); }, 80); return () => clearTimeout(t); }, [rate, voiceURI]);
  const start = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(0); };
  const pauseResume = () => { if (!supported) return; if (status === "playing") { window.speechSynthesis.pause(); setStatus("paused"); } else if (status === "paused") { window.speechSynthesis.resume(); setStatus("playing"); } };
  const stop = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; };
  const skip = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.min(segments.length, segIdxRef.current + 1)); };
  const back = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.max(0, segIdxRef.current - 1)); };
  const jumpTo = (i) => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(i); };
  const dismissTip = () => { setTipDismissed(true); try { localStorage.setItem("ares_audio_tip_dismissed", "1"); } catch (e) {} };
  if (!supported || !segments || segments.length === 0) return null;
  const currentVoice = voices.find(v => v.voiceURI === voiceURI);
  const naturalCount = voices.filter(isNaturalVoice).length;
  const tip = !tipDismissed && naturalCount === 0 ? browserHint() : null;
  return (
    <React.Fragment>
      {tip && (<div className="ab-tip"><span><strong>{tip.strong}:</strong> {tip.msg}</span><button className="ab-tip-close" onClick={dismissTip}>×</button></div>)}
      {status === "idle" ? (
        <div className="audiobook-bar idle"><button className="ab-cta" onClick={start}><span className="ab-cta-ico">{"🎧"}</span> Listen to this chapter</button><span className="ab-hint">Reads aloud, section by section{currentVoice && isNaturalVoice(currentVoice) && " · natural voice"}</span></div>
      ) : (
        <div className="audiobook-bar active">
          <div className="ab-current"><div className="ab-current-label">Now playing · section {segIdx + 1} of {segments.length}</div><div className="ab-current-title">{segments[segIdx] && segments[segIdx].label}</div></div>
          <div className="ab-controls">
            <button className="ab-btn" onClick={back} title="Previous">{"⏮"}</button>
            <button className="ab-btn primary" onClick={pauseResume} title={status === "playing" ? "Pause" : "Resume"}>{status === "playing" ? "⏸" : "▶"}</button>
            <button className="ab-btn" onClick={skip} title="Next">{"⏭"}</button>
            <button className="ab-btn" onClick={stop} title="Stop">{"⏹"}</button>
            <select className="ab-jump" value={segIdx} onChange={e => jumpTo(parseInt(e.target.value))}>{segments.map((s, i) => <option key={s.id} value={i}>{(i + 1) + ". " + s.label}</option>)}</select>
            <select className="ab-speed" value={rate} onChange={e => setRate(parseFloat(e.target.value))}>{[0.75, 1.0, 1.25, 1.5, 2.0].map(r => <option key={r} value={r}>{r}×</option>)}</select>
            {voices.length > 1 && (<select className="ab-voice" value={voiceURI} onChange={e => setVoiceURI(e.target.value)} title="Voice (★ = natural)">{voices.slice(0, 18).map((v) => <option key={v.voiceURI} value={v.voiceURI}>{voiceLabel(v)}</option>)}</select>)}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function HighlightActionPopup({ onHighlight, onNote }) {
  const [popup, setPopup] = useState(null);
  useEffect(() => {
    const handler = (e) => {
      if (e.target && e.target.closest && e.target.closest(".hl-popup")) return;
      setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) { setPopup(null); return; }
        const text = sel.toString().trim();
        if (text.length < 3 || text.length > 600) { setPopup(null); return; }
        const range = sel.getRangeAt(0);
        const container = range.commonAncestorContainer;
        const element = container.nodeType === 3 ? container.parentElement : container;
        if (!element || !element.closest(".prose")) { setPopup(null); return; }
        const rect = range.getBoundingClientRect();
        if (rect.width === 0) { setPopup(null); return; }
        setPopup({ text, x: rect.left + rect.width / 2, y: rect.top });
      }, 50);
    };
    const clear = () => setPopup(null);
    document.addEventListener("mouseup", handler);
    document.addEventListener("touchend", handler);
    document.addEventListener("scroll", clear, true);
    return () => { document.removeEventListener("mouseup", handler); document.removeEventListener("touchend", handler); document.removeEventListener("scroll", clear, true); };
  }, []);
  if (!popup) return null;
  return (<div className="hl-popup" style={{ left: popup.x, top: popup.y - 8 }}><button onClick={(e) => { e.stopPropagation(); onHighlight(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>★ Highlight</button><button onClick={(e) => { e.stopPropagation(); onNote(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>+ Note</button></div>);
}

  ];
  const filtered = c.entries.filter(e => {
    if (category !== "all" && e.category !== category) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return e.term.toLowerCase().includes(s) || e.def.toLowerCase().includes(s);
  }).slice().sort((a, b) => a.term.localeCompare(b.term));
  return (
    <div>
      <div className="chapter-header">
        <div className="chapter-act-label">Part Five — Reference</div>
        <div className="chapter-number">{chapter.number}</div>
        <div className="chapter-title">{chapter.title}</div>
        <div className="chapter-hook">{c.intro}</div>
      </div>
      <div className="gl-search-bar"><input type="search" placeholder="Search by term or definition…" value={search} onChange={e => setSearch(e.target.value)} className="gl-search" /></div>
      <div className="gl-categories">{categories.map(cat => (<button key={cat.key} className={"gl-cat " + (category === cat.key ? "active" : "")} onClick={() => setCategory(cat.key)}>{cat.label}</button>))}</div>
      <div className="gl-results">
        {filtered.length === 0 ? (<div className="gl-empty">No entries match "{search}". Try a different term or clear the filter.</div>) : (
          filtered.map(e => {
            const catObj = categories.find(c => c.key === e.category);
            return (<div key={e.term} className="gl-entry"><span className="gl-term">{e.term}</span>{catObj && catObj.key !== "all" && <span className="gl-cat-badge">{catObj.label}</span>}<div className="gl-def">{e.def}</div></div>);
          })
        )}
      </div>
      <div className="gl-footer">Showing <strong>{filtered.length}</strong> of <strong>{c.entries.length}</strong> entries</div>
    </div>
  );
}

// === Ch2 — Motor Program Library Builder ===
function MotorProgramLibrary() {
  const [variability, setVariability] = useState(70);
  const [feedback, setFeedback] = useState(75);
  const [volume, setVolume] = useState(60);

  // Library size grows with volume × feedback
  const librarySize = Math.round(volume * (0.4 + 0.6 * (feedback / 100)));
  // Recall schema range = variability × feedback (sweet spot at variability ~70)
  const variabilityCurve = Math.max(0, 1 - Math.pow((variability - 70) / 90, 2));
  const schemaRange = Math.round(variabilityCurve * (feedback / 100) * 100);
  // GMP fidelity scales with volume + feedback (less sensitive to variability)
  const gmpFidelity = Math.min(100, Math.round(((volume * 0.5) + (feedback * 0.5)) * (0.7 + variability/300)));
  // Retrieval interval (ms): lower = faster. Elite ~40 ms, untrained ~120 ms
  const retrievalMs = Math.max(40, Math.round(140 - (gmpFidelity * 0.6) - (schemaRange * 0.2)));

  // Visual: practice envelope diagram
  // Show a 2D plot — x axis = parameter range, blue dots = practiced points, shaded green = recall accuracy
  const W = 480, H = 160;
  const pad = { l: 40, r: 20, t: 20, b: 30 };
  // Practiced points cluster around center; spread with variability
  const points = [];
  const numPoints = Math.max(2, Math.round(volume / 8));
  for (let i = 0; i < numPoints; i++) {
    const norm = (Math.sin(i * 2.7) + 1) / 2;  // pseudo-random distribution
    const xNorm = 0.5 + (norm - 0.5) * (variability / 100);
    const x = pad.l + xNorm * (W - pad.l - pad.r);
    const y = pad.t + (H - pad.t - pad.b) * (0.3 + Math.cos(i * 1.7) * 0.2);
    points.push({ x, y });
  }
  // Recall accuracy band: width = schemaRange
  const bandHalf = (schemaRange / 100) * (W - pad.l - pad.r) / 2;
  const bandX = pad.l + (W - pad.l - pad.r) / 2 - bandHalf;
  const bandW = bandHalf * 2;

  const verdict = (() => {
    if (volume < 30) return { txt: "Insufficient exposure volume. Schemas need thousands of varied, feedback-rich reps to form. There is no shortcut — and the timeline is honest.", cls: "crit" };
    if (feedback < 30) return { txt: "Practice without outcome feedback automatizes the motor sequence but does not build schemas with predictive structure. The reps are happening; the learning is not.", cls: "crit" };
    if (variability < 30) return { txt: "Blocked, low-variability practice. The motor program will execute well in the practiced conditions and break under perturbation. The library is being built brittle.", cls: "warn" };
    if (variability > 90) return { txt: "Variability so high the brain can't extract the invariant. Pure noise produces no schema. The sweet spot sits around 60–80%.", cls: "warn" };
    if (gmpFidelity > 75 && schemaRange > 65) return { txt: "Library forming cleanly. GMP fidelity is high; recall schema covers a wide parameter range; retrieval is fast. This is what trained motor expertise looks like at this station.", cls: "good" };
    return { txt: "Moderate library development. Adjust the three knobs to find the conditions that produce both fidelity and range.", cls: "" };
  })();

  return (
    <div className="mpl-wrap">
      <div className="mpl-controls">
        <div className="mpl-ctrl">
          <div className="mpl-ctrl-label"><span>Practice variability</span><span className="val">{variability}%</span></div>
          <input type="range" min="0" max="100" value={variability} onChange={e => setVariability(parseInt(e.target.value))} />
          <div className="mpl-ctrl-sub">Surface variation with deep-structure consistency. Sweet spot ~60–80%. Too low = brittle; too high = noise.</div>
        </div>
        <div className="mpl-ctrl">
          <div className="mpl-ctrl-label"><span>Outcome feedback</span><span className="val">{feedback}%</span></div>
          <input type="range" min="0" max="100" value={feedback} onChange={e => setFeedback(parseInt(e.target.value))} />
          <div className="mpl-ctrl-sub">Quality of outcome signal after each rep. No feedback = no schema formation.</div>
        </div>
        <div className="mpl-ctrl">
          <div className="mpl-ctrl-label"><span>Exposure volume</span><span className="val">{volume}%</span></div>
          <input type="range" min="0" max="100" value={volume} onChange={e => setVolume(parseInt(e.target.value))} />
          <div className="mpl-ctrl-sub">Number of repetitions. Schemas need thousands; there is no shortcut.</div>
        </div>
      </div>
      <div className="mpl-stage">
        <div className="mpl-stage-h">Practice envelope · parameter coverage · recall schema accuracy band</div>
        <svg className="mpl-svg" viewBox={"0 0 " + W + " " + H} xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width={W} height={H} fill="#0D0A1A" />
          {/* Recall accuracy band */}
          <rect x={bandX} y={pad.t} width={bandW} height={H - pad.t - pad.b} fill="rgba(78,205,196,0.10)" stroke="rgba(78,205,196,0.40)" strokeWidth="1" strokeDasharray="3 3" />
          {/* x axis */}
          <line x1={pad.l} y1={H-pad.b} x2={W-pad.r} y2={H-pad.b} stroke="#3a3550" />
          <text x={pad.l} y={H-8} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">low param</text>
          <text x={W-pad.r} y={H-8} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif" textAnchor="end">high param</text>
          <text x="8" y={pad.t+8} fill="#4ECDC4" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">RECALL</text>
          {/* Practiced reps */}
          {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="4" fill="#E24B4A" opacity={Math.max(0.3, (feedback/100))} stroke="#fff" strokeWidth="0.5" />)}
          {/* Label */}
          <text x={W/2} y={pad.t-4} fill="#A099B8" fontSize="9" fontFamily="Inter, sans-serif" textAnchor="middle">red = practiced parameters · teal band = recall schema accurate range</text>
        </svg>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">GMP fidelity</div><div className={"mpl-stat-val " + (gmpFidelity > 75 ? "good" : gmpFidelity > 50 ? "warn" : "crit")}>{gmpFidelity}%</div><div className="mpl-stat-sub">Quality of the stored invariants — timing, force, sequence.</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Recall schema range</div><div className={"mpl-stat-val " + (schemaRange > 65 ? "good" : schemaRange > 40 ? "warn" : "crit")}>{schemaRange}%</div><div className="mpl-stat-sub">Parameter envelope where the schema interpolates accurately.</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Retrieval interval</div><div className={"mpl-stat-val " + (retrievalMs < 70 ? "good" : retrievalMs < 100 ? "warn" : "crit")}>{retrievalMs} ms</div><div className="mpl-stat-sub">Decision → motor program begins. Elite: 40–60 ms.</div></div>
      </div>
      <div className="mpl-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}
