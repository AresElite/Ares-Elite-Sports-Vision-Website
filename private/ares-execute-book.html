// === Ch3 — Basal Ganglia Gate ===
function BasalGangliaGate() {
  const [direct, setDirect] = useState(70);
  const [indirect, setIndirect] = useState(30);
  const [dopamine, setDopamine] = useState(60);
  const [hyperdirect, setHyperdirect] = useState(20);
  const goSignal = Math.max(0, direct - indirect * 0.5);
  const vigor = Math.round(Math.min(100, (goSignal * 0.6) + (dopamine * 0.4)));
  const releaseLatency = Math.round(80 + (100 - goSignal) * 1.2 - dopamine * 0.3);
  const abortTime = hyperdirect > 50 ? Math.round(40 + (100 - hyperdirect) * 0.8) : null;
  const verdict = (() => {
    if (vigor < 35) return { txt: "Under-vigored release. The right program is selected but executed tentatively. Often arousal-side, not character.", cls: "crit" };
    if (vigor > 85 && hyperdirect < 30) return { txt: "Aggressive release with weak abort capacity — the swing is going through regardless of late information.", cls: "warn" };
    if (vigor > 60 && hyperdirect > 60) return { txt: "Clean gate function: vigorous release with the abort capacity to check the swing when late information arrives.", cls: "good" };
    return { txt: "Adjust the three pathways and dopamine to see how the gate's release vigor and abort capacity shift.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Direct (go) drive</span><span className="val">{direct}%</span></div><input type="range" min="0" max="100" value={direct} onChange={e=>setDirect(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Facilitates motor program release.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Indirect (stop) drive</span><span className="val">{indirect}%</span></div><input type="range" min="0" max="100" value={indirect} onChange={e=>setIndirect(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Suppresses unwanted programs.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Dopamine (vigor)</span><span className="val">{dopamine}%</span></div><input type="range" min="0" max="100" value={dopamine} onChange={e=>setDopamine(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Modulates action vigor and reinforcement learning.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Hyperdirect (abort capacity)</span><span className="val">{hyperdirect}%</span></div><input type="range" min="0" max="100" value={hyperdirect} onChange={e=>setHyperdirect(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Emergency stop — the checked swing.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Release vigor</div><div className={"b3-stat-val " + (vigor > 70 ? "good" : vigor > 45 ? "warn" : "crit")}>{vigor}%</div><div className="b3-stat-sub">Composite of direct drive and dopaminergic gain.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Release latency</div><div className={"b3-stat-val " + (releaseLatency < 100 ? "good" : releaseLatency < 140 ? "warn" : "crit")}>{releaseLatency} ms</div><div className="b3-stat-sub">Time from cortical drive to program release.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Abort window</div><div className={"b3-stat-val " + (abortTime && abortTime < 80 ? "good" : abortTime ? "warn" : "crit")}>{abortTime ? abortTime + " ms" : "—"}</div><div className="b3-stat-sub">Hyperdirect emergency-stop time; needs &gt;50% drive to engage.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch4 — M1 Plasticity ===
function M1Plasticity() {
  const [trainHrs, setTrainHrs] = useState(8);
  const [weeks, setWeeks] = useState(20);
  const [layoff, setLayoff] = useState(0);
  // Map size growth = log curve over weeks × hours, capped
  const growth = Math.min(100, Math.round(Math.log(1 + weeks * trainHrs / 4) * 22));
  const contraction = Math.min(growth * 0.7, layoff * 1.5);
  const mapSize = Math.max(15, Math.round(growth - contraction));
  const precision = Math.round(mapSize * 0.9 + (Math.min(weeks, 12) * 0.5));
  const excitability = Math.min(100, Math.round((mapSize * 0.6) + (trainHrs * 4) - (layoff * 0.8)));
  const verdict = (() => {
    if (layoff > 12) return { txt: "Extended disuse: M1 representation has contracted. Re-expansion takes weeks of structured exposure — the 'rust' is real and measurable.", cls: "crit" };
    if (mapSize > 65 && precision > 60) return { txt: "Expanded, excitable cortical representation. This is what trained motor expertise looks like at the M1 level.", cls: "good" };
    if (trainHrs < 4 && weeks > 8) return { txt: "Volume too low to drive map expansion. Plasticity needs sustained training intensity to engage.", cls: "warn" };
    return { txt: "Adjust training intensity, weeks, and layoff to see M1 expand and contract.", cls: "" };
  })();
  // Simple visual: bar showing map territory
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Training hours / week</span><span className="val">{trainHrs}</span></div><input type="range" min="0" max="20" value={trainHrs} onChange={e=>setTrainHrs(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Sustained intensity drives map expansion.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Weeks of training</span><span className="val">{weeks}</span></div><input type="range" min="0" max="52" value={weeks} onChange={e=>setWeeks(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Plasticity timescale is weeks to months.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Recent layoff (weeks)</span><span className="val">{layoff}</span></div><input type="range" min="0" max="20" value={layoff} onChange={e=>setLayoff(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Disuse contracts the representation. Re-expansion takes time.</div></div>
      </div>
      <div className="b3-stage">
        <div className="b3-stage-h">M1 cortical representation · motor map</div>
        <div className="b3-bar"><div className="b3-bar-fill" style={{ width: mapSize + "%", background: mapSize > 65 ? "linear-gradient(90deg, var(--accent-glow), var(--teal))" : mapSize > 40 ? "linear-gradient(90deg, var(--gold), var(--accent-glow))" : "linear-gradient(90deg, var(--red), var(--gold))" }} /></div>
        <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 6 }}>Representation size: {mapSize}% of trainable maximum</div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Map size</div><div className={"b3-stat-val " + (mapSize > 65 ? "good" : mapSize > 40 ? "warn" : "crit")}>{mapSize}%</div><div className="b3-stat-sub">Cortical territory dedicated to the trained movement.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Precision</div><div className={"b3-stat-val " + (precision > 60 ? "good" : "warn")}>{precision}%</div><div className="b3-stat-sub">Fine motor differentiation within the map.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Cortical excitability</div><div className={"b3-stat-val " + (excitability > 60 ? "good" : "warn")}>{excitability}%</div><div className="b3-stat-sub">MEP responsiveness — what TMS would measure.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch5 — Corticospinal Velocity ===
function CorticospinalVelocity() {
  const [diameter, setDiameter] = useState(70);
  const [myelin, setMyelin] = useState(75);
  const [concussion, setConcussion] = useState(0);
  // Velocity in m/s
  const velocity = Math.max(10, Math.round(((diameter * 0.5) + (myelin * 0.5)) * (1 - concussion * 0.008) * 1.0));
  // Latency to spinal cord (assume ~1m descent for distal limbs)
  const latency = Math.max(8, Math.round(1000 / velocity));
  const verdict = (() => {
    if (concussion > 50) return { txt: "Post-concussive abnormalities present. Prolonged silent period is detectable on TMS even when standard testing has cleared the athlete.", cls: "crit" };
    if (velocity > 80) return { txt: "Elite conduction velocity. Fast, well-myelinated corticospinal pathway delivers commands with minimal descending delay.", cls: "good" };
    if (velocity > 60) return { txt: "Solid conduction. Adequate for most demands; further activity-dependent myelination can push it higher.", cls: "warn" };
    return { txt: "Slow descending conduction. Motor onset will lag decision speed.", cls: "crit" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Axon diameter</span><span className="val">{diameter}%</span></div><input type="range" min="20" max="100" value={diameter} onChange={e=>setDiameter(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Larger diameters conduct faster. Partly biological.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Myelination quality</span><span className="val">{myelin}%</span></div><input type="range" min="20" max="100" value={myelin} onChange={e=>setMyelin(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Trainable through activity-dependent myelination.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Post-concussive marker</span><span className="val">{concussion}%</span></div><input type="range" min="0" max="100" value={concussion} onChange={e=>setConcussion(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Prolonged silent period severity on TMS.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Conduction velocity</div><div className={"b3-stat-val " + (velocity > 75 ? "good" : velocity > 50 ? "warn" : "crit")}>{velocity} m/s</div><div className="b3-stat-sub">Fastest fibers: ~100 m/s. Slowest: ~10 m/s.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Descent latency</div><div className={"b3-stat-val " + (latency < 15 ? "good" : latency < 25 ? "warn" : "crit")}>{latency} ms</div><div className="b3-stat-sub">Cortex → spinal cord for distal limbs.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">TMS status</div><div className={"b3-stat-val " + (concussion > 30 ? "crit" : "good")}>{concussion > 30 ? "Abnormal" : "Normal"}</div><div className="b3-stat-sub">Prolonged silent period present above ~30%.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch6 — Size Principle ===
function SizePrinciple() {
  const [force, setForce] = useState(40);
  // Type I recruited 0-35%, Type IIa 35-75%, Type IIx 75-100%
  const typeI = Math.min(100, (force / 35) * 100);
  const typeIIa = Math.max(0, Math.min(100, ((force - 35) / 40) * 100));
  const typeIIx = Math.max(0, Math.min(100, ((force - 75) / 25) * 100));
  // Fatigue rate weighted by recruited units
  const fatigueRate = Math.round((typeI * 0.1) + (typeIIa * 0.5) + (typeIIx * 1.5));
  const sustainability = Math.max(5, Math.round(120 - fatigueRate));
  const verdict = (() => {
    if (force < 20) return { txt: "Low force demand. Only Type I motor units recruited. Sustainable indefinitely.", cls: "good" };
    if (force > 85) return { txt: "Near-maximal effort. Type IIx units engaged. Explosive output, fast fatigue.", cls: "warn" };
    return { txt: "Type I plus partial Type IIa recruitment. Sustainable high-intensity range.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Force demand</span><span className="val">{force}%</span></div><input type="range" min="0" max="100" value={force} onChange={e=>setForce(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Drag to recruit progressively larger motor units per Henneman's rule.</div></div>
      </div>
      <div className="b3-stage">
        <div className="b3-stage-h">Recruitment stack · Henneman's size principle</div>
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: "var(--accent-glow)", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>Type I (slow, fatigue-resistant)</div>
          <div className="b3-bar"><div className="b3-bar-fill" style={{ width: typeI + "%", background: "var(--teal)" }} /></div>
        </div>
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: "var(--accent-glow)", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>Type IIa (fast oxidative)</div>
          <div className="b3-bar"><div className="b3-bar-fill" style={{ width: typeIIa + "%", background: "var(--gold)" }} /></div>
        </div>
        <div>
          <div style={{ fontSize: 11, color: "var(--accent-glow)", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>Type IIx (fast glycolytic)</div>
          <div className="b3-bar"><div className="b3-bar-fill" style={{ width: typeIIx + "%", background: "var(--red)" }} /></div>
        </div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Type IIx engagement</div><div className={"b3-stat-val " + (typeIIx > 50 ? "warn" : "good")}>{Math.round(typeIIx)}%</div><div className="b3-stat-sub">Highest-threshold; needed for maximal explosive output.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Fatigue rate</div><div className={"b3-stat-val " + (fatigueRate < 30 ? "good" : fatigueRate < 70 ? "warn" : "crit")}>{fatigueRate}%</div><div className="b3-stat-sub">Cumulative load weighted by recruited fiber type.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Sustainability</div><div className={"b3-stat-val " + (sustainability > 80 ? "good" : sustainability > 40 ? "warn" : "crit")}>{sustainability}s</div><div className="b3-stat-sub">Approximate time before significant fatigue at this force.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch7 — Kinetic Chain ===
function KineticChain() {
  const [synergy, setSynergy] = useState(75);
  const [timing, setTiming] = useState(75);
  const [leak, setLeak] = useState(15);
  // Each segment contributes; leak reduces transfer
  const legs = 100;
  const hips = legs * (synergy / 100) * (timing / 100) * (1 - leak / 200);
  const trunk = hips * (synergy / 100) * (timing / 100) * (1 - leak / 200);
  const shoulder = trunk * (synergy / 100) * (timing / 100) * (1 - leak / 250);
  const elbow = shoulder * (synergy / 100) * (timing / 100) * (1 - leak / 300);
  const wrist = elbow * (synergy / 100) * (timing / 100);
  const distalOutput = Math.round(wrist);
  const efficiency = Math.round((distalOutput / 100) * 100);
  const verdict = (() => {
    if (leak > 40) return { txt: "Severe kinetic chain leak. Force generated proximally is escaping laterally — the athlete is working hard for little distal output.", cls: "crit" };
    if (synergy > 80 && timing > 80 && leak < 20) return { txt: "Clean proximal-to-distal transfer. Force generated at the base is reaching the endpoint with minimal loss. This is what 'pop' looks like mechanically.", cls: "good" };
    return { txt: "Moderate chain efficiency. Adjust synergy organization, segment timing, and leak to see how distal output responds.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Synergy quality</span><span className="val">{synergy}%</span></div><input type="range" min="20" max="100" value={synergy} onChange={e=>setSynergy(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Coordinated activation across muscle groups.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Segment timing</span><span className="val">{timing}%</span></div><input type="range" min="20" max="100" value={timing} onChange={e=>setTiming(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Proximal segments peak before distal; sequencing precision.</div></div>

// === Ch8 — APA Window ===
function APAWindow() {
  const [amplitude, setAmplitude] = useState(70);
  const [offset, setOffset] = useState(0); // ms relative to ideal; ideal = -100 ms (100 ms before main mover)
  // Stability = how close to ideal -100 ms
  const timingError = Math.abs(offset);
  const stability = Math.max(0, Math.round(amplitude - timingError * 0.4));
  const efficiency = Math.max(0, Math.round(stability - timingError * 0.3));
  const verdict = (() => {
    if (timingError > 80) return { txt: "Severe APA timing drift. The platform is unstable when the kinetic chain initiates; force leaks into stabilization work.", cls: "crit" };
    if (amplitude < 35) return { txt: "Insufficient APA amplitude. The stabilization is too weak to support the upcoming main movement.", cls: "crit" };
    if (timingError < 20 && amplitude > 65) return { txt: "Clean APA: well-timed, well-amplified. The platform is stable when the main movement begins — kinetic chain initiates from a solid base.", cls: "good" };
    return { txt: "Adjust amplitude and timing offset to find the platform-stable window.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>APA amplitude</span><span className="val">{amplitude}%</span></div><input type="range" min="0" max="100" value={amplitude} onChange={e=>setAmplitude(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Force scaling of the postural pre-stabilization.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Timing offset</span><span className="val">{offset > 0 ? "+" : ""}{offset} ms</span></div><input type="range" min="-100" max="100" value={offset} onChange={e=>setOffset(parseInt(e.target.value))} /><div className="b3-ctrl-sub">0 = ideal (~100 ms before prime mover). Negative = too early; positive = too late.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Platform stability</div><div className={"b3-stat-val " + (stability > 60 ? "good" : stability > 35 ? "warn" : "crit")}>{stability}%</div><div className="b3-stat-sub">Base solidity when the kinetic chain initiates.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Chain efficiency</div><div className={"b3-stat-val " + (efficiency > 55 ? "good" : "warn")}>{efficiency}%</div><div className="b3-stat-sub">Force transfer cleanliness through the kinetic chain.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Timing error</div><div className={"b3-stat-val " + (timingError < 20 ? "good" : timingError < 50 ? "warn" : "crit")}>{timingError} ms</div><div className="b3-stat-sub">Distance from ideal APA onset.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch9 — Cerebellar Correction ===
function CerebellarCorrection() {
  const [modelAccuracy, setModelAccuracy] = useState(75);
  const [correctionSpeed, setCorrectionSpeed] = useState(70);
  const [noise, setNoise] = useState(20);
  const predictionError = Math.max(0, Math.round(100 - modelAccuracy + noise * 0.4));
  const correctionLatency = Math.round(50 + (100 - correctionSpeed) * 0.8 + noise * 0.3);
  const residualError = Math.max(0, Math.round(predictionError - correctionSpeed * 0.5 + noise * 0.3));
  const verdict = (() => {
    if (noise > 60) return { txt: "High sensory noise corrupting the error signal. Concussion / disuse signature. Corrections can't refine when the input is degraded.", cls: "crit" };
    if (modelAccuracy > 80 && correctionSpeed > 75 && residualError < 15) return { txt: "Well-tuned cerebellar online correction. Small errors caught and corrected at speeds below conscious experience. This is what 'feel' is.", cls: "good" };
    if (correctionLatency > 100) return { txt: "Slow correction loop. Small errors compound into larger errors before they can be addressed.", cls: "warn" };
    return { txt: "Adjust the three parameters to see how prediction, correction, and noise interact.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Forward model accuracy</span><span className="val">{modelAccuracy}%</span></div><input type="range" min="20" max="100" value={modelAccuracy} onChange={e=>setModelAccuracy(parseInt(e.target.value))} /><div className="b3-ctrl-sub">How well the cerebellum predicts upcoming state.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Inverse correction speed</span><span className="val">{correctionSpeed}%</span></div><input type="range" min="20" max="100" value={correctionSpeed} onChange={e=>setCorrectionSpeed(parseInt(e.target.value))} /><div className="b3-ctrl-sub">How quickly errors are detected and adjusted.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Sensory noise</span><span className="val">{noise}%</span></div><input type="range" min="0" max="100" value={noise} onChange={e=>setNoise(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Concussion / disuse degrades the error signal.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Prediction error</div><div className={"b3-stat-val " + (predictionError < 20 ? "good" : predictionError < 40 ? "warn" : "crit")}>{predictionError}%</div><div className="b3-stat-sub">Discrepancy between forward model and actual outcome.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Correction latency</div><div className={"b3-stat-val " + (correctionLatency < 75 ? "good" : correctionLatency < 110 ? "warn" : "crit")}>{correctionLatency} ms</div><div className="b3-stat-sub">Time from error detection to corrective adjustment.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Residual error</div><div className={"b3-stat-val " + (residualError < 15 ? "good" : residualError < 35 ? "warn" : "crit")}>{residualError}%</div><div className="b3-stat-sub">Uncorrected deviation in final movement.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch10 — Proprioception ===
function Proprioception() {
  const [spindle, setSpindle] = useState(80);
  const [gto, setGto] = useState(80);
  const [jointHealth, setJointHealth] = useState(90);
  const avg = (spindle + gto + jointHealth) / 3;
  const positionError = Math.max(0, Math.round(100 - avg));
  const acuity = Math.round(avg);
  const reInjuryRisk = Math.max(5, Math.round((100 - jointHealth) * 0.8));
  const verdict = (() => {
    if (jointHealth < 50) return { txt: "Post-injury proprioceptive deficit at the affected joint. Re-injury risk is elevated; the joint feels 'fine' but the brain's position information is degraded.", cls: "crit" };
    if (acuity > 80) return { txt: "Elite proprioceptive acuity. The brain has accurate, real-time information about body state — the cerebellar correction loop has clean input to correct against.", cls: "good" };
    return { txt: "Adjust the three receptor channels to see how proprioceptive estimation degrades.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Muscle spindle sensitivity</span><span className="val">{spindle}%</span></div><input type="range" min="20" max="100" value={spindle} onChange={e=>setSpindle(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Length and stretch velocity.</div></div>

        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Joint receptor health</span><span className="val">{jointHealth}%</span></div><input type="range" min="20" max="100" value={jointHealth} onChange={e=>setJointHealth(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Often degraded at previously injured joints.</div></div>

        <div className="b3-stat"><div className="b3-stat-label">Proprioceptive acuity</div><div className={"b3-stat-val " + (acuity > 75 ? "good" : acuity > 50 ? "warn" : "crit")}>{acuity}%</div><div className="b3-stat-sub">Composite precision of the proprioceptive signal.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Position estimation error</div><div className={"b3-stat-val " + (positionError < 20 ? "good" : positionError < 40 ? "warn" : "crit")}>{positionError}%</div><div className="b3-stat-sub">Difference between perceived and actual position.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Re-injury risk</div><div className={"b3-stat-val " + (reInjuryRisk < 15 ? "good" : reInjuryRisk < 30 ? "warn" : "crit")}>{reInjuryRisk}%</div><div className="b3-stat-sub">Elevated at previously injured joints.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );

// === Ch11 — Cross-Bridge ===
function CrossBridge() {
  const [firingRate, setFiringRate] = useState(60);
  const [unitsRecruited, setUnitsRecruited] = useState(60);
  const [fatigue, setFatigue] = useState(20);
  const peakForce = Math.max(5, Math.round((firingRate * 0.4 + unitsRecruited * 0.6) * (1 - fatigue / 150)));
  const sustainability = Math.max(5, Math.round(120 - fatigue * 1.2 - (firingRate > 80 ? 20 : 0)));
  const verdict = (() => {
    if (fatigue > 70) return { txt: "Heavy fatigue. Cross-bridge cycling slowing; calcium release sluggish. Late-game peak force is dropping despite identical descending commands.", cls: "crit" };
    if (peakForce > 75 && fatigue < 30) return { txt: "Clean excitation-contraction coupling at high output. Strong calcium release, efficient cross-bridge cycling, near-perfect NMJ transmission.", cls: "good" };
    return { txt: "Adjust firing rate, recruitment, and fatigue to see peak force and sustainability shift.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Motor neuron firing rate</span><span className="val">{firingRate}%</span></div><input type="range" min="20" max="100" value={firingRate} onChange={e=>setFiringRate(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Sustained firing produces sustained calcium release.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Motor units recruited</span><span className="val">{unitsRecruited}%</span></div><input type="range" min="20" max="100" value={unitsRecruited} onChange={e=>setUnitsRecruited(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Parallel force-producing channels.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Fatigue level</span><span className="val">{fatigue}%</span></div><input type="range" min="0" max="100" value={fatigue} onChange={e=>setFatigue(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Cumulative metabolic stress on the cross-bridge cycle.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Peak force</div><div className={"b3-stat-val " + (peakForce > 70 ? "good" : peakForce > 45 ? "warn" : "crit")}>{peakForce}%</div><div className="b3-stat-sub">Output relative to maximum capacity.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Sustainability</div><div className={"b3-stat-val " + (sustainability > 80 ? "good" : sustainability > 40 ? "warn" : "crit")}>{sustainability}s</div><div className="b3-stat-sub">Time before significant force decline at current state.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">NMJ status</div><div className={"b3-stat-val " + (fatigue < 60 ? "good" : "warn")}>{fatigue < 60 ? "Reliable" : "Degraded"}</div><div className="b3-stat-sub">Peripheral fatigue affects NMJ above ~60%.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

  const CARDS = [

    { q: "Her form falls apart mid-swing.", side: "execute", explain: "The individual motor action itself is breaking down. EXECUTE problem — Book Three." },

    { q: "Her mechanics looked great until the fourth quarter when they degraded.", side: "execute", explain: "The motor action itself degrades — synergy decomposition under load. EXECUTE failure mode (Mode 9 in Ch 13)." },
    { q: "His form is technically clean but he can't sync with his pitch framing partner.", side: "sync", explain: "Individual mechanics are clean; the failure is in two-person coordination. SYNCHRONIZE." },

      </div>
      <div className="b3-cards-grid">

}

    { key: "cells", label: "Cells & Channels" }, { key: "cognitive", label: "Motor Programs" }, { key: "sensory", label: "Proprioception" },
    { key: "muscle", label: "Muscle" }, { key: "clinical", label: "Clinical / Performance" }, { key: "pathology", label: "Pathology" }, { key: "boundary", label: "EXECUTE/SYNC Boundary" }
  ];
  const filtered = c.entries.filter(e => {
    if (category !== "all" && e.category !== category) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return e.term.toLowerCase().includes(s) || e.def.toLowerCase().includes(s);
  }).slice().sort((a,b) => a.term.localeCompare(b.term));
  return (
    <div>
      <div className="chapter-header"><div className="chapter-act-label">Part Five — Reference</div><div className="chapter-number">{chapter.number}</div><div className="chapter-title">{chapter.title}</div><div className="chapter-hook">{c.intro}</div></div>
      <div className="gl-search-bar"><input type="search" placeholder="Search by term or definition…" value={search} onChange={e => setSearch(e.target.value)} className="gl-search" /></div>
      <div className="gl-categories">{categories.map(cat => (<button key={cat.key} className={"gl-cat " + (category === cat.key ? "active" : "")} onClick={() => setCategory(cat.key)}>{cat.label}</button>))}</div>
      <div className="gl-results">
        {filtered.length === 0 ? (<div className="gl-empty">No entries match "{search}".</div>) : (
          filtered.map(e => { const catObj = categories.find(c => c.key === e.category); return (<div key={e.term} className="gl-entry"><span className="gl-term">{e.term}</span>{catObj && catObj.key !== "all" && <span className="gl-cat-badge">{catObj.label}</span>}<div className="gl-def">{e.def}</div></div>); })
        )}
      </div>
      <div className="gl-footer">Showing <strong>{filtered.length}</strong> of <strong>{c.entries.length}</strong> entries</div>
    </div>
  );
};

function _detectVideoSource(s) {
  if (!s) return null;
  const trimmed = String(s).trim();
  if (!trimmed) return null;
  const ytId = extractYouTubeId(trimmed);
  if (ytId) return { kind: "youtube", value: ytId };
  if (trimmed.startsWith("blob:")) return { kind: "blob", value: trimmed };
  return { kind: "file", value: trimmed };
}

function _NewWatchPanel({ chapter }) {
  const key = "ares_video_" + chapter.id;
  const initial = (() => { try { return localStorage.getItem(key) || ""; } catch (e) { return ""; } })();
  const [source, setSource] = useState(initial);
  const [input, setInput] = useState("");
  const [editing, setEditing] = useState(false);
  const [error, setError] = useState("");
  const [blobUrl, setBlobUrl] = useState("");
  const [blobName, setBlobName] = useState("");
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);
  useEffect(() => () => { if (blobUrl) URL.revokeObjectURL(blobUrl); }, []);
  const detected = blobUrl ? { kind: "blob", value: blobUrl } : _detectVideoSource(source);

  const save = () => {
    const trimmed = input.trim();
    if (!trimmed) { setError("Paste a URL or filename, or use Choose file."); return; }
    if (blobUrl) { URL.revokeObjectURL(blobUrl); setBlobUrl(""); setBlobName(""); }
    try { localStorage.setItem(key, trimmed); } catch (e) {}
    setSource(trimmed); setEditing(false); setInput(""); setError("");
  };
  const removeAll = () => {
    try { localStorage.removeItem(key); } catch (e) {}
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    setSource(""); setBlobUrl(""); setBlobName(""); setInput(""); setEditing(false);
  };
  const onFile = (file) => {
    if (!file) return;
    if (!file.type || !file.type.startsWith("video/")) { setError("That doesn't look like a video file. Use an MP4, WebM, or MOV."); return; }
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    const url = URL.createObjectURL(file);
    setBlobUrl(url); setBlobName(file.name);
    setSource(""); try { localStorage.removeItem(key); } catch (e) {}
    setEditing(false); setError("");
  };
  const onDrop = (e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; if (f) onFile(f); };

  if (detected && !editing) {
    if (detected.kind === "youtube") {
      return (
        <div>
          <div className="video-frame">
            <iframe src={"https://www.youtube-nocookie.com/embed/" + detected.value + "?rel=0&modestbranding=1"} title={chapter.title} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
          </div>
          <div className="video-meta">
            <span>Video for: <strong>{chapter.title}</strong><span className="video-tag-session">YouTube embed</span></span>
            <button className="video-btn primary" onClick={() => { setInput(source); setEditing(true); }}>Replace video</button>
            <button className="video-btn" onClick={removeAll}>Remove</button>
          </div>
          <div className="video-warn-banner"><strong>Embed issue (Error 153, blank player)?</strong> YouTube has refused the embed — usually because the video is flagged Made-for-Kids or has embedding disabled. Switch to a local file: drop your MP4 onto this panel or reference it by filename (e.g. <code>videos/{chapter.id}.mp4</code>). Plays directly in the book, no YouTube required.</div>
        </div>
      );
    }
    const src = detected.value;
    return (
      <div>
        <div className="video-frame native">
          <video src={src} controls controlsList="nodownload" playsInline preload="metadata" />
        </div>
        <div className="video-meta">
          <span>Video for: <strong>{chapter.title}</strong>{blobUrl ? <span className="video-tag-session">⚡ Session only · {blobName}</span> : <span className="video-tag-native">▶ Native playback</span>}</span>
          <button className="video-btn primary" onClick={() => { setInput(blobUrl ? "" : source); setEditing(true); }}>Replace video</button>
          <button className="video-btn" onClick={removeAll}>Remove</button>
        </div>
        {blobUrl && (<div className="video-info-banner"><strong>Playing a dropped file.</strong> This works for the rest of this session but won't survive a reload. For persistent playback, save your MP4 to a <code>videos/</code> folder next to this book and reference it as <code>videos/{chapter.id}.mp4</code>.</div>)}
      </div>
    );
  }

  return (
    <div className={"video-empty " + (dragging ? "dropping" : "")} onDrop={onDrop} onDragOver={(e) => { e.preventDefault(); setDragging(true); }} onDragLeave={() => setDragging(false)}>
      <div className="ve-icon">{"🎬"}</div>
      <h3>{editing ? "Replace the video for this chapter" : "Add a video for this chapter"}</h3>
      <p>Drop an MP4 here, choose a file, or paste a URL / filename for <strong style={{color:"var(--text)"}}>{chapter.title}</strong>. Local files play natively in the book — no YouTube, no embed errors, fully offline.</p>
      <div className="ve-actions">
        <button className="ve-pick" onClick={() => fileInputRef.current && fileInputRef.current.click()}>{"⬆ Choose video file"}</button>
        <input ref={fileInputRef} type="file" accept="video/*" style={{display:"none"}} onChange={(e) => onFile(e.target.files && e.target.files[0])} />
        <span className="ve-or">{"— or —"}</span>
      </div>
      <div className="ve-form">
        <input type="text" placeholder={"videos/" + chapter.id + ".mp4  ·  https://…/video.mp4  ·  youtube.com/watch?v=…"} value={input} onChange={e => { setInput(e.target.value); if (error) setError(""); }} onKeyDown={e => { if (e.key === "Enter") save(); }} />
        <button className="ve-save" onClick={save}>Save</button>
        {editing && <button className="ve-cancel" onClick={() => { setEditing(false); setInput(""); setError(""); }}>Cancel</button>}
      </div>
      {error && <div className="ve-error">{error}</div>}
      <div className="ve-hint"><strong>Recommended for persistent offline playback:</strong> create a <code>videos/</code> folder next to <code>ARES_Book1_ACQUIRE_Prototype.html</code> and drop your MP4s in. Reference them per chapter as <code>videos/ch1.mp4</code>, <code>videos/ch5.mp4</code>, etc. — once saved, they load on every reload, no internet needed.</div>
    </div>
  );
}

  const c = chapter.content;
  const fullText = (typeof FULL_CHAPTER_TEXT !== "undefined" && FULL_CHAPTER_TEXT[chapter.id]) ? FULL_CHAPTER_TEXT[chapter.id] : c.opening;
  const segments = getChapterSegments(chapter);
  return (
    <div>
      <div className="fw-cover">
        <div className="fw-series">A.R.E.S. Performance Series · Book Three</div>
        <div className="fw-book">EXECUTE</div>
        <div className="fw-sub">The Motor Output Architecture — From the Decision Release to Muscle Contraction</div>
        <div className="fw-kicker">Foreword</div>
        <div className="fw-fwtitle">The Last Meter</div>
      </div>
      <AudiobookBar chapter={chapter} segments={segments} />
      <Prose text={fullText} highlights={highlights} />
      {c.signature && <div className="fw-signature">— <strong>{c.signature}</strong></div>}
    </div>
  );
};

// UpcomingChapter override — Book 3 messaging
UpcomingChapter = function({ chapter }) {
  return (
    <div>
      <div className="chapter-header">
        <div className="chapter-act-label">Coming Soon</div>
        <div className="chapter-number">{chapter.number}</div>
        <div className="chapter-title">{chapter.title}</div>
      </div>
      <div className="upcoming">
        <div className="up-icon">{"✦"}</div>
        <h3>This chapter is on the production roadmap</h3>
        <div className="up-num">{chapter.number}</div>
        <p>Book Three EXECUTE is rolling out chapter-by-chapter. Foreword, Chapter 1 (The Execution Chain), and Chapter 2 (SMA & the Motor Program Library) are live. The remaining stations — basal ganglia, M1, corticospinal tract, spinal motor neurons, muscle synergies, APAs, cerebellum, proprioception, and the neuromuscular junction — are next in the build.</p>
      </div>
    </div>
  );
};

function App() {
  const [activeChapter, setActiveChapter] = useState(null);
  const [activeBlock, setActiveBlock] = useState("opening");
  const [pathway, setPathway] = useState("Read");
  const [progress, setProgress] = useState({});
  const [refsMap, setRefsMap] = useState({});
  const [notesOpen, setNotesOpen] = useState(false);
  const [tutorialOpen, setTutorialOpen] = useState(false);
  const [prefilledAnchor, setPrefilledAnchor] = useState("");
  const allChapters = BOOK.acts.flatMap(a => a.chapters);
  const chapter = allChapters.find(c => c.id === activeChapter);
  const [highlights, addHighlight, removeHighlight] = useChapterHighlights(activeChapter || "_none");
  const [notes, addNote, deleteNote] = useChapterNotes(activeChapter || "_none");

  useEffect(() => { try { const seen = localStorage.getItem("ares_b3_tutorial_seen"); if (!seen) setTutorialOpen(true); } catch (e) {} }, []);
  const closeTutorial = () => { setTutorialOpen(false); try { localStorage.setItem("ares_b3_tutorial_seen", "1"); } catch (e) {} };

  useEffect(() => { setActiveBlock("opening"); setPathway("Read"); }, [activeChapter]);
  useEffect(() => { if (chapter) saveProgress(chapter.id, { progress: 0.1 }); }, [chapter && chapter.id]);
  useEffect(() => { if (!chapter || !refsMap[activeBlock]) return; refsMap[activeBlock].scrollIntoView({ behavior: "smooth", block: "start" }); }, [activeBlock]);

  const handleAddNote = (anchorText) => { setPrefilledAnchor(anchorText || ""); setNotesOpen(true); };

  const blocks = chapter ? getBlocks(chapter) : [];
  let body = null;
  if (!chapter) body = <HomeScreen onStart={() => setActiveChapter("foreword")} />;
  else if (chapter.type === "foreword") body = <ForewordView chapter={chapter} highlights={highlights} />;
  else if (chapter.type === "framing") body = <FramingChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else if (chapter.type === "science") body = <ScienceChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else body = <UpcomingChapter chapter={chapter} />;

  return (
    <React.Fragment>
      <Sidebar book={BOOK} activeChapter={activeChapter} onSelectChapter={setActiveChapter} progress={progress} onHome={() => setActiveChapter(null)} />
      <div className="main">
        {chapter && <TopBar chapter={chapter} blocks={blocks} activeBlock={activeBlock} onSelectBlock={setActiveBlock} pathway={pathway} onSetPathway={setPathway} onToggleNotes={() => setNotesOpen(!notesOpen)} onShowTutorial={() => setTutorialOpen(true)} notesCount={notes.length} highlightsCount={highlights.length} />}
        <div className="content">{body}</div>
      </div>
      {chapter && (chapter.type === "foreword" || chapter.type === "framing" || chapter.type === "science") && (
        <HighlightActionPopup onHighlight={(t) => addHighlight(t)} onNote={(t) => handleAddNote(t)} />
      )}
      <NotesPanel open={notesOpen} onClose={() => { setNotesOpen(false); setPrefilledAnchor(""); }} chapter={chapter} notes={notes} highlights={highlights} onAddNote={addNote} onDeleteNote={deleteNote} onRemoveHighlight={removeHighlight} prefilledAnchor={prefilledAnchor} onClearPrefill={() => setPrefilledAnchor("")} />
      <Tutorial open={tutorialOpen} onClose={closeTutorial} />
    </React.Fragment>
  );
}

const FULL_CHAPTER_TEXT = {"foreword": "Every motor action begins as intention and ends as physics. Between those two endpoints — between the moment a neural command leaves the dorsolateral prefrontal cortex and the moment a ball leaves a hand or a stick connects with a puck or a foot strikes a ball — sits a chain of stations that the entire upstream pipeline has been preparing for. The signal that crossed the chiasm in Book One. The decision that was released in Book Two. All of it converges on this final meter, the meter where intention becomes the actual movement that other people see on tape.\n\nThis is the stage that confuses practitioners more than any other. Coaches have coached technique for a hundred years. Strength and conditioning has been a serious profession for fifty. Biomechanics has a vast literature. Sport science labs measure everything that moves. By any reasonable standard, the motor side of athletic performance is the *most* studied area in applied sport — and yet the gap between what is known about motor execution at the neural level and what gets acted on in practice is, in my experience, almost as wide as the gap was for acquisition or routing.\n\nThe reason for that gap is, I think, the same as in the other two books, with a sport-specific twist: practitioners look at motor execution and they see *technique*. They see the swing, the throw, the stride. And because technique is visible — because it shows up on tape — practitioners treat the visible movement as the unit of analysis. They watch the swing, they see what looks wrong, and they try to coach it back into shape. Sometimes that works. More often it doesn't, and when it doesn't work nobody can quite say why.\n\nThe reason it often doesn't work is that the visible movement is the *output* of a multi-station neural pipeline, and the failure that produced the bad output is rarely at the same station that the eye sees the movement at. A bat swing that looks \"out of sync\" can be a failure of the motor program library, the corticospinal command, the spinal motor pool's recruitment timing, the cerebellar online correction, the proprioceptive feedback loop, the synergy organization, or the anticipatory postural adjustment — and the surface symptom in the swing looks roughly the same across all of those. Coaching the visible swing back into shape works when the failure happens to be in the muscle activation; it does not work when the failure is two stations upstream in the neural sequencing.\n\nThis book is a station-by-station map of the motor pipeline, the same way Books One and Two were station-by-station maps of perception and routing. It exists for the same reason: because the diagnostic question that matters is not *what does the bad movement look like*. The diagnostic question is *which station in the pipeline is producing the bad movement*. Once you can answer that question, the intervention becomes specific. Without that question, the intervention is a guess.\n\nI want to be precise about that endpoint, because it is the boundary that defines this book. EXECUTE ends where the muscle fiber actually contracts — where the action potential at the neuromuscular junction triggers the calcium release that bridges actin and myosin and produces force. That is the final station of motor output. Everything after that is the integration of multiple actions, multiple systems, multiple sub-movements firing in time with one another at the level of the whole athletic performance — and that is Book Four. Book Four is SYNCHRONIZE. EXECUTE lives between the decision release and the final contraction, and it ends at the contraction.\n\nInside that pipeline, the chapters do what the chapters of Books One and Two did: they walk the command, station by station, from the moment the prefrontal cortex hands it down to the moment the muscle fiber acts on it.\n\nPart One reframes execution from a vague \"technique\" problem into a routing-engineering problem with a measurable address.\n\nPart Two is the long anatomical journey. Ten chapters, walking from the supplementary motor area's sequence storage, through the basal ganglia's action gate, through the primary motor cortex and the giant Betz cells, down the corticospinal tract, into the spinal motor pool, across the muscle synergies, through the anticipatory postural adjustment system that stabilizes the platform, into the cerebellum's online correction loop, through the proprioceptive feedback loop that closes the system, and finally to the neuromuscular junction and the muscle fiber itself. This is the science core of the book.\n\nPart Three is the hand-off chapter that closes EXECUTE at the contraction and previews what SYNCHRONIZE will do with the output in Book Four.\n\nPart Four is the ten-failure-modes chapter, which is the diagnostic key for everything that came before.\n\nPart Five closes the book.\n\nThere is one thing I want to say directly before the journey begins, because the rest of the book follows from it. **The motor side of athletic performance is not, in any meaningful sense, a separate domain from the perceptual and cognitive side.** It is the third stage of the same pipeline. The same athlete whose acquisition system was the subject of Book One, whose routing system was the subject of Book Two, is the athlete whose motor system is the subject of Book Three. And the same diagnostic logic applies to all three: the bottleneck is rarely at the station the surface symptom seems to point at. The bottleneck is somewhere upstream, in a specific neural pathway, with a specific behavioral signature, and a specific intervention that addresses it.\n\nYou cannot fix a motor execution problem by drilling the surface movement if the actual problem lives in the motor program library, the synergy structure, or the anticipatory postural adjustment system. The surface drilling will produce changes that look like progress in practice and that evaporate under load. Specific intervention at the actual failing station, by contrast, produces changes that are durable, that transfer to game speed, and that are visible on the metrics that matter.\n\nThe photon arrived in Book One. The signal crossed the chiasm. The decision was released in Book Two. From here, the command travels its last ten stations, becomes movement, and meets the world.\n\n— **Dr. Joe LaPlaca, OD**\nAres Elite Sports Vision", "ch1": "**Reframing motor performance from a \"technique\" problem into a routing-engineering problem with a measurable address.**\n\nWhen a hitter takes a check-swing on a slider that breaks just off the corner and the bat barely catches the top of the ball for a weak grounder, the coaching staff almost always has the explanation ready before the next pitch. He was out in front. He didn't trust his hands. He's pressing. The prescribed intervention is usually to film it, show it to him, talk through his mechanics, and try to coach the visible swing back into shape.\n\nThat intervention is not wrong, exactly. It is at the wrong level of resolution. The hitter *did* swing badly. The mechanics *were* off. But the word \"mechanics\" describes the surface output of a multi-station neural pipeline, not the station that failed. Treating the surface produces inconsistent results because it leaves the actual failing station in place.\n\nThe actual failing station has a name. It has a neural address. It has a measurable signature. And once you find it, the intervention is no longer about coaching the swing. It is about engineering the specific motor pipeline that produced the bad output so that the next at-bat produces a better one.\n\nThat is the reframe this entire book is built on: **the gap between an elite motor executor and a very good one is almost never a difference in raw physical capability.** It is a difference in the architecture of the motor pipeline that converts a released decision into the actual movement. Architecture is buildable. Buildable means trainable. Trainable means there is leverage.\n\nThree mistakes get made over and over in the way motor execution is talked about in applied sport. The whole book is, in some sense, a response to those three mistakes. They are the same shape as the three mistakes Book Two named for routing, retargeted for the motor pipeline.\n\nThe first mistake is treating motor execution as if it were a single thing — a property of the athlete, called \"technique\" or \"skill\" or \"mechanics,\" that can be improved through generalized drilling. It is not. Motor output is the composite product of approximately ten neural stations, each of which can be measured independently and each of which has its own trainable parameters. An athlete who tests as having \"bad mechanics\" in the aggregate may have nine fine stations and one broken one. The intervention is not to make him \"better.\" The intervention is to find the one station that is producing the failure and train it.\n\nThe second mistake is locating the bottleneck in the wrong layer. The default coaching assumption is that motor failures live in the muscle activation layer — the level at which the surface movement is visible. *He didn't keep his hands inside the ball. She dropped her elbow.* In a meaningful number of cases this is correct. In most cases the bottleneck is *upstream* of the muscle activation — in the motor program library, in the cerebellar timing calibration, in the anticipatory postural adjustment that destabilized the platform a hundred milliseconds before the visible movement began, in the synergy structure that failed to transfer force proximally to distally, in the proprioceptive feedback loop that fed the control system bad position information. Surface coaching is sometimes the right intervention. More often, the leverage lives further upstream than the visible movement suggests.\n\nThe third mistake is conflating the motor system with the cognitive system. This is the mistake that the existing literature on sport performance makes most consistently in the *opposite* direction from the mistake Book Two named. Coaches sometimes attribute motor failures to mental causes — \"he was thinking too much, he choked, he lost his focus\" — when the underlying problem is mechanical. And sometimes they attribute mental failures to motor causes — \"his mechanics are off, he needs more reps\" — when the underlying problem is upstream. Both conflations are common, both produce wasted intervention, and both are resolved by the same diagnostic discipline: localize the actual failing station before intervening.\n\nThis book is a precision instrument for the motor execution stage. Used well, it removes most of the guessing.\n\n*Execution* is the path the released decision travels from the dorsolateral prefrontal cortex to the contraction of the skeletal muscle fibers that produce the visible movement. Along that path the command passes through specific cortical and subcortical structures, is sequenced into a specific motor program, gets parameterized for the current context, is gated for release, descends through the corticospinal tract, recruits specific motor units in specific muscle pools, organizes those motor units into coordinated synergies, is preceded by anticipatory postural adjustments, is monitored by a cerebellar online-correction loop, is fed real-time proprioceptive feedback, and finally produces the calcium-driven force that makes the body move.\n\nThe total time elapsed between the prefrontal release signal and the visible movement onset is the *execution latency*. For an untrained adult, execution latency for a moderately complex sport-relevant action sits somewhere in the range of **150 to 300 milliseconds**. For an elite athlete in their domain, the same action can complete in **80 to 150 milliseconds**. That difference — sometimes 100 milliseconds, sometimes more — is, in fast-action sport, a substantial fraction of the entire margin between elite and very good.\n\nBut execution is not only about latency. The *quality* of the movement matters as much as the speed of its onset. Motor execution can fail in latency (too slow), in fidelity (the wrong movement produced), in calibration (the right movement at the wrong amplitude or angle), in robustness (the movement degrades under fatigue or pressure), or in integration (the movement is mechanically correct but doesn't transfer through the kinetic chain). Each of those failure modes has a different neural address and a different intervention.\n\nThe organizing framework for the whole book — the model that links every chapter, every diagnostic question, and every clinical impression I will offer — is the **Execution Cost Matrix (ECM)**, which is the EXECUTE-stage parallel to ROUTE's Decision Routing Matrix.\n\nThe ECM says that motor output quality, for any action, is the product of three variables that interact:\n\n**Motor Program Fidelity** is the quality and specificity of the stored motor program that is being executed. A motor program is not a memory of a movement; it is a structured neural command sequence — a *generalized motor program* (GMP) that encodes the invariant features of a class of actions, paired with a *recall schema* that translates the current goal into specific parameter values. High fidelity means the GMP is well-encoded and the recall schema is accurate across a wide parameter range. Low fidelity means the program is either incomplete, poorly parameterized, or being retrieved sluggishly. Fidelity is the largest single determinant of execution quality in trained athletes.\n\n**Calibration Quality** is the accuracy of the timing, force, and spatial parameters delivered by the cerebellar and proprioceptive systems during execution. Calibration is what the cerebellum's forward model contributes during the action: the moment-to-moment comparison of intended movement to actual movement, and the moment-to-moment correction. Calibration also includes the proprioceptive feedback loop: muscle spindles, Golgi tendon organs, joint receptors, all delivering real-time information about where the body actually is and how hard the muscles are actually pulling. Calibration is what turns a roughly correct movement into a precisely correct one.\n\n**Robustness Under Load** is the degree to which the motor system continues to deliver the same fidelity and calibration under fatigue, pressure, and unexpected perturbation. A movement that works in low-stakes practice but degrades under game pressure has a robustness failure. A swing that is technically clean in the first inning and falls apart in the seventh has a fatigue-side robustness failure. Robustness is largely a function of how thoroughly the upstream stations have been trained across varied conditions — the analog of the upstream-cleanness argument that organized Book Two's ACC chapter.\n\nExecution quality, then, is roughly:\n\n> **(Motor Program Fidelity) × (Calibration Quality) × (Robustness Under Load)**\n\nThis is not a precise quantitative equation. It is an organizing principle. Its value is that it gives a practitioner a vocabulary for asking *where* a given athlete's motor problem is coming from, instead of treating \"bad mechanics\" as a single undifferentiated description.\n\nAn athlete with high program fidelity, tight cerebellar calibration, and strong robustness under load will look effortlessly excellent. An athlete with degraded program fidelity, sluggish calibration, or fragile robustness will look like \"her technique falls apart in the moments that count,\" \"his swing is inconsistent,\" \"she has a beautiful practice swing but can't replicate it at game speed.\" The neurological difference between them lives in three knobs, not one.\n\nThe other organizing structure you will encounter throughout this book is the **Execution Chain** — the station-by-station map of the command's path from the decision release to the contraction of muscle fiber. The same architecture that Books One and Two used.\n\nIn the order Part Two will cover them:\n\n1. **Supplementary Motor Area (SMA)** — the sequence storage and motor program retrieval center, where the command from the DLPFC is converted into a structured temporal sequence.\n2. **Basal Ganglia (Execute Side)** — the action selection gate that releases the selected motor program and regulates the vigor with which it is executed.\n3. **Primary Motor Cortex (M1)** — the final cortical command center where the giant Betz cells generate the specific corticospinal output to drive muscle activation.\n4. **Corticospinal Tract** — the white-matter cable carrying the descending motor command from cortex to spinal cord.\n5. **Spinal Motor Neurons & Central Pattern Generators** — the spinal-level coordination that distributes the command to specific motor pools and handles rhythmic movement patterns autonomously.\n6. **Muscle Synergies** — the body's abbreviation system, in which groups of muscles are activated together as functional units rather than independently.\n7. **Anticipatory Postural Adjustments (APAs)** — the small, precisely timed adjustments that stabilize the platform a hundred milliseconds before the main movement begins.\n8. **Cerebellum (Execute Side)** — the online-correction loop running forward and inverse models, calibrating the movement moment-to-moment against the predicted outcome.\n9. **Proprioception** — the sensory feedback loop, anchored in muscle spindles, Golgi tendon organs, and joint receptors, that closes the motor system and tells the brain what the body actually did.\n10. **Neuromuscular Junction & Muscle Fiber** — the final station, where the motor neuron's action potential crosses the synaptic gap, calcium is released, actin and myosin engage, and intention finally becomes force.\n\nThere is a deliberate symmetry between this chain and the chains of Books One and Two. Book One walked the visual signal from the photon to the optic chiasm. Book Two walked the post-chiasm signal to the DLPFC decision release. Book Three walks the post-decision command to the muscle contraction. The total signal-to-action pipeline is thirty stations long — ten in ACQUIRE, ten in ROUTE, ten in EXECUTE — and the muscle fiber contraction is station thirty.\n\nOnce the fiber contracts, the signal exits the EXECUTE pipeline and enters the SYNCHRONIZE pipeline of Book Four. That hand-off is the subject of Chapter Twelve.\n\nBy the end of this book, you should be carrying the same diagnostic question Books One and Two trained, retargeted for motor output: **which station is the bottleneck?**\n\nThat single reframe — from \"her mechanics are off\" to \"*where* are her mechanics off?\" — is the most useful thing this book can give you. It will not eliminate the work of intervention. It will, however, point the intervention at the actual station that is failing instead of at the surface movement that is showing up on tape.\n\nWhen you watch a struggling motor performance, the chapters that follow will give you a checklist:\n\n- Is the motor program library too sparse for the demands of the current context? (Ch 2)\n- Is the basal ganglia gate releasing the wrong program, or releasing it with too little vigor? (Ch 3)\n- Is M1 generating the right command but with insufficient precision? (Ch 4)\n- Is the descending corticospinal signal arriving cleanly? (Ch 5)\n- Is the spinal motor pool recruiting in the right order, at the right intensity? (Ch 6)\n- Are the muscle synergies organized correctly to transfer force through the kinetic chain? (Ch 7)\n- Are the anticipatory postural adjustments stabilizing the platform in time? (Ch 8)\n- Is the cerebellum's online correction catching small errors fast enough? (Ch 9)\n- Is the proprioceptive feedback loop delivering accurate position information? (Ch 10)\n- Is the neuromuscular junction transmitting the command without losing fidelity? (Ch 11)\n\nEach of those is a different question, with a different test, and a different intervention. The book is organized to answer them.\n\nOne thing in this book that will look different from Books One and Two is that the motor neuroscience literature has a longer applied history than the perception or routing literature. Motor program theory has been studied for almost a century. Schmidt's schema theory dates from 1975. The basal-ganglia direct/indirect-pathway model has been mapped exhaustively. The cerebellar forward-model framework has been mature for thirty years. The amount of empirical material to draw from is, in many ways, larger here than in the previous two books.\n\nWhat I have tried to do is the same translation work that organized the earlier books: take the consensus output of the rigorous neuroscience, and convert it into terms a sport-performance practitioner can act on. Where I make a clinical interpretation that is mine alone, I will say so. Where I am summarizing established mechanism, I will keep the interpretation tight to what the literature actually supports.\n\nWith that, the decision is released. The command is on its way. Let's follow it forward.\n\n**Chapter summary**\n\n- Motor execution is not a single trait. It is the composite output of ten neural stations along the DLPFC-to-muscle-fiber pipeline.\n- \"Bad mechanics\" describes a surface symptom, not a mechanism. The mechanism almost always lives upstream of the visible movement.\n- The Execution Cost Matrix says motor output quality = (Motor Program Fidelity) × (Calibration Quality) × (Robustness Under Load).\n- ACQUIRE fixes signal quality. ROUTE fixes route depth and decision speed. EXECUTE fixes program fidelity, calibration, and robustness.\n- Execution ends at the contraction of muscle fiber. Everything downstream is SYNCHRONIZE — Book Four.\n- The diagnostic instinct to build: *which station is the bottleneck?*", "ch2": "**A motor program is not a memory of how a movement felt. It is a structured neural command sequence — and the supplementary motor area is where that sequence lives.**\n\nThe moment the dorsolateral prefrontal cortex releases its decision, something has to convert that decision into a structured temporal sequence of muscle activation commands. The DLPFC's output is, in a meaningful sense, an abstract intention: *swing at this pitch, in this direction, with this much force.* It is not, by itself, a movement. The movement requires that the abstract intention be paired with a stored sequence — *the bat swing program* — and that the program be parameterized for the current context — *this swing, this pitch speed, this strike zone location, this game situation.*\n\nThe structure that does that conversion is the **supplementary motor area**, or **SMA**, sitting on the medial surface of the frontal lobe just anterior to the primary motor cortex. The SMA holds the library of stored motor programs — the abbreviated, abstract command sequences that the brain has built up across thousands of repetitions of each class of movement. When the DLPFC releases a decision, the SMA retrieves the matching program, applies the current parameters via the recall schema, and hands the sequenced output forward to the basal ganglia for action gating and then to M1 for direct corticospinal command.\n\nThe SMA is the first station of the Execution Chain because it is where the abstract decision becomes a structured motor command. Everything downstream is the execution of that command. Everything upstream is the decision that selected it. The SMA sits exactly at the boundary.\n\nA motor program is, in the technical sense used here, a stored neural command sequence that encodes the **invariant features** of a class of actions. The most influential theoretical account of motor programs is Richard Schmidt's **schema theory**, originally published in 1975 and refined extensively since. Schmidt proposed that motor learning produces two related stored structures: a *generalized motor program* (GMP) that encodes what is constant across all instances of an action class, and a *recall schema* that encodes how to set the specific parameter values for each instance.\n\nThe GMP stores the **invariant features** of the movement:\n\n**Relative timing.** The proportional timing relationships between the elements of the movement. A throwing program's GMP encodes that the stride lands before the trunk rotates, which begins before the arm accelerates, which precedes the wrist snap. The absolute durations of these phases scale based on intended velocity, but the proportional relationships are invariant. Two throws at different speeds have different absolute durations and the same proportional structure.\n\n**Relative force.** The proportional force contributions of different muscle groups. The proximal-to-distal force transfer pattern — legs contribute the most absolute force, hips contribute the next most, trunk less, shoulder less, elbow less, wrist least — is invariant across throws. The absolute force values scale; the proportions do not.\n\n**Sequence.** The order of muscle activation is invariant across all instances of the program. Stride, trunk rotation, arm acceleration, wrist snap — that sequence does not vary across throws. What varies is the parameter values applied to each element.\n\nWhat the GMP does *not* store are the **response specifications** — the specific parameter values that have to be set each time the program is executed. The intended velocity. The intended release point. The intended spin axis. The intended target location. These are not stored as part of the program; they are computed each time the program is retrieved, based on the current goal.\n\nThis separation is critical to how motor learning actually works. Practicing a single specific version of a movement — one specific target, one specific velocity, one specific situation — refines the parameter values for that specific instance but does not strengthen the underlying GMP or expand the recall schema's accurate range. Practicing *across a range* of parameter values, by contrast, simultaneously refines the GMP and expands the recall schema's accuracy window. This is the empirical basis for the *variability of practice* principle that runs through the motor learning literature.\n\nThe recall schema is the learned rule that translates current movement goals into specific parameter values for the GMP. It is built from experience: each instance of executing the program — with whatever parameters the athlete tried, and whatever outcome resulted — refines the recall schema's mapping from goal to parameters.\n\nThe recall schema has an important statistical property. It is most accurate — produces the most reliable parameter specifications — at parameter values that have been frequently practiced. Outside the practiced range, the schema extrapolates, and extrapolation is, by definition, less accurate than interpolation. An athlete whose practice has been concentrated at a narrow band of parameters (one fastball speed, one strike zone region, one pitching distance) will have a recall schema that works precisely at that band and degrades sharply outside it. An athlete whose practice has covered a wide range of parameters will have a recall schema that works adequately across the full range, even at parameter values that were not specifically practiced — because the schema can interpolate within its trained envelope.\n\nThis is the neurological substrate of why high-variability practice produces better transfer than blocked, low-variability practice. It is one of the most reliable findings in motor learning research, and it has direct implications for how motor program training should be designed at the practice level.\n\nMotor programs are not stored in a single brain region. They are distributed across several interconnected structures, each contributing a different aspect of the complete program:\n\n**Supplementary Motor Area (SMA)** stores the temporal sequence — the timing of the activation pattern across the movement's elements. SMA neurons fire in patterns that anticipate upcoming movement elements before those elements actually begin, consistent with a forward-running sequence representation that prepares each upcoming command in advance.\n\n**Pre-SMA**, slightly anterior to the SMA proper, handles the higher-level selection and switching between motor programs — the cognitive interface between the decision (from the DLPFC) and the program retrieval. Pre-SMA activity is particularly strong during the moments just before a movement begins, when the program is being selected and parameterized but not yet executed.\n\n**Primary Motor Cortex (M1)**, which we will reach in detail in Chapter Four, holds the final command layer — the specific corticospinal commands that will be sent down the cord to the spinal motor neurons. M1 is the \"what muscles, how much\" final output stage; the SMA is the \"what sequence, what timing\" stage that feeds M1.\n\n**Cerebellum** holds the calibration data — the timing precision and the forward-model predictions that allow the motor program to be executed with high temporal accuracy. We return to the cerebellum in detail in Chapter Nine.\n\n**Basal Ganglia** hold the action selection and vigor parameters — which program to release, and with how much intensity. Chapter Three covers this in depth.\n\n**Spinal Cord** holds the central pattern generators for rhythmic movements (locomotion, running gait, rhythmic reach), which can produce coordinated output partly independently of cortical input. Chapter Six covers this.\n\nThis distributed architecture is the reason \"where is the motor program stored?\" does not have a single answer. The program is a network of contributions across these structures, with the SMA as the central temporal-sequencing hub.\n\nMotor program retrieval is not instantaneous. From the moment the DLPFC releases a decision to the moment the corresponding motor program begins executing, there is a measurable retrieval interval — typically 40 to 120 milliseconds, depending on how well-practiced the program is and how unambiguous the decision was.\n\nThis retrieval interval matters because it sits directly between the routing latency (Book Two's stage) and the execution latency (this book's stage). An athlete with elite routing but slow motor program retrieval will look like she \"decided quickly but moved slowly.\" An athlete with average routing but fast motor program retrieval can sometimes look elite, because the body initiates the movement so quickly that the apparent \"reaction time\" looks compressed.\n\nThe retrieval interval shortens with practice — specifically, with the kind of practice that builds *recognition contiguity* between the decision signal and the corresponding motor program. Decisions that are reliably paired with specific motor programs produce sharper recognition contiguity and faster retrieval. Decisions that are paired ambiguously with several possible motor programs produce broader, slower retrieval as the SMA has to select among candidates.\n\nThis is part of the mechanism by which experts look faster than they are: their decisions and motor programs are coupled tightly, so the apparent execution latency is shortened by a tightening of the retrieval interval, even if the decision itself and the muscle activation itself have not changed.\n\nSMA-stage failures show up as:\n\n**Motor program library poverty.** The athlete's library does not include a well-encoded program for the current situation. The body has to construct the movement from less abstract components, slowly and inaccurately. Common in young athletes who have not yet accumulated the volume of varied repetitions needed to build rich GMP libraries.\n\n**Slow program retrieval.** The library exists but the SMA's retrieval is sluggish — recognition contiguity between decision and program is weak. Common in athletes who have practiced the movement extensively but have not practiced the *decision-to-movement coupling*. Their bodies know how to swing; their nervous systems are slow to deploy the swing when the decision is made.\n\n**Inappropriate program selection.** The wrong motor program is retrieved for the current decision. Common when GMPs from different action classes have similar surface features (a swing for a fastball vs. a swing for an off-speed pitch). The fix is more carefully differentiated training that builds clearer boundaries between adjacent programs.\n\n**Narrow recall schema.** The library is rich and retrieval is fast, but the recall schema does not extrapolate accurately outside the narrow band of parameters that have been practiced. The athlete executes elite movement in familiar conditions and degrades sharply when conditions move outside the trained envelope.\n\nThe supplementary motor area is station 1 of the Execution Chain — the first station downstream of the DLPFC decision release. With this chapter, the abstract decision has been converted into a structured temporal sequence with parameter values applied. The program is ready to be released to action.\n\nThe next station is the basal ganglia, which decides *whether and how vigorously* to release the prepared program. Chapter Three follows the command into the action gate.\n\n**Chapter summary**\n\n- A motor program is a structured neural command sequence, not a memory of how a movement felt.\n- The SMA is the central temporal-sequencing hub for motor program storage and retrieval.\n- Schmidt's schema theory: GMPs encode invariant features (relative timing, relative force, sequence); recall schemas translate goals into specific parameter values.\n- Variability of practice expands the recall schema's accurate range. Blocked, narrow practice produces brittle motor programs.\n- Motor programs are distributed across SMA, M1, cerebellum, basal ganglia, and spinal CPGs — each contributing a different aspect.\n- Retrieval interval (40–120 ms) shortens with recognition-contiguity training between decision and program.\n- Failures: library poverty, slow retrieval, inappropriate selection, narrow recall schema.\n- The diagnostic instinct: is this an SMA-stage failure or is it further downstream?", "ch3": "**The basal ganglia don't make decisions. They decide whether to release the decisions that have already been made — and with how much vigor.**\n\nThe basal ganglia have appeared briefly in Book Two, where they were named as one of the structures that lies downstream of the DLPFC decision release. This chapter is the proper treatment. The basal ganglia are the brain's **action selection gate**: a set of subcortical nuclei whose job is to decide, moment by moment, which of the prepared motor programs is actually released to execution, and which are held back. They do not generate motor programs. They do not decide what the body should do in any cognitive sense. What they do is gate — they release the right program at the right time with the right intensity, and they suppress everything else.\n\nWhen the basal ganglia work cleanly, the released motor program is the one the SMA prepared in response to the DLPFC's decision, and the suppressed programs are the alternatives that almost won. When the basal ganglia work poorly, the released program is sometimes the wrong one, or the right one but at the wrong vigor, or the right one but with insufficient suppression of competing programs that smear the execution.\n\nFor an athlete, this matters because the gate sits between the prepared program and the actual movement. An athlete with a clean SMA-prepared program and a poorly functioning basal-ganglia gate looks like he \"knew what to do but couldn't get the body to do it.\" That is a real, specific neural failure with a specific address. It is not character.\n\nThe basal ganglia's gating function is implemented through three parallel pathways, each with a different role.\n\n**The direct pathway** is the \"go\" pathway. It facil
