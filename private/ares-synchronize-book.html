// === Ch3 — Basal Ganglia Gate ===
function BasalGangliaGate() {
  const [direct, setDirect] = useState(70);
  const [indirect, setIndirect] = useState(30);
  const [dopamine, setDopamine] = useState(60);
  const [hyperdirect, setHyperdirect] = useState(20);
  const goSignal = Math.max(0, direct - indirect * 0.5);
  const vigor = Math.round(Math.min(100, (goSignal * 0.6) + (dopamine * 0.4)));
  const releaseLatency = Math.round(80 + (100 - goSignal) * 1.2 - dopamine * 0.3);
  const abortTime = hyperdirect > 50 ? Math.round(40 + (100 - hyperdirect) * 0.8) : null;
  const verdict = (() => {
    if (vigor < 35) return { txt: "Under-vigored release. The right program is selected but executed tentatively. Often arousal-side, not character.", cls: "crit" };
    if (vigor > 85 && hyperdirect < 30) return { txt: "Aggressive release with weak abort capacity — the swing is going through regardless of late information.", cls: "warn" };
    if (vigor > 60 && hyperdirect > 60) return { txt: "Clean gate function: vigorous release with the abort capacity to check the swing when late information arrives.", cls: "good" };
    return { txt: "Adjust the three pathways and dopamine to see how the gate's release vigor and abort capacity shift.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Direct (go) drive</span><span className="val">{direct}%</span></div><input type="range" min="0" max="100" value={direct} onChange={e=>setDirect(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Facilitates motor program release.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Indirect (stop) drive</span><span className="val">{indirect}%</span></div><input type="range" min="0" max="100" value={indirect} onChange={e=>setIndirect(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Suppresses unwanted programs.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Dopamine (vigor)</span><span className="val">{dopamine}%</span></div><input type="range" min="0" max="100" value={dopamine} onChange={e=>setDopamine(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Modulates action vigor and reinforcement learning.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Hyperdirect (abort capacity)</span><span className="val">{hyperdirect}%</span></div><input type="range" min="0" max="100" value={hyperdirect} onChange={e=>setHyperdirect(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Emergency stop — the checked swing.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Release vigor</div><div className={"b3-stat-val " + (vigor > 70 ? "good" : vigor > 45 ? "warn" : "crit")}>{vigor}%</div><div className="b3-stat-sub">Composite of direct drive and dopaminergic gain.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Release latency</div><div className={"b3-stat-val " + (releaseLatency < 100 ? "good" : releaseLatency < 140 ? "warn" : "crit")}>{releaseLatency} ms</div><div className="b3-stat-sub">Time from cortical drive to program release.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Abort window</div><div className={"b3-stat-val " + (abortTime && abortTime < 80 ? "good" : abortTime ? "warn" : "crit")}>{abortTime ? abortTime + " ms" : "—"}</div><div className="b3-stat-sub">Hyperdirect emergency-stop time; needs &gt;50% drive to engage.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch4 — M1 Plasticity ===
function M1Plasticity() {
  const [trainHrs, setTrainHrs] = useState(8);
  const [weeks, setWeeks] = useState(20);
  const [layoff, setLayoff] = useState(0);
  // Map size growth = log curve over weeks × hours, capped
  const growth = Math.min(100, Math.round(Math.log(1 + weeks * trainHrs / 4) * 22));
  const contraction = Math.min(growth * 0.7, layoff * 1.5);
  const mapSize = Math.max(15, Math.round(growth - contraction));
  const precision = Math.round(mapSize * 0.9 + (Math.min(weeks, 12) * 0.5));
  const excitability = Math.min(100, Math.round((mapSize * 0.6) + (trainHrs * 4) - (layoff * 0.8)));
  const verdict = (() => {
    if (layoff > 12) return { txt: "Extended disuse: M1 representation has contracted. Re-expansion takes weeks of structured exposure — the 'rust' is real and measurable.", cls: "crit" };
    if (mapSize > 65 && precision > 60) return { txt: "Expanded, excitable cortical representation. This is what trained motor expertise looks like at the M1 level.", cls: "good" };
    if (trainHrs < 4 && weeks > 8) return { txt: "Volume too low to drive map expansion. Plasticity needs sustained training intensity to engage.", cls: "warn" };
    return { txt: "Adjust training intensity, weeks, and layoff to see M1 expand and contract.", cls: "" };
  })();
  // Simple visual: bar showing map territory
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Training hours / week</span><span className="val">{trainHrs}</span></div><input type="range" min="0" max="20" value={trainHrs} onChange={e=>setTrainHrs(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Sustained intensity drives map expansion.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Weeks of training</span><span className="val">{weeks}</span></div><input type="range" min="0" max="52" value={weeks} onChange={e=>setWeeks(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Plasticity timescale is weeks to months.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Recent layoff (weeks)</span><span className="val">{layoff}</span></div><input type="range" min="0" max="20" value={layoff} onChange={e=>setLayoff(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Disuse contracts the representation. Re-expansion takes time.</div></div>
      </div>
      <div className="b3-stage">
        <div className="b3-stage-h">M1 cortical representation · motor map</div>
        <div className="b3-bar"><div className="b3-bar-fill" style={{ width: mapSize + "%", background: mapSize > 65 ? "linear-gradient(90deg, var(--accent-glow), var(--teal))" : mapSize > 40 ? "linear-gradient(90deg, var(--gold), var(--accent-glow))" : "linear-gradient(90deg, var(--red), var(--gold))" }} /></div>
        <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 6 }}>Representation size: {mapSize}% of trainable maximum</div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Map size</div><div className={"b3-stat-val " + (mapSize > 65 ? "good" : mapSize > 40 ? "warn" : "crit")}>{mapSize}%</div><div className="b3-stat-sub">Cortical territory dedicated to the trained movement.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Precision</div><div className={"b3-stat-val " + (precision > 60 ? "good" : "warn")}>{precision}%</div><div className="b3-stat-sub">Fine motor differentiation within the map.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Cortical excitability</div><div className={"b3-stat-val " + (excitability > 60 ? "good" : "warn")}>{excitability}%</div><div className="b3-stat-sub">MEP responsiveness — what TMS would measure.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>

  );
}

// === Ch5 — Corticospinal Velocity ===
function CorticospinalVelocity() {
  const [diameter, setDiameter] = useState(70);
  const [myelin, setMyelin] = useState(75);
  const [concussion, setConcussion] = useState(0);
  // Velocity in m/s
  const velocity = Math.max(10, Math.round(((diameter * 0.5) + (myelin * 0.5)) * (1 - concussion * 0.008) * 1.0));
  // Latency to spinal cord (assume ~1m descent for distal limbs)
  const latency = Math.max(8, Math.round(1000 / velocity));
  const verdict = (() => {
    if (concussion > 50) return { txt: "Post-concussive abnormalities present. Prolonged silent period is detectable on TMS even when standard testing has cleared the athlete.", cls: "crit" };
    if (velocity > 80) return { txt: "Elite conduction velocity. Fast, well-myelinated corticospinal pathway delivers commands with minimal descending delay.", cls: "good" };
    if (velocity > 60) return { txt: "Solid conduction. Adequate for most demands; further activity-dependent myelination can push it higher.", cls: "warn" };
    return { txt: "Slow descending conduction. Motor onset will lag decision speed.", cls: "crit" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Axon diameter</span><span className="val">{diameter}%</span></div><input type="range" min="20" max="100" value={diameter} onChange={e=>setDiameter(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Larger diameters conduct faster. Partly biological.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Myelination quality</span><span className="val">{myelin}%</span></div><input type="range" min="20" max="100" value={myelin} onChange={e=>setMyelin(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Trainable through activity-dependent myelination.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Post-concussive marker</span><span className="val">{concussion}%</span></div><input type="range" min="0" max="100" value={concussion} onChange={e=>setConcussion(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Prolonged silent period severity on TMS.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Conduction velocity</div><div className={"b3-stat-val " + (velocity > 75 ? "good" : velocity > 50 ? "warn" : "crit")}>{velocity} m/s</div><div className="b3-stat-sub">Fastest fibers: ~100 m/s. Slowest: ~10 m/s.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Descent latency</div><div className={"b3-stat-val " + (latency < 15 ? "good" : latency < 25 ? "warn" : "crit")}>{latency} ms</div><div className="b3-stat-sub">Cortex → spinal cord for distal limbs.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">TMS status</div><div className={"b3-stat-val " + (concussion > 30 ? "crit" : "good")}>{concussion > 30 ? "Abnormal" : "Normal"}</div><div className="b3-stat-sub">Prolonged silent period present above ~30%.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch6 — Size Principle ===
function SizePrinciple() {
  const [force, setForce] = useState(40);
  // Type I recruited 0-35%, Type IIa 35-75%, Type IIx 75-100%
  const typeI = Math.min(100, (force / 35) * 100);
  const typeIIa = Math.max(0, Math.min(100, ((force - 35) / 40) * 100));
  const typeIIx = Math.max(0, Math.min(100, ((force - 75) / 25) * 100));
  // Fatigue rate weighted by recruited units
  const fatigueRate = Math.round((typeI * 0.1) + (typeIIa * 0.5) + (typeIIx * 1.5));
  const sustainability = Math.max(5, Math.round(120 - fatigueRate));
  const verdict = (() => {
    if (force < 20) return { txt: "Low force demand. Only Type I motor units recruited. Sustainable indefinitely.", cls: "good" };
    if (force > 85) return { txt: "Near-maximal effort. Type IIx units engaged. Explosive output, fast fatigue.", cls: "warn" };
    return { txt: "Type I plus partial Type IIa recruitment. Sustainable high-intensity range.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Force demand</span><span className="val">{force}%</span></div><input type="range" min="0" max="100" value={force} onChange={e=>setForce(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Drag to recruit progressively larger motor units per Henneman's rule.</div></div>
      </div>
      <div className="b3-stage">
        <div className="b3-stage-h">Recruitment stack · Henneman's size principle</div>
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: "var(--accent-glow)", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>Type I (slow, fatigue-resistant)</div>
          <div className="b3-bar"><div className="b3-bar-fill" style={{ width: typeI + "%", background: "var(--teal)" }} /></div>
        </div>
        <div style={{ marginBottom: 8 }}>
          <div style={{ fontSize: 11, color: "var(--accent-glow)", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>Type IIa (fast oxidative)</div>
          <div className="b3-bar"><div className="b3-bar-fill" style={{ width: typeIIa + "%", background: "var(--gold)" }} /></div>
        </div>
        <div>
          <div style={{ fontSize: 11, color: "var(--accent-glow)", fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>Type IIx (fast glycolytic)</div>
          <div className="b3-bar"><div className="b3-bar-fill" style={{ width: typeIIx + "%", background: "var(--red)" }} /></div>
        </div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Type IIx engagement</div><div className={"b3-stat-val " + (typeIIx > 50 ? "warn" : "good")}>{Math.round(typeIIx)}%</div><div className="b3-stat-sub">Highest-threshold; needed for maximal explosive output.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Fatigue rate</div><div className={"b3-stat-val " + (fatigueRate < 30 ? "good" : fatigueRate < 70 ? "warn" : "crit")}>{fatigueRate}%</div><div className="b3-stat-sub">Cumulative load weighted by recruited fiber type.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Sustainability</div><div className={"b3-stat-val " + (sustainability > 80 ? "good" : sustainability > 40 ? "warn" : "crit")}>{sustainability}s</div><div className="b3-stat-sub">Approximate time before significant fatigue at this force.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch7 — Kinetic Chain ===
function KineticChain() {
  const [synergy, setSynergy] = useState(75);
  const [timing, setTiming] = useState(75);
  const [leak, setLeak] = useState(15);
  // Each segment contributes; leak reduces transfer
  const legs = 100;
  const hips = legs * (synergy / 100) * (timing / 100) * (1 - leak / 200);
  const trunk = hips * (synergy / 100) * (timing / 100) * (1 - leak / 200);
  const shoulder = trunk * (synergy / 100) * (timing / 100) * (1 - leak / 250);
  const elbow = shoulder * (synergy / 100) * (timing / 100) * (1 - leak / 300);
  const wrist = elbow * (synergy / 100) * (timing / 100);
  const distalOutput = Math.round(wrist);
  const efficiency = Math.round((distalOutput / 100) * 100);
  const verdict = (() => {
    if (leak > 40) return { txt: "Severe kinetic chain leak. Force generated proximally is escaping laterally — the athlete is working hard for little distal output.", cls: "crit" };
    if (synergy > 80 && timing > 80 && leak < 20) return { txt: "Clean proximal-to-distal transfer. Force generated at the base is reaching the endpoint with minimal loss. This is what 'pop' looks like mechanically.", cls: "good" };
    return { txt: "Moderate chain efficiency. Adjust synergy organization, segment timing, and leak to see how distal output responds.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Synergy quality</span><span className="val">{synergy}%</span></div><input type="range" min="20" max="100" value={synergy} onChange={e=>setSynergy(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Coordinated activation across muscle groups.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Segment timing</span><span className="val">{timing}%</span></div><input type="range" min="20" max="100" value={timing} onChange={e=>setTiming(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Proximal segments peak before distal; sequencing precision.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Lateral leak</span><span className="val">{leak}%</span></div><input type="range" min="0" max="80" value={leak} onChange={e=>setLeak(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Force escaping laterally instead of transferring through the chain.</div></div>
      </div>
      <div className="b3-stage">
        <div className="b3-stage-h">Force transfer · legs → hips → trunk → shoulder → elbow → wrist → ball</div>
        {[{n:"Legs",v:legs},{n:"Hips",v:hips},{n:"Trunk",v:trunk},{n:"Shoulder",v:shoulder},{n:"Elbow",v:elbow},{n:"Wrist",v:wrist}].map((s,i)=>(
          <div key={i} style={{ marginBottom: 6 }}>
            <div style={{ fontSize: 10, color: "var(--text-muted)", marginBottom: 2 }}>{s.n}: {Math.round(s.v)}%</div>
            <div className="b3-bar"><div className="b3-bar-fill" style={{ width: Math.min(100, s.v) + "%", background: "linear-gradient(90deg, var(--lp), var(--red))" }} /></div>
          </div>
        ))}
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Distal output</div><div className={"b3-stat-val " + (distalOutput > 60 ? "good" : distalOutput > 35 ? "warn" : "crit")}>{distalOutput}%</div><div className="b3-stat-sub">Force arriving at the endpoint.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Chain efficiency</div><div className={"b3-stat-val " + (efficiency > 60 ? "good" : efficiency > 35 ? "warn" : "crit")}>{efficiency}%</div><div className="b3-stat-sub">Output relative to proximal force generated.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Lost to leak</div><div className={"b3-stat-val " + (100 - efficiency < 30 ? "good" : "warn")}>{100 - efficiency}%</div><div className="b3-stat-sub">Energy dissipated rather than transferred.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch8 — APA Window ===
function APAWindow() {
  const [amplitude, setAmplitude] = useState(70);
  const [offset, setOffset] = useState(0); // ms relative to ideal; ideal = -100 ms (100 ms before main mover)
  // Stability = how close to ideal -100 ms
  const timingError = Math.abs(offset);
  const stability = Math.max(0, Math.round(amplitude - timingError * 0.4));
  const efficiency = Math.max(0, Math.round(stability - timingError * 0.3));
  const verdict = (() => {
    if (timingError > 80) return { txt: "Severe APA timing drift. The platform is unstable when the kinetic chain initiates; force leaks into stabilization work.", cls: "crit" };
    if (amplitude < 35) return { txt: "Insufficient APA amplitude. The stabilization is too weak to support the upcoming main movement.", cls: "crit" };
    if (timingError < 20 && amplitude > 65) return { txt: "Clean APA: well-timed, well-amplified. The platform is stable when the main movement begins — kinetic chain initiates from a solid base.", cls: "good" };
    return { txt: "Adjust amplitude and timing offset to find the platform-stable window.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>APA amplitude</span><span className="val">{amplitude}%</span></div><input type="range" min="0" max="100" value={amplitude} onChange={e=>setAmplitude(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Force scaling of the postural pre-stabilization.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Timing offset</span><span className="val">{offset > 0 ? "+" : ""}{offset} ms</span></div><input type="range" min="-100" max="100" value={offset} onChange={e=>setOffset(parseInt(e.target.value))} /><div className="b3-ctrl-sub">0 = ideal (~100 ms before prime mover). Negative = too early; positive = too late.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Platform stability</div><div className={"b3-stat-val " + (stability > 60 ? "good" : stability > 35 ? "warn" : "crit")}>{stability}%</div><div className="b3-stat-sub">Base solidity when the kinetic chain initiates.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Chain efficiency</div><div className={"b3-stat-val " + (efficiency > 55 ? "good" : "warn")}>{efficiency}%</div><div className="b3-stat-sub">Force transfer cleanliness through the kinetic chain.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Timing error</div><div className={"b3-stat-val " + (timingError < 20 ? "good" : timingError < 50 ? "warn" : "crit")}>{timingError} ms</div><div className="b3-stat-sub">Distance from ideal APA onset.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch9 — Cerebellar Correction ===
function CerebellarCorrection() {
  const [modelAccuracy, setModelAccuracy] = useState(75);
  const [correctionSpeed, setCorrectionSpeed] = useState(70);
  const [noise, setNoise] = useState(20);
  const predictionError = Math.max(0, Math.round(100 - modelAccuracy + noise * 0.4));
  const correctionLatency = Math.round(50 + (100 - correctionSpeed) * 0.8 + noise * 0.3);
  const residualError = Math.max(0, Math.round(predictionError - correctionSpeed * 0.5 + noise * 0.3));
  const verdict = (() => {
    if (noise > 60) return { txt: "High sensory noise corrupting the error signal. Concussion / disuse signature. Corrections can't refine when the input is degraded.", cls: "crit" };
    if (modelAccuracy > 80 && correctionSpeed > 75 && residualError < 15) return { txt: "Well-tuned cerebellar online correction. Small errors caught and corrected at speeds below conscious experience. This is what 'feel' is.", cls: "good" };
    if (correctionLatency > 100) return { txt: "Slow correction loop. Small errors compound into larger errors before they can be addressed.", cls: "warn" };
    return { txt: "Adjust the three parameters to see how prediction, correction, and noise interact.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Forward model accuracy</span><span className="val">{modelAccuracy}%</span></div><input type="range" min="20" max="100" value={modelAccuracy} onChange={e=>setModelAccuracy(parseInt(e.target.value))} /><div className="b3-ctrl-sub">How well the cerebellum predicts upcoming state.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Inverse correction speed</span><span className="val">{correctionSpeed}%</span></div><input type="range" min="20" max="100" value={correctionSpeed} onChange={e=>setCorrectionSpeed(parseInt(e.target.value))} /><div className="b3-ctrl-sub">How quickly errors are detected and adjusted.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Sensory noise</span><span className="val">{noise}%</span></div><input type="range" min="0" max="100" value={noise} onChange={e=>setNoise(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Concussion / disuse degrades the error signal.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Prediction error</div><div className={"b3-stat-val " + (predictionError < 20 ? "good" : predictionError < 40 ? "warn" : "crit")}>{predictionError}%</div><div className="b3-stat-sub">Discrepancy between forward model and actual outcome.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Correction latency</div><div className={"b3-stat-val " + (correctionLatency < 75 ? "good" : correctionLatency < 110 ? "warn" : "crit")}>{correctionLatency} ms</div><div className="b3-stat-sub">Time from error detection to corrective adjustment.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Residual error</div><div className={"b3-stat-val " + (residualError < 15 ? "good" : residualError < 35 ? "warn" : "crit")}>{residualError}%</div><div className="b3-stat-sub">Uncorrected deviation in final movement.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch10 — Proprioception ===
function Proprioception() {
  const [spindle, setSpindle] = useState(80);
  const [gto, setGto] = useState(80);
  const [jointHealth, setJointHealth] = useState(90);
  const avg = (spindle + gto + jointHealth) / 3;
  const positionError = Math.max(0, Math.round(100 - avg));
  const acuity = Math.round(avg);
  const reInjuryRisk = Math.max(5, Math.round((100 - jointHealth) * 0.8));
  const verdict = (() => {
    if (jointHealth < 50) return { txt: "Post-injury proprioceptive deficit at the affected joint. Re-injury risk is elevated; the joint feels 'fine' but the brain's position information is degraded.", cls: "crit" };
    if (acuity > 80) return { txt: "Elite proprioceptive acuity. The brain has accurate, real-time information about body state — the cerebellar correction loop has clean input to correct against.", cls: "good" };
    return { txt: "Adjust the three receptor channels to see how proprioceptive estimation degrades.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Muscle spindle sensitivity</span><span className="val">{spindle}%</span></div><input type="range" min="20" max="100" value={spindle} onChange={e=>setSpindle(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Length and stretch velocity.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>GTO sensitivity</span><span className="val">{gto}%</span></div><input type="range" min="20" max="100" value={gto} onChange={e=>setGto(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Force at the muscle-tendon junction.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Joint receptor health</span><span className="val">{jointHealth}%</span></div><input type="range" min="20" max="100" value={jointHealth} onChange={e=>setJointHealth(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Often degraded at previously injured joints.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Proprioceptive acuity</div><div className={"b3-stat-val " + (acuity > 75 ? "good" : acuity > 50 ? "warn" : "crit")}>{acuity}%</div><div className="b3-stat-sub">Composite precision of the proprioceptive signal.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Position estimation error</div><div className={"b3-stat-val " + (positionError < 20 ? "good" : positionError < 40 ? "warn" : "crit")}>{positionError}%</div><div className="b3-stat-sub">Difference between perceived and actual position.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Re-injury risk</div><div className={"b3-stat-val " + (reInjuryRisk < 15 ? "good" : reInjuryRisk < 30 ? "warn" : "crit")}>{reInjuryRisk}%</div><div className="b3-stat-sub">Elevated at previously injured joints.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch11 — Cross-Bridge ===
function CrossBridge() {
  const [firingRate, setFiringRate] = useState(60);
  const [unitsRecruited, setUnitsRecruited] = useState(60);
  const [fatigue, setFatigue] = useState(20);
  const peakForce = Math.max(5, Math.round((firingRate * 0.4 + unitsRecruited * 0.6) * (1 - fatigue / 150)));
  const sustainability = Math.max(5, Math.round(120 - fatigue * 1.2 - (firingRate > 80 ? 20 : 0)));
  const verdict = (() => {
    if (fatigue > 70) return { txt: "Heavy fatigue. Cross-bridge cycling slowing; calcium release sluggish. Late-game peak force is dropping despite identical descending commands.", cls: "crit" };
    if (peakForce > 75 && fatigue < 30) return { txt: "Clean excitation-contraction coupling at high output. Strong calcium release, efficient cross-bridge cycling, near-perfect NMJ transmission.", cls: "good" };
    return { txt: "Adjust firing rate, recruitment, and fatigue to see peak force and sustainability shift.", cls: "" };
  })();
  return (
    <div className="b3-wrap">
      <div className="b3-controls">
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Motor neuron firing rate</span><span className="val">{firingRate}%</span></div><input type="range" min="20" max="100" value={firingRate} onChange={e=>setFiringRate(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Sustained firing produces sustained calcium release.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Motor units recruited</span><span className="val">{unitsRecruited}%</span></div><input type="range" min="20" max="100" value={unitsRecruited} onChange={e=>setUnitsRecruited(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Parallel force-producing channels.</div></div>
        <div className="b3-ctrl"><div className="b3-ctrl-label"><span>Fatigue level</span><span className="val">{fatigue}%</span></div><input type="range" min="0" max="100" value={fatigue} onChange={e=>setFatigue(parseInt(e.target.value))} /><div className="b3-ctrl-sub">Cumulative metabolic stress on the cross-bridge cycle.</div></div>
      </div>
      <div className="b3-readout">
        <div className="b3-stat"><div className="b3-stat-label">Peak force</div><div className={"b3-stat-val " + (peakForce > 70 ? "good" : peakForce > 45 ? "warn" : "crit")}>{peakForce}%</div><div className="b3-stat-sub">Output relative to maximum capacity.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">Sustainability</div><div className={"b3-stat-val " + (sustainability > 80 ? "good" : sustainability > 40 ? "warn" : "crit")}>{sustainability}s</div><div className="b3-stat-sub">Time before significant force decline at current state.</div></div>
        <div className="b3-stat"><div className="b3-stat-label">NMJ status</div><div className={"b3-stat-val " + (fatigue < 60 ? "good" : "warn")}>{fatigue < 60 ? "Reliable" : "Degraded"}</div><div className="b3-stat-sub">Peripheral fatigue affects NMJ above ~60%.</div></div>
      </div>
      <div className="b3-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch12 — Execute/Synchronize Dx ===
function ExecuteSyncDx() {
  const CARDS = [
    { q: "His individual swing looks clean on tape but he can't string together quality at-bats.", side: "sync", explain: "Individual motor action quality is intact. The failure is in multi-action coordination across the at-bat. SYNCHRONIZE problem — Book Four." },
    { q: "Her form falls apart mid-swing.", side: "execute", explain: "The individual motor action itself is breaking down. EXECUTE problem — Book Three." },
    { q: "He runs the right route but can't time his break with the QB's release.", side: "sync", explain: "Action choice was correct. The mechanical execution was correct. Failure is in cross-system temporal coordination. SYNCHRONIZE problem." },
    { q: "Her mechanics looked great until the fourth quarter when they degraded.", side: "execute", explain: "The motor action itself degrades — synergy decomposition under load. EXECUTE failure mode (Mode 9 in Ch 13)." },
    { q: "His form is technically clean but he can't sync with his pitch framing partner.", side: "sync", explain: "Individual mechanics are clean; the failure is in two-person coordination. SYNCHRONIZE." },
    { q: "She's overthinking her shot and the mechanics fragment.", side: "execute", explain: "Reinvestment — the canonical EXECUTE-side choke (Mode 10). The DLPFC is doing work that should be left to automatic systems." },
    { q: "He's missing by inches in ways that don't match his fatigue or pressure level.", side: "either", explain: "Need more data. Could be EXECUTE (proprioceptive degradation, cerebellar dysmetria) or SYNCHRONIZE (action-environment coupling drift). Run both batteries." },
    { q: "Her teammates keep ending up out of position when she's the playmaker.", side: "sync", explain: "Multi-system coordination across people. SYNCHRONIZE." }
  ];
  const [revealed, setRevealed] = useState(new Set());
  const toggle = (i) => { const n = new Set(revealed); if (n.has(i)) n.delete(i); else n.add(i); setRevealed(n); };
  return (
    <div className="b3-wrap">
      <div className="b3-stage" style={{ padding: 18 }}>
        <div className="b3-stage-h">Scenario cards · click to reveal</div>
        <div style={{ fontSize: 12, color: "var(--text-muted)", lineHeight: 1.6 }}>Eight common athlete complaints. Read each one and decide silently: <strong style={{ color: "var(--red)" }}>EXECUTE</strong> problem (this book) or <strong style={{ color: "var(--teal)" }}>SYNCHRONIZE</strong> problem (Book Four)? Click to reveal.</div>
      </div>
      <div className="b3-cards-grid">
        {CARDS.map((c, i) => {
          const rev = revealed.has(i);
          return (
            <div key={i} className={"b3-card " + (rev ? "revealed " + c.side : "")} onClick={() => toggle(i)}>
              <div className="b3-q">"{c.q}"</div>
              {rev ? (<div><span className={"b3-pill " + c.side}>{c.side === "either" ? "Need more data" : c.side}</span><div className="b3-exp">{c.explain}</div></div>) : (<div className="b3-prompt">Click to reveal which side of the muscle contraction this lives on.</div>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// === Ch13 — Ten Execution Failure Modes ===
function ExecutionFailureCards() {
  const [expanded, setExpanded] = useState(new Set());
  const FAILURES = [
    { n:1, name:"Motor Program Library Poverty", station:"SMA · Ch. 2", coaching:"He doesn't have the swing for that pitch type. She doesn't have a fadeaway.", mechanism:"Library doesn't contain a well-encoded program for the current action class. Body has to construct on the fly.", diagnostic:"Does the deficit live in a particular action class? Disappear in well-practiced classes?", intervention:"High-volume, varied, feedback-rich reps of the missing action class. Developmental fix." },
    { n:2, name:"Narrow Recall Schema", station:"SMA · Ch. 2", coaching:"He's great in normal conditions but falls apart when anything is different.", mechanism:"Library is rich but recall schema doesn't extrapolate outside the practiced parameter band.", diagnostic:"Does performance degrade specifically outside the training envelope?", intervention:"Variability-of-practice work. Random schedules, parameter range expansion." },
    { n:3, name:"Basal Ganglia Vigor Failure", station:"BG · Ch. 3", coaching:"He's not playing aggressive. She's tentative.", mechanism:"Dopaminergic vigor regulation producing under-activation. Often arousal- or fatigue-related.", diagnostic:"Is vigor low across all classes or specific situations? Track with arousal state?", intervention:"Arousal regulation. Practice under realistic vigor demands. Not 'be more aggressive.'" },
    { n:4, name:"Kinetic Chain Leak", station:"Synergy · Ch. 7", coaching:"He's throwing with his arm. She's swinging with her hands.", mechanism:"Proximal-to-distal force transfer poorly organized. Force escapes laterally or bottlenecks.", diagnostic:"Compare distal output to proximal force. Does video show energy escaping at a segment?", intervention:"Synergy-specific work demanding clean sequencing. Slow then re-accelerate with corrected pattern." },
    { n:5, name:"APA Deficiency", station:"APAs · Ch. 8", coaching:"He has good mechanics but doesn't have great pop. She looks the part but doesn't drive the ball.", mechanism:"APA insufficient in amplitude or mistimed. Platform unstable when main movement begins.", diagnostic:"Mechanically clean on tape but underperforming on output? Specifically on high-force actions?", intervention:"APA-specific training under perturbation. Stability-demand progression." },
    { n:6, name:"Cerebellar Timing Drift", station:"Cerebellum · Ch. 9", coaching:"His timing is off. She's a beat early. He's a beat late.", mechanism:"Cerebellar temporal precision degraded. Often concussion, disuse, or insufficient training of specific timing demands.", diagnostic:"Right place, wrong moment? Concussion history or extended layoff?", intervention:"Sport-specific timing training matching competition kinematics. Forward-model refinement." },
    { n:7, name:"Proprioceptive Degradation", station:"Proprioception · Ch. 10", coaching:"His precision is off but his mechanics look right.", mechanism:"Proprioceptive signal degraded at affected joint. Cerebellar loop has inaccurate input.", diagnostic:"Injury history at affected joint? Precision degrades when visual input reduced?", intervention:"Joint-specific proprioceptive training. Balance work under perturbation." },
    { n:8, name:"Force Regulation Variance", station:"Motor unit / NMJ · Ch. 11", coaching:"His contact is inconsistent. She hits some hard and some soft for no reason.", mechanism:"Force-regulation system producing inconsistent output for consistent nominal effort.", diagnostic:"Inconsistency specifically in force output? Tracks with fatigue or arousal?", intervention:"Force-regulation training. Sometimes overall strength work for Type IIx access." },
    { n:9, name:"Synergy Decomposition Under Load", station:"Synergy + Fatigue · Ch. 7", coaching:"Her form holds up for the first half but falls apart by the fourth quarter.", mechanism:"Under fatigue, synergies decompose. What was unified becomes fragmented muscle activations.", diagnostic:"Tracks with cumulative load? Early-game execution looks elite?", intervention:"Robustness training under load. Practice execution at the back end of fatigue states." },
    { n:10, name:"Reinvestment Under Pressure", station:"DLPFC reaching back · Ch. 10", coaching:"He's overthinking his swing. She's coaching herself instead of executing.", mechanism:"Reverting from automatic synergy-driven execution to conscious DLPFC micromanagement. Canonical choke.", diagnostic:"Specifically in high-arousal situations? Executes automatically in low-stakes contexts?", intervention:"External focus of attention. Pre-performance routines biasing toward automaticity. Reduce technical coaching in competition phases." }
  ];
  const toggle = n => { const x = new Set(expanded); if (x.has(n)) x.delete(n); else x.add(n); setExpanded(x); };
  return (
    <div className="b3-wrap">
      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "var(--accent-glow)", marginBottom: 6 }}>TEN EXECUTION FAILURE MODES</div>
      <div style={{ fontSize: 13, color: "var(--text-muted)", lineHeight: 1.55 }}>Click any card to expand. Read the surface coaching language at the top — then reveal the actual neural address, the diagnostic check, and the intervention direction underneath.</div>
      <div className="b3-failgrid">
        {FAILURES.map(f => (
          <div key={f.n} className={"b3-failcard " + (expanded.has(f.n) ? "expanded" : "")} onClick={() => toggle(f.n)}>
            <div className="b3-num">Mode {f.n}</div>
            <div className="b3-name">{f.name}</div>
            <div className="b3-station">{f.station}</div>
            <div className="b3-coach">"{f.coaching}"</div>
            {!expanded.has(f.n) && <div className="b3-prompt">Click to reveal the mechanism, diagnostic, and intervention →</div>}
            <div className="b3-details">
              <div className="b3-sec"><div className="b3-sec-l">Mechanism</div><div className="b3-sec-b">{f.mechanism}</div></div>
              <div className="b3-sec"><div className="b3-sec-l">Diagnostic check</div><div className="b3-sec-b">{f.diagnostic}</div></div>
              <div className="b3-sec"><div className="b3-sec-l">Intervention direction</div><div className="b3-sec-b">{f.intervention}</div></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// === GlossaryView override for Book 3 categories ===
GlossaryView = function({ chapter }) {
  const c = chapter.content;
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("all");
  const categories = [
    { key: "all", label: "All" }, { key: "framework", label: "Framework" }, { key: "anatomy", label: "Anatomy" },
    { key: "cells", label: "Cells & Channels" }, { key: "cognitive", label: "Motor Programs" }, { key: "sensory", label: "Proprioception" },
    { key: "muscle", label: "Muscle" }, { key: "clinical", label: "Clinical / Performance" }, { key: "pathology", label: "Pathology" }, { key: "boundary", label: "EXECUTE/SYNC Boundary" }
  ];
  const filtered = c.entries.filter(e => {
    if (category !== "all" && e.category !== category) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return e.term.toLowerCase().includes(s) || e.def.toLowerCase().includes(s);
  }).slice().sort((a,b) => a.term.localeCompare(b.term));
  return (
    <div>
      <div className="chapter-header"><div className="chapter-act-label">Part Five — Reference</div><div className="chapter-number">{chapter.number}</div><div className="chapter-title">{chapter.title}</div><div className="chapter-hook">{c.intro}</div></div>
      <div className="gl-search-bar"><input type="search" placeholder="Search by term or definition…" value={search} onChange={e => setSearch(e.target.value)} className="gl-search" /></div>
      <div className="gl-categories">{categories.map(cat => (<button key={cat.key} className={"gl-cat " + (category === cat.key ? "active" : "")} onClick={() => setCategory(cat.key)}>{cat.label}</button>))}</div>
      <div className="gl-results">
        {filtered.length === 0 ? (<div className="gl-empty">No entries match "{search}".</div>) : (
          filtered.map(e => { const catObj = categories.find(c => c.key === e.category); return (<div key={e.term} className="gl-entry"><span className="gl-term">{e.term}</span>{catObj && catObj.key !== "all" && <span className="gl-cat-badge">{catObj.label}</span>}<div className="gl-def">{e.def}</div></div>); })
        )}
      </div>
      <div className="gl-footer">Showing <strong>{filtered.length}</strong> of <strong>{c.entries.length}</strong> entries</div>
    </div>
  );
};

// === App override to route afterword + glossary types ===
App = function() {
  const [activeChapter, setActiveChapter] = useState(null);
  const [activeBlock, setActiveBlock] = useState("opening");
  const [pathway, setPathway] = useState("Read");
  const [progress, setProgress] = useState({});
  const [refsMap, setRefsMap] = useState({});
  const [notesOpen, setNotesOpen] = useState(false);
  const [tutorialOpen, setTutorialOpen] = useState(false);
  const [prefilledAnchor, setPrefilledAnchor] = useState("");
  const allChapters = BOOK.acts.flatMap(a => a.chapters);
  const chapter = allChapters.find(c => c.id === activeChapter);
  const [highlights, addHighlight, removeHighlight] = useChapterHighlights(activeChapter || "_none");
  const [notes, addNote, deleteNote] = useChapterNotes(activeChapter || "_none");

  useEffect(() => { try { const seen = localStorage.getItem("ares_b3_tutorial_seen"); if (!seen) setTutorialOpen(true); } catch (e) {} }, []);
  const closeTutorial = () => { setTutorialOpen(false); try { localStorage.setItem("ares_b3_tutorial_seen", "1"); } catch (e) {} };

  useEffect(() => { setActiveBlock("opening"); setPathway("Read"); }, [activeChapter]);
  useEffect(() => { if (chapter) saveProgress(chapter.id, { progress: 0.1 }); }, [chapter && chapter.id]);
  useEffect(() => { if (!chapter || !refsMap[activeBlock]) return; refsMap[activeBlock].scrollIntoView({ behavior: "smooth", block: "start" }); }, [activeBlock]);

  const handleAddNote = (anchorText) => { setPrefilledAnchor(anchorText || ""); setNotesOpen(true); };
  const blocks = chapter ? getBlocks(chapter) : [];
  let body = null;
  if (!chapter) body = <HomeScreen onStart={() => setActiveChapter("foreword")} />;
  else if (chapter.type === "foreword") body = <ForewordView chapter={chapter} highlights={highlights} />;
  else if (chapter.type === "afterword") body = <AfterwordView chapter={chapter} highlights={highlights} />;
  else if (chapter.type === "glossary") body = <GlossaryView chapter={chapter} />;
  else if (chapter.type === "framing") body = <FramingChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else if (chapter.type === "science") body = <ScienceChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else body = <UpcomingChapter chapter={chapter} />;

  return (
    <React.Fragment>
      <Sidebar book={BOOK} activeChapter={activeChapter} onSelectChapter={setActiveChapter} progress={progress} onHome={() => setActiveChapter(null)} />
      <div className="main">
        {chapter && <TopBar chapter={chapter} blocks={blocks} activeBlock={activeBlock} onSelectBlock={setActiveBlock} pathway={pathway} onSetPathway={setPathway} onToggleNotes={() => setNotesOpen(!notesOpen)} onShowTutorial={() => setTutorialOpen(true)} notesCount={notes.length} highlightsCount={highlights.length} />}
        <div className="content">{body}</div>
      </div>
      {chapter && (chapter.type === "foreword" || chapter.type === "afterword" || chapter.type === "framing" || chapter.type === "science") && (
        <HighlightActionPopup onHighlight={(t) => addHighlight(t)} onNote={(t) => handleAddNote(t)} />
      )}
      <NotesPanel open={notesOpen} onClose={() => { setNotesOpen(false); setPrefilledAnchor(""); }} chapter={chapter} notes={notes} highlights={highlights} onAddNote={addNote} onDeleteNote={deleteNote} onRemoveHighlight={removeHighlight} prefilledAnchor={prefilledAnchor} onClearPrefill={() => setPrefilledAnchor("")} />
      <Tutorial open={tutorialOpen} onClose={closeTutorial} />
    </React.Fragment>
  );
};

function _detectVideoSource(s) {
  if (!s) return null;
  const trimmed = String(s).trim();
  if (!trimmed) return null;
  const ytId = extractYouTubeId(trimmed);
  if (ytId) return { kind: "youtube", value: ytId };
  if (trimmed.startsWith("blob:")) return { kind: "blob", value: trimmed };
  return { kind: "file", value: trimmed };
}

function _NewWatchPanel({ chapter }) {
  const key = "ares_video_" + chapter.id;
  const initial = (() => { try { return localStorage.getItem(key) || ""; } catch (e) { return ""; } })();
  const [source, setSource] = useState(initial);
  const [input, setInput] = useState("");
  const [editing, setEditing] = useState(false);
  const [error, setError] = useState("");
  const [blobUrl, setBlobUrl] = useState("");
  const [blobName, setBlobName] = useState("");
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);
  useEffect(() => () => { if (blobUrl) URL.revokeObjectURL(blobUrl); }, []);
  const detected = blobUrl ? { kind: "blob", value: blobUrl } : _detectVideoSource(source);

  const save = () => {
    const trimmed = input.trim();
    if (!trimmed) { setError("Paste a URL or filename, or use Choose file."); return; }
    if (blobUrl) { URL.revokeObjectURL(blobUrl); setBlobUrl(""); setBlobName(""); }
    try { localStorage.setItem(key, trimmed); } catch (e) {}
    setSource(trimmed); setEditing(false); setInput(""); setError("");
  };
  const removeAll = () => {
    try { localStorage.removeItem(key); } catch (e) {}
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    setSource(""); setBlobUrl(""); setBlobName(""); setInput(""); setEditing(false);
  };
  const onFile = (file) => {
    if (!file) return;
    if (!file.type || !file.type.startsWith("video/")) { setError("That doesn't look like a video file. Use an MP4, WebM, or MOV."); return; }
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    const url = URL.createObjectURL(file);
    setBlobUrl(url); setBlobName(file.name);
    setSource(""); try { localStorage.removeItem(key); } catch (e) {}
    setEditing(false); setError("");
  };
  const onDrop = (e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; if (f) onFile(f); };

  if (detected && !editing) {
    if (detected.kind === "youtube") {
      return (
        <div>
          <div className="video-frame">
            <iframe src={"https://www.youtube-nocookie.com/embed/" + detected.value + "?rel=0&modestbranding=1"} title={chapter.title} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
          </div>
          <div className="video-meta">
            <span>Video for: <strong>{chapter.title}</strong><span className="video-tag-session">YouTube embed</span></span>
            <button className="video-btn primary" onClick={() => { setInput(source); setEditing(true); }}>Replace video</button>
            <button className="video-btn" onClick={removeAll}>Remove</button>
          </div>
          <div className="video-warn-banner"><strong>Embed issue (Error 153, blank player)?</strong> YouTube has refused the embed — usually because the video is flagged Made-for-Kids or has embedding disabled. Switch to a local file: drop your MP4 onto this panel or reference it by filename (e.g. <code>videos/{chapter.id}.mp4</code>). Plays directly in the book, no YouTube required.</div>
        </div>
      );
    }
    const src = detected.value;
    return (
      <div>
        <div className="video-frame native">
          <video src={src} controls controlsList="nodownload" playsInline preload="metadata" />
        </div>
        <div className="video-meta">
          <span>Video for: <strong>{chapter.title}</strong>{blobUrl ? <span className="video-tag-session">⚡ Session only · {blobName}</span> : <span className="video-tag-native">▶ Native playback</span>}</span>
          <button className="video-btn primary" onClick={() => { setInput(blobUrl ? "" : source); setEditing(true); }}>Replace video</button>
          <button className="video-btn" onClick={removeAll}>Remove</button>
        </div>
        {blobUrl && (<div className="video-info-banner"><strong>Playing a dropped file.</strong> This works for the rest of this session but won't survive a reload. For persistent playback, save your MP4 to a <code>videos/</code> folder next to this book and reference it as <code>videos/{chapter.id}.mp4</code>.</div>)}
      </div>
    );
  }

  return (
    <div className={"video-empty " + (dragging ? "dropping" : "")} onDrop={onDrop} onDragOver={(e) => { e.preventDefault(); setDragging(true); }} onDragLeave={() => setDragging(false)}>
      <div className="ve-icon">{"🎬"}</div>
      <h3>{editing ? "Replace the video for this chapter" : "Add a video for this chapter"}</h3>
      <p>Drop an MP4 here, choose a file, or paste a URL / filename for <strong style={{color:"var(--text)"}}>{chapter.title}</strong>. Local files play natively in the book — no YouTube, no embed errors, fully offline.</p>
      <div className="ve-actions">
        <button className="ve-pick" onClick={() => fileInputRef.current && fileInputRef.current.click()}>{"⬆ Choose video file"}</button>
        <input ref={fileInputRef} type="file" accept="video/*" style={{display:"none"}} onChange={(e) => onFile(e.target.files && e.target.files[0])} />
        <span className="ve-or">{"— or —"}</span>
      </div>
      <div className="ve-form">
        <input type="text" placeholder={"videos/" + chapter.id + ".mp4  ·  https://…/video.mp4  ·  youtube.com/watch?v=…"} value={input} onChange={e => { setInput(e.target.value); if (error) setError(""); }} onKeyDown={e => { if (e.key === "Enter") save(); }} />
        <button className="ve-save" onClick={save}>Save</button>
        {editing && <button className="ve-cancel" onClick={() => { setEditing(false); setInput(""); setError(""); }}>Cancel</button>}

        <div className="content">{body}</div>
      </div>
      {chapter && (chapter.type === "foreword" || chapter.type === "framing" || chapter.type === "science") && (

      <Tutorial open={tutorialOpen} onClose={closeTutorial} />
    </React.Fragment>
  );
}

// === BOOK 3 FULL CHAPTER TEXT + READ MODE OVERRIDE ===
const FULL_CHAPTER_TEXT = {"ch1": "*Why Optimizing Components Does Not Optimize the System*\n\nA Formula 1 car has approximately 14,000 components. Each one is engineered to tolerances measured in microns. The engine produces over 1,000 horsepower. The aerodynamics package generates enough downforce to drive the car on a ceiling. The braking system can decelerate from 200 mph to 50 mph in under two seconds. Every component, taken individually, represents the absolute frontier of engineering capability.\n\nAnd yet — the car’s performance is not determined by the quality of its components. It is determined by how well those components work together. The fastest engine in the field means nothing if the energy recovery system’s deployment timing is 30 milliseconds out of phase with the throttle map. The best aerodynamics package is worthless if the suspension geometry doesn’t keep the floor in its optimal operating window through corner transitions. The most powerful brakes are a liability if brake-by-wire calibration doesn’t match the driver’s pedal feel expectations under varying tire temperatures.\n\nThe same principle governs human performance, and it governs it more severely than most practitioners understand.\n\n**The Component Optimization Fallacy**\n\nThe dominant model in athletic development is component optimization: identify the weakest link in the performance chain and train it. This model is not wrong — it is incomplete. It addresses the quality of individual subsystems without addressing the quality of their integration.\n\nConsider the neurocognitive pipeline this series has mapped across three books. The ACQUIRE stage delivers perceptual information. The ROUTE stage converts that information into a selected action. The EXECUTE stage converts that selection into physical movement. Each stage has its own neural substrates, its own performance parameters, its own failure modes, and its own training targets.\n\nBut here is the problem that component-level training cannot solve: the stages do not operate sequentially. They operate in parallel, with continuous bidirectional feedback, predictive pre-loading, and temporal coupling that must be precise to within tens of milliseconds. The ACQUIRE system is not simply handing a completed packet of information to the ROUTE system, which then hands a completed decision to the EXECUTE system. All three systems are operating simultaneously, continuously influencing each other, and their outputs must converge at precisely the right moment for the action to succeed.\n\nThis convergence is synchronization. And it is a distinct, trainable capacity — not an emergent byproduct of training the individual stages.\n\n**Temporal Binding: The Clock Problem**\n\nThe most fundamental synchronization challenge is temporal: the three stages of the A.R.E.S. loop process information at different speeds, through different neural pathways, with different latencies. Visual acquisition through the retino-cortical pathway takes approximately 50–80 milliseconds to reach primary visual cortex, with an additional 80–150 milliseconds for higher-order perceptual processing. Decision routing through the basal ganglia and prefrontal networks takes 100–400 milliseconds depending on schema depth and conflict load. Motor execution from primary motor cortex to the onset of force production takes 80–200 milliseconds depending on the muscle group and movement complexity.\n\nThese are not fixed delays. They are variable, state-dependent, and influenced by factors including arousal level, fatigue state, attentional focus, prior probability estimates, and the specific neural pathway being recruited. The brain must somehow take these asynchronous, variable-latency processing streams and produce a unified, temporally coherent action.\n\nThe mechanism that achieves this is neural oscillatory coupling — the synchronization of electrical rhythms across distributed brain regions. When neurons in visual cortex, basal ganglia, premotor cortex, and primary motor cortex oscillate at the same frequency and phase, information transfer between them is maximized. When they fall out of phase, the pipeline fragments.\n\nThis is not a metaphor. It is measurable. EEG studies of elite athletes consistently show two signatures that distinguish them from sub-elite performers: higher amplitude gamma-band (30–80 Hz) oscillations during task-relevant processing, and tighter phase-locking between frontal and parietal regions during decision-action coupling. The elite brain is not just faster — it is more synchronized.\n\n**The Synchronization Deficit Taxonomy**\n\nSynchronization failures fall into four categories, each with distinct mechanisms, distinct measurement profiles, and distinct training interventions:\n\nTemporal Desynchronization: The individual stages operate at correct speed but their outputs do not converge at the right moment. The athlete sees it, decides correctly, and executes well — but is 100 milliseconds late because the perceptual update, decision completion, and motor initiation are not temporally aligned.\n\nSensory Conflict: The multi-sensory integration system receives conflicting information from different modalities (vision, proprioception, vestibular) and must resolve the conflict before a coherent percept can drive action. The resolution process adds latency and can produce errors in spatial or temporal judgment.\n\nPredictive Failure: The brain’s internal forward model generates incorrect predictions about the upcoming state of the environment, causing a mismatch between anticipated and actual conditions that requires costly online correction.\n\nIntegration Overload: The synchronization demands of the task exceed the athlete’s current integration capacity, causing the system to fall back from parallel, predictive processing to serial, reactive processing. The athlete appears to “slow down” under game speed even though individual component speeds have not changed.\n\nEach of these failure modes will be addressed with mechanism-level specificity in the chapters that follow. Each is measurable. Each is trainable. None is fixed.", "ch2": "*Building a Unified Percept from Competing Streams*\n\nA baseball batter facing a 95 mph fastball has approximately 400 milliseconds from the moment the ball leaves the pitcher’s hand until it crosses the plate. In those 400 milliseconds, the batter’s brain must accomplish something extraordinary: it must combine visual information about the ball’s trajectory, auditory information from the sound of the ball leaving the hand and the seam rotation, proprioceptive information about the batter’s own body position and bat angle, and vestibular information about head position and stability — and synthesize all of it into a single, unified percept that drives a swing decision and motor execution with spatial precision measured in centimeters and temporal precision measured in single-digit milliseconds.\n\nThis is not perception. This is multi-sensory integration (MSI) — the active, computational process by which the brain combines information from multiple sensory channels into a coherent internal model of the external world. And it is not a passive merging of data streams. It is a competitive, weighted, context-dependent process that determines which information is trusted, which is suppressed, and how conflicts between modalities are resolved.\n\n**The Superior Colliculus: The Brain’s Integration Hub**\n\nThe primary neural structure responsible for multi-sensory integration in rapid, action-relevant contexts is the superior colliculus (SC) — a layered structure in the midbrain that receives direct input from the retina, the auditory system, and somatosensory pathways, and maintains topographic maps that align these inputs in spatial coordinates.\n\nThe SC performs integration according to three empirically validated principles that have been replicated across species and sensory combinations:\n\nThe Spatial Principle: Multi-sensory enhancement occurs when stimuli from different modalities originate from the same spatial location. A visual stimulus and an auditory stimulus arising from the same position in space produce a neural response in SC neurons that is greater than the sum of either unimodal response alone — a phenomenon called superadditivity. When the stimuli are spatially disparate, the response is suppressed below the stronger unimodal response.\n\nThe Temporal Principle: Enhancement requires temporal coincidence within a modality-specific integration window. For vision-auditory integration, the window is approximately 100–200 milliseconds. For vision-proprioception, it is tighter: approximately 50–100 milliseconds. Stimuli arriving outside these windows are processed independently, losing the integration benefit.\n\nThe Inverse Effectiveness Principle: The magnitude of multi-sensory enhancement is inversely proportional to the strength of the unimodal stimuli. Weak visual signal + weak auditory signal = large enhancement. Strong visual signal + strong auditory signal = minimal enhancement. This principle has a direct training implication: multi-sensory integration training has the highest ROI when conducted under degraded sensory conditions, not optimal ones.\n\n**Cortical Multi-Sensory Integration: Beyond the Colliculus**\n\nWhile the superior colliculus handles rapid, reflexive multi-sensory binding, higher-order integration — the kind that builds a full-field model of the competitive environment — occurs across a distributed cortical network. Three regions are particularly critical for sport performance:\n\nThe posterior parietal cortex (PPC), particularly the intraparietal sulcus, integrates visual and proprioceptive information to build an egocentric spatial model — the athlete’s continuously updated representation of where objects and bodies are relative to their own position. This is the neural substrate of spatial awareness in sport. Damage or disruption to PPC produces optic ataxia — the inability to accurately reach for objects despite seeing them clearly. Functional degradation produces the sport equivalent: the athlete who “sees” the field but consistently misjudges spatial relationships.\n\nThe superior temporal sulcus (STS) integrates visual and auditory information and is particularly involved in biological motion processing — the interpretation of other humans’ movements. This is the structure that allows a point guard to read a defender’s hip angle and predict the direction of their next step 200 milliseconds before it occurs. STS activation patterns distinguish expert from novice athletes in studies of anticipatory judgment.\n\nThe ventral premotor cortex (PMv) integrates visual, auditory, and proprioceptive information in a peripersonal space representation — the volume of space within arm’s reach. PMv neurons respond to objects approaching the body in any modality and drive protective or interceptive responses. This is the structure that produces the flinch response to an incoming object, and — when properly trained — the calibrated, precise interception of objects in three-dimensional space.\n\n**Sensory Weighting: How the Brain Decides What to Trust**\n\nThe brain does not treat all sensory inputs equally. It dynamically adjusts the weight assigned to each modality based on reliability, context, and prior experience — a process called optimal cue integration, which follows Bayesian statistical principles with remarkable precision.\n\nThe key variable is reliability, operationalized as the inverse variance of the sensory estimate. A modality with low variance (precise, consistent signals) receives high weight. A modality with high variance (noisy, inconsistent signals) receives low weight. The integrated estimate is a reliability-weighted average, and its precision is always better than either unimodal estimate alone.\n\nThis has profound implications for sport training. Consider a goalkeeper facing a penalty kick. In daylight, on a firm surface, the visual system provides the most reliable information about ball trajectory, and proprioception provides the most reliable information about body position. The weights are stable, and the integrated percept is accurate.\n\nNow put that goalkeeper on a rain-soaked pitch at night with stadium lights creating glare. Visual reliability drops. Proprioceptive reliability remains stable. The brain should up-weight proprioception and down-weight vision — and in expert performers, it does. But in less experienced athletes, the sensory weighting fails to adapt. They continue to over-rely on degraded visual information, producing spatial judgment errors.\n\nThis is not a lack of talent. It is a failure of multi-sensory calibration — the adaptive weighting process that ensures the most reliable information drives action. And it is explicitly trainable through systematic exposure to degraded-modality conditions, which is precisely what stroboscopic training, proprioceptive perturbation training, and the AESV sensory integration protocols address.\n\n**The Binding Problem and Temporal Integration Windows**\n\nThe binding problem — how the brain combines separately processed features into a unified percept — is solved through temporal synchrony. Features that are processed by neurons firing in synchrony (phase-locked gamma oscillations) are bound together into a single object or event. Features processed by neurons firing asynchronously are perceived as separate.\n\nFor athletes, the temporal integration window — the time period within which stimuli are bound together as a single event — is a critical performance parameter. A narrower window means finer temporal discrimination: the ability to distinguish events that are separated by smaller time intervals. A wider window means coarser temporal perception but more robust integration under noisy conditions.\n\nElite athletes in temporally demanding sports (baseball, cricket, table tennis, fencing) consistently show narrower temporal integration windows than sub-elite athletes and non-athletes. A professional baseball batter can distinguish temporal intervals of approximately 5–8 milliseconds. A recreational player’s resolution is approximately 20–40 milliseconds. This four-to-five-fold difference in temporal precision directly translates to superior interception timing and swing adjustment accuracy.\n\nThe temporal integration window is plastic. It narrows with training and widens with disuse. The training mechanism involves systematic exposure to tasks requiring fine temporal discrimination, which drives cortical reorganization in the superior temporal regions responsible for temporal binding.", "ch3": "*How Elite Athletes Act on Information Before It Arrives*\n\nWayne Gretzky’s most famous quote — “I skate to where the puck is going to be, not where it has been” — is usually treated as a metaphor for anticipation. It is not a metaphor. It is a precise description of predictive coding: the neural mechanism by which the brain generates predictions about upcoming sensory events and uses those predictions, rather than actual sensory data, to drive action.\n\nThis is not optional. It is mandatory. The physics of neural processing make it so. By the time visual information from the retina reaches conscious awareness, approximately 80–200 milliseconds have elapsed. In a sport environment where events unfold on timescales of 100–400 milliseconds, purely reactive processing — waiting for sensory data to arrive and then responding — is fundamentally too slow. The brain must act on predictions, or it cannot act in time.\n\nThe predictive coding framework, formalized by Karl Friston and now supported by three decades of neuroimaging, electrophysiology, and behavioral research, proposes that the brain is fundamentally a prediction engine. Every level of the neural hierarchy generates predictions about the input it expects to receive from the level below. When the actual input matches the prediction, processing is efficient and fast — the predicted input is effectively “pre-processed.” When the actual input violates the prediction, a prediction error signal is generated and propagated upward, consuming additional processing resources and time.\n\nElite sport performance is, at its computational core, the art of minimizing prediction error under extreme temporal constraints.\n\n**The Architecture of Prediction: Efference Copy and Forward Models**\n\nThe brain’s predictive machinery is built on a specific neural architecture: the efference copy and forward model system. When the motor cortex issues a movement command, it simultaneously sends a copy of that command — the efference copy — to the cerebellum. The cerebellum uses an internal forward model to predict the sensory consequences of the movement before the actual sensory feedback arrives.\n\nThis allows two critical capabilities:\n\nFirst, the brain can distinguish between self-generated and externally generated sensory events. When you move your eyes, the visual scene shifts across the retina — but you do not perceive the world as moving, because the predicted retinal shift (from the efference copy) matches the actual shift. This cancellation mechanism is so fundamental that its failure produces disabling symptoms: patients with cerebellar damage experience oscillopsia (the perception that the visual world is moving) during self-generated head and eye movements.\n\nSecond, the brain can detect errors before they become consequential. If the predicted sensory feedback from a motor command does not match the actual feedback, the discrepancy is detected within 40–80 milliseconds — fast enough to allow online correction within the current movement. Without the forward model, error detection would have to wait for the full sensory feedback loop (150–300 milliseconds), by which point most sport movements would be complete and uncorrectable.\n\nThe quality of an athlete’s forward model — the accuracy of the sensory predictions it generates — is determined by training volume, training variability, and the degree to which training conditions match competitive conditions. A forward model trained in sterile, predictable practice environments generates poor predictions under the variable, noisy conditions of competition. This is one mechanism by which “practice performance” fails to transfer to “game performance” — the forward model was never calibrated against competitive-grade variability.\n\n**Prediction in the Perception-Action Loop**\n\nPredictive coding operates at every level of the perception-action loop, not just at the motor output stage. In the ACQUIRE stage, the visual system generates predictions about expected visual input based on context, prior experience, and task goals. These predictions take the form of attentional templates — neural activity patterns in visual cortex that pre-activate the feature detectors most likely to be relevant. When the expected stimulus appears, it is processed faster and more accurately because the relevant neural population is already primed.\n\nIn the ROUTE stage, the decision system generates predictions about which response will be required based on contextual cues that precede the decision-triggering event. These predictions manifest as motor preparation — subthreshold activation of the motor programs most likely to be needed. This is the “starting point bias” described in Book Two’s drift-diffusion framework: the decision process begins closer to the threshold for the predicted response, reducing the evidence accumulation needed to reach decision.\n\nIn the EXECUTE stage, the motor system generates predictions about the sensory consequences of each movement, enabling the online correction and error detection mechanisms described above.\n\nWhen all three predictive systems are operating in concert — when the perceptual system is predicting the right inputs, the decision system is predicting the right responses, and the motor system is predicting the right feedback — the result is what athletes and coaches describe as “being in the zone.” The athlete is not reacting faster. They are predicting better, which reduces the reactive processing demand to near zero.\n\n**Prediction Error: The Cost of Being Wrong**\n\nWhen a prediction fails — when the actual sensory input does not match the predicted input — the brain generates a prediction error signal that propagates up the neural hierarchy. This signal has measurable neural and performance costs.\n\nThe neural cost is quantified by the mismatch negativity (MMN) response, a negative voltage deflection in the EEG that peaks approximately 100–250 milliseconds after a prediction-violating stimulus. The amplitude of the MMN reflects the magnitude of the prediction error. Larger MMN = bigger surprise = more processing resources diverted to error resolution.\n\nThe performance cost is directly measurable as increased response latency. A study by Abernethy and colleagues demonstrated that when expert cricket batters were shown deceptive bowling actions that violated their movement-based predictions, their response times increased by 80–120 milliseconds compared to non-deceptive deliveries — even though the ball’s physical trajectory was identical. The prediction error, not the stimulus complexity, drove the performance decrement.\n\nThis is the mechanism behind the effectiveness of deceptive actions in sport. A pump fake works not because it creates confusion, but because it generates a specific prediction error in the opponent’s forward model. The opponent’s brain predicted one trajectory based on the movement kinematics and must now update that prediction, consuming 100+ milliseconds of processing time. In sports where the available response window is 300–500 milliseconds, that update cost is often fatal.\n\nTraining implication: building prediction accuracy (through pattern recognition and varied exposure) and building prediction error tolerance (through systematic exposure to deceptive and unpredictable stimuli) are both critical and address different aspects of the synchronization architecture.\n\n**The Cerebellar Prediction Engine**\n\nThe cerebellum is the brain’s primary prediction engine. It contains approximately 80% of the brain’s neurons — roughly 69 billion — packed into a structure that weighs only 10% of total brain mass. This extraordinary neural density exists because the cerebellum’s primary computational function — generating, comparing, and updating predictive models — requires massive parallel processing.\n\nThe cerebellum maintains forward models for every regularly performed action. Each model encodes the expected sensory consequences of a specific motor command under specific initial conditions. The Purkinje cells of the cerebellar cortex — the largest neurons in the brain, each receiving input from up to 200,000 parallel fibers — compute the predicted sensory state. Climbing fibers from the inferior olivary nucleus carry the actual sensory feedback. When prediction and feedback diverge, the climbing fiber signal induces long-term depression at the parallel fiber-Purkinje cell synapses, updating the forward model to reduce future prediction error.\n\nThis is supervised learning implemented in biological hardware, running continuously, and updating in real time. It is the mechanism by which practice improves timing precision: every repetition generates a prediction, compares it to actual feedback, and adjusts the model. Variable practice generates more prediction errors across a wider parameter space, which builds a more robust and generalizable forward model. This is why variable practice produces better long-term skill transfer than blocked practice — it trains a richer prediction engine, not just a more memorized movement.\n\nFor the SYNCHRONIZE stage specifically, the cerebellum is responsible for the temporal predictions that bind the A.R.E.S. loop together. It predicts when visual information will arrive based on eye movement timing. It predicts when a decision will be needed based on the temporal structure of the unfolding play. It predicts when motor output must begin to intercept a moving target at the right time and place. When these temporal predictions are accurate, the system is synchronized. When they degrade — through fatigue, concussion, or insufficient calibration — synchronization fractures.", "ch4": "*The Electrical Architecture of Synchronized Performance*\n\nEvery neuron in the brain is an oscillator. It fires in rhythmic patterns, and these patterns are not random — they are organized into frequency bands that serve distinct computational functions. The synchronization of these oscillations across brain regions is the physical mechanism by which the distributed processing required for athletic performance is coordinated into a unified output.\n\nThis is not a speculative model. The relationship between oscillatory dynamics and performance has been documented across thousands of studies using electroencephalography (EEG), magnetoencephalography (MEG), and intracranial recordings. The evidence is unambiguous: the quality of cross-regional oscillatory coupling predicts performance quality with higher reliability than any behavioral measure alone.\n\n**The Oscillatory Hierarchy: Frequency Bands and Their Functions**\n\nNeural oscillations are organized into five canonical frequency bands, each associated with distinct computational roles:\n\nDelta (0.5–4 Hz): Large-scale cortical coordination and motivational state regulation. Delta power increases during sustained attention and is modulated by reward expectation. In sport contexts, delta oscillations provide the broadest temporal framework for action sequencing.\n\nTheta (4–8 Hz): Working memory maintenance, error monitoring, and long-range cortical communication. Frontal midline theta, generated primarily by the anterior cingulate
