.cornea-svg { width: 100%; height: auto; display: block; }
.cornea-layer-rect.dim { opacity: 0.45; }

.cd-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 14px; flex-wrap: wrap; }
.cd-name { font-size: 19px; font-weight: 700; color: #fff; }

.cd-power { font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--gold); padding: 4px 12px; border-radius: 20px; background: rgba(212,168,67,0.08); white-space: nowrap; }
.cd-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
@media (min-width: 720px) { .cd-grid { grid-template-columns: repeat(3, 1fr); } }
.cornea-facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding-top: 16px; border-top: 1px solid var(--border); }

.home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; flex: 1; padding: 40px; }

.loop-stage { position: absolute; width: 140px; text-align: center; cursor: pointer; }

.loop-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }

.aperture-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin: 20px 0 28px; }
.aperture-stage { background: radial-gradient(circle at 50% 50%, #1a1228, #08050f); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 220px; margin-bottom: 16px; }
.iris-svg { max-width: 240px; width: 100%; height: auto; }
.aperture-controls { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
@media (min-width: 720px) { .aperture-controls { grid-template-columns: 1fr 1fr; } }
.ap-ctrl { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.ap-ctrl label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-glow); margin-bottom: 8px; }
.ap-ctrl label span.val { color: var(--text); }
.ap-ctrl input[type=range] { width: 100%; accent-color: var(--accent-glow); }
.ap-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.ap-preset { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer; font-family: inherit; }
.ap-preset:hover { border-color: var(--accent); color: var(--text); }
.ap-preset.active { background: var(--lp); color: #fff; border-color: var(--accent-glow); }
.ap-readout { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 16px; }
.ap-stat { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
.ap-stat .k { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }
.ap-stat .v { font-size: 18px; font-weight: 700; color: #fff; margin-top: 4px; font-variant-numeric: tabular-nums; }
.ap-stat .sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.ap-verdict { background: var(--bg-surface); border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0; padding: 14px 16px; font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; min-height: 52px; }
.aq-panel { background: linear-gradient(135deg, rgba(127,211,247,0.10), rgba(34,20,97,0.30)); border: 1px solid rgba(127,211,247,0.30); border-radius: 12px; padding: 16px 18px; }
.aq-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #7FD3F7; margin-bottom: 6px; }
.aq-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.aq-iop { display: inline-block; background: rgba(127,211,247,0.18); color: #7FD3F7; padding: 3px 10px; border-radius: 12px; font-weight: 600; font-size: 11px; margin-top: 8px; font-variant-numeric: tabular-nums; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); }
  .content { padding: 24px 20px; }
  .loop-container { width: 300px; height: 300px; }
  .fw-book { font-size: 40px; }
  .spectrum-readout { flex-wrap: wrap; }
  .sr-energy { border-left: none; padding-left: 0; text-align: left; }
  .cd-top { flex-direction: column; }
}

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CHAIN = [{"n": 1, "key": "acquire", "short": "ACQUIRE", "station": "ACQUIRE — Signal In", "ch": "Book 1", "does": "Photon to perception. Visual information enters and becomes a usable percept.", "fail": "Degraded acuity, narrow span, slow gaze control.", "cost": "The system is reading the wrong picture."}, {"n": 2, "key": "route", "short": "ROUTE", "station": "ROUTE — Decision", "ch": "Book 2", "does": "Evidence accumulates to a decision. The right response is selected.", "fail": "Slow accumulation, poor thresholds, conflict.", "cost": "Right read, wrong or late choice."}, {"n": 3, "key": "execute", "short": "EXECUTE", "station": "EXECUTE — Motor Output", "ch": "Book 3", "does": "The decision becomes muscle force through the ten-station motor chain.", "fail": "Program poverty, kinetic-chain leak, timing drift.", "cost": "Good decision, poor movement."}, {"n": 4, "key": "sync", "boundary": true, "short": "SYNCHRONIZE", "station": "SYNCHRONIZE — Integration", "ch": "Book 4", "does": "The three stages must run on one clock. Their outputs converge at the right moment.", "fail": "Temporal decoupling, sensory conflict, prediction failure, overload.", "cost": "Every component works — the play still fails."}];

const BOOK = {"title": "SYNCHRONIZE", "subtitle": "Book Four · The Integration Architecture", "acts": [{"id": "part1", "label": "PART ONE — THE PROBLEM", "chapters": [{"id": "foreword", "number": "Foreword", "title": "The Handoff That Should Have Worked", "type": "foreword", "content": {"opening": "Beijing, 2008. The Bird's Nest, the Olympic semifinal of the men's 4×100-meter relay. The United States sent a team of some of the fastest human beings on the planet — anchored by Tyson Gay, that season's reigning world champion at 100 and 200 meters. On paper, a relay squad that had no business losing.\n\nThey never reached the final.\n\nThe baton came around to the last exchange — Darvis Patton driving into the zone at near top speed, Gay already accelerating away, hand reaching back for a pass the two of them had made ten thousand times before. And the baton hit the track. No trip. No pulled hamstring. Nobody was outrun. The handoff simply didn't happen.\n\nNothing was wrong with the sprinting. Each leg, run on its own, was world-class — the acceleration, the top-end speed, the mechanics, all of it there. What failed was the twenty-meter window in which one runner's timing had to line up exactly with another's: the single moment where two independently elite systems had to operate on the same clock. They didn't. The fastest components in the field went home without a medal, beaten by teams they would have run down in any straight race. That same afternoon, the U.S. women's 4×100 dropped their baton too.\n\nAfterward, Gay took the blame and Patton insisted it was his — two great athletes each reaching to own a failure that belonged to neither of them alone. Because the failure was not *in* either runner. It was in the space *between* them.\n\nThis is the failure mode that the first three books in this series cannot address on their own. You can have elite ACQUIRE, elite ROUTE, and elite EXECUTE — the visual system, the decision, and the motor output each performing at the highest level — and still lose, because the stages were never bound onto a single clock. The dropped baton is only the most literal version of a handoff that happens *inside* every athlete on every play, thousands of times a game: the instant one fast system has to pass to the next without dropping what it is carrying.\n\nThat binding is synchronization. And it is trainable.\n\nIt is not enough to build fast components. The components must run on the same clock.", "signature": "Dr. Joe LaPlaca, OD — Ares Elite Sports Vision"}}, {"id": "ch1", "number": "Chapter 1", "title": "The Synchronization Problem", "type": "science", "partLabel": "Part One — The Problem", "aresStage": "synchronize", "content": {"hook": "A Formula 1 car has ~14,000 components machined to microns. Its lap time is not determined by the quality of its components. It is determined by how well they work *together*. Human performance is governed by the same principle — more severely.", "callout": {"clinical": "Before attributing a breakdown to a single stage, verify that ACQUIRE, ROUTE, and EXECUTE are each intact. A synchronization deficit produces failures that look like component failures but do not resolve with component-level training.", "coaching": "'Optimize the weakest link' is the default development model — and it is incomplete. The stages don't run in sequence; their outputs must *converge* in time. Coaching a clean pass and a clean cut separately never trains the coupling between them."}, "summary": ["Component optimization does not produce system optimization. The A.R.E.S. stages run in overlapping parallel and must converge in time.", "Temporal binding is the core problem: three stages with variable, state-dependent latencies must produce outputs that align at the decisive moment.", "The mechanism of convergence is neural oscillatory coupling — measurable in EEG, not a metaphor.", "Synchronization failures fall into four categories: temporal desynchronization, sensory conflict, predictive failure, and integration overload.", "Synchronization is a distinct, trainable capacity — not an emergent byproduct of training the components."], "quiz": [{"question": "Why does optimizing components not optimize the system?", "options": ["The components are too expensive", "The stages must converge in time, and convergence is a separate capacity", "Components can't be measured", "It does — component training is sufficient"], "correct": 1, "feedback": "The stages run in overlapping parallel; their temporal convergence is a distinct capacity."}, {"question": "The four synchronization failure categories are:", "options": ["Speed, strength, power, endurance", "Temporal desynchronization, sensory conflict, predictive failure, integration overload", "Vision, decision, motor, recovery", "Acquire, route, execute, program"], "correct": 1, "feedback": "Each has a distinct mechanism, measurement, and intervention."}, {"question": "The physical mechanism that binds the stages in time is:", "options": ["Muscle memory", "Neural oscillatory coupling", "Willpower", "Blood flow"], "correct": 1, "feedback": "Oscillatory coupling is measurable with EEG coherence analysis."}]}, "interactive": "syncClock", "interactiveLabel": "The Weakest-Link Clock", "exploreHeading": "Optimize every component — and still lose the play", "exploreSub": "Set ACQUIRE, ROUTE, and EXECUTE quality high. Then drag temporal alignment down and watch integrated output collapse."}]}, {"id": "part2", "label": "PART TWO — THE MECHANISMS", "chapters": [{"id": "ch2", "number": "Chapter 2", "title": "Multi-Sensory Integration", "type": "science", "partLabel": "Part Two — The Mechanisms", "aresStage": "synchronize", "content": {"hook": "A batter facing a 95-mph fastball has ~400 ms to fuse vision, sound, proprioception, and vestibular input into one percept precise to the centimeter and the millisecond. That fusion is not passive. It is a competitive, weighted, context-dependent computation.", "callout": {"clinical": "An athlete who 'can't find the ball' under stadium lights despite normal acuity is showing a multi-sensory calibration failure, not a visual one. Test under systematically degraded conditions — the deficit is invisible at baseline.", "coaching": "Inverse effectiveness means multi-sensory training has its highest ROI under *degraded* conditions, not optimal ones. Strobe, dim, and perturb on purpose — that is where the weighting system learns."}, "summary": ["Multi-sensory integration (MSI) is an active computation combining vision, audition, proprioception, and vestibular input into a unified percept.", "The superior colliculus integrates by three principles: Spatial (same location = enhancement), Temporal (coincidence within modality-specific windows), and Inverse Effectiveness (weakest signals benefit most).", "Cortical networks — PPC, STS, ventral premotor — build the egocentric spatial model, biological-motion reading, and peripersonal interception that define sport awareness.", "Sensory weighting follows Bayesian optimal cue integration: reliable modalities get higher weight. Experts recalibrate under degraded conditions; novices do not.", "The temporal integration window sets how finely an athlete discriminates events in time — elite ~5–8 ms, recreational ~20–40 ms. It is trainable."], "quiz": [{"question": "The Inverse Effectiveness Principle states that MSI enhancement is greatest when:", "options": ["Both signals are strong", "The unimodal signals are weak", "Stimuli are far apart", "Only vision is used"], "correct": 1, "feedback": "Weak + weak = large enhancement — hence training under degraded conditions."}, {"question": "Optimal cue integration weights each sense by its:", "options": ["Speed", "Reliability (inverse variance)", "Cortical size", "Evolutionary age"], "correct": 1, "feedback": "Low-variance, reliable channels receive higher weight; the integrated estimate beats any single one."}, {"question": "An expert on a rain-soaked, glare-lit pitch will:", "options": ["Keep trusting vision equally", "Up-weight proprioception and down-weight degraded vision", "Stop moving", "Rely only on hearing"], "correct": 1, "feedback": "Adaptive re-weighting under degraded conditions is the expert signature."}]}, "interactive": "sensoryWeighting", "interactiveLabel": "Bayesian Cue Integration", "exploreHeading": "Watch the brain re-weight the senses it can trust", "exploreSub": "Switch conditions from daylight to rain-and-glare and see how an expert up-weights proprioception while a novice keeps trusting degraded vision."}, {"id": "ch3", "number": "Chapter 3", "title": "Predictive Coding and the Internal Forward Model", "type": "science", "partLabel": "Part Two — The Mechanisms", "aresStage": "synchronize", "content": {"hook": "Gretzky skated 'to where the puck is going to be.' That is not a metaphor — it is predictive coding. By the time retinal data reaches awareness, 80–200 ms have passed. In a 100–400 ms sport world, the brain must act on predictions or it cannot act in time.", "callout": {"clinical": "A forward model calibrated only in sterile practice generates poor predictions under competitive variability. 'Practice performer, game underperformer' is often a prediction-calibration gap, not a talent gap.", "coaching": "Deception works by manufacturing a prediction error in the opponent's forward model — costing 80–120 ms of re-computation. Train both accurate prediction *and* fast recovery from violated predictions."}, "summary": ["Predictive coding is mandatory in sport: reactive processing is too slow for competitive timescales. The brain pre-processes predicted input.", "The efference-copy / forward-model system (cerebellar) predicts the sensory consequences of every motor command, enabling error detection within 40–80 ms.", "Prediction operates at every level — perceptual (attentional templates), decisional (motor pre-loading), and motor (sensory-consequence prediction). Their synchronization produces 'zone' performance.", "Prediction errors cost 80–120 ms each. Deception in sport exploits this directly.", "The cerebellum — ~69 billion neurons — is the prediction engine. Variable practice builds more robust, generalizable forward models than blocked practice."], "quiz": [{"question": "Why is purely reactive processing too slow in sport?", "options": ["Muscles are slow", "Retinal-to-awareness latency (80–200 ms) exceeds many response windows", "Athletes don't try hard enough", "Vision is unreliable"], "correct": 1, "feedback": "The brain must act on predictions to meet 100–400 ms demands."}, {"question": "The forward model enables online error detection within:", "options": ["40–80 ms", "1 second", "300–500 ms", "10 seconds"], "correct": 0, "feedback": "Fast enough to correct within the current movement."}, {"question": "A pump fake degrades an opponent because it:", "options": ["Is confusing", "Generates a specific prediction error costing 100+ ms to resolve", "Is faster than the eye", "Blocks vision"], "correct": 1, "feedback": "The opponent's forward model must update — a costly re-computation."}]}}, {"id": "ch4", "number": "Chapter 4", "title": "Neural Oscillations and Cross-Regional Binding", "type": "science", "partLabel": "Part Two — The Mechanisms", "aresStage": "synchronize", "content": {"hook": "Every neuron is an oscillator. The synchronization of those rhythms across regions is the physical mechanism by which distributed processing becomes one unified output. Cross-regional coupling predicts performance better than any single behavioral measure.", "callout": {"clinical": "Long-range phase synchronization degrades with fatigue, concussion, sleep loss, and anxiety — each through a distinct mechanism. A drop in coupling shows up before component measures move.", "coaching": "Theta-gamma coupling is the capacity that lets a quarterback hold alignment, routes, and blitz reads simultaneously. It is trained by demanding simultaneous maintenance and manipulation of multiple cues under time pressure — not by isolated reps."}, "summary": ["Five frequency bands (delta, theta, alpha, beta, gamma) serve distinct computational roles; their cross-regional synchronization is the physical mechanism of integrated performance.", "Cross-frequency coupling — especially theta-gamma phase-amplitude coupling — organizes multi-item working memory into sequenced temporal packets. Elite athletes show tighter coupling.", "Long-range phase synchronization across three pathways (fronto-parietal, cortico-cerebellar, thalamo-cortical) binds the A.R.E.S. loop; degradation in any one fragments that integration.", "Behavioral proxies — temporal order judgment, dual-task cost, anticipatory timing — correlate with neural synchronization and are field-deployable."], "quiz": [{"question": "Gamma oscillations are described as the 'glue' of:", "options": ["Muscle contraction", "The binding problem — fusing features into one percept", "Blood flow", "Sleep"], "correct": 1, "feedback": "Phase-locked gamma binds separately processed features together."}, {"question": "Theta-gamma coupling organizes working memory by:", "options": ["Erasing old items", "Locking gamma bursts to theta phases as sequenced 'slots'", "Slowing all processing", "Increasing heart rate"], "correct": 1, "feedback": "Each item rides a gamma burst in its own theta-phase slot."}, {"question": "Which is NOT one of the three long-range synchronization pathways?", "options": ["Fronto-parietal", "Cortico-cerebellar", "Thalamo-cortical", "Spino-thalamic"], "correct": 3, "feedback": "The three are fronto-parietal, cortico-cerebellar, and thalamo-cortical."}]}, "interactive": "oscillations", "interactiveLabel": "Theta-Gamma Coupling", "exploreHeading": "Load the working-memory slots until they bleed", "exploreSub": "Tighten theta-gamma coupling, then add items. Watch capacity grow with coupling and collapse into interference when load exceeds it."}, {"id": "ch5", "number": "Chapter 5", "title": "The Vestibular Foundation", "type": "science", "partLabel": "Part Two — The Mechanisms", "aresStage": "synchronize", "content": {"hook": "Below vision, below proprioception, sits the vestibular system — the operating system every other system runs on. When it fails, nothing else works: not gaze, not balance, not the internal sense of 'up.' This is why concussion is a synchronization-platform injury.", "callout": {"clinical": "A VOR gain error of even 5% produces intermittent visual degradation during every head movement — invisible to standard testing, measurable with dynamic visual acuity. Screen it whenever post-concussion performance lags clearance.", "coaching": "Vestibular training is not balance training. Target the VOR (gaze stability), vestibular-cognitive integration, and vestibular-cerebellar timing — three distinct pathways, three distinct protocols."}, "summary": ["The vestibular system provides the gravitational/inertial reference frame against which all other senses are calibrated. Its degradation cascades disproportionately.", "The VOR stabilizes gaze with 10–15 ms latency. A 5% gain error means intermittent visual loss during head movement — a hidden synchronization deficit.", "Vestibular input to the hippocampus maintains the spatial map underlying field awareness; degraded input causes spatial disorientation distinct from visual or cognitive deficits.", "Synchronization-focused vestibular training must target three pathways: VOR gaze stability, vestibular-cognitive spatial processing, and vestibular-cerebellar timing."], "quiz": [{"question": "Correct VOR gain for accurate gaze stabilization is:", "options": ["0.5", "1.0", "1.5", "2.0"], "correct": 1, "feedback": "Gain of 1.0 means eye velocity exactly opposes head velocity — zero retinal slip."}, {"question": "The VOR's ~10–15 ms latency makes it:", "options": ["The slowest reflex", "The fastest reflex in the body", "Irrelevant to sport", "Purely cognitive"], "correct": 1, "feedback": "Gaze stability cannot wait for visual processing."}, {"question": "Why is concussion called a 'synchronization-platform injury'?", "options": ["It only affects muscles", "It damages the vestibular system every other system is calibrated against", "It's purely psychological", "It never affects performance"], "correct": 1, "feedback": "Residual vestibular desynchronization drives deficits that survive standard clearance."}]}, "interactive": "vorGain", "interactiveLabel": "VOR Gain & Retinal Slip", "exploreHeading": "Break gaze stability at game-speed head velocity", "exploreSub": "Set VOR gain off 1.0 and crank head velocity. Watch retinal slip blur the target — the moment ACQUIRE goes offline mid-play."}, {"id": "ch6", "number": "Chapter 6", "title": "Anticipation and Pattern Recognition", "type": "science", "partLabel": "Part Two — The Mechanisms", "aresStage": "synchronize", "content": {"hook": "Chase and Simon, 1973: experts reconstructed real chess positions almost perfectly — but on random boards, dropped to novice level. Their edge was never memory. It was pattern recognition: perceiving meaningful chunks and predicting how they will evolve.", "callout": {"clinical": "When anticipation fails, localize the cascade: is the pattern not recognized, the schema incomplete, or the schema not linked to a motor response? Each has a different training address.", "coaching": "Breadth beats depth: 500 reps across systematically varied parameters build a broader, more transferable schema library than 1,000 identical reps. Add contrast training to sharpen the cues that separate look-alike patterns."}, "summary": ["Expert pattern recognition is not better memory — it is extraction of meaningful configurations (schemas) encoding spatial and temporal relationships as single units.", "The recognition cascade (visual extraction → hippocampal schema completion → premotor preparation) completes in 200–300 ms in experts, letting motor prep begin at recognition, not decision.", "Temporal pattern recognition — reading the rhythm — runs through striatal coincidence detection and is how perception and action become temporally coupled.", "Schema depth (variation) and specificity (discrimination) are built through variable and contrast training; library breadth outperforms depth for competitive transfer."], "quiz": [{"question": "The expert chess advantage disappeared when:", "options": ["The clock was removed", "Pieces were placed randomly", "The board was larger", "Novices practiced"], "correct": 1, "feedback": "Random boards removed the meaningful patterns their schemas encode."}, {"question": "In experts, the pattern-recognition cascade completes within:", "options": ["2–3 seconds", "200–300 ms", "10 ms", "1 minute"], "correct": 1, "feedback": "Fast enough that motor preparation begins at recognition."}, {"question": "Which builds the more competitively transferable schema library?", "options": ["1,000 identical reps", "500 reps across systematically varied parameters", "Watching film only", "Mental rehearsal alone"], "correct": 1, "feedback": "Breadth of variation outperforms narrow depth for transfer."}]}}, {"id": "ch7", "number": "Chapter 7", "title": "The Flow State Architecture", "type": "science", "partLabel": "Part Two — The Mechanisms", "aresStage": "synchronize", "content": {"hook": "'Flow' has been diluted to a feel-good label. In the A.R.E.S. framework it is a specific, measurable neural state: maximal synchronization across the pipeline, minimal prediction error, and the shutdown of the self-monitoring that normally eats bandwidth.", "callout": {"clinical": "Flow cannot occur during novel skill acquisition — explicit learning requires the very prefrontal engagement flow suppresses. Expect and design for it only where deep schemas already exist.", "coaching": "Flow can't be commanded, but its preconditions can be engineered: challenge-skill match, immediate informational feedback, deep schemas, attentional absorption, and low self-evaluative threat. Build the on-ramp, not the state."}, "summary": ["Flow is transient hypofrontality (reduced prefrontal activity) plus maximal sensorimotor cross-regional synchronization — an engineering target, not a mystery.", "Its EEG signature: increased frontal alpha, maintained posterior gamma, elevated theta-gamma coupling, enhanced sensorimotor alpha coherence.", "Five preconditions: skill-challenge match, clear immediate feedback, deep schema availability, attentional absorption, low self-evaluative threat.", "The AESV flow protocol builds each precondition via progressive challenge calibration, immediate informational feedback, schema-depth work, and external attentional anchoring."], "quiz": [{"question": "Transient hypofrontality enhances performance because:", "options": ["It adds conscious control", "It quiets self-monitoring that slows automatic processing", "It increases fear", "It reduces vision"], "correct": 1, "feedback": "Conscious processing is 300–500 ms slower; going quiet frees trained subsystems."}, {"question": "Flow cannot occur during:", "options": ["Well-practiced performance", "Novel skill acquisition", "Competition", "High challenge"], "correct": 1, "feedback": "Explicit learning needs prefrontal engagement, which opposes hypofrontality."}, {"question": "Which is a precondition for flow?", "options": ["High self-evaluative threat", "Ambiguous feedback", "Skill-challenge match", "Shallow schemas"], "correct": 2, "feedback": "Demands must match trained capacity — too easy or too hard both block flow."}]}}]}, {"id": "part3", "label": "PART THREE — WHEN IT BREAKS", "chapters": [{"id": "ch8", "number": "Chapter 8", "title": "Fatigue and Synchronization Degradation", "type": "science", "partLabel": "Part Three — When It Breaks", "aresStage": "synchronize", "content": {"hook": "The conventional model of fatigue is peripheral — depleted muscles. But long before force production drops, central fatigue degrades synchronization. The muscles still have capacity; the integration binding them has loosened.", "callout": {"clinical": "Reaction-time variability rises before mean reaction time. An athlete with stable average speed but 20%+ higher trial-to-trial variability is already desynchronizing — track the variance, not just the mean.", "coaching": "Late-game 'mental errors' are frequently neurochemical, not psychological. Build resilience with metabolic-cognitive dual loading: synchronization-demanding tasks performed under controlled physical fatigue."}, "summary": ["Central fatigue degrades synchronization before it degrades component performance; integration loosens first, producing 'mental errors' that are actually neurochemical.", "Three mechanisms: serotonergic accumulation (reduced oscillatory precision), dopaminergic depletion (forced conscious processing), adenosine accumulation (reduced neural excitability). They interact and self-reinforce.", "Four measurable markers: increased RT variability, elevated dual-task cost, degraded anticipatory timing, reduced multi-sensory integration benefit.", "Resilience is trainable via metabolic-cognitive dual loading — building tolerance for the neurochemical environment of late-game performance."], "quiz": [{"question": "Central fatigue degrades performance primarily by:", "options": ["Depleting muscle glycogen", "Loosening the integration between perception, decision, and action", "Reducing bone density", "Lowering body temperature"], "correct": 1, "feedback": "Synchronization degrades before component force capacity does."}, {"question": "Which marker of desynchronization rises first under fatigue?", "options": ["Mean reaction time", "Reaction-time variability", "Muscle mass", "Height"], "correct": 1, "feedback": "Temporal precision loosens before average speed changes."}, {"question": "Synchronization resilience is built through:", "options": ["Rest alone", "Metabolic-cognitive dual loading", "Isolated strength work", "Visualization only"], "correct": 1, "feedback": "Train synchronization under controlled fatigue to expand the maintainable envelope."}]}}, {"id": "ch9", "number": "Chapter 9", "title": "Arousal, Anxiety, and the Inverted-U Revisited", "type": "science", "partLabel": "Part Three — When It Breaks", "aresStage": "synchronize", "content": {"hook": "The inverted-U has been the default model of pressure for a century. Its flaw isn't that it's wrong — it's that it describes a phenomenon without a mechanism. Too much arousal hurts performance, but why, how, and what degrades? Synchronization supplies the answer.", "callout": {"clinical": "Anxiety fragments synchronization through four distinct mechanisms — attentional narrowing, working-memory disruption, motor reinvestment, temporal compression — each requiring a different intervention. Diagnose which one before prescribing.", "coaching": "The target of arousal regulation is not calm — it is calibrated. A under-aroused lineman needs up-regulation, not breathing-down. 'Clutch' is the trained ability to hold all four neuromodulators in their moderate range under pressure."}, "summary": ["Arousal is a neuromodulatory state set by four systems: noradrenergic (signal-to-noise), dopaminergic (decision threshold), cholinergic (attentional focus), serotonergic (mood/impulse). Each has a nonlinear dose-response curve.", "Anxiety degrades synchronization four ways: attentional narrowing, working-memory disruption, motor reinvestment, and temporal compression — each with its own fix.", "Clutch performance is not a trait; it is trained neuromodulatory calibration under competitive pressure.", "The optimal point is the configuration that maximizes cross-regional synchronization — and it sometimes requires up-regulation, not down-regulation."], "quiz": [{"question": "The synchronization framework's critique of the inverted-U is that it:", "options": ["Is completely wrong", "Describes a phenomenon without a mechanism", "Ignores arousal", "Only applies to novices"], "correct": 1, "feedback": "Without mechanism, intervention is guesswork — synchronization provides the mechanism."}, {"question": "'Tunnel vision' under stress is caused by:", "options": ["Low dopamine", "High norepinephrine narrowing the processing spotlight", "Serotonin depletion", "Fatigue only"], "correct": 1, "feedback": "A literal narrowing of processing bandwidth for peripheral information."}, {"question": "The goal of arousal regulation is:", "options": ["Always calm", "Calibrated — sometimes up-regulated", "Maximum arousal", "Zero arousal"], "correct": 1, "feedback": "Optimal varies by task and individual; under-arousal needs up-regulation."}]}, "interactive": "arousalU", "interactiveLabel": "Arousal & Synchronization", "exploreHeading": "Find the calibrated point — not the calm one", "exploreSub": "Slide arousal across the range. Watch four neuromodulators shift and synchronization quality trace an inverted-U. Sometimes the fix is up-regulation."}, {"id": "ch10", "number": "Chapter 10", "title": "When Synchronization Fails — Ten Failure Modes", "type": "science", "partLabel": "Part Three — When It Breaks", "aresStage": "synchronize", "content": {"hook": "Every prior chapter described how synchronization works. This one describes how it breaks. Ten failure modes, each with a mechanism, a behavioral signature, a measurement, and an intervention — ordered by prevalence, most common first.", "callout": {"clinical": "Post-concussion residual desynchronization is the most insidious mode: the athlete is 'cleared' and normal on isolated component tests, yet measurably deficient under integration load. Assess under loaded conditions, not baseline.", "coaching": "'A step behind,' 'can't find the ball,' 'chokes,' 'looks different but I can't say why' — these are not diagnoses. Each maps to a specific failure mode with a specific fix. Learn the ten and stop coaching the surface."}, "summary": ["Ten failure modes form a diagnostic framework for integration breakdown — each with a distinct mechanism, signature, measurement, and intervention.", "The most common are temporal decoupling, sensory-weighting miscalibration, and predictive-model staleness — all trainable without neuroimaging.", "Post-concussion residual desynchronization is the most dangerous: standard return-to-play may clear an athlete before synchronization is restored.", "No failure mode is permanent or talent-limited; every one is measurable through behavioral proxies and trainable through specific protocols."], "quiz": [{"question": "The most common synchronization failure mode is:", "options": ["Post-concussion desynchronization", "Perception-action temporal decoupling", "Schema interference", "VOR gain dysfunction"], "correct": 1, "feedback": "Technically correct but 50–150 ms late — 'a step behind.'"}, {"question": "Why is post-concussion residual desynchronization so dangerous?", "options": ["It's obvious on all tests", "Component tests look normal while integration-loaded performance is deficient", "It resolves instantly", "It only affects balance"], "correct": 1, "feedback": "Deficits are visible only under load, so standard clearance misses them."}, {"question": "'He has good mechanics but is always a step behind' most likely indicates:", "options": ["Sensory weighting miscalibration", "Perception-action temporal decoupling", "Integration overload", "Schema interference"], "correct": 1, "feedback": "The action is correct but temporally misaligned with the environment."}]}, "interactive": "syncFailureCards", "interactiveLabel": "The Ten Synchronization Failures", "exploreHeading": "From sideline language to neural address", "exploreSub": "Click each card to translate a behavioral signature into its mechanism — and the intervention that actually targets it."}]}, {"id": "part4", "label": "PART FOUR — CONCUSSION ACROSS THE LOOP", "chapters": [{"id": "ch11", "number": "Chapter 11", "title": "Concussion and the Front Door — What a Hit Does to ACQUIRE", "type": "science", "partLabel": "Part Four — Concussion Across the Loop", "aresStage": "acquire", "content": {"hook": "The eyes are not passive cameras. They are an active oculomotor system driven by more of the brain than any other sense — which is exactly why a diffuse brain injury shows up at the front door first. Concussion rarely takes vision away. It makes the picture arrive late, dim, and unstable.", "callout": {"clinical": "Static visual acuity is a poor concussion screen — it is usually normal. The deficits live in the dynamic oculomotor system: saccades, smooth pursuit, near point of convergence, and gaze stability. Screen with VOMS, near-point-of-convergence, and King-Devick, not a wall chart.", "coaching": "An athlete who is 'cleared' but says the ball looks 'a step late,' or that screens and reading trigger headaches, is telling you the front door is still broken. Believe the report — the visual system recovers on its own timeline, usually behind the symptom checklist."}, "summary": ["Concussion triggers a neurometabolic cascade — ionic flux, a glutamate surge, an energy crisis, and axonal stretch — that disproportionately affects the visual and oculomotor system because so much of the brain participates in vision.", "Static visual acuity is typically normal; the damage is to the dynamic oculomotor machinery — saccades, smooth pursuit, and convergence.", "Convergence insufficiency (a receded near point of convergence) affects a large fraction of concussed athletes and drives reading and near-task symptoms.", "Gaze instability (VOR), light sensitivity, and reduced contrast sensitivity and processing speed degrade the quality, speed, and stability of the incoming signal.", "A degraded ACQUIRE stage means every downstream stage inherits a noisier, later picture — the injury's effects begin at the front door."], "quiz": [{"question": "Why is a static eye chart a poor concussion screen?", "options": ["It is too expensive", "Static acuity is usually normal; the deficits are in the dynamic oculomotor system", "It requires special equipment", "Athletes memorize the chart"], "correct": 1, "feedback": "The damage is to saccades, pursuit, convergence, and gaze stability — not letter acuity."}, {"question": "Convergence insufficiency after concussion refers to:", "options": ["The eyes crossing involuntarily", "A receded near point of convergence causing near-task and reading symptoms", "Total loss of depth perception", "Color blindness"], "correct": 1, "feedback": "The near point of convergence recedes; reading and screens provoke symptoms."}, {"question": "A degraded ACQUIRE stage matters downstream because:", "options": ["It doesn't — vision is separate", "Every later stage inherits the noisier, slower signal (garbage in)", "It only affects reading", "It speeds up decisions"], "correct": 1, "feedback": "The decision and motor stages can only work with the picture ACQUIRE delivers."}]}, "interactive": "concEngineVision", "interactiveLabel": "The Concussion Engine", "exploreHeading": "See a concussion from the inside — start with vision", "exploreSub": "Scrub the recovery timeline, then move between four lenses: the metabolic cascade, the brain map, the first-person visual simulation, and the A.R.E.S. loop. Here it opens on what the athlete actually sees."}, {"id": "ch12", "number": "Chapter 12", "title": "Concussion and the Slowed Decision — What a Hit Does to ROUTE", "type": "science", "partLabel": "Part Four — Concussion Across the Loop", "aresStage": "route", "content": {"hook": "If you could measure only one thing after a concussion, measure speed of processing. Across the entire literature it is the most consistent and most persistent cognitive casualty — and ROUTE, the decision stage, is where a slowed processor becomes a slow, tentative, error-prone athlete.", "callout": {"clinical": "Processing speed and reaction-time variability are the most sensitive markers of a ROUTE-stage concussion deficit — more sensitive than accuracy, which the athlete often preserves by slowing down. Track the variability, not just the mean.", "coaching": "A concussed athlete who is 'thinking too much' and playing tentative is not being timid — the automatic decision pathways are impaired and the slow, conscious pathway is compensating. Do not coach aggression into a decision system that is physiologically slowed."}, "summary": ["Processing speed and reaction time are the most consistent and persistent cognitive casualties of concussion.", "In drift-diffusion terms, concussion lowers the drift rate and pushes decision thresholds up: decisions become slower and noisier, or accuracy drops to hold speed.", "Increased trial-to-trial variability — inconsistency — is a hallmark, not merely a slower average.", "Working-memory and attention bottlenecks degrade field-reading and collapse dual-task performance.", "Degraded automatic routing forces a reversion to slow, deliberate conscious control — the athlete 'thinks too much' and looks a step behind."], "quiz": [{"question": "The most consistent cognitive casualty of concussion is:", "options": ["Long-term memory", "Processing speed and reaction time", "Vocabulary", "Color perception"], "correct": 1, "feedback": "Processing speed is the single most sensitive and persistent cognitive marker."}, {"question": "In drift-diffusion terms, concussion primarily:", "options": ["Raises the drift rate", "Lowers the drift rate so evidence accumulates slower and noisier", "Removes the threshold", "Has no effect on decisions"], "correct": 1, "feedback": "Lower drift rate plus raised thresholds means slower, noisier decisions."}, {"question": "A concussed athlete who 'thinks too much' is showing:", "options": ["Lack of effort", "Reversion from automatic to slow conscious control because automatic pathways are impaired", "A vision problem", "Improved decision-making"], "correct": 1, "feedback": "Impaired automatic routing forces the slow, deliberate pathway to compensate."}]}, "interactive": "concEngineCognition", "interactiveLabel": "The Concussion Engine", "exploreHeading": "Click into the brain that makes the decision", "exploreSub": "The same living model, opened on the brain map — click the prefrontal cortex and the language areas, then scrub the timeline to watch the cognitive deficits recover. Four lenses in all."}, {"id": "ch13", "number": "Chapter 13", "title": "Concussion and the Compromised Output — What a Hit Does to EXECUTE", "type": "science", "partLabel": "Part Four — Concussion Across the Loop", "aresStage": "execute", "content": {"hook": "The most dangerous thing about concussion's motor effects is how quiet they are. Balance looks fine, the movement looks normal, the symptom checklist is clean — and the motor system is still measurably off, in ways that both cap performance and raise the risk of the next injury.", "callout": {"clinical": "Motor deficits after concussion routinely outlast symptoms and standard clearance: a prolonged cortical silent period on TMS, dual-task gait deficits, and elevated subsequent lower-extremity injury risk. Add dual-task and motor-timing assessment before full clearance.", "coaching": "The concussed athlete who is 'cleared' and looks normal is at elevated risk of a non-contact lower-body injury for months. Progress motor load — cutting, landing, reactive agility under fatigue — deliberately, not all at once on the first day back."}, "summary": ["Concussion slows movement initiation and execution and degrades force precision and motor timing — the corticospinal command is issued later and calibrated worse.", "A prolonged cortical silent period on TMS marks altered motor-cortex inhibition that can persist beyond symptom resolution and clearance.", "Postural-control and cerebellar-timing deficits make movements subtly imprecise; dual-task gait deficits reveal fragile integration even after single-task walking normalizes.", "Return from concussion carries roughly a doubled risk of lower-extremity musculoskeletal injury for months — a motor deficit with orthopedic consequences.", "Motor recovery lags the symptom checklist; clearance on symptoms alone misses a compromised output stage."], "quiz": [{"question": "A prolonged cortical silent period on TMS after concussion indicates:", "options": ["Faster reflexes", "Altered motor-cortex inhibition that can persist past symptom resolution", "A torn muscle", "Normal recovery"], "correct": 1, "feedback": "It reflects increased intracortical (GABA-B) inhibition that outlasts symptoms."}, {"question": "After returning to play from concussion, athletes show:", "options": ["Lower injury risk", "Roughly doubled lower-extremity musculoskeletal injury risk for months", "No change in injury risk", "Only upper-body injury risk"], "correct": 1, "feedback": "Residual sensorimotor deficits raise non-contact lower-body injury risk."}, {"question": "Dual-task gait testing is useful because:", "options": ["It measures strength", "Gait deficits reappear under cognitive load even after single-task walking looks normal", "It tests vision", "It replaces balance testing"], "correct": 1, "feedback": "The integration is still fragile; loading it reveals the hidden deficit."}]}, "interactive": "concEngineMotor", "interactiveLabel": "The Concussion Engine", "exploreHeading": "Trace the injury into the output system", "exploreSub": "The living model, opened on the brain map — click the motor cortex and cerebellum, then scrub the timeline to see the motor and timing deficits that outlast the symptoms. Four lenses in all."}, {"id": "ch14", "number": "Chapter 14", "title": "Concussion Is a Synchronization Injury — Why 'Cleared' Isn't 'Recovered'", "type": "science", "partLabel": "Part Four — Concussion Across the Loop", "aresStage": "synchronize", "content": {"hook": "Concussion is usually called a brain injury. For the performance athlete it is more precisely a timing injury. It degrades each stage a little — and it degrades the coupling between them a lot. The dropped baton in the foreword is what a concussed A.R.E.S. loop looks like from the outside.", "callout": {"clinical": "Post-concussion deficits are most visible under integration load, not at rest. A symptom-free, component-normal athlete can remain measurably desynchronized. Add dual-task, multi-sensory, and dynamic-visual-acuity testing under fatigue to return-to-play, and grade recovery by integration, not by symptom resolution.", "coaching": "'Cleared' means the parts passed their tests. It does not mean the athlete's systems are back on the same clock. Expect a window after clearance where performance is down and re-injury risk is up, and reintroduce integrated, game-speed demands gradually rather than all at once."}, "summary": ["Concussion degrades each A.R.E.S. stage modestly but degrades the coupling between them severely — diffuse axonal injury is, by definition, injury to the timing tracts that bind the loop.", "It strikes the cerebellum and vestibular system directly — the forward-model predictor and the reference frame the whole system calibrates against.", "Because integrated output multiplies components by their alignment, individually mild deficits produce a whole-system drop far larger than any single deficit predicts — the athlete feels 'off' but can't localize it.", "'Cleared' is component-based and arrives before integration recovers: post-concussion residual desynchronization is the window of reduced performance and elevated re-injury risk.", "Return-to-play and recovery should be synchronization-based — integration-under-load testing and graded synchronization retraining — not symptom checklists alone."], "quiz": [{"question": "Why is concussion fundamentally a synchronization injury?", "options": ["It only affects mood", "Diffuse axonal injury damages the long white-matter tracts that carry the timing signals binding regions together", "It has no lasting effect", "It only affects the eyes"], "correct": 1, "feedback": "The connective timing tracts — the very pathways that bind the loop — are what a rotational hit shears."}, {"question": "Because integrated output multiplies components by alignment, individually mild concussion deficits produce:", "options": ["No measurable change", "A whole-system drop larger than any single deficit predicts", "Improvement through compensation", "Only a vision problem"], "correct": 1, "feedback": "The effects multiply, so mild deficits compound into a large integration failure."}, {"question": "'Cleared but not synchronized' describes:", "options": ["A fully recovered athlete", "Component tests normalizing before integration-under-load recovers", "An athlete who never had symptoms", "A purely psychological state"], "correct": 1, "feedback": "This is post-concussion residual desynchronization — the danger window."}]}, "interactive": "concEngineLoop", "interactiveLabel": "The Concussion Engine", "exploreHeading": "Pass every component test — and still be desynchronized", "exploreSub": "The living model, opened on the A.R.E.S. loop. Scrub the recovery timeline into the shaded window where every isolated test passes but integration under load still fails — and switch lenses to see why. Four lenses in all."}]}, {"id": "part5", "label": "PART FIVE — REFERENCE", "chapters": [{"id": "appendixB", "number": "Appendix A", "title": "Drill Library — SYNCHRONIZE Stage", "type": "science", "partLabel": "Part Five — Reference", "aresStage": "synchronize", "content": {"hook": "The SYNCHRONIZE-stage entries in the full 40-drill AESV library. Each card lists the target, equipment, and progression depth; complete specifications are in Book 5 (PROGRAM).", "callout": {"clinical": "Each drill is a controlled stressor on one synchronization pathway. Sequence them by the athlete's SAB profile, not by list order.", "coaching": "Progression depth (100–400+ levels) is what keeps a drill in the flow-compatible challenge zone across an entire development arc. The level, not the drill, is the training variable."}, "summary": ["S-01 Temporal Pacer (temporal coupling, FitLight, 120 levels) and S-02 Sensory Switchboard (MSI, FitLight + tones + strobe, 150 levels).", "S-03 Prediction Engine (forward-model, video + response pad, 200 levels) and S-04 Integration Ladder (progressive capacity, FitLight + BOSU + cognitive deck, 180 levels).", "S-05 Fatigue Synchronizer (resilience, FitLight + conditioning, 100 levels) and S-06 Gaze Lock (VOR, DVA chart + metronome, 120 levels).", "S-07 Rhythm Rider (cross-limb timing, metronome, 150 levels) and S-08 Pressure Integrator (arousal, FitLight + consequence protocol, 100 levels)."], "quiz": [{"question": "Which drill primarily trains VOR and gaze stability?", "options": ["S-01 Temporal Pacer", "S-06 Gaze Lock", "S-03 Prediction Engine", "S-08 Pressure Integrator"], "correct": 1, "feedback": "Target identification during active head rotation at increasing velocities."}, {"question": "The training variable that keeps a drill in the challenge zone across development is:", "options": ["The drill name", "Its progression level (100–400+)", "The equipment brand", "The time of day"], "correct": 1, "feedback": "Level, not drill, is what scales with the athlete."}]}, "interactive": "drillLibrary", "interactiveLabel": "The SYNCHRONIZE Drill Library", "exploreHeading": "Eight drills, four SAB domains", "exploreSub": "Click any drill card to see its primary target, equipment, description, and progression depth."}, {"id": "glossary", "number": "Appendix B", "title": "Glossary", "type": "glossary", "content": {"intro": "Every key term from Book Four — from the synchronization problem to the concussion cascade. Search by term or scan by category.", "entries": [{"term": "AQ™ Score (Ares Quotient)", "category": "framework", "def": "The unified performance metric integrating all four A.R.E.S. stages into a weighted composite, measured under Base, Fatigue, and Pressure conditions. Built for longitudinal tracking and cross-athlete comparison within sport and position groups."}, {"term": "Synchronization Integration Protocol (SIP)", "category": "framework", "def": "The AESV master architecture connecting assessment, training, and monitoring across the full A.R.E.S. loop with periodized seasonal structure."}, {"term": "Synchronization Assessment Battery (SAB)", "category": "framework", "def": "The AESV eight-test assessment across four domains: temporal binding precision, multi-sensory integration capacity, predictive model accuracy, and integration under load."}, {"term": "Latency Ledger™", "category": "framework", "def": "AESV's longitudinal performance tracking tool linking training inputs to performance outputs across the full A.R.E.S. loop."}, {"term": "Component Optimization Fallacy", "category": "framework", "def": "The mistaken belief that optimizing each component (stage) in isolation optimizes the system. Ignores that the stages must converge in time."}, {"term": "Superior Colliculus", "category": "anatomy", "def": "Midbrain structure performing rapid multi-sensory integration using topographic maps that align visual, auditory, and somatosensory inputs in spatial coordinates."}, {"term": "Posterior Parietal Cortex (PPC)", "category": "anatomy", "def": "Cortical region integrating visual and proprioceptive information into an egocentric spatial model — the neural substrate of spatial awareness and field sense in sport."}, {"term": "Vestibulo-Ocular Reflex (VOR)", "category": "anatomy", "def": "A three-neuron brainstem reflex producing compensatory eye movements during head rotation with ~10–15 ms latency. VOR gain accuracy directly determines visual stability during dynamic play."}, {"term": "Mirror Neuron System (MNS)", "category": "anatomy", "def": "Neurons in premotor cortex and inferior parietal lobule that activate during both action execution and observation. Enables interpersonal prediction by internally simulating observed actions."}, {"term": "Multi-Sensory Integration (MSI)", "category": "integration", "def": "The active, computational process of combining information from multiple sensory channels into a coherent internal model. Governed by spatial, temporal, and inverse-effectiveness principles."}, {"term": "Optimal Cue Integration", "category": "integration", "def": "The Bayesian process by which the brain weights sensory inputs by reliability (inverse variance). The integrated estimate is always more precise than either unimodal estimate alone."}, {"term": "Sensory Weighting", "category": "integration", "def": "The dynamic adjustment of reliance on different sensory modalities based on current reliability. Experts recalibrate under degraded conditions; novices do not."}, {"term": "Inverse Effectiveness Principle", "category": "integration", "def": "The MSI principle that enhancement is greatest when unimodal signals are weak. Implication: multi-sensory training has the highest ROI under degraded sensory conditions."}, {"term": "Binding Problem", "category": "integration", "def": "The challenge of combining separately processed features into a unified percept. Solved through temporal synchrony: features on phase-locked gamma oscillations are bound together."}, {"term": "Temporal Binding Window", "category": "integration", "def": "The time period within which stimuli are integrated as a single event. Narrower windows enable finer temporal discrimination. Elite athletes: 5–8 ms; recreational: 20–40 ms. Trainable."}, {"term": "Predictive Coding", "category": "prediction", "def": "The framework proposing the brain is fundamentally a prediction engine, generating expectations at every hierarchical level and processing primarily through prediction-error signals."}, {"term": "Forward Model", "category": "prediction", "def": "An internal (primarily cerebellar) model predicting the sensory consequences of motor commands. Enables online error detection within 40–80 ms and is the foundation of predictive performance."}, {"term": "Efference Copy", "category": "prediction", "def": "A copy of a motor command sent to the cerebellum simultaneously with the command to the muscles. Enables the forward model to predict sensory consequences before actual feedback arrives."}, {"term": "Prediction Error", "category": "prediction", "def": "The discrepancy between predicted and actual sensory input. Generates a neural signal that consumes resources and adds 80–120 ms to response time — the mechanism behind deception."}, {"term": "Mismatch Negativity (MMN)", "category": "prediction", "def": "An EEG-measurable negative voltage deflection 100–250 ms after a prediction-violating stimulus. Amplitude reflects prediction-error magnitude."}, {"term": "Neural Oscillations", "category": "oscillations", "def": "Rhythmic electrical activity organized into five bands (delta, theta, alpha, beta, gamma), each with distinct computational functions. Cross-regional coupling coordinates distributed processing."}, {"term": "Gamma Oscillations (30–80+ Hz)", "category": "oscillations", "def": "High-frequency oscillations associated with feature binding, prediction, and conscious perception. Elevated gamma power and coherence characterize expert performance."}, {"term": "Cross-Frequency Coupling (CFC)", "category": "oscillations", "def": "The modulation of one oscillation by another — typically a slow oscillation's phase modulating a fast oscillation's amplitude. The primary mechanism of working-memory organization."}, {"term": "Phase-Amplitude Coupling (PAC)", "category": "oscillations", "def": "A form of CFC in which the phase of a slow oscillation modulates the amplitude of a fast one. The mechanism of multi-item working-memory organization."}, {"term": "Theta-Gamma Coupling", "category": "oscillations", "def": "PAC between theta (4–8 Hz) and gamma (30–80+ Hz). The primary mechanism for binding working-memory content to motor preparation. Tighter in elite athletes."}, {"term": "Long-Range Phase Synchronization", "category": "oscillations", "def": "The alignment of oscillatory phases across distant brain regions via three pathways: fronto-parietal, cortico-cerebellar, and thalamo-cortical."}, {"term": "Central Fatigue", "category": "fatigue", "def": "Reduction in neural drive from brain to muscles, mediated by serotonergic, dopaminergic, and adenosinergic mechanisms. Degrades synchronization before affecting peripheral force production."}, {"term": "Adenosine", "category": "fatigue", "def": "A metabolic byproduct of neural activity that binds A1 receptors on glutamatergic neurons, reducing excitability. Accumulates during performance, degrading oscillatory coupling."}, {"term": "Transient Hypofrontality", "category": "flow", "def": "Temporary reduction in prefrontal activity during flow, releasing well-trained subsystems from conscious monitoring and enabling maximum integrated processing speed."}, {"term": "Flow State", "category": "flow", "def": "A neural state of transient hypofrontality, maximal cross-regional synchronization, minimal prediction error, and suppressed self-monitoring. An engineering target with defined preconditions."}, {"term": "Coincidence Anticipation Timing", "category": "measurement", "def": "The ability to time a motor response to coincide with a moving stimulus arriving at a specified location. A primary measure of temporal binding precision."}, {"term": "Coupled Oscillator Dynamic", "category": "team", "def": "The tendency of two rhythmically active systems to synchronize their cycles when connected through continuous information exchange. The mechanism of dyadic interpersonal synchronization."}, {"term": "Shared Mental Model (SMM)", "category": "team", "def": "A knowledge structure held in common by team members enabling anticipatory coordination without communication. Built through shared experience, not instruction."}, {"term": "Integration Overload", "category": "failure", "def": "A synchronization failure mode in which task demands exceed integration capacity, forcing a fallback from parallel to serial processing."}, {"term": "Temporal Desynchronization", "category": "failure", "def": "A failure mode in which individual stages perform correctly but their outputs fail to converge at the right moment, producing technically correct but temporally misaligned actions."}, {"term": "Drift-Diffusion Model", "category": "prediction", "def": "A framework describing decisions as continuous evidence accumulation reaching a threshold. Key parameters: drift rate, threshold, and starting-point bias (Book 2)."}, {"term": "Neurometabolic Cascade", "category": "concussion", "def": "The sequence following concussive force (Giza & Hovda): indiscriminate glutamate release, potassium efflux and calcium influx, an energy crisis of raised glucose demand against reduced cerebral blood flow, mitochondrial dysfunction, and axonal stretch."}, {"term": "Diffuse Axonal Injury (DAI)", "category": "concussion", "def": "Widespread stretching and shearing of long white-matter axons from rotational force. Because these tracts carry the timing signals that bind brain regions, DAI is fundamentally an injury to synchronization."}, {"term": "VOMS (Vestibular/Ocular Motor Screening)", "category": "concussion", "def": "A sideline-capable screen of smooth pursuit, saccades, convergence, VOR, and visual-motion sensitivity used to detect the oculomotor and vestibular deficits of concussion that static acuity misses."}, {"term": "Near Point of Convergence (NPC)", "category": "concussion", "def": "The closest point at which the eyes maintain single binocular vision. A receded NPC (convergence insufficiency) is a common post-concussion deficit driving near-task and reading symptoms."}, {"term": "King-Devick Test", "category": "concussion", "def": "A rapid number-naming test of saccadic eye movement, attention, and processing speed used as a concussion screen; times lengthen with oculomotor and cognitive impairment."}, {"term": "Cortical Silent Period", "category": "concussion", "def": "A TMS-measured const DB_NAME = "ares_acquire";
const DB_VERSION = 1;
function openDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, DB_VERSION); req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains("progress")) db.createObjectStore("progress", { keyPath: "id" }); }; req.onsuccess = (e) => resolve(e.target.result); req.onerror = (e) => reject(e.target.error); }); }
async function saveProgress(id, data) { try { const db = await openDB(); const tx = db.transaction("progress", "readwrite"); tx.objectStore("progress").put({ id, ...data, updatedAt: Date.now() }); } catch (e) {} }

function renderRich(text, keyPrefix) {
  const nodes = [];
  const re = /(\*\*[^*]+\*\*|\*[^*]+\*)/g;
  let last = 0, m, i = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) nodes.push(text.slice(last, m.index));
    const seg = m[0];
    if (seg.startsWith("**")) nodes.push(<strong key={keyPrefix + "-b" + i}>{seg.slice(2, -2)}</strong>);
    else nodes.push(<em key={keyPrefix + "-i" + i}>{seg.slice(1, -1)}</em>);
    last = m.index + seg.length; i++;
  }
  if (last < text.length) nodes.push(text.slice(last));
  return nodes;
}

function applyHighlights(root, highlights) {
  if (!root) return;
  root.querySelectorAll(".ares-mark").forEach(mark => { const parent = mark.parentNode; while (mark.firstChild) parent.insertBefore(mark.firstChild, mark); parent.removeChild(mark); if (parent.normalize) parent.normalize(); });
  if (!highlights || highlights.length === 0) return;
  const sorted = highlights.slice().sort((a, b) => (b.text || "").length - (a.text || "").length);
  sorted.forEach(h => {
    if (!h.text || h.text.length < 3) return;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, { acceptNode: (n) => { if (n.parentNode && n.parentNode.closest && n.parentNode.closest(".ares-mark")) return NodeFilter.FILTER_REJECT; return NodeFilter.FILTER_ACCEPT; } });
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(node => {
      const text = node.textContent;
      const idx = text.indexOf(h.text);
      if (idx === -1) return;
      const before = text.slice(0, idx);
      const match = text.slice(idx, idx + h.text.length);
      const after = text.slice(idx + h.text.length);
      const parent = node.parentNode;
      if (before) parent.insertBefore(document.createTextNode(before), node);
      const mark = document.createElement("mark");
      mark.className = "ares-mark";
      mark.textContent = match;
      mark.dataset.hlId = h.id;
      parent.insertBefore(mark, node);
      if (after) parent.insertBefore(document.createTextNode(after), node);
      parent.removeChild(node);
    });
  });
}

function Prose({ text, highlights }) {
  const ref = useRef(null);

function AudiobookBar({ chapter, segments }) {

  useEffect(() => { try { localStorage.setItem("ares_audio_rate", String(rate)); } catch (e) {} }, [rate]);

  useEffect(() => { if (supported) window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; }, [chapter && chapter.id]);

  useEffect(() => { if (status !== "playing" || !supported) return; isRestarting.current = true; window.speechSynthesis.cancel(); const t = setTimeout(() => { isRestarting.current = false; speakSeg(segIdxRef.current); }, 80); return () => clearTimeout(t); }, [rate, voiceURI]);
  const start = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(0); };
  const pauseResume = () => { if (!supported) return; if (status === "playing") { window.speechSynthesis.pause(); setStatus("paused"); } else if (status === "paused") { window.speechSynthesis.resume(); setStatus("playing"); } };
  const stop = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; };
  const skip = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.min(segments.length, segIdxRef.current + 1)); };
  const back = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.max(0, segIdxRef.current - 1)); };
  const jumpTo = (i) => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(i); };
  const dismissTip = () => { setTipDismissed(true); try { localStorage.setItem("ares_audio_tip_dismissed", "1"); } catch (e) {} };
  if (!supported || !segments || segments.length === 0) return null;
  const currentVoice = voices.find(v => v.voiceURI === voiceURI);

function HighlightActionPopup({ onHighlight, onNote }) {
  const [popup, setPopup] = useState(null);
  useEffect(() => {
    const handler = (e) => {
      if (e.target && e.target.closest && e.target.closest(".hl-popup")) return;
      setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) { setPopup(null); return; }
        const text = sel.toString().trim();
        if (text.length < 3 || text.length > 600) { setPopup(null); return; }
        const range = sel.getRangeAt(0);
        const container = range.commonAncestorContainer;
        const element = container.nodeType === 3 ? container.parentElement : container;
        if (!element || !element.closest(".prose")) { setPopup(null); return; }
        const rect = range.getBoundingClientRect();
        if (rect.width === 0) { setPopup(null); return; }
        setPopup({ text, x: rect.left + rect.width / 2, y: rect.top });
      }, 50);
    };
    const clear = () => setPopup(null);
    document.addEventListener("mouseup", handler);
    document.addEventListener("touchend", handler);
    document.addEventListener("scroll", clear, true);
    return () => { document.removeEventListener("mouseup", handler); document.removeEventListener("touchend", handler); document.removeEventListener("scroll", clear, true); };
  }, []);
  if (!popup) return null;
  return (<div className="hl-popup" style={{ left: popup.x, top: popup.y - 8 }}><button onClick={(e) => { e.stopPropagation(); onHighlight(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>★ Highlight</button><button onClick={(e) => { e.stopPropagation(); onNote(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>+ Note</button></div>);
}

function useChapterHighlights(chapterId) {
  const [highlights, setHighlights] = useState([]);
  useEffect(() => { try { const stored = localStorage.getItem("ares_hl_" + chapterId); setHighlights(stored ? JSON.parse(stored) : []); } catch (e) { setHighlights([]); } }, [chapterId]);
  const add = (text) => { const next = [...highlights, { id: Date.now() + Math.random(), text, ts: Date.now() }]; setHighlights(next); try { localStorage.setItem("ares_hl_" + chapterId, JSON.stringify(next)); } catch (e) {} };
  const remove = (id) => { const next = highlights.filter(h => h.id !== id); setHighlights(next); try { localStorage.setItem("ares_hl_" + chapterId, JSON.stringify(next)); } catch (e) {} };
  return [highlights, add, remove];
}

function useChapterNotes(chapterId) {
  const [notes, setNotes] = useState([]);
  useEffect(() => { try { const stored = localStorage.getItem("ares_notes_" + chapterId); setNotes(stored ? JSON.parse(stored) : []); } catch (e) { setNotes([]); } }, [chapterId]);
  const add = (note) => { const next = [{ id: Date.now() + Math.random(), ts: Date.now(), ...note }, ...notes]; setNotes(next); try { localStorage.setItem("ares_notes_" + chapterId, JSON.stringify(next)); } catch (e) {} };
  const remove = (id) => { const next = notes.filter(n => n.id !== id); setNotes(next); try { localStorage.setItem("ares_notes_" + chapterId, JSON.stringify(next)); } catch (e) {} };
  return [notes, add, remove];

// === Ch2 — Motor Program Library Builder ===
function MotorProgramLibrary() {
  const [variability, setVariability] = useState(70);
  const [feedback, setFeedback] = useState(75);
  const [volume, setVolume] = useState(60);

  // Library size grows with volume × feedback
  const librarySize = Math.round(volume * (0.4 + 0.6 * (feedback / 100)));
  // Recall schema range = variability × feedback (sweet spot at variability ~70)
  const variabilityCurve = Math.max(0, 1 - Math.pow((variability - 70) / 90, 2));
  const schemaRange = Math.round(variabilityCurve * (feedback / 100) * 100);
  // GMP fidelity scales with volume + feedback (less sensitive to variability)
  const gmpFidelity = Math.min(100, Math.round(((volume * 0.5) + (feedback * 0.5)) * (0.7 + variability/300)));
  // Retrieval interval (ms): lower = faster. Elite ~40 ms, untrained ~120 ms
  const retrievalMs = Math.max(40, Math.round(140 - (gmpFidelity * 0.6) - (schemaRange * 0.2)));

  // Visual: practice envelope diagram
  // Show a 2D plot — x axis = parameter range, blue dots = practiced points, shaded green = recall accuracy
  const W = 480, H = 160;
  const pad = { l: 40, r: 20, t: 20, b: 30 };
  // Practiced points cluster around center; spread with variability
  const points = [];
  const numPoints = Math.max(2, Math.round(volume / 8));
  for (let i = 0; i < numPoints; i++) {
    const norm = (Math.sin(i * 2.7) + 1) / 2;  // pseudo-random distribution
    const xNorm = 0.5 + (norm - 0.5) * (variability / 100);
    const x = pad.l + xNorm * (W - pad.l - pad.r);
    const y = pad.t + (H - pad.t - pad.b) * (0.3 + Math.cos(i * 1.7) * 0.2);
    points.push({ x, y });
  }
  // Recall accuracy band: width = schemaRange
  const bandHalf = (schemaRange / 100) * (W - pad.l - pad.r) / 2;
  const bandX = pad.l + (W - pad.l - pad.r) / 2 - bandHalf;
  const bandW = bandHalf * 2;

  const verdict = (() => {
    if (volume < 30) return { txt: "Insufficient exposure volume. Schemas need thousands of varied, feedback-rich reps to form. There is no shortcut — and the timeline is honest.", cls: "crit" };
    if (feedback < 30) return { txt: "Practice without outcome feedback automatizes the motor sequence but does not build schemas with predictive structure. The reps are happening; the learning is not.", cls: "crit" };
    if (variability < 30) return { txt: "Blocked, low-variability practice. The motor program will execute well in the practiced conditions and break under perturbation. The library is being built brittle.", cls: "warn" };
    if (variability > 90) return { txt: "Variability so high the brain can't extract the invariant. Pure noise produces no schema. The sweet spot sits around 60–80%.", cls: "warn" };
    if (gmpFidelity > 75 && schemaRange > 65) return { txt: "Library forming cleanly. GMP fidelity is high; recall schema covers a wide parameter range; retrieval is fast. This is what trained motor expertise looks like at this station.", cls: "good" };
    return { txt: "Moderate library development. Adjust the three knobs to find the conditions that produce both fidelity and range.", cls: "" };
  })();

  return (
    <div className="mpl-wrap">
      <div className="mpl-controls">
        <div className="mpl-ctrl">
          <div className="mpl-ctrl-label"><span>Practice variability</span><span className="val">{variability}%</span></div>
          <input type="range" min="0" max="100" value={variability} onChange={e => setVariability(parseInt(e.target.value))} />
          <div className="mpl-ctrl-sub">Surface variation with deep-structure consistency. Sweet spot ~60–80%. Too low = brittle; too high = noise.</div>
        </div>
        <div className="mpl-ctrl">
          <div className="mpl-ctrl-label"><span>Outcome feedback</span><span className="val">{feedback}%</span></div>
          <input type="range" min="0" max="100" value={feedback} onChange={e => setFeedback(parseInt(e.target.value))} />
          <div className="mpl-ctrl-sub">Quality of outcome signal after each rep. No feedback = no schema formation.</div>
        </div>
        <div className="mpl-ctrl">
          <div className="mpl-ctrl-label"><span>Exposure volume</span><span className="val">{volume}%</span></div>
          <input type="range" min="0" max="100" value={volume} onChange={e => setVolume(parseInt(e.target.value))} />
          <div className="mpl-ctrl-sub">Number of repetitions. Schemas need thousands; there is no shortcut.</div>
        </div>
      </div>
      <div className="mpl-stage">
        <div className="mpl-stage-h">Practice envelope · parameter coverage · recall schema accuracy band</div>
        <svg className="mpl-svg" viewBox={"0 0 " + W + " " + H} xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width={W} height={H} fill="#0D0A1A" />
          {/* Recall accuracy band */}
          <rect x={bandX} y={pad.t} width={bandW} height={H - pad.t - pad.b} fill="rgba(78,205,196,0.10)" stroke="rgba(78,205,196,0.40)" strokeWidth="1" strokeDasharray="3 3" />
          {/* x axis */}
          <line x1={pad.l} y1={H-pad.b} x2={W-pad.r} y2={H-pad.b} stroke="#3a3550" />
          <text x={pad.l} y={H-8} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">low param</text>
          <text x={W-pad.r} y={H-8} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif" textAnchor="end">high param</text>
          <text x="8" y={pad.t+8} fill="#4ECDC4" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">RECALL</text>
          {/* Practiced reps */}
          {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="4" fill="#E24B4A" opacity={Math.max(0.3, (feedback/100))} stroke="#fff" strokeWidth="0.5" />)}
          {/* Label */}
          <text x={W/2} y={pad.t-4} fill="#A099B8" fontSize="9" fontFamily="Inter, sans-serif" textAnchor="middle">red = practiced parameters · teal band = recall schema accurate range</text>
        </svg>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">GMP fidelity</div><div className={"mpl-stat-val " + (gmpFidelity > 75 ? "good" : gmpFidelity > 50 ? "warn" : "crit")}>{gmpFidelity}%</div><div className="mpl-stat-sub">Quality of the stored invariants — timing, force, sequence.</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Recall schema range</div><div className={"mpl-stat-val " + (schemaRange > 65 ? "good" : schemaRange > 40 ? "warn" : "crit")}>{schemaRange}%</div><div className="mpl-stat-sub">Parameter envelope where the schema interpolates accurately.</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Retrieval interval</div><div className={"mpl-stat-val " + (retrievalMs < 70 ? "good" : retrievalMs < 100 ? "warn" : "crit")}>{retrievalMs} ms</div><div className="mpl-stat-sub">Decision → motor program begins. Elite: 40–60 ms.</div></div>
      </div>
      <div className="mpl-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}
