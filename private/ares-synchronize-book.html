// Ch1 — The Weakest-Link Clock
function SyncClock() {
  const [a, setA] = useState(88), [r, setR] = useState(85), [e, setE] = useState(90), [align, setAlign] = useState(42);
  const compAvg = Math.round((a + r + e) / 3);
  const output = Math.round(compAvg * (0.2 + 0.8 * (align / 100)));
  const off = (100 - align) / 100 * 46; // pixel offset of converging arrows
  const cx = 150, cy = 95;
  const verdict = (() => {
    if (compAvg >= 80 && align < 40) return { txt: "Every component is elite — and the play still fails. This is the Component Optimization Fallacy made visible. The three streams are fast, but they do not converge in time.", cls: "hw" };
    if (align >= 80 && compAvg >= 75) return { txt: "Synchronized. The three streams converge on the target at the same moment. This is what integrated performance looks like — components on one clock.", cls: "good" };
    if (align >= 80 && compAvg < 60) return { txt: "Well-timed but under-powered. The clock is right; the components need work. Synchronization can't rescue a stage that isn't there.", cls: "warn" };
    return { txt: "Partial convergence. Raise temporal alignment and watch integrated output climb far faster than any single component slider can push it.", cls: "" };
  })();
  const vcol = verdict.cls === "good" ? "var(--teal)" : verdict.cls === "warn" ? "var(--gold)" : "var(--accent-glow)";
  return (
    <div className="mpl-wrap">
      <div className="mpl-controls">
        <Slider label="ACQUIRE quality" val={a} min={0} max={100} onChange={setA} fmt={v => v + "%"} />
        <Slider label="ROUTE quality" val={r} min={0} max={100} onChange={setR} fmt={v => v + "%"} />
        <Slider label="EXECUTE quality" val={e} min={0} max={100} onChange={setE} fmt={v => v + "%"} />
        <Slider label="Temporal alignment" val={align} min={0} max={100} onChange={setAlign} fmt={v => v + "%"} />
      </div>
      <div className="b4-svg-stage">
        <svg viewBox="0 0 300 150" className="mpl-svg" style={{ maxHeight: 190 }}>
          <circle cx={cx} cy={cy} r="30" fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="1.5" />
          <circle cx={cx} cy={cy} r="16" fill="none" stroke="rgba(255,255,255,0.28)" strokeWidth="1.5" />
          <circle cx={cx} cy={cy} r={Math.max(3, off / 2 + 3)} fill={align > 75 ? "var(--teal)" : "var(--gold)"} opacity="0.9" />
          {[{ x: 40, y: 20, c: "#8B6FC0", lab: "A" }, { x: 150, y: 12, c: "#6B4FA0", lab: "R" }, { x: 260, y: 20, c: "#E24B4A", lab: "E" }].map((s, i) => {
            const dx = (i - 1) * off;
            return (<g key={i}><line x1={s.x} y1={s.y} x2={cx + dx} y2={cy - 12} stroke={s.c} strokeWidth="2.5" opacity="0.85" /><circle cx={s.x} cy={s.y} r="10" fill={s.c} /><text x={s.x} y={s.y + 4} textAnchor="middle" fontSize="10" fontWeight="700" fill="#fff">{s.lab}</text></g>);
          })}
          <text x={cx} y={cy + 48} textAnchor="middle" fontSize="10" fill="var(--text-muted)">{align > 75 ? "streams converge on target" : "streams miss — arriving a beat apart"}</text>
        </svg>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">Component Average</div><div className="mpl-stat-val">{compAvg}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Temporal Alignment</div><div className={"mpl-stat-val " + (align >= 75 ? "good" : align >= 45 ? "warn" : "crit")}>{align}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Integrated Output</div><div className={"mpl-stat-val " + (output >= 75 ? "good" : output >= 50 ? "warn" : "crit")}>{output}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
      </div>
      <div className="b4-verdict" style={{ background: "rgba(34,20,97,0.4)", border: "1px solid " + vcol }}><span style={{ color: vcol, fontWeight: 700 }}>Verdict · </span>{verdict.txt}</div>
    </div>
  );
}

// Ch2 — Bayesian Cue Integration
function SensoryWeighting() {
  const presets = {
    "Daylight · firm ground": { v: 90, p: 82, b: 84 },
    "Rain · night · glare": { v: 34, p: 82, b: 80 },
    "Crowd noise · turf": { v: 82, p: 74, b: 80 }
  };
  const [preset, setPreset] = useState("Daylight · firm ground");
  const [v, setV] = useState(90), [p, setP] = useState(82), [b, setB] = useState(84);
  const apply = (name) => { const s = presets[name]; setPreset(name); setV(s.v); setP(s.p); setB(s.b); };
  const chans = [{ k: "Vision", r: v, c: "#8B6FC0" }, { k: "Proprioception", r: p, c: "#4ECDC4" }, { k: "Vestibular", r: b, c: "#D4A843" }];
  const inv = chans.map(c => 1 / Math.max(3, 105 - c.r));
  const sumInv = inv.reduce((x, y) => x + y, 0);
  const weights = inv.map(x => x / sumInv);
  const integVar = 1 / sumInv;
  const integRel = Math.round(100 - integVar);
  const bestSingle = Math.max(v, p, b);
  const dom = chans[weights.indexOf(Math.max(...weights))].k;
  const verdict = v < 50
    ? "Vision is degraded. The reliability-weighted system should now lean on proprioception and vestibular input — and in an expert it does. A novice keeps over-trusting the noisy visual channel and misjudges space."
    : "Vision is reliable and carries the most weight. Notice the integrated estimate is still more precise than any single channel — that superadditive gain is the whole point of fusing senses.";
  return (
    <div className="mpl-wrap">
      <div className="b4-preset-row">{Object.keys(presets).map(name => (<button key={name} className={"b4-preset " + (preset === name ? "active" : "")} onClick={() => apply(name)}>{name}</button>))}</div>
      <div className="mpl-controls">
        <Slider label="Visual reliability" val={v} min={5} max={100} onChange={x => { setV(x); setPreset(""); }} fmt={x => x + "%"} />
        <Slider label="Proprioceptive reliability" val={p} min={5} max={100} onChange={x => { setP(x); setPreset(""); }} fmt={x => x + "%"} />
        <Slider label="Vestibular reliability" val={b} min={5} max={100} onChange={x => { setB(x); setPreset(""); }} fmt={x => x + "%"} />
      </div>
      <div className="mpl-stage">
        <div className="mpl-stage-h">Optimal weights (Bayesian, ∝ 1/variance)</div>
        <div className="b4-bars">
          {chans.map((c, i) => (
            <div className="b4-bar-row" key={c.k}>
              <div className="b4-bar-name">{c.k}</div>
              <div className="b4-bar-track"><div className="b4-bar-fill" style={{ width: (weights[i] * 100) + "%", background: c.c }} /></div>
              <div className="b4-bar-val">{Math.round(weights[i] * 100)}%</div>
            </div>
          ))}
        </div>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">Dominant channel</div><div className="mpl-stat-val" style={{ fontSize: 18 }}>{dom}</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Best single channel</div><div className="mpl-stat-val warn">{bestSingle}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Integrated precision</div><div className="mpl-stat-val good">{integRel}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
      </div>
      <div className="mpl-note"><strong>Integrated precision beats every single channel.</strong> {verdict}</div>
    </div>
  );
}

// Ch4 — Theta-Gamma Coupling / working-memory slots
function Oscillations() {
  const [coupling, setCoupling] = useState(72), [items, setItems] = useState(4);
  const capacity = Math.max(1, Math.round((coupling / 100) * 7));
  const effective = Math.min(items, capacity);
  const W = 300, H = 120, mid = 66, amp = 30;
  const path = [];
  for (let x = 0; x <= W; x += 4) { const y = mid - amp * Math.sin((x / W) * Math.PI * 4); path.push((x === 0 ? "M" : "L") + x + " " + y.toFixed(1)); }
  const slots = [];
  for (let i = 0; i < items; i++) {
    const phase = (i + 0.5) / items;
    const x = phase * W;
    const y = mid - amp * Math.sin(phase * Math.PI * 4);
    const ok = i < capacity;
    slots.push({ x, y, ok, i });
  }
  const verdict = items <= capacity
    ? "All items sit in their own theta-phase slot. Working memory holds them cleanly — the quarterback keeps alignment, routes, and blitz reads separated and accessible."
    : "Load exceeds coupling capacity. The extra items bleed across phases (shown red), producing interference. Tighten coupling or reduce load — this is how fatigue and anxiety fragment decision-making.";
  return (
    <div className="mpl-wrap">
      <div className="mpl-controls">
        <Slider label="Theta-gamma coupling" val={coupling} min={10} max={100} onChange={setCoupling} fmt={x => x + "%"} />
        <Slider label="Items held in working memory" val={items} min={1} max={7} onChange={setItems} />
      </div>
      <div className="b4-svg-stage">
        <svg viewBox="0 0 300 120" className="mpl-svg" style={{ maxHeight: 170 }}>
          <path d={path.join(" ")} fill="none" stroke="rgba(139,111,192,0.55)" strokeWidth="2" />
          {slots.map(s => (
            <g key={s.i}>
              <line x1={s.x} y1={s.y} x2={s.x} y2={s.y - 26} stroke={s.ok ? "#4ECDC4" : "#E24B4A"} strokeWidth="2" opacity="0.7" />
              <circle cx={s.x} cy={s.y - 32} r="9" fill={s.ok ? "#4ECDC4" : "#E24B4A"} opacity={s.ok ? 0.95 : 0.85} />
              <text x={s.x} y={s.y - 28} textAnchor="middle" fontSize="9" fontWeight="700" fill="#0D0A1A">{s.i + 1}</text>
            </g>
          ))}
          <text x="6" y="112" fontSize="9" fill="var(--text-dim)">theta cycle → gamma bursts locked to phase = working-memory slots</text>
        </svg>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">Slot capacity</div><div className="mpl-stat-val">{capacity}</div><div className="mpl-stat-sub">rises with coupling tightness</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Items loaded</div><div className="mpl-stat-val">{items}</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Held cleanly</div><div className={"mpl-stat-val " + (items <= capacity ? "good" : "crit")}>{effective}<span style={{ fontSize: 13, color: "var(--text-muted)" }}> / {items}</span></div></div>
      </div>
      <div className="mpl-note">{verdict}</div>
    </div>
  );
}

// Ch5 — VOR gain & retinal slip
function VorGain() {
  const [gain, setGain] = useState(1.0), [vel, setVel] = useState(300);
  const slip = Math.round(Math.abs(1 - gain) * vel);
  const blur = Math.min(11, slip / 30);
  const status = slip < 20 ? { t: "Gaze locked — vision stable", c: "var(--teal)" } : slip < 80 ? { t: "Intermittent slip — acuity degrading", c: "var(--gold)" } : { t: "Vision offline during movement", c: "var(--red)" };
  const verdict = Math.abs(1 - gain) < 0.03
    ? "VOR gain near 1.0. The eyes exactly counter-rotate the head; the retinal image stays still even at high velocity. ACQUIRE stays online."
    : "Gain is off " + (Math.round(Math.abs(1 - gain) * 100)) + "%. At " + vel + "°/s the image slips " + slip + "°/s across the retina. Every head movement briefly takes the visual system offline — invisible to static acuity tests, measurable with dynamic visual acuity.";
  return (
    <div className="mpl-wrap">
      <div className="mpl-controls">
        <Slider label="VOR gain (eye ÷ head velocity)" val={gain} min={0.80} max={1.20} step={0.01} onChange={setGain} fmt={x => x.toFixed(2)} />
        <Slider label="Head angular velocity" val={vel} min={0} max={1000} step={10} onChange={setVel} fmt={x => x + "°/s"} />
      </div>
      <div className="b4-svg-stage" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 150 }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 62, fontWeight: 700, color: "#fff", filter: "blur(" + blur.toFixed(1) + "px)", letterSpacing: 6, transition: "filter .2s" }}>E</div>
          <div style={{ marginTop: 12, fontSize: 12, color: status.c, fontWeight: 700 }}>{status.t}</div>
        </div>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">Gain error</div><div className={"mpl-stat-val " + (Math.abs(1 - gain) < 0.03 ? "good" : Math.abs(1 - gain) < 0.08 ? "warn" : "crit")}>{Math.round(Math.abs(1 - gain) * 100)}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Retinal slip</div><div className={"mpl-stat-val " + (slip < 20 ? "good" : slip < 80 ? "warn" : "crit")}>{slip}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>°/s</span></div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Reflex latency</div><div className="mpl-stat-val" style={{ fontSize: 18 }}>10–15<span style={{ fontSize: 13, color: "var(--text-muted)" }}> ms</span></div></div>
      </div>
      <div className="mpl-note">{verdict}</div>
    </div>
  );
}

// Ch9 — Arousal & synchronization (inverted-U + neuromodulators)
function ArousalU() {
  const presets = { "Under-aroused": 24, "Calibrated": 55, "Over-aroused": 86 };
  const [ar, setAr] = useState(55);
  const gauss = (x, mu, sd) => Math.exp(-Math.pow((x - mu) / sd, 2));
  const sync = Math.round(100 * gauss(ar, 55, 26));
  const ne = Math.round(Math.min(100, ar * 1.05));
  const da = Math.round(100 * gauss(ar, 52, 30));
  const ach = Math.round(Math.min(100, 30 + ar * 0.7));
  const sig = Math.round(100 * gauss(ar, 50, 34));
  const W = 300, H = 90;
  const curve = [];
  for (let x = 0; x <= 100; x += 2) { const y = H - 8 - (H - 20) * gauss(x, 55, 26); curve.push((x === 0 ? "M" : "L") + (x / 100 * W).toFixed(1) + " " + y.toFixed(1)); }
  const mx = ar / 100 * W, my = H - 8 - (H - 20) * gauss(ar, 55, 26);
  const verdict = ar < 38 ? "Under-aroused. Signal-to-noise and decision drive are too low. The fix is up-regulation, not calming down — this athlete needs more noradrenergic drive."
    : ar > 74 ? "Over-aroused. Norepinephrine has narrowed attention to tunnel vision, working memory is shrinking, and the internal clock is running fast. Synchronization is fragmenting."
    : "Calibrated. All four neuromodulators sit in their moderate range and cross-regional synchronization is maximized. This is the 'clutch' configuration — trained, not innate.";
  const bars = [{ k: "Norepinephrine", v: ne, c: "#E24B4A" }, { k: "Dopamine", v: da, c: "#8B6FC0" }, { k: "Acetylcholine", v: ach, c: "#4ECDC4" }, { k: "Serotonin", v: sig, c: "#D4A843" }];
  return (
    <div className="mpl-wrap">
      <div className="b4-preset-row">{Object.keys(presets).map(n => (<button key={n} className={"b4-preset " + (ar === presets[n] ? "active" : "")} onClick={() => setAr(presets[n])}>{n}</button>))}</div>
      <div className="mpl-controls"><Slider label="Arousal level" val={ar} min={0} max={100} onChange={setAr} fmt={x => x + "%"} /></div>
      <div className="b4-svg-stage">
        <svg viewBox="0 0 300 90" className="mpl-svg" style={{ maxHeight: 130 }}>
          <path d={curve.join(" ")} fill="none" stroke="var(--accent-glow)" strokeWidth="2" />
          <line x1={mx} y1="6" x2={mx} y2="84" stroke="#fff" strokeWidth="1.5" strokeDasharray="3 3" opacity="0.7" />
          <circle cx={mx} cy={my} r="5" fill={sync > 75 ? "#4ECDC4" : sync > 45 ? "#D4A843" : "#E24B4A"} />
          <text x="4" y="86" fontSize="9" fill="var(--text-dim)">low arousal</text>
          <text x="248" y="86" fontSize="9" fill="var(--text-dim)">high arousal</text>
        </svg>
      </div>
      <div className="mpl-stage">
        <div className="mpl-stage-h">The four ascending neuromodulators</div>
        <div className="b4-bars">{bars.map(b => (<div className="b4-bar-row" key={b.k}><div className="b4-bar-name">{b.k}</div><div className="b4-bar-track"><div className="b4-bar-fill" style={{ width: b.v + "%", background: b.c }} /></div><div className="b4-bar-val">{b.v}</div></div>))}</div>
      </div>
      <div className="mpl-readout"><div className="mpl-stat" style={{ gridColumn: "1 / -1" }}><div className="mpl-stat-label">Synchronization quality</div><div className={"mpl-stat-val " + (sync > 75 ? "good" : sync > 45 ? "warn" : "crit")}>{sync}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div></div>
      <div className="mpl-note">{verdict}</div>
    </div>
  );
}

// Ch14 — The Concussion Cascade (cleared vs. synchronized)
function ConcussionCascade() {
  const presets = {
    "Acute (day 1)": { a: 68, r: 62, e: 58, cp: 78 },
    "Symptom-free / 'cleared'": { a: 18, r: 20, e: 17, cp: 56 },
    "Fully synchronized": { a: 8, r: 8, e: 8, cp: 12 }
  };
  const [pset, setPset] = useState("Symptom-free / 'cleared'");
  const [a, setA] = useState(18), [r, setR] = useState(20), [e, setE] = useState(17), [cp, setCp] = useState(56);
  const apply = (name) => { const s = presets[name]; setPset(name); setA(s.a); setR(s.r); setE(s.e); setCp(s.cp); };
  const ha = 100 - a, hr = 100 - r, he = 100 - e, align = 100 - cp;
  const compAvg = Math.round((ha + hr + he) / 3);
  const integrated = Math.round(compAvg * (0.2 + 0.8 * (align / 100)));
  const componentsPass = ha >= 78 && hr >= 78 && he >= 78;  // each isolated test near-normal
  const integrationOK = integrated >= 75;
  const phases = [{ k: "ACQUIRE", v: ha, c: "#8B6FC0" }, { k: "ROUTE", v: hr, c: "#6B4FA0" }, { k: "EXECUTE", v: he, c: "#E24B4A" }, { k: "Coupling", v: align, c: "#4ECDC4" }];
  let verdict, vcol;
  if (!componentsPass) { verdict = "Acute deficits still show on the component tests themselves. The athlete is visibly not recovered — this is the easy case to hold out."; vcol = "var(--red)"; }
  else if (!integrationOK) { verdict = "Cleared but not synchronized. Every isolated test passes — acuity, reaction time, single-task balance — yet integration under load is still failing. This is post-concussion residual desynchronization: the window where performance is down and re-injury risk is up, invisible to any test that looks at one system at a time."; vcol = "var(--gold)"; }
  else { verdict = "Synchronized. Components have recovered and, critically, so has the coupling between them. The systems are back on one clock — this is recovery, not just clearance."; vcol = "var(--teal)"; }
  return (
    <div className="mpl-wrap">
      <div className="b4-preset-row">{Object.keys(presets).map(n => (<button key={n} className={"b4-preset " + (pset === n ? "active" : "")} onClick={() => apply(n)}>{n}</button>))}</div>
      <div className="mpl-controls">
        <Slider label="ACQUIRE impairment" val={a} min={0} max={100} onChange={x => { setA(x); setPset(""); }} fmt={x => x + "%"} />
        <Slider label="ROUTE impairment" val={r} min={0} max={100} onChange={x => { setR(x); setPset(""); }} fmt={x => x + "%"} />
        <Slider label="EXECUTE impairment" val={e} min={0} max={100} onChange={x => { setE(x); setPset(""); }} fmt={x => x + "%"} />
        <Slider label="Coupling impairment (timing)" val={cp} min={0} max={100} onChange={x => { setCp(x); setPset(""); }} fmt={x => x + "%"} />
      </div>
      <div className="mpl-stage">
        <div className="mpl-stage-h">Remaining function by phase (and their coupling)</div>
        <div className="b4-bars">{phases.map(pz => (<div className="b4-bar-row" key={pz.k}><div className="b4-bar-name">{pz.k}</div><div className="b4-bar-track"><div className="b4-bar-fill" style={{ width: pz.v + "%", background: pz.c }} /></div><div className="b4-bar-val">{pz.v}%</div></div>))}</div>
      </div>
      <div className="mpl-readout">
        <div className="mpl-stat"><div className="mpl-stat-label">Component tests</div><div className={"mpl-stat-val " + (componentsPass ? "good" : "crit")} style={{ fontSize: 20 }}>{componentsPass ? "PASS" : "FAIL"}</div><div className="mpl-stat-sub">isolated, at rest</div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Integration under load</div><div className={"mpl-stat-val " + (integrationOK ? "good" : "crit")}>{integrated}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
        <div className="mpl-stat"><div className="mpl-stat-label">Status</div><div className="mpl-stat-val" style={{ fontSize: 15, color: vcol }}>{!componentsPass ? "Not cleared" : integrationOK ? "Recovered" : "Cleared, not synced"}</div></div>
      </div>
      <div className="b4-verdict" style={{ background: "rgba(34,20,97,0.4)", border: "1px solid " + vcol }}><span style={{ color: vcol, fontWeight: 700 }}>Verdict · </span>{verdict}</div>
    </div>
  );
}

function ConcussionEngine({ initialLens = "cascade", focus = "acquire" }) {
  const focusRegion = { acquire: "occipital", route: "prefrontal", execute: "motor", synchronize: "cerebellum" }[focus] || "occipital";
  const [sev, setSev] = useState("moderate");
  const [day, setDay] = useState(3);
  const [lens, setLens] = useState(initialLens);
  const [region, setRegion] = useState(focusRegion);
  const [vt, setVt] = useState({ glare: true, blur: true, double: true, wobble: true, contrast: true });
  const S = sev === "moderate" ? 1 : 0.6;
  const dcy = (tau, base) => Math.max(0, Math.min(100, Math.round(base * S * Math.exp(-day / tau))));

  // per-function impairment (0 healthy-ish .. 100 max) at current day
  const imp = {
    vision: dcy(10, 86), glare: dcy(7, 92), vestibular: dcy(14, 88), cognitive: dcy(12, 82),
    speech: dcy(9, 58), motor: dcy(18, 72), timing: dcy(16, 82), proprio: dcy(15, 76), coupling: dcy(26, 92)
  };

  // ---- metabolic curves (percent of normal, 0..160) ----
  const glut = d => 100 * S * Math.exp(-d / 1.6);
  const demand = d => 100 + 58 * S * Math.exp(-d / 1.6);
  const cbf = d => 100 - 34 * S * Math.exp(-d / 7);
  const calc = d => Math.max(0, 96 * S * (Math.exp(-d / 22) - Math.exp(-d / 1.4)));
  const phase = day <= 2
    ? { label: "Hyperacute · 0–2 days", col: "var(--red)", txt: "Indiscriminate glutamate release has thrown the ion gradients open — potassium floods out of neurons, calcium floods in. The sodium-potassium pumps run flat out to restore balance, and the brain's demand for glucose spikes." }
    : day <= 7
    ? { label: "Acute energy crisis · 2–7 days", col: "var(--gold)", txt: "Glucose demand is still elevated while cerebral blood flow has dropped — an energy deficit. Calcium inside the mitochondria is impairing energy production. This is the window of greatest metabolic vulnerability: a second impact now is disproportionately dangerous." }
    : day <= 21
    ? { label: "Recovery, hidden vulnerability · 1–3 weeks", col: "var(--accent-glow)", txt: "The energy crisis is resolving, but axonal function, neurotransmission, and — most of all — the coupling between systems lag behind. Symptoms fade before the physiology does." }
    : { label: "Resolution · 3+ weeks", col: "var(--teal)", txt: "Metabolic markers have largely normalized. Whatever deficit remains lives in integration under load — the last thing to return, and the reason 'cleared' can still mean 'not synchronized.'" };

  // ---- brain regions ----
  const regions = [
    { id: "prefrontal", x: 78, y: 96, r: 20, label: "Prefrontal Cortex", stage: "ROUTE", func: "Decision-making, processing speed, working memory, attention.", sym: "Slowed processing, poor working memory, reversion to slow conscious control — the ROUTE-stage deficit.", k: "cognitive" },
    { id: "motor", x: 150, y: 60, r: 17, label: "Primary Motor Cortex", stage: "EXECUTE", func: "The final cortical command to the muscles (Betz cells → corticospinal tract).", sym: "Slowed, less precise output; prolonged cortical silent period on TMS that outlasts symptoms.", k: "motor" },
    { id: "parietal", x: 205, y: 68, r: 17, label: "Parietal Cortex", stage: "SYNCHRONIZE", func: "Proprioception and the egocentric spatial map — where the body and objects are.", sym: "Degraded body sense and spatial awareness; the field 'doesn't feel right.'", k: "proprio" },
    { id: "occipital", x: 268, y: 104, r: 18, label: "Occipital / Visual Cortex", stage: "ACQUIRE", func: "Visual processing — acuity, contrast, motion.", sym: "Reduced contrast and processing speed; a dimmer, later picture even at 20/20.", k: "vision" },
    { id: "temporal", x: 118, y: 150, r: 16, label: "Temporal Lobe (Language)", stage: "ROUTE", func: "Speech, language, and verbal memory (Broca's & Wernicke's areas).", sym: "Word-finding difficulty, slowed or slurred speech, verbal-memory lapses.", k: "speech" },
    { id: "thalamus", x: 172, y: 116, r: 13, label: "Thalamus", stage: "ACQUIRE", func: "Sensory relay and gating — including light.", sym: "Photophobia (glare/light sensitivity) from thalamocortical hyperexcitability.", k: "glare" },
    { id: "cerebellum", x: 262, y: 168, r: 20, label: "Cerebellum", stage: "EXECUTE", func: "Timing, coordination, and the forward models that predict movement outcomes.", sym: "Dysmetria — movements a beat early or late; degraded online correction and timing.", k: "timing" },
    { id: "vestibular", x: 208, y: 190, r: 15, label: "Vestibular / Brainstem", stage: "SYNCHRONIZE", func: "Balance, the VOR (gaze stability), and the inertial reference frame.", sym: "Dizziness, gaze instability, retinal slip during head movement — the platform is shaky.", k: "vestibular" }
  ];
  const sel = regions.find(r => r.id === region) || regions[0];
  const heat = v => { // impairment -> color
    if (v >= 66) return "#E24B4A"; if (v >= 40) return "#D4A843"; if (v >= 18) return "#8B6FC0"; return "#3a3358";
  };

  // ---- loop lens ----
  const acqImp = Math.round((imp.vision + imp.glare + imp.vestibular) / 3);
  const rteImp = imp.cognitive, exeImp = Math.round((imp.motor + imp.timing) / 2), coupImp = imp.coupling;
  const ha = 100 - acqImp, hr = 100 - rteImp, he = 100 - exeImp, align = 100 - coupImp;
  const compAvg = Math.round((ha + hr + he) / 3);
  const integrated = Math.round(compAvg * (0.2 + 0.8 * (align / 100)));
  const compsPass = ha >= 78 && hr >= 78 && he >= 78;
  const integOK = integrated >= 75;
  // scan for cleared-but-not-synced window
  const win = [];
  for (let d = 0; d <= 45; d++) {
    const iv = k => Math.max(0, Math.min(100, Math.round(k.base * S * Math.exp(-d / k.tau))));
    const a = 100 - Math.round((iv({ tau: 10, base: 86 }) + iv({ tau: 7, base: 92 }) + iv({ tau: 14, base: 88 })) / 3);
    const r = 100 - iv({ tau: 12, base: 82 });
    const e = 100 - Math.round((iv({ tau: 18, base: 72 }) + iv({ tau: 16, base: 82 })) / 2);
    const al = 100 - iv({ tau: 26, base: 92 });
    const cAvg = (a + r + e) / 3, integ = cAvg * (0.2 + 0.8 * (al / 100));
    if (a >= 78 && r >= 78 && e >= 78 && integ < 75) win.push(d);
  }
  const winStart = win.length ? win[0] : null, winEnd = win.length ? win[win.length - 1] : null;

  const TABS = [
    { k: "cascade", ico: "⚡", lab: "Metabolic Cascade" },
    { k: "brain", ico: "🧠", lab: "Brain Map" },
    { k: "vision", ico: "👁", lab: "First-Person" },
    { k: "loop", ico: "◆", lab: "The Loop" }
  ];

  // scale helpers for cascade chart
  const CW = 360, CH = 170, x0 = 12, x1 = 350, y0 = 152, y1 = 12;
  const sx = d => x0 + (d / 45) * (x1 - x0);
  const sy = v => y0 - (v / 160) * (y0 - y1);
  const pathOf = fn => { let p = ""; for (let d = 0; d <= 45; d += 1) p += (d === 0 ? "M" : "L") + sx(d).toFixed(1) + " " + sy(fn(d)).toFixed(1); return p; };
  const gapPath = () => { // area between demand and cbf where demand>cbf
    let up = "", dn = ""; const pts = [];
    for (let d = 0; d <= 45; d += 1) { if (demand(d) > cbf(d)) pts.push(d); }
    if (!pts.length) return "";
    up = pts.map((d, i) => (i === 0 ? "M" : "L") + sx(d).toFixed(1) + " " + sy(demand(d)).toFixed(1)).join(" ");
    dn = pts.slice().reverse().map(d => "L" + sx(d).toFixed(1) + " " + sy(cbf(d)).toFixed(1)).join(" ");
    return up + " " + dn + " Z";
  };

  return (
    <div className="mpl-wrap">
      {/* severity + timeline */}
      <div className="b4-preset-row">
        {["mild", "moderate"].map(s => (<button key={s} className={"b4-preset " + (sev === s ? "active" : "")} onClick={() => setSev(s)}>{s === "mild" ? "Mild impact" : "Moderate impact"}</button>))}
      </div>
      <div className="ce-timeline">
        <div className="ce-tl-top">
          <div className="ce-tl-day">Day {day}<span> since impact</span></div>
          <div className="ce-tl-phase" style={{ color: phase.col, border: "1px solid " + phase.col, background: "rgba(0,0,0,0.2)" }}>{phase.label}</div>
        </div>
        <input type="range" min={0} max={45} value={day} onChange={e => setDay(parseInt(e.target.value))} />
        <div className="ce-tl-ticks"><span>impact</span><span>1 wk</span><span>2 wk</span><span>3 wk</span><span>6 wk</span></div>
      </div>

      <div className="ce-tabs">{TABS.map(t => (<button key={t.k} className={"ce-tab " + (lens === t.k ? "active" : "")} onClick={() => setLens(t.k)}><span>{t.ico}</span>{t.lab}</button>))}</div>

      {/* ---- CASCADE ---- */}
      {lens === "cascade" && (
        <div>
          <div className="b4-svg-stage">
            <svg viewBox={"0 0 " + CW + " " + CH} className="ce-svg" style={{ maxHeight: 220 }}>
              <line x1={x0} y1={sy(100)} x2={x1} y2={sy(100)} stroke="rgba(255,255,255,0.18)" strokeDasharray="3 3" strokeWidth="1" />
              <text x={x0 + 2} y={sy(100) - 3} fontSize="8" fill="var(--text-dim)">normal (100%)</text>
              <path d={gapPath()} fill="rgba(226,75,74,0.22)" stroke="none" />
              <path d={pathOf(cbf)} fill="none" stroke="#4ECDC4" strokeWidth="2" />
              <path d={pathOf(demand)} fill="none" stroke="#D4A843" strokeWidth="2" />
              <path d={pathOf(glut)} fill="none" stroke="#8B6FC0" strokeWidth="2" />
              <path d={pathOf(calc)} fill="none" stroke="#E24B4A" strokeWidth="2" strokeDasharray="4 2" />
              <line x1={sx(day)} y1={y1} x2={sx(day)} y2={y0} stroke="#fff" strokeWidth="1.5" opacity="0.7" />
              <circle cx={sx(day)} cy={sy(demand(day))} r="3.5" fill="#D4A843" />
              <circle cx={sx(day)} cy={sy(cbf(day))} r="3.5" fill="#4ECDC4" />
            </svg>
          </div>
          <div className="ce-legend">
            <span><i className="ce-swatch" style={{ background: "#8B6FC0" }} />Glutamate / ion flux</span>
            <span><i className="ce-swatch" style={{ background: "#D4A843" }} />Glucose demand</span>
            <span><i className="ce-swatch" style={{ background: "#4ECDC4" }} />Cerebral blood flow</span>
            <span><i className="ce-swatch" style={{ background: "#E24B4A" }} />Calcium / mito. stress</span>
            <span><i className="ce-swatch" style={{ background: "rgba(226,75,74,0.35)" }} />Energy crisis (the gap)</span>
          </div>
          <div className="mpl-note" style={{ marginTop: 14 }}><strong style={{ color: phase.col }}>{phase.label}. </strong>{phase.txt}</div>
        </div>
      )}

      {/* ---- BRAIN MAP ---- */}
      {lens === "brain" && (
        <div>
          <div className="b4-svg-stage">
            <svg viewBox="0 0 340 230" className="ce-svg" style={{ maxHeight: 260 }}>
              <ellipse cx="165" cy="108" rx="150" ry="84" fill="rgba(255,255,255,0.03)" stroke="var(--border)" strokeWidth="1.5" />
              <ellipse cx="262" cy="168" rx="42" ry="30" fill="rgba(255,255,255,0.03)" stroke="var(--border)" strokeWidth="1.5" />
              <rect x="196" y="182" width="18" height="34" rx="7" fill="rgba(255,255,255,0.03)" stroke="var(--border)" strokeWidth="1.5" />
              <text x="20" y="24" fontSize="9" fill="var(--text-dim)">stylized — front of brain at left</text>
              {regions.map(rg => {
                const v = imp[rg.k], on = rg.id === sel.id;
                return (
                  <g key={rg.id} className="ce-region" onClick={() => setRegion(rg.id)}>
                    <circle cx={rg.x} cy={rg.y} r={rg.r} fill={heat(v)} opacity={on ? 0.95 : 0.62} stroke={on ? "#fff" : "rgba(255,255,255,0.25)"} strokeWidth={on ? 2.5 : 1} />
                    <text x={rg.x} y={rg.y + 3} textAnchor="middle" fontSize="9" fontWeight="700" fill="#fff">{v}</text>
                  </g>
                );
              })}
            </svg>
          </div>
          <div className="ce-legend">
            <span><i className="ce-swatch" style={{ background: "#E24B4A" }} />severe</span>
            <span><i className="ce-swatch" style={{ background: "#D4A843" }} />moderate</span>
            <span><i className="ce-swatch" style={{ background: "#8B6FC0" }} />mild</span>
            <span><i className="ce-swatch" style={{ background: "#3a3358" }} />near-normal</span>
            <span style={{ color: "var(--text-dim)" }}>numbers = impairment at day {day}</span>
          </div>
          <div className="ce-detail">
            <div><span className="ce-detail-name">{sel.label}</span><span className="ce-detail-stage">{sel.stage}</span></div>
            <div className="ce-detail-k">Normally governs</div><div className="ce-detail-v">{sel.func}</div>
            <div className="ce-detail-k" style={{ color: "var(--gold)" }}>Concussion effect</div><div className="ce-detail-v">{sel.sym}</div>
            <div className="ce-detail-k" style={{ color: "var(--accent-glow)" }}>Impairment at day {day}</div><div className="ce-detail-v">{imp[sel.k]}% of maximum{imp[sel.k] < 18 ? " · largely resolved" : imp[sel.k] >= 66 ? " · severe" : ""}</div>
          </div>
        </div>
      )}

      {/* ---- FIRST-PERSON VISION ---- */}
      {lens === "vision" && (() => {
        const blurPx = vt.blur ? (imp.vision / 22) : 0;
        const sat = vt.contrast ? (100 - imp.vision * 0.6) : 100;
        const bright = vt.glare ? (100 + imp.glare * 0.4) : 100;
        const wob = vt.wobble ? (imp.vestibular / 26) : 0;
        const dv = vt.double ? (imp.vestibular / 6) : 0;
        const Scene = ({ dx, op }) => (
          <svg viewBox="0 0 360 196" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", transform: "translateX(" + dx + "px)", opacity: op }}>
            <defs><linearGradient id="cegrass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#2f7d46" /><stop offset="1" stopColor="#1c5730" /></linearGradient><linearGradient id="cesky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#243b57" /><stop offset="1" stopColor="#3d6089" /></linearGradient></defs>
            <rect x="0" y="0" width="360" height="86" fill="url(#cesky)" />
            <rect x="0" y="86" width="360" height="110" fill="url(#cegrass)" />
            <line x1="0" y1="86" x2="360" y2="86" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5" />
            <line x1="120" y1="196" x2="165" y2="86" stroke="rgba(255,255,255,0.35)" strokeWidth="2" />
            <line x1="360" y1="150" x2="205" y2="86" stroke="rgba(255,255,255,0.30)" strokeWidth="2" />
            <line x1="20" y1="150" x2="150" y2="86" stroke="rgba(255,255,255,0.30)" strokeWidth="2" />
            <circle cx="188" cy="120" r="20" fill="#fff" stroke="#d0d0d0" strokeWidth="1.5" />
            <path d="M170 118 q18 -10 36 0" fill="none" stroke="#c33" strokeWidth="1.5" />
            <path d="M170 124 q18 10 36 0" fill="none" stroke="#c33" strokeWidth="1.5" />
          </svg>
        );
        return (
          <div>
            <div className="ce-scene" style={{ ["--wx"]: wob.toFixed(2) + "px" }}>
              <div className="ce-scene-anim" style={{ animation: wob > 0.1 ? "ce-wobble 0.55s infinite" : "none", filter: "blur(" + blurPx.toFixed(1) + "px) saturate(" + sat + "%) brightness(" + bright + "%)" }}>
                <Scene dx={0} op={1} />
                {dv > 0.5 && <Scene dx={dv} op={0.45} />}
              </div>
              {vt.glare && imp.glare > 8 && <div className="ce-glare" style={{ opacity: Math.min(0.85, imp.glare / 120) }} />}
              <div className="ce-scene-cap">what the athlete sees · day {day}</div>
            </div>
            <div className="ce-vtoggles">
              {[["glare", "Glare / photophobia"], ["blur", "Blur"], ["double", "Double vision"], ["wobble", "Gaze instability (VOR)"], ["contrast", "Contrast loss"]].map(([k, lab]) => (
                <button key={k} className={"ce-vtog " + (vt[k] ? "on" : "")} onClick={() => setVt({ ...vt, [k]: !vt[k] })}>{vt[k] ? "● " : "○ "}{lab}</button>
              ))}
            </div>
            <div className="mpl-note" style={{ marginTop: 14 }}>Every effect here is tied to a real deficit and to the recovery timeline: glare to thalamic light-gating, blur and contrast to visual-cortex processing, double vision to convergence insufficiency, and the wobble to VOR gaze instability. Scrub the day slider — the picture clears as the systems recover, and the wobble (vestibular) is among the last to settle.</div>
          </div>
        );
      })()}

      {/* ---- THE LOOP ---- */}
      {lens === "loop" && (
        <div>
          <div className="mpl-stage">
            <div className="mpl-stage-h">Remaining function by stage at day {day}</div>
            <div className="b4-bars">
              {[{ k: "ACQUIRE", v: ha, c: "#8B6FC0" }, { k: "ROUTE", v: hr, c: "#6B4FA0" }, { k: "EXECUTE", v: he, c: "#E24B4A" }, { k: "Coupling", v: align, c: "#4ECDC4" }].map(p => (
                <div className="b4-bar-row" key={p.k}><div className="b4-bar-name">{p.k}</div><div className="b4-bar-track"><div className="b4-bar-fill" style={{ width: p.v + "%", background: p.c }} /></div><div className="b4-bar-val">{p.v}%</div></div>
              ))}
            </div>
          </div>
          <div className="mpl-readout">
            <div className="mpl-stat"><div className="mpl-stat-label">Component tests</div><div className={"mpl-stat-val " + (compsPass ? "good" : "crit")} style={{ fontSize: 20 }}>{compsPass ? "PASS" : "FAIL"}</div><div className="mpl-stat-sub">isolated, at rest</div></div>
            <div className="mpl-stat"><div className="mpl-stat-label">Integration under load</div><div className={"mpl-stat-val " + (integOK ? "good" : "crit")}>{integrated}<span style={{ fontSize: 13, color: "var(--text-muted)" }}>%</span></div></div>
            <div className="mpl-stat"><div className="mpl-stat-label">Status</div><div className="mpl-stat-val" style={{ fontSize: 15, color: !compsPass ? "var(--red)" : integOK ? "var(--teal)" : "var(--gold)" }}>{!compsPass ? "Not cleared" : integOK ? "Recovered" : "Cleared, not synced"}</div></div>
          </div>
          {winStart !== null && (
            <div style={{ marginTop: 14 }}>
              <div className="ems-label" style={{ marginBottom: 6 }}>The "cleared but not synchronized" window</div>
              <div style={{ position: "relative", height: 26, background: "var(--bg-surface)", border: "1px solid var(--border)", borderRadius: 6, overflow: "hidden" }}>
                <div style={{ position: "absolute", top: 0, bottom: 0, left: (winStart / 45 * 100) + "%", width: ((winEnd - winStart) / 45 * 100) + "%", background: "rgba(212,168,67,0.35)", borderLeft: "1px solid var(--gold)", borderRight: "1px solid var(--gold)" }} />
                <div style={{ position: "absolute", top: 0, bottom: 0, left: (day / 45 * 100) + "%", width: 2, background: "#fff" }} />
                <div style={{ position: "absolute", left: 6, top: 5, fontSize: 10, color: "var(--gold)", fontWeight: 700 }}>days {winStart}–{winEnd}: passes tests, still desynchronized</div>
              </div>
            </div>
          )}
          <div className="mpl-note" style={{ marginTop: 14 }}>Component tests recover first; the coupling recovers last. In the shaded window the athlete passes every isolated test yet is still desynchronized under load — the danger zone for reduced performance and re-injury. Drag the day slider into it.</div>
        </div>
      )}
    </div>
  );
}

INTERACTIVES.concEngineVision = function () { return <ConcussionEngine initialLens="vision" focus="acquire" />; };
INTERACTIVES.concEngineCognition = function () { return <ConcussionEngine initialLens="brain" focus="route" />; };
INTERACTIVES.concEngineMotor = function () { return <ConcussionEngine initialLens="brain" focus="execute" />; };
INTERACTIVES.concEngineLoop = function () { return <ConcussionEngine initialLens="loop" focus="synchronize" />; };


ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
