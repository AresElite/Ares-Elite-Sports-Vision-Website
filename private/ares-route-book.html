    .acc-opt-strength { font-size: 28px; font-weight: 700; color: #fff; }
    .acc-opt-sub { font-size: 10px; color: var(--text-muted); }
    .acc-conflict-bar { height: 14px; background: rgba(0,0,0,0.30); border-radius: 7px; overflow: hidden; margin: 8px 0 4px; }
    .acc-conflict-fill { height: 100%; transition: width 0.3s; }
  `;
  document.head.appendChild(_sd);
}

// === Ch7 — IT Pattern Matcher ===
function ITMatcher() {
  const [librarySize, setLibrarySize] = useState(70);  // 0..100 = # of stored expert templates
  const [sceneComplexity, setSceneComplexity] = useState(50); // 0..100
  const [verbalInterference, setVerbalInterference] = useState(0); // 0..100

  // Compute IT matching latency
  // Base latency ~100 ms for an elite match
  // Library size: small library → no good matches → slower (need ventral confirmation)
  // Scene complexity: more cues to disambiguate = slower
  // Verbal interference: forces conceptual mode = much slower
  const libraryBonus = Math.max(0, (librarySize - 30)) * 1.5;  // larger library = faster matching
  const complexityCost = sceneComplexity * 1.2;
  const verbalCost = verbalInterference * 2.4;
  const latency = Math.max(80, Math.round(280 - libraryBonus + complexityCost + verbalCost));

  // Confidence
  const confidence = Math.max(0, Math.min(100, librarySize - sceneComplexity * 0.4 - verbalInterference * 0.6));

  // Scene tiles: show 16 tiles, highlight matched ones
  const tiles = Array.from({ length: 16 }, (_, i) => i);
  const matchCount = Math.max(1, Math.round((librarySize / 100) * (1 - verbalInterference/200) * 5));
  const candidateCount = Math.max(0, Math.round((sceneComplexity / 100) * 4));

  const verdict = (() => {
    if (verbalInterference > 60) return { txt: "Verbal interference is dominant. IT is forced into slow conceptual mode — this is what 'overthinking' looks like at the recognition stage.", cls: "crit" };
    if (librarySize < 30) return { txt: "Schema poverty: no strong templates to retrieve. IT defaults to slow feature-by-feature analysis. Common in young or transitioning athletes.", cls: "crit" };
    if (latency < 130 && confidence > 75) return { txt: "Elite IT engagement: strong library, clean signal, automatic match. This is what 'reading the game' looks like.", cls: "good" };
    if (latency < 180) return { txt: "Solid IT performance. Match returns quickly with reasonable confidence.", cls: "warn" };
    return { txt: "Moderate IT performance. Adjust library size, scene complexity, and verbal interference to see how each affects matching.", cls: "" };
  })();

  return (
    <div className="it-wrap">
      <div className="it-controls">
        <div className="it-ctrl"><div className="it-ctrl-label"><span>Schema library size</span><span className="val">{librarySize}%</span></div><input type="range" min="0" max="100" value={librarySize} onChange={e => setLibrarySize(parseInt(e.target.value))} /><div className="it-ctrl-sub">How many sport-specific templates IT has access to. Built by years of context-rich exposure.</div></div>
        <div className="it-ctrl"><div className="it-ctrl-label"><span>Scene complexity</span><span className="val">{sceneComplexity}%</span></div><input type="range" min="0" max="100" value={sceneComplexity} onChange={e => setSceneComplexity(parseInt(e.target.value))} /><div className="it-ctrl-sub">More competing cues to disambiguate slows the match.</div></div>
        <div className="it-ctrl"><div className="it-ctrl-label"><span>Verbal interference</span><span className="val">{verbalInterference}%</span></div><input type="range" min="0" max="100" value={verbalInterference} onChange={e => setVerbalInterference(parseInt(e.target.value))} /><div className="it-ctrl-sub">Coaching cues during execution push IT out of fast matching into slow conceptual analysis.</div></div>
      </div>
      <div className="it-stage">
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:8}}>SCENE · IT scanning for matches</div>
        <div className="it-scene-grid">
          {tiles.map(i => {
            const isMatch = i < matchCount;
            const isCandidate = i >= matchCount && i < matchCount + candidateCount;
            const icons = ["⚽","🏀","🏈","🥅","🎾","🏒","⚾","🥍","🏐","🏓","🎯","⛳","🎱","🏸","🥊","🤺"];
            return <div key={i} className={"it-tile " + (isMatch ? "match" : isCandidate ? "candidate" : "")}>{icons[i]}</div>;
          })}
        </div>
        <div style={{fontSize:10,color:"var(--text-muted)",textAlign:"center"}}>
          <span style={{color:"var(--teal)"}}>● Match returned</span> &nbsp;·&nbsp; <span style={{color:"var(--gold)"}}>● Candidate (slower confirmation)</span>
        </div>
      </div>
      <div className="it-readout">
        <div className="it-stat"><div className="it-stat-label">Match latency</div><div className={"it-stat-val " + (latency < 130 ? "good" : latency < 200 ? "warn" : "crit")}>{latency} ms</div><div className="it-stat-sub">Elite range: 100–150 ms. Above 250 ms = slow conceptual mode.</div></div>
        <div className="it-stat"><div className="it-stat-label">Match confidence</div><div className={"it-stat-val " + (confidence > 70 ? "good" : confidence > 40 ? "warn" : "crit")}>{Math.round(confidence)}%</div><div className="it-stat-sub">High confidence = single clean match, low ACC cost downstream.</div></div>
        <div className="it-stat"><div className="it-stat-label">Active candidates</div><div className={"it-stat-val " + (candidateCount === 0 ? "good" : candidateCount < 3 ? "warn" : "crit")}>{matchCount + candidateCount}</div><div className="it-stat-sub">More candidates = more downstream ACC conflict to resolve.</div></div>
      </div>
      <div className="it-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch8 — Schema Library Builder ===
function SchemaLib() {
  const [variability, setVariability] = useState(70);
  const [feedback, setFeedback] = useState(80);
  const [difficulty, setDifficulty] = useState(75);  // 0..100, sweet spot 70-85
  const [reps, setReps] = useState(60);              // 0..100

  // Library quality = product of all four (with difficulty being a sweet-spot function)
  const difficultySweetSpot = 1 - Math.pow((difficulty - 78) / 50, 2);
  const dEffective = Math.max(0, difficultySweetSpot);
  const librarySize = Math.round(reps * (0.3 + 0.7 * (variability/100)) * (0.4 + 0.6 * (feedback/100)));
  const schemaSpecificity = Math.round((feedback / 100) * (1 - Math.pow((variability - 60)/80, 2)) * 100);
  const retrievalSpeed = Math.max(50, Math.round(300 - (librarySize * 2) - (feedback / 2)));
  const transferReliability = Math.round(((variability/100) * 60) + ((feedback/100) * 25) + (dEffective * 15));

  const verdict = (() => {
    if (reps < 30) return { txt: "Insufficient exposure volume. Even with perfect conditions, schemas need massed reps to form.", cls: "crit" };
    if (feedback < 30) return { txt: "Practice without outcome feedback produces motor automatization but doesn't build predictive schemas. The athlete repeats motions without learning patterns.", cls: "crit" };
    if (variability < 30) return { txt: "Low variability: the brain memorizes specific instances rather than extracting transferable patterns. Looks great in practice, fails in the game.", cls: "crit" };
    if (difficulty < 50 || difficulty > 90) return { txt: "Outside the challenge-point window (70–85%). Too easy = no new schemas formed; too hard = no consistent pattern to extract.", cls: "warn" };
    if (transferReliability > 75 && librarySize > 50) return { txt: "Schema library forming cleanly. Variability + feedback + challenge-point + volume — all four conditions met.", cls: "good" };
    return { txt: "Moderate schema formation. Adjust the four conditions to find the sweet spot.", cls: "" };
  })();

  return (
    <div className="sl-wrap">
      <div className="sl-controls">
        <div className="sl-ctrl"><div className="sl-ctrl-label"><span>Practice variability</span><span className="val">{variability}%</span></div><input type="range" min="0" max="100" value={variability} onChange={e => setVariability(parseInt(e.target.value))} /><div className="sl-ctrl-sub">Surface variability with deep-structure consistency. Too little = memorization; too much = noise.</div></div>
        <div className="sl-ctrl"><div className="sl-ctrl-label"><span>Outcome feedback quality</span><span className="val">{feedback}%</span></div><input type="range" min="0" max="100" value={feedback} onChange={e => setFeedback(parseInt(e.target.value))} /><div className="sl-ctrl-sub">Schemas form around outcomes. No feedback = no predictive structure.</div></div>
        <div className="sl-ctrl"><div className="sl-ctrl-label"><span>Difficulty (challenge point)</span><span className="val">{difficulty}%</span></div><input type="range" min="0" max="100" value={difficulty} onChange={e => setDifficulty(parseInt(e.target.value))} /><div className="sl-ctrl-sub">Sweet spot: 70–85% success rate. Too easy or too hard kills schema formation.</div></div>
        <div className="sl-ctrl"><div className="sl-ctrl-label"><span>Exposure volume</span><span className="val">{reps}%</span></div><input type="range" min="0" max="100" value={reps} onChange={e => setReps(parseInt(e.target.value))} /><div className="sl-ctrl-sub">Schemas need thousands of reps to form. There is no shortcut.</div></div>
      </div>
      <div className="sl-stage">
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:10}}>SCHEMA LIBRARY · current state</div>
        <div className="sl-row"><div className="sl-row-label">Library size</div><div className="sl-row-bar"><div className="sl-row-fill" style={{width: Math.min(100, librarySize) + "%"}} /></div><div className="sl-row-val">{librarySize}</div></div>
        <div className="sl-row"><div className="sl-row-label">Schema specificity</div><div className="sl-row-bar"><div className="sl-row-fill" style={{width: Math.max(0, schemaSpecificity) + "%"}} /></div><div className="sl-row-val">{Math.max(0, schemaSpecificity)}</div></div>
        <div className="sl-row"><div className="sl-row-label">Transfer reliability</div><div className="sl-row-bar"><div className="sl-row-fill" style={{width: transferReliability + "%"}} /></div><div className="sl-row-val">{transferReliability}</div></div>
      </div>
      <div className="sl-readout">
        <div className="sl-stat"><div className="sl-stat-label">Retrieval speed</div><div className={"sl-stat-val " + (retrievalSpeed < 150 ? "good" : retrievalSpeed < 220 ? "warn" : "crit")}>{retrievalSpeed} ms</div><div className="sl-stat-sub">Elite range 100–150 ms.</div></div>
        <div className="sl-stat"><div className="sl-stat-label">Game transfer</div><div className={"sl-stat-val " + (transferReliability > 75 ? "good" : transferReliability > 50 ? "warn" : "crit")}>{transferReliability}%</div><div className="sl-stat-sub">Probability practice schemas survive game-context.</div></div>
        <div className="sl-stat"><div className="sl-stat-label">Library count</div><div className={"sl-stat-val " + (librarySize > 50 ? "good" : librarySize > 25 ? "warn" : "crit")}>{librarySize}</div><div className="sl-stat-sub">Of 100 possible templates for this sport.</div></div>
      </div>
      <div className="sl-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch9 — Cerebellar Forward Model ===
function CerebellumModel() {
  const [trainingReps, setTrainingReps] = useState(60);  // 0..100, simulated training maturity
  const [domainSpecificity, setDomainSpecificity] = useState(80); // 0..100, how matched to current sport
  const [noise, setNoise] = useState(20); // 0..100, sensory noise / disuse / post-concussion

  // Prediction error compounds with training (lower=better)
  const baseError = 50;
  const trainingReduction = (trainingReps / 100) * 40;
  const domainPenalty = (1 - domainSpecificity / 100) * 25;
  const noisePenalty = (noise / 100) * 30;
  const predictionError = Math.max(2, Math.round(baseError - trainingReduction + domainPenalty + noisePenalty));

  const timingPrecision = Math.max(0, Math.round(100 - predictionError - noise * 0.3));

  // Draw a learning curve: error over time given current settings
  const W = 480, H = 140;
  const points = [];
  for (let r = 0; r <= 100; r += 4) {
    const tred = (r / 100) * 40;
    const err = Math.max(2, baseError - tred + domainPenalty + noisePenalty);
    const x = 30 + (r / 100) * (W - 60);
    const y = H - 20 - (err / 80) * (H - 40);
    points.push(`${x},${y}`);
  }
  const curPathX = 30 + (trainingReps / 100) * (W - 60);
  const curPathY = H - 20 - (predictionError / 80) * (H - 40);

  const verdict = (() => {
    if (noise > 60) return { txt: "High noise — concussion / disuse signature. Forward models can't refine when the input is corrupted.", cls: "crit" };
    if (domainSpecificity < 40) return { txt: "Cross-sport context. The forward model is partially mistuned for this domain — even well-trained athletes look novice when the kinematics change.", cls: "warn" };
    if (predictionError < 15 && trainingReps > 70) return { txt: "Forward model converged. This is what 'knowing where the puck will be' feels like — not magic, just a refined cerebellar simulation.", cls: "good" };
    return { txt: "Model still refining. The cerebellum learns from prediction errors via climbing-fiber signals — every rep is a tiny weight update.", cls: "" };
  })();

  return (
    <div className="cb-wrap">
      <div className="cb-controls">
        <div className="cb-ctrl"><div className="cb-ctrl-label"><span>Training reps</span><span className="val">{trainingReps}%</span></div><input type="range" min="0" max="100" value={trainingReps} onChange={e => setTrainingReps(parseInt(e.target.value))} /><div className="cb-ctrl-sub">Thousands of sport-specific reps refine the forward model.</div></div>
        <div className="cb-ctrl"><div className="cb-ctrl-label"><span>Domain specificity</span><span className="val">{domainSpecificity}%</span></div><input type="range" min="0" max="100" value={domainSpecificity} onChange={e => setDomainSpecificity(parseInt(e.target.value))} /><div className="cb-ctrl-sub">How matched the trained context is to the current task. Cross-sport transfer is poor.</div></div>
        <div className="cb-ctrl"><div className="cb-ctrl-label"><span>Sensory noise / disuse</span><span className="val">{noise}%</span></div><input type="range" min="0" max="100" value={noise} onChange={e => setNoise(parseInt(e.target.value))} /><div className="cb-ctrl-sub">Concussion, layoff, or sensory degradation noise-out the learning signal.</div></div>
      </div>
      <div className="cb-stage">
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:8}}>FORWARD MODEL · prediction error vs. training reps</div>
        <svg className="cb-chart" viewBox={"0 0 " + W + " " + H} xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width={W} height={H} fill="#0D0A1A" />
          {/* axes */}
          <line x1="30" y1="20" x2="30" y2={H-20} stroke="#3a3550" />
          <line x1="30" y1={H-20} x2={W-30} y2={H-20} stroke="#3a3550" />
          <text x="6" y="24" fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">err</text>
          <text x={W-28} y={H-6} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">reps</text>
          {/* learning curve */}
          <polyline points={points.join(" ")} fill="none" stroke="#8B6FC0" strokeWidth="2" />
          {/* current state */}
          <circle cx={curPathX} cy={curPathY} r="6" fill="#4ECDC4" stroke="#fff" strokeWidth="2" />
          <text x={curPathX} y={curPathY - 12} textAnchor="middle" fill="#4ECDC4" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">you are here</text>
        </svg>
      </div>
      <div className="cb-readout">
        <div className="cb-stat"><div className="cb-stat-label">Prediction error</div><div className={"cb-stat-val " + (predictionError < 15 ? "good" : predictionError < 30 ? "warn" : "crit")}>{predictionError}%</div><div className="cb-stat-sub">Lower = the cerebellum's prediction matches what actually happens.</div></div>
        <div className="cb-stat"><div className="cb-stat-label">Timing precision</div><div className={"cb-stat-val " + (timingPrecision > 70 ? "good" : timingPrecision > 50 ? "warn" : "crit")}>{timingPrecision}%</div><div className="cb-stat-sub">Cerebellar clock accuracy for sequence timing.</div></div>
        <div className="cb-stat"><div className="cb-stat-label">Anticipation lead</div><div className={"cb-stat-val " + (predictionError < 15 ? "good" : "warn")}>{Math.max(50, Math.round(300 - predictionError * 4))} ms</div><div className="cb-stat-sub">How far ahead the model can reliably project.</div></div>
      </div>
      <div className="cb-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch10 — ACC Conflict Cost ===
function ACCConflict() {
  const [optA, setOptA] = useState(75);
  const [optB, setOptB] = useState(65);
  const [schemaCleanness, setSchemaCleanness] = useState(70);  // upstream signal quality
  const [pressure, setPressure] = useState(30);

  // Conflict signal: high when the two options are close in evidence
  const gap = Math.abs(optA - optB);
  const baseConflict = Math.max(0, 100 - gap * 4);
  // Pressure amplifies conflict
  const pressureAmp = (pressure / 100) * 30;
  // Clean upstream reduces effective conflict
  const cleanReduction = (schemaCleanness / 100) * 25;
  const conflictSignal = Math.max(0, Math.min(100, baseConflict + pressureAmp - cleanReduction));

  // Decision latency cost
  const baseLatency = 180;
  const conflictCost = (conflictSignal / 100) * 180;
  const latency = Math.round(baseLatency + conflictCost);

  const winner = optA > optB ? "A" : optB > optA ? "B" : "tie";

  const verdict = (() => {
    if (conflictSignal > 70 && pressure > 60) return { txt: "Pressure-amplified conflict lock. The athlete freezes — schemas can't converge cleanly under arousal. Treat upstream, not the freeze.", cls: "crit" };
    if (conflictSignal > 60) return { txt: "High ACC conflict cost. Two options are too close in evidence — arbitration adds 100+ ms. Upstream schema work is the fix.", cls: "crit" };
    if (gap > 25 && schemaCleanness > 70) return { txt: "Clean read: ACC pays almost no conflict cost. This is what elite expertise looks like at this station — not a faster ACC, a cleaner upstream pipeline.", cls: "good" };
    return { txt: "Moderate conflict cost. Adjust the option strengths, upstream cleanness, and pressure to see how each shifts the latency.", cls: "" };
  })();

  return (
    <div className="acc-wrap">
      <div className="acc-controls">
        <div className="acc-ctrl"><div className="acc-ctrl-label"><span>Option A strength</span><span className="val">{optA}%</span></div><input type="range" min="0" max="100" value={optA} onChange={e => setOptA(parseInt(e.target.value))} /><div className="acc-ctrl-sub">Evidence weight for option A from the schema library.</div></div>
        <div className="acc-ctrl"><div className="acc-ctrl-label"><span>Option B strength</span><span className="val">{optB}%</span></div><input type="range" min="0" max="100" value={optB} onChange={e => setOptB(parseInt(e.target.value))} /><div className="acc-ctrl-sub">Evidence weight for option B. Close to A = max conflict.</div></div>
        <div className="acc-ctrl"><div className="acc-ctrl-label"><span>Upstream pipeline cleanness</span><span className="val">{schemaCleanness}%</span></div><input type="range" min="0" max="100" value={schemaCleanness} onChange={e => setSchemaCleanness(parseInt(e.target.value))} /><div className="acc-ctrl-sub">Clean schemas + good prediction reduce what the ACC has to arbitrate.</div></div>
        <div className="acc-ctrl"><div className="acc-ctrl-label"><span>Pressure / arousal</span><span className="val">{pressure}%</span></div><input type="range" min="0" max="100" value={pressure} onChange={e => setPressure(parseInt(e.target.value))} /><div className="acc-ctrl-sub">High pressure amplifies conflict via amygdala input.</div></div>
      </div>
      <div className="acc-stage">
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:8}}>ACC ARBITRATION · competing options</div>
        <div className="acc-options">
          <div className={"acc-opt " + (winner === "A" ? "winner" : "")}><div className="acc-opt-label">Option A</div><div className="acc-opt-strength">{optA}</div><div className="acc-opt-sub">evidence weight</div></div>
          <div className={"acc-opt " + (winner === "B" ? "winner" : "")}><div className="acc-opt-label">Option B</div><div className="acc-opt-strength">{optB}</div><div className="acc-opt-sub">evidence weight</div></div>
        </div>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text-muted)",marginBottom:4}}>Conflict signal magnitude</div>
        <div className="acc-conflict-bar"><div className="acc-conflict-fill" style={{width: conflictSignal + "%", background: conflictSignal > 60 ? "linear-gradient(90deg, var(--red), var(--gold))" : conflictSignal > 30 ? "linear-gradient(90deg, var(--gold), var(--accent-glow))" : "linear-gradient(90deg, var(--accent-glow), var(--teal))"}} /></div>
        <div style={{fontSize:10,color:"var(--text-muted)",textAlign:"right"}}>{Math.round(conflictSignal)}/100</div>
      </div>
      <div className="acc-readout">
        <div className="acc-stat"><div className="acc-stat-label">ACC conflict cost</div><div className={"acc-stat-val " + (conflictSignal < 20 ? "good" : conflictSignal < 50 ? "warn" : "crit")}>{Math.round(conflictCost)} ms</div><div className="acc-stat-sub">Extra latency added by arbitration alone.</div></div>
        <div className="acc-stat"><div className="acc-stat-label">Total decision latency</div><div className={"acc-stat-val " + (latency < 220 ? "good" : latency < 300 ? "warn" : "crit")}>{latency} ms</div><div className="acc-stat-sub">Baseline 180 ms + conflict cost.</div></div>
        <div className="acc-stat"><div className="acc-stat-label">Selected option</div><div className="acc-stat-val">{winner}</div><div className="acc-stat-sub">DLPFC commits to the higher-weighted option once arbitration completes.</div></div>
      </div>
      <div className="acc-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch11 — DLPFC Decision-Release Ramp ===
function DLPFCRamp() {
  const [wmLoad, setWmLoad] = useState(30);          // 0..100, higher = more burden on WM
  const [schemaCompression, setSchemaCompression] = useState(80); // 0..100, higher = more pre-processed
  const [threshold, setThreshold] = useState(60);    // 0..100, higher = more cautious
  const [reinvestment, setReinvestment] = useState(15); // 0..100, higher = more conscious deliberation
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);       // 0..1, the ramp's current accumulation
  const [released, setReleased] = useState(false);
  const [releaseAt, setReleaseAt] = useState(null);
  const animRef = useRef(null);
  const startRef = useRef(0);

  // Effective slope: high schema compression + low WM load + low reinvestment = steep ramp
  const slope = Math.max(0.05,
    0.30 * (schemaCompression / 100)
    - 0.18 * (wmLoad / 100)
    - 0.22 * (reinvestment / 100)
    + 0.12 // baseline
  );
  // Threshold height: user-set caution
  const thHeight = 0.30 + (threshold / 100) * 0.50; // 0.30 to 0.80
  // Time to threshold (sec) = thHeight / slope; convert to ms
  const idealReleaseMs = Math.round((thHeight / slope) * 1000);

  const start = () => {
    if (running) return;
    setProgress(0); setReleased(false); setReleaseAt(null); setRunning(true);
    startRef.current = performance.now();
    const tick = (now) => {
      const elapsed = (now - startRef.current) / 1000; // seconds
      const accum = Math.min(1, elapsed * slope);
      setProgress(accum);
      if (accum >= thHeight) {
        setReleased(true);
        setReleaseAt(Math.round(elapsed * 1000));
        setRunning(false);
        return;
      }
      if (elapsed > 2.2) {
        // Failed to release within 2.2 s (timeout)
        setRunning(false);
        setReleased(false);
        setReleaseAt(null);
        return;
      }
      animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
  };
  const reset = () => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    setRunning(false); setProgress(0); setReleased(false); setReleaseAt(null);
  };
  useEffect(() => () => { if (animRef.current) cancelAnimationFrame(animRef.current); }, []);
  useEffect(() => { reset(); }, [wmLoad, schemaCompression, threshold, reinvestment]);

  const W = 560, H = 220;
  const pad = { l: 40, r: 20, t: 20, b: 30 };
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  // Project a 2.2 s window
  const winSec = 2.2;
  // Sample the ramp at the current state
  // Draw history line based on progress
  const accumNow = progress;
  const elapsedSec = accumNow / slope;
  const pts = [];
  const STEP = 0.02;
  for (let t = 0; t <= elapsedSec + 0.001; t += STEP) {
    const v = Math.min(1, t * slope);
    const x = pad.l + (t / winSec) * chartW;
    const y = pad.t + chartH - v * chartH;
    pts.push(`${x},${y}`);
  }
  const thresholdY = pad.t + chartH - thHeight * chartH;

  // Verdict
  const verdict = (() => {
    if (reinvestment > 60) return { txt: "Reinvestment dominant: the DLPFC is doing conscious work that should have been pre-processed upstream. This is the canonical choke pattern — under pressure, automatic schemas collapse into slow deliberation.", cls: "crit" };
    if (wmLoad > 70 && schemaCompression < 40) return { txt: "Working memory overload + thin schema compression. The DLPFC has too much to integrate from scratch. Decision is slow regardless of effort.", cls: "crit" };
    if (idealReleaseMs < 180 && schemaCompression > 70) return { txt: "Elite operating point. The schema library, predictions, and attention have done the work upstream — the DLPFC just integrates and releases.", cls: "good" };
    if (idealReleaseMs < 260) return { txt: "Solid DLPFC integration. Decision releases promptly with reasonable caution.", cls: "warn" };
    return { txt: "Adjust the sliders. Watch how the slope steepens when schemas have compressed the work — and how the threshold changes the time-to-release.", cls: "" };
  })();

  return (
    <div className="dl-wrap">
      <div className="dl-controls">
        <div className="dl-ctrl"><div className="dl-ctrl-label"><span>Working memory load</span><span className="val">{wmLoad}%</span></div><input type="range" min="0" max="100" value={wmLoad} onChange={e => setWmLoad(parseInt(e.target.value))} /><div className="dl-ctrl-sub">How much the DLPFC has to hold in mind right now.</div></div>
        <div className="dl-ctrl"><div className="dl-ctrl-label"><span>Schema compression</span><span className="val">{schemaCompression}%</span></div><input type="range" min="0" max="100" value={schemaCompression} onChange={e => setSchemaCompression(parseInt(e.target.value))} /><div className="dl-ctrl-sub">How much the schema library has pre-integrated the problem.</div></div>
        <div className="dl-ctrl"><div className="dl-ctrl-label"><span>Caution threshold</span><span className="val">{threshold}%</span></div><input type="range" min="0" max="100" value={threshold} onChange={e => setThreshold(parseInt(e.target.value))} /><div className="dl-ctrl-sub">Higher = more careful, slower release. Modulated by stakes.</div></div>
        <div className="dl-ctrl"><div className="dl-ctrl-label"><span>Reinvestment</span><span className="val">{reinvestment}%</span></div><input type="range" min="0" max="100" value={reinvestment} onChange={e => setReinvestment(parseInt(e.target.value))} /><div className="dl-ctrl-sub">Reverting from automatic to deliberate processing — the choke mechanism.</div></div>
      </div>
      <div className="dl-stage">
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:8}}>DLPFC EVIDENCE ACCUMULATION · ramp to threshold</div>
        <svg className="dl-svg" viewBox={"0 0 " + W + " " + H} xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width={W} height={H} fill="#0D0A1A" />
          {/* Axes */}
          <line x1={pad.l} y1={pad.t} x2={pad.l} y2={H-pad.b} stroke="#3a3550" />
          <line x1={pad.l} y1={H-pad.b} x2={W-pad.r} y2={H-pad.b} stroke="#3a3550" />
          <text x="8" y={pad.t+8} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">activity</text>
          <text x={W-pad.r} y={H-8} fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif" textAnchor="end">time (ms)</text>
          {/* Time tick marks */}
          {[0, 0.5, 1.0, 1.5, 2.0].map(t => {
            const x = pad.l + (t / winSec) * chartW;
            return (<g key={t}><line x1={x} y1={H-pad.b} x2={x} y2={H-pad.b+4} stroke="#6B6480" /><text x={x} y={H-pad.b+15} fill="#6B6480" fontSize="9" textAnchor="middle">{t*1000}</text></g>);
          })}
          {/* Threshold line */}
          <line x1={pad.l} y1={thresholdY} x2={W-pad.r} y2={thresholdY} stroke="#D4A843" strokeWidth="2" strokeDasharray="4 4" />
          <text x={W-pad.r-4} y={thresholdY-6} fill="#D4A843" fontSize="9" fontFamily="Inter, sans-serif" textAnchor="end" fontWeight="700">commit threshold</text>
          {/* Ramp */}
          {pts.length > 1 && <polyline points={pts.join(" ")} fill="none" stroke="#4ECDC4" strokeWidth="3" />}
          {/* Current point */}
          {pts.length > 0 && (() => {
            const last = pts[pts.length-1].split(",");
            return <circle cx={last[0]} cy={last[1]} r="6" fill="#4ECDC4" stroke="#fff" strokeWidth="2" />;
          })()}
          {/* Release marker */}
          {released && (
            <g>
              <line x1={pad.l + (releaseAt/1000/winSec) * chartW} y1={pad.t} x2={pad.l + (releaseAt/1000/winSec) * chartW} y2={H-pad.b} stroke="#fff" strokeWidth="2" strokeDasharray="2 3" opacity="0.6" />
              <text x={pad.l + (releaseAt/1000/winSec) * chartW} y={pad.t+12} fill="#fff" fontSize="10" textAnchor="middle" fontWeight="700">RELEASE @ {releaseAt}ms</text>
            </g>
          )}
        </svg>
        <div className="dl-controls-row">
          <button className="dl-btn" onClick={start} disabled={running}>{running ? "Ramping…" : (released ? "Run again" : "Start decision")}</button>
          <button className="dl-btn secondary" onClick={reset}>Reset</button>
        </div>
      </div>
      <div className="dl-readout">
        <div className="dl-stat"><div className="dl-stat-label">Ramp slope</div><div className={"dl-stat-val " + (slope > 0.40 ? "good" : slope > 0.25 ? "warn" : "crit")}>{slope.toFixed(2)}</div><div className="dl-stat-sub">Steeper = faster evidence accumulation = faster release.</div></div>
        <div className="dl-stat"><div className="dl-stat-label">Threshold height</div><div className="dl-stat-val">{thHeight.toFixed(2)}</div><div className="dl-stat-sub">Higher = more cautious. Set by stakes and goal.</div></div>
        <div className="dl-stat"><div className="dl-stat-label">Ideal release time</div><div className={"dl-stat-val " + (idealReleaseMs < 200 ? "good" : idealReleaseMs < 320 ? "warn" : "crit")}>{idealReleaseMs} ms</div><div className="dl-stat-sub">Computed from current slope & threshold.</div></div>
      </div>
      <div className="dl-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch12 — Hand-Off Diagnostic ===
function HandoffDx() {
  const CARDS = [
    { quote: "She runs the wrong route on the third read.", side: "route", explain: "Action selection failure. The decision itself was wrong. The motor execution might have been clean. ROUTE problem — Book Two." },
    { quote: "His mechanics fall apart in the fourth quarter.", side: "execute", explain: "The decision is presumably the same one he's made all game. The motor execution is what broke. EXECUTE problem — Book Three (motor fatigue, sequencing breakdown)." },
    { quote: "She freezes when two defenders close at the same time.", side: "route", explain: "Conflict lock at the ACC. Two options too close in evidence weight. Pure ROUTE problem — train the upstream pipeline so the decision is cleaner." },
    { quote: "He hits the ball cleanly but late.", side: "execute", explain: "He chose to swing. The decision was correct. The motor timing was off — that's cerebellar timing on the EXECUTE side. Book Three." },
    { quote: "She arrives at the spot a beat late on every closeout.", side: "route", explain: "V5 forward-prediction deficit. Reacting to where the ball was, not where it will be. ROUTE problem — Chapter 5." },
    { quote: "After the trade, he can't seem to read his new system.", side: "route", explain: "Schema interference. Old templates still fire automatically, new ones haven't displaced them in retrieval priority. ROUTE problem — Chapter 8." },
    { quote: "She knows the correct shot mechanics but her hands aren't doing it.", side: "execute", explain: "The decision was right (the shot she chose). The motor command failed. EXECUTE problem — motor sequencing or proprioceptive integration in Book Three." },
    { quote: "He bites on every pump fake.", side: "route", explain: "Dorsal-only commitment under time pressure — committing on dorsal-stream output before ventral confirmation arrives. ROUTE problem — Chapter 4." },
    { quote: "Her release point drifts inconsistent across innings.", side: "execute", explain: "Motor consistency. The decision (when to throw) is fine; the execution (how to throw) is drifting. EXECUTE problem." },
    { quote: "He overthinks every big-moment play.", side: "route", explain: "Reinvestment at the DLPFC — automatic processing reverting to deliberate under pressure. ROUTE problem — Chapter 11. (Note: the *visible symptom* — tight motor execution — is in EXECUTE, but the cause is in ROUTE.)" },
    { quote: "She tracks the puck but can't get her glove to the right spot.", side: "either", explain: "Need more data. Could be ROUTE (V5/parietal prediction is off, so the glove plan is to the wrong place) or EXECUTE (the glove plan is right but motor delivery is sluggish). Run the routing battery first; if clean, look downstream." },
    { quote: "He misses cues from the weak side consistently.", side: "route", explain: "LGN attentional gating failure or parietal aperture problem. The signal is arriving but not being received. ROUTE problem — Chapters 2 and 6." }
  ];

  const [revealed, setRevealed] = useState(new Set());

  const toggle = (i) => {
    const next = new Set(revealed);
    if (next.has(i)) next.delete(i); else next.add(i);
    setRevealed(next);
  };

  const correctCount = Array.from(revealed).filter(i => CARDS[i].side === "route" || CARDS[i].side === "execute").length;
  const routeCount = CARDS.filter(c => c.side === "route").length;
  const executeCount = CARDS.filter(c => c.side === "execute").length;
  const eitherCount = CARDS.filter(c => c.side === "either").length;

  return (
    <div className="ho-wrap">
      <div className="ho-stage" style={{padding:18}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:8}}>SCENARIO CARDS · click to reveal</div>
        <div style={{fontSize:12,color:"var(--text-muted)",lineHeight:1.6}}>Twelve common athlete complaints. Read each one and decide silently: <strong style={{color:"var(--accent-glow)"}}>ROUTE</strong> problem (this book) or <strong style={{color:"var(--gold)"}}>EXECUTE</strong> problem (Book Three)? Click to reveal the answer and the reasoning. Build the diagnostic instinct that splits these two stages apart.</div>
      </div>
      <div className="ho-cards">
        {CARDS.map((card, i) => {
          const isRevealed = revealed.has(i);
          return (
            <div key={i} className={"ho-card " + (isRevealed ? "revealed " + card.side : "")} onClick={() => toggle(i)}>
              <div className="ho-quote">{card.quote}</div>
              {isRevealed ? (
                <div>
                  <span className={"ho-side " + card.side}>{card.side === "either" ? "Could be either" : card.side}</span>
                  <div className="ho-explain">{card.explain}</div>
                </div>
              ) : (
                <div className="ho-prompt">Click to reveal which side of the decision release this lives on.</div>
              )}
            </div>
          );
        })}
      </div>
      <div className="ho-summary">
        <div className="ho-summary-h">DISTRIBUTION ACROSS THE TWELVE</div>
        Out of 12 scenarios: <strong>{routeCount} are ROUTE problems</strong>, <strong>{executeCount} are EXECUTE problems</strong>, and <strong>{eitherCount} need more data to localize</strong>. The common diagnostic mistake — assuming a coach's surface-language description tells you which side of the chain to work on — is exactly why this card set exists. Many problems that sound like they live in EXECUTE actually live in ROUTE, and the wrong intervention will produce months of wasted effort. <span style={{color:"var(--text-dim)"}}>Revealed: {revealed.size}/12.</span>
      </div>
    </div>
  );
}

// === Ch13 — Ten Routing Failure Modes ===
function FailureRouteCards() {
  const [expanded, setExpanded] = useState(new Set());
  const FAILURES = [
    { n: 1, name: "Attentional Gate Failure", station: "LGN · Ch. 2", layer: "upstream", coaching: "He was looking right at it. She's not seeing what's in front of her.",
      mechanism: "LGN's attentional gating is biased toward the wrong region. The signal arrives at the retina, crosses the chiasm, and is gated DOWN at the thalamus because corticothalamic feedback wasn't biasing the right channel.",
      diagnostic: "Does the athlete consistently miss cues in specific spatial regions despite looking in their direction? Previous concussion history? Resolves when attention is explicitly directed?",
      intervention: "Attentional control training that shapes corticothalamic gain. Often paired with neuro-optometric assessment for post-concussive asymmetry." },
    { n: 2, name: "Feature Extraction Delay", station: "V1 · Ch. 3", layer: "upstream", coaching: "She just doesn't pick it up early enough. He sees it once it's too late.",
      mechanism: "V1's basic feature extraction (orientation, contrast, motion direction) is slower than the situation demands. Often rides upstream from an ACQUIRE-stage deficit that degrades the input V1 receives.",
      diagnostic: "Has Book One's battery been run? Specifically contrast sensitivity, refractive status with cylinder, dynamic vision testing. Athlete's feature-extraction speed slower than schema/cognitive scores predict?",
      intervention: "Fix the ACQUIRE-stage input first. V1 cannot operate faster than its input. If acquisition is clean and V1 is still slow, post-concussive specialist." },
    { n: 3, name: "Magnocellular Weakness", station: "Dorsal Stream · Ch. 4", layer: "upstream", coaching: "She's slow on anything moving. He can read still pictures but not motion.",
      mechanism: "M-pathway operates at reduced effectiveness. Can be congenital, post-concussive, or age-related. Produces a slow dorsal stream across the board.",
      diagnostic: "Standardized magnocellular function tests show reduced sensitivity to fast, low-contrast motion. Static tasks normal, motion tasks poor. Dorsal-vs-ventral gap unusually small or reversed.",
      intervention: "Targeted M-pathway conditioning where possible. Acknowledge that the ceiling is partly biological. Build compensating ventral and schema-based prediction to offset." },
    { n: 4, name: "Trajectory Anticipation Failure", station: "V5/MT · Ch. 5", layer: "midchain", coaching: "He's always reacting where the ball was, not where it's going. She arrives a half-step late on everything.",
      mechanism: "V5/MT's forward prediction is weak. Athlete tracks where things are with adequate accuracy but can't extract a tight velocity vector and project forward.",
      diagnostic: "Standardized motion-coherence tasks; trajectory-prediction tasks; compare static vs. dynamic visual acuity. Look for a gap between static reading and dynamic tracking.",
      intervention: "High-velocity, predictive-tracking work with sport-specific motion profiles. Build cerebellar forward model in parallel." },
    { n: 5, name: "Spatial Attention Narrowing", station: "PPC · Ch. 6", layer: "midchain", coaching: "Tunnel vision. Ball-watching. She doesn't see what's around her.",
      mechanism: "PPC's spatial attention map is narrow — chronic or stress-induced. Attends to primary target effectively but can't maintain peripheral awareness. Often pressure-amplified.",
      diagnostic: "Peripheral awareness testing under load. Compare awareness window in low-load vs. high-load conditions. Look for collapse-under-pressure pattern.",
      intervention: "Aperture training that demands maintained peripheral awareness during primary tasks. Arousal regulation. High-volume context-rich practice for robustness." },
    { n: 6, name: "Schema Poverty", station: "Hippocampus/IT · Ch. 7–8", layer: "midchain", coaching: "She's just not seeing the game yet. He doesn't know what he's looking at.",
      mechanism: "Library of stored expert templates is too sparse for the level of competition. IT pattern-recognition can't return strong matches because there are none to return. Forces slow downstream processing.",
      diagnostic: "Sport-specific scenario testing; recognition latency in familiar vs. novel situations. Wide variance — fine in familiar, lost in unfamiliar.",
      intervention: "High-volume, varied, feedback-rich exposure. Developmental fix that takes time. The intervention is exposure, not coaching cues." },
    { n: 7, name: "Schema Interference", station: "Hippocampus/IT · Ch. 8", layer: "midchain", coaching: "He's overthinking everything since the trade. She knew this stuff but now she's hesitating.",
      mechanism: "Well-developed schema library from a previous context conflicts with new system. Old templates fire automatically, ACC has to arbitrate, decision slows.",
      diagnostic: "Recent system change, position change, team change, coaching change? Does the slowdown live specifically in situations where old and new schemas overlap?",
      intervention: "Volume exposure in new context with feedback to displace old templates from retrieval priority. Weeks-to-months process; plan for the dip." },
    { n: 8, name: "Conflict Lock", station: "ACC · Ch. 10", layer: "terminal", coaching: "She freezes on the read. He gets stuck between two options.",
      mechanism: "Two or more decision options too close in evidence weight. ACC can't release until additional info arrives. Late commitment looks like indecision on tape.",
      diagnostic: "Does the freeze happen specifically on reads where two options have similar evidence? Disappears with single clear answer? Most reads return strong matches?",
      intervention: "UPSTREAM — make schema library richer and pipeline cleaner so ACC has less to arbitrate. Direct work on the conflict point (\"commit faster\") is rarely effective." },
    { n: 9, name: "Working Memory Overload", station: "DLPFC · Ch. 11", layer: "terminal", coaching: "She's overwhelmed by complex schemes. Too much information and he locks up.",
      mechanism: "Current task exceeds DLPFC working memory capacity. Holding/integrating more independent pieces than capacity allows. Slow, error-prone integration.",
      diagnostic: "Performance degrades specifically with multiple simultaneous variables? Improves when complexity reduced or matches a familiar schema?",
      intervention: "Schema building (offload work from DLPFC). Coaching simplification (reduce simultaneous variables). Practice load progression." },
    { n: 10, name: "Reinvestment Under Pressure", station: "DLPFC · Ch. 11", layer: "terminal", coaching: "He's thinking too much. She tightens up in big moments. He can do it in practice but not in games.",
      mechanism: "Under pressure, athlete shifts from automatic schema-driven to deliberate DLPFC processing. Conscious processing is slower than the automatic processing it replaced.",
      diagnostic: "Performance dip specifically in high-arousal situations? Same reads happen cleanly in low-pressure contexts? Athlete reports awareness of \"thinking through\" decisions during the dip?",
      intervention: "Robustness training of upstream pipeline under varied arousal. Goal: schemas/predictions strong enough that they continue to deliver under pressure, leaving DLPFC nothing to reinvest in. Pre-performance routines that bias toward automatic processing also help." }
  ];

  const toggle = (n) => {
    const next = new Set(expanded);
    if (next.has(n)) next.delete(n); else next.add(n);
    setExpanded(next);
  };

  return (
    <div className="frc-wrap">
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--accent-glow)",marginBottom:6}}>TEN ROUTING FAILURE MODES</div>
      <div style={{fontSize:13,color:"var(--text-muted)",lineHeight:1.55}}>Click any card to expand. Read the surface coaching language at the top — then reveal the actual neural address, the diagnostic check, and the intervention direction underneath. Build the translation table.</div>
      <div className="frc-grid">
        {FAILURES.map(f => (
          <div key={f.n} className={"frc-card " + (expanded.has(f.n) ? "expanded" : "")} onClick={() => toggle(f.n)}>
            <div className="frc-num">Mode {f.n}</div>
            <div className="frc-name">{f.name}</div>
            <div className="frc-station">{f.station}</div>
            <div className="frc-coaching">"{f.coaching}"</div>
            {!expanded.has(f.n) && <div className="frc-prompt">Click to reveal the mechanism, diagnostic, and intervention →</div>}
            <div className="frc-details">
              <div className="frc-section"><div className="frc-section-label">Mechanism</div><div className="frc-section-body">{f.mechanism}</div></div>
              <div className="frc-section"><div className="frc-section-label">Diagnostic check</div><div className="frc-section-body">{f.diagnostic}</div></div>
              <div className="frc-section"><div className="frc-section-label">Intervention direction</div><div className="frc-section-body">{f.intervention}</div></div>
              <span className={"frc-tag " + f.layer}>{f.layer === "upstream" ? "Upstream — fix first" : f.layer === "midchain" ? "Mid-chain" : "Terminal — usually rides upstream"}</span>
            </div>
          </div>
        ))}
      </div>
      <div className="frc-meter"><strong>Diagnostic order matters.</strong> Walk the chain front to back. Upstream failures (Modes 1, 2, 3) starve every downstream station. There is little point training Mode 8 conflict resolution in an athlete whose Mode 2 V1 feature extraction is degraded. Leverage is almost always further upstream than the surface suggests.</div>
    </div>
  );
}

      context: "The cohort enters the program. Routing battery run on all 27 drivers — reaction time, MOT, perception span, sport-specific pattern recognition, schema retrieval. Drivers are within the normal range for healthy adults on most measures but show substantial headroom on motorsport-specific tasks.",
      metrics: { reaction: 35, mot: 38, perception: 42, recognition: 40, schema: 35 }, trajectory: "baseline" },
    { date: "Winter 2022", title: "Mid-Intervention", note: "~6 weeks into structured protocol",
      context: "Cohort is six weeks into integrated routing-stage training. Initial gains visible across the battery. The drivers who started with the most headroom (reaction time, pattern recognition) show the earliest movement.",
      metrics: { reaction: 55, mot: 60, perception: 65, recognition: 62, schema: 58 }, trajectory: "mid" },
    { date: "Spring 2023", title: "Post-Intervention", note: "End of off-season program",
      context: "Cohort completes the off-season program. Average reaction-time improvement of ~27% from baseline. MOT and perception-span gains in the 25–35% range. Pattern recognition and schema retrieval show large, consistent improvements. The direction of change is uniform across the cohort; magnitudes vary with starting headroom.",

        <div className="at-final">

// === Override GlossaryView for Book 2 categories ===
GlossaryView = function({ chapter }) {
  const c = chapter.content;
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("all");
  const categories = [
    { key: "all", label: "All" },
    { key: "framework", label: "Framework" },
    { key: "anatomy", label: "Anatomy" },
    { key: "cells", label: "Cells & Channels" },
    { key: "cognitive", label: "Cognitive Mechanisms" },
    { key: "clinical", label: "Clinical / Performance" },
    { key: "pathology", label: "Pathology" },
    { key: "boundary", label: "ROUTE/EXECUTE Boundary" }
  ];
  const filtered = c.entries.filter(e => {
    if (category !== "all" && e.category !== category) return false;
    if (!search) return true;
    const s = search.toLowerCase();
    return e.term.toLowerCase().includes(s) || e.def.toLowerCase().includes(s);
  }).slice().sort((a, b) => a.term.localeCompare(b.term));
  return (
    <div>
      <div className="chapter-header">
        <div className="chapter-act-label">Part Five — Reference</div>
        <div className="chapter-number">{chapter.number}</div>
        <div className="chapter-title">{chapter.title}</div>
        <div className="chapter-hook">{c.intro}</div>
      </div>
      <div className="gl-search-bar"><input type="search" placeholder="Search by term or definition…" value={search} onChange={e => setSearch(e.target.value)} className="gl-search" /></div>
      <div className="gl-categories">{categories.map(cat => (<button key={cat.key} className={"gl-cat " + (category === cat.key ? "active" : "")} onClick={() => setCategory(cat.key)}>{cat.label}</button>))}</div>
      <div className="gl-results">
        {filtered.length === 0 ? (<div className="gl-empty">No entries match "{search}". Try a different term or clear the filter.</div>) : (
          filtered.map(e => {
            const catObj = categories.find(c => c.key === e.category);
            return (<div key={e.term} className="gl-entry"><span className="gl-term">{e.term}</span>{catObj && catObj.key !== "all" && <span className="gl-cat-badge">{catObj.label}</span>}<div className="gl-def">{e.def}</div></div>);
          })
        )}
      </div>
      <div className="gl-footer">Showing <strong>{filtered.length}</strong> of <strong>{c.entries.length}</strong> entries</div>
    </div>
  );
};

// === Override App to route afterword + glossary types ===
App = function() {
  const [activeChapter, setActiveChapter] = useState(null);
  const [activeBlock, setActiveBlock] = useState("opening");
  const [pathway, setPathway] = useState("Read");
  const [progress, setProgress] = useState({});
  const [refsMap, setRefsMap] = useState({});
  const [notesOpen, setNotesOpen] = useState(false);
  const [tutorialOpen, setTutorialOpen] = useState(false);
  const [prefilledAnchor, setPrefilledAnchor] = useState("");
  const allChapters = BOOK.acts.flatMap(a => a.chapters);
  const chapter = allChapters.find(c => c.id === activeChapter);
  const [highlights, addHighlight, removeHighlight] = useChapterHighlights(activeChapter || "_none");
  const [notes, addNote, deleteNote] = useChapterNotes(activeChapter || "_none");

  useEffect(() => { try { const seen = localStorage.getItem("ares_b2_tutorial_seen"); if (!seen) setTutorialOpen(true); } catch (e) {} }, []);
  const closeTutorial = () => { setTutorialOpen(false); try { localStorage.setItem("ares_b2_tutorial_seen", "1"); } catch (e) {} };

  useEffect(() => { setActiveBlock("opening"); setPathway("Read"); }, [activeChapter]);
  useEffect(() => { if (chapter) saveProgress(chapter.id, { progress: 0.1 }); }, [chapter && chapter.id]);
  useEffect(() => { if (!chapter || !refsMap[activeBlock]) return; refsMap[activeBlock].scrollIntoView({ behavior: "smooth", block: "start" }); }, [activeBlock]);

  const handleAddNote = (anchorText) => { setPrefilledAnchor(anchorText || ""); setNotesOpen(true); };

  const blocks = chapter ? getBlocks(chapter) : [];
  let body = null;
  if (!chapter) body = <HomeScreen onStart={() => setActiveChapter("foreword")} />;
  else if (chapter.type === "foreword") body = <ForewordView chapter={chapter} highlights={highlights} />;
  else if (chapter.type === "afterword") body = <AfterwordView chapter={chapter} highlights={highlights} />;
  else if (chapter.type === "glossary") body = <GlossaryView chapter={chapter} />;
  else if (chapter.type === "framing") body = <FramingChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else if (chapter.type === "science") body = <ScienceChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else body = <UpcomingChapter chapter={chapter} />;

  return (
    <React.Fragment>
      <Sidebar book={BOOK} activeChapter={activeChapter} onSelectChapter={setActiveChapter} progress={progress} onHome={() => setActiveChapter(null)} />
      <div className="main">
        {chapter && <TopBar chapter={chapter} blocks={blocks} activeBlock={activeBlock} onSelectBlock={setActiveBlock} pathway={pathway} onSetPathway={setPathway} onToggleNotes={() => setNotesOpen(!notesOpen)} onShowTutorial={() => setTutorialOpen(true)} notesCount={notes.length} highlightsCount={highlights.length} />}
        <div className="content">{body}</div>
      </div>
      {chapter && (chapter.type === "foreword" || chapter.type === "afterword" || chapter.type === "framing" || chapter.type === "science") && (
        <HighlightActionPopup onHighlight={(t) => addHighlight(t)} onNote={(t) => handleAddNote(t)} />
      )}
      <NotesPanel open={notesOpen} onClose={() => { setNotesOpen(false); setPrefilledAnchor(""); }} chapter={chapter} notes={notes} highlights={highlights} onAddNote={addNote} onDeleteNote={deleteNote} onRemoveHighlight={removeHighlight} prefilledAnchor={prefilledAnchor} onClearPrefill={() => setPrefilledAnchor("")} />
      <Tutorial open={tutorialOpen} onClose={closeTutorial} />
    </React.Fragment>
  );
};

function _detectVideoSource(s) {
  if (!s) return null;
  const trimmed = String(s).trim();
  if (!trimmed) return null;
  const ytId = extractYouTubeId(trimmed);
  if (ytId) return { kind: "youtube", value: ytId };
  if (trimmed.startsWith("blob:")) return { kind: "blob", value: trimmed };
  return { kind: "file", value: trimmed };
}

function _NewWatchPanel({ chapter }) {
  const key = "ares_video_" + chapter.id;
  const initial = (() => { try { return localStorage.getItem(key) || ""; } catch (e) { return ""; } })();
  const [source, setSource] = useState(initial);
  const [input, setInput] = useState("");
  const [editing, setEditing] = useState(false);
  const [error, setError] = useState("");
  const [blobUrl, setBlobUrl] = useState("");
  const [blobName, setBlobName] = useState("");
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);
  useEffect(() => () => { if (blobUrl) URL.revokeObjectURL(blobUrl); }, []);
  const detected = blobUrl ? { kind: "blob", value: blobUrl } : _detectVideoSource(source);

  const save = () => {
    const trimmed = input.trim();
    if (!trimmed) { setError("Paste a URL or filename, or use Choose file."); return; }
    if (blobUrl) { URL.revokeObjectURL(blobUrl); setBlobUrl(""); setBlobName(""); }
    try { localStorage.setItem(key, trimmed); } catch (e) {}
    setSource(trimmed); setEditing(false); setInput(""); setError("");
  };
  const removeAll = () => {
    try { localStorage.removeItem(key); } catch (e) {}
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    setSource(""); setBlobUrl(""); setBlobName(""); setInput(""); setEditing(false);
  };
  const onFile = (file) => {
    if (!file) return;
    if (!file.type || !file.type.startsWith("video/")) { setError("That doesn't look like a video file. Use an MP4, WebM, or MOV."); return; }
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    const url = URL.createObjectURL(file);
    setBlobUrl(url); setBlobName(file.name);
    setSource(""); try { localStorage.removeItem(key); } catch (e) {}
    setEditing(false); setError("");
  };
  const onDrop = (e) => { e.preventDefault(); setDragging(false); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; if (f) onFile(f); };

  if (detected && !editing) {
    if (detected.kind === "youtube") {
      return (
        <div>
          <div className="video-frame">
            <iframe src={"https://www.youtube-nocookie.com/embed/" + detected.value + "?rel=0&modestbranding=1"} title={chapter.title} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
          </div>
          <div className="video-meta">
            <span>Video for: <strong>{chapter.title}</strong><span className="video-tag-session">YouTube embed</span></span>
            <button className="video-btn primary" onClick={() => { setInput(source); setEditing(true); }}>Replace video</button>
            <button className="video-btn" onClick={removeAll}>Remove</button>
          </div>
          <div className="video-warn-banner"><strong>Embed issue (Error 153, blank player)?</strong> YouTube has refused the embed — usually because the video is flagged Made-for-Kids or has embedding disabled. Switch to a local file: drop your MP4 onto this panel or reference it by filename (e.g. <code>videos/{chapter.id}.mp4</code>). Plays directly in the book, no YouTube required.</div>
        </div>
      );
    }
    const src = detected.value;
    return (
      <div>
        <div className="video-frame native">
          <video src={src} controls controlsList="nodownload" playsInline preload="metadata" />
        </div>
        <div className="video-meta">
          <span>Video for: <strong>{chapter.title}</strong>{blobUrl ? <span className="video-tag-session">⚡ Session only · {blobName}</span> : <span className="video-tag-native">▶ Native playback</span>}</span>
          <button className="video-btn primary" onClick={() => { setInput(blobUrl ? "" : source); setEditing(true); }}>Replace video</button>
          <button className="video-btn" onClick={removeAll}>Remove</button>
        </div>
        {blobUrl && (<div className="video-info-banner"><strong>Playing a dropped file.</strong> This works for the rest of this session but won't survive a reload. For persistent playback, save your MP4 to a <code>videos/</code> folder next to this book and reference it as <code>videos/{chapter.id}.mp4</code>.</div>)}
      </div>
    );
  }

  return (
    <div className={"video-empty " + (dragging ? "dropping" : "")} onDrop={onDrop} onDragOver={(e) => { e.preventDefault(); setDragging(true); }} onDragLeave={() => setDragging(false)}>
      <div className="ve-icon">{"🎬"}</div>
      <h3>{editing ? "Replace the video for this chapter" : "Add a video for this chapter"}</h3>
      <p>Drop an MP4 here, choose a file, or paste a URL / filename for <strong style={{color:"var(--text)"}}>{chapter.title}</strong>. Local files play natively in the book — no YouTube, no embed errors, fully offline.</p>
      <div className="ve-actions">
        <button className="ve-pick" onClick={() => fileInputRef.current && fileInputRef.current.click()}>{"⬆ Choose video file"}</button>
        <input ref={fileInputRef} type="file" accept="video/*" style={{display:"none"}} onChange={(e) => onFile(e.target.files && e.target.files[0])} />
        <span className="ve-or">{"— or —"}</span>
      </div>
      <div className="ve-form">
        <input type="text" placeholder={"videos/" + chapter.id + ".mp4  ·  https://…/video.mp4  ·  youtube.com/watch?v=…"} value={input} onChange={e => { setInput(e.target.value); if (error) setError(""); }} onKeyDown={e => { if (e.key === "Enter") save(); }} />
        <button className="ve-save" onClick={save}>Save</button>
        {editing && <button className="ve-cancel" onClick={() => { setEditing(false); setInput(""); setError(""); }}>Cancel</button>}
      </div>
      {error && <div className="ve-error">{error}</div>}
      <div className="ve-hint"><strong>Recommended for persistent offline playback:</strong> create a <code>videos/</code> folder next to <code>ARES_Book1_ACQUIRE_Prototype.html</code> and drop your MP4s in. Reference them per chapter as <code>videos/ch1.mp4</code>, <code>videos/ch5.mp4</code>, etc. — once saved, they load on every reload, no internet needed.</div>
    </div>
  );
}

  );
};

function App() {
  const [activeChapter, setActiveChapter] = useState(null);
  const [activeBlock, setActiveBlock] = useState("opening");
  const [pathway, setPathway] = useState("Read");
  const [progress, setProgress] = useState({});
  const [refsMap, setRefsMap] = useState({});
  const [notesOpen, setNotesOpen] = useState(false);
  const [tutorialOpen, setTutorialOpen] = useState(false);
  const [prefilledAnchor, setPrefilledAnchor] = useState("");
  const allChapters = BOOK.acts.flatMap(a => a.chapters);
  const chapter = allChapters.find(c => c.id === activeChapter);
  const [highlights, addHighlight, removeHighlight] = useChapterHighlights(activeChapter || "_none");
  const [notes, addNote, deleteNote] = useChapterNotes(activeChapter || "_none");

  useEffect(() => { try { const seen = localStorage.getItem("ares_b2_tutorial_seen"); if (!seen) setTutorialOpen(true); } catch (e) {} }, []);
  const closeTutorial = () => { setTutorialOpen(false); try { localStorage.setItem("ares_b2_tutorial_seen", "1"); } catch (e) {} };

  useEffect(() => { setActiveBlock("opening"); setPathway("Read"); }, [activeChapter]);
  useEffect(() => { if (chapter) saveProgress(chapter.id, { progress: 0.1 }); }, [chapter && chapter.id]);
  useEffect(() => { if (!chapter || !refsMap[activeBlock]) return; refsMap[activeBlock].scrollIntoView({ behavior: "smooth", block: "start" }); }, [activeBlock]);

  const handleAddNote = (anchorText) => { setPrefilledAnchor(anchorText || ""); setNotesOpen(true); };

  const blocks = chapter ? getBlocks(chapter) : [];
  let body = null;
  if (!chapter) body = <HomeScreen onStart={() => setActiveChapter("foreword")} />;
  else if (chapter.type === "foreword") body = <ForewordView chapter={chapter} highlights={highlights} />;
  else if (chapter.type === "framing") body = <FramingChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else if (chapter.type === "science") body = <ScienceChapter chapter={chapter} pathway={pathway} setPathway={setPathway} registerRefs={(r) => setRefsMap(r)} highlights={highlights} />;
  else body = <UpcomingChapter chapter={chapter} />;

  return (
    <React.Fragment>
      <Sidebar book={BOOK} activeChapter={activeChapter} onSelectChapter={setActiveChapter} progress={progress} onHome={() => setActiveChapter(null)} />
      <div className="main">
        {chapter && <TopBar chapter={chapter} blocks={blocks} activeBlock={activeBlock} onSelectBlock={setActiveBlock} pathway={pathway} onSetPathway={setPathway} onToggleNotes={() => setNotesOpen(!notesOpen)} onShowTutorial={() => setTutorialOpen(true)} notesCount={notes.length} highlightsCount={highlights.length} />}
        <div className="content">{body}</div>
      </div>
      {chapter && (chapter.type === "foreword" || chapter.type === "framing" || chapter.type === "science") && (
        <HighlightActionPopup onHighlight={(t) => addHighlight(t)} onNote={(t) => handleAddNote(t)} />
      )}
      <NotesPanel open={notesOpen} onClose={() => { setNotesOpen(false); setPrefilledAnchor(""); }} chapter={chapter} notes={notes} highlights={highlights} onAddNote={addNote} onDeleteNote={deleteNote} onRemoveHighlight={removeHighlight} prefilledAnchor={prefilledAnchor} onClearPrefill={() => setPrefilledAnchor("")} />
      <Tutorial open={tutorialOpen} onClose={closeTutorial} />
    </React.Fragment>
  );
}

// === BOOK 2 FULL CHAPTER TEXT + READ MODE OVERRIDE ===
const FULL_CHAPTER_TEXT = {"foreword": "You have read the play correctly. The information is there. Your visual system has done its job — the signal has arrived clean. And then, in the space of perhaps three hundred milliseconds, something happens. Or something fails to happen.\n\nThis is the failure that confounds coaches more than any other. They know the athlete can see. They have watched her in film sessions identify the correct response within a heartbeat. They have run the scenario in walkthroughs. They have explained the read so many times the explanation has become a joke between them. And then the game starts, the same situation appears in real time, and she hesitates. The shot is taken too late. The pass goes to the second option, not the first. The defender closes the gap. The play breaks down.\n\nThey call it indecision. They call it overthinking. They call it pressure. They call it a slow processor. They call it a low hockey IQ, a low football IQ, a low basketball IQ — the polite way of saying they have decided that the athlete cannot see the game the way the best players see it.\n\nAlmost none of those labels are correct. What they are describing — almost without exception — is a routing failure.\n\nA routing failure is what happens when the signal arrives but the brain takes too long to decide what to do with it. Not because the signal is bad. Not because the athlete is \"slow.\" Because somewhere between the optic chiasm — where the visual signal stopped being a perceptual problem — and the prefrontal cortex, where the decision is finally made and released to the muscles, the pathway has a bottleneck. The signal is sitting in queue at a station that hasn't been trained to clear it fast enough.\n\nRouting failures are mechanical. They have a specific neural address. They produce specific behavioral signatures that careful observers can learn to read. And — this is the part that should matter most to anyone who coaches or trains an athlete for elite performance — they respond to specific, structured intervention.\n\nI am writing this paragraph at the end of a five-year arc of clinical and applied work. I have watched hockey goalies move from the 13th percentile in contrast sensitivity into the 96th. I have watched the pit crew across all three cars of an IndyCar team shed 27% of their reaction time across a single off-season. I have watched basketball players who tested as \"slow\" on every laboratory measure of cognitive speed develop, over twelve weeks, the kind of pre-snap, pre-play visual anticipation that scouts confuse with \"feel.\" None of those athletes became smarter. None of them became faster in any general sense. What they did was train the specific routing pathway — the chiasm-to-decision pipeline — that connects what they see to what they do.\n\nThat pipeline is the subject of this book.\n\nI want to say something here that I would say if you and I were sitting across a coffee table. I came into this work the long way — through optometry school, residency, clinic work, and eventually a focused practice in elite sport. Along the way I noticed something that the literature kept saying but that almost no one in applied sport seemed to be acting on. The literature was clear: the gap between an elite athlete and a very good athlete is almost never a difference in raw visual acquisition. It is a difference in what the brain does with the visual signal. The elite athlete's brain takes the same signal that arrives in the very good athlete's brain and converts it to a decision faster, with less interference, with a higher probability of being the *right* decision.\n\nThe mechanism behind that conversion is not mysterious. It has been mapped — at the level of cortical area, at the level of cell type, at the level of millisecond timing — by some of the most rigorous neuroscience of the past forty years. It just hasn't been translated into terms that a sport-performance practitioner can act on.\n\nThat is the gap this book is written to close.\n\nWhat you will find in the pages that follow is a station-by-station map of how a clean visual signal becomes a selected action. The pipeline runs from the optic tracts through the lateral geniculate nucleus, into the primary visual cortex, out through the two great streams of vision — the dorsal stream for *where* and *how*, the ventral stream for *what* — and then up into the regions of the brain that compare what is seen to what is remembered, that monitor for conflict between competing options, and that finally, in the dorsolateral prefrontal cortex, integrate the signal with the goal and release a decision.\n\nI want to be precise about that endpoint, because it is the boundary that defines this book. ROUTE ends the moment the decision is made and released — the moment the prefrontal cortex commits to an action and hands the command downstream to the motor system. Everything that happens after that — the basal ganglia gating the motor program, the supplementary motor area sequencing the movement, the primary motor cortex sending the signal to the muscles — is Book Three. Book Three is EXECUTE. That is where motor output lives. ROUTE lives in the space between perception and command, and it ends at the point of decision.\n\nThe chapters that follow each take one station of the routing pipeline, explain how it works, show how it fails, translate the failure into the behavioral signature that a coach will recognize on tape, and connect the failure mode to where the trainable lever lives. Some stations — the LGN's gain controller, V1's feature columns, V5's motion area — will be unfamiliar territory for most sport-performance practitioners. They are also where the largest leverage points live, because they are early in the pipeline and almost nobody currently looks there. Other stations — the working memory system, the conflict monitor, the schema library — will sound more familiar, because some version of them has been talked about in sport psychology for decades. The version in this book is not the sport-psychology version. It is the neuroscience version, with specific structures, specific mechanisms, and specific levers.\n\nThis book is in five parts.\n\nPart One is one chapter long and exists to do one job: reframe the problem of \"decision speed\" from a vague psychological construct into a routing-engineering problem with a measurable address.\n\nPart Two is the long anatomical journey — ten chapters, walking the signal from the chiasm to the decision engine. This is the science core of the book. Read it once for the mechanisms, then again for the diagnostic implications.\n\nPart Three is the hand-off chapter — a single chapter that closes ROUTE at the point of decision release and previews what EXECUTE will do with the signal in Book Three.\n\nPart Four is two chapters. The first is the ten-failure-modes chapter, which is the diagnostic key for everything that came before — a translation table from the language of the sideline (\"she gets stuck on her first read,\" \"he's slow under pressure,\" \"they fall apart in the second half\") to the actual neural failure underneath. The second is the Andretti IndyCar case study, which exists because evidence beats argument and the IndyCar work is the single best-documented routing transformation I have on record.\n\nPart Five closes the book.\n\nRead it once for the science. Read it again with a specific athlete or a specific team in mind. Then start looking at film with the diagnostic framework in your head. You will be surprised how quickly the language of the sideline starts translating, and how much faster you can find the actual bottleneck.\n\nThe photon arrived in Book One. The signal crossed the chiasm. From here, we follow it forward.\n\n— **Dr. Joe LaPlaca, OD**\nAres Elite Spo", "ch1": "**Reframing elite decision-making as a routing engineering problem.**\n\nWhen a quarterback holds the ball half a second too long and takes a sack, the coaching staff almost always has the explanation ready before the next snap. He was indecisive. He didn't trust his reads. He hesitated. The prescribed intervention is usually to push him — film study, mental reps, \"play faster,\" more confidence. Sometimes those interventions work. More often they don't, because the diagnosis is incomplete.\n\nThe diagnosis is not wrong, exactly. It is at the wrong level of resolution. The quarterback *did* hesitate. There *was* indecision. But the word \"indecision\" describes the surface symptom, not the underlying mechanism — and treating the surface produces inconsistent results because it leaves the actual bottleneck in place.\n\nThe actual bottleneck has a name. It has a location. It has a measurable signature. And once you find it, the intervention is no longer about confidence or trust. It is about engineering the routing pathway between the visual signal and the decision so that the same play, on the same defense, produces a faster release.\n\nThat is the reframe this entire book is built on: **the gap between an elite decision-maker and a very good one is almost never a difference in raw cognitive speed.** It is a difference in the architecture of the routing pipeline that converts a clean visual signal into a selected action. Architecture is buildable. Buildable means trainable. Trainable means there is leverage.\n\nThree mistakes get made over and over in the way decision speed is talked about in applied sport. The whole book is, in some sense, a response to those three mistakes. They deserve to be named at the start.\n\nThe first mistake is treating decision speed as if it were a single thing — a property of the athlete, like their forty time or their wingspan. It is not. Decision latency is a *composite*. It is the sum of latencies across roughly ten neural stations, each of which can be measured independently and each of which has its own trainable parameters. An athlete who tests as having a \"slow\" decision in the aggregate may have nine fast stations and one slow one. The intervention is not to make her \"faster.\" The intervention is to find the one station that is dragging the aggregate and train it.\n\nThe second mistake is locating the bottleneck in the wrong layer. The default coaching assumption — and the default sport-psychology assumption — is that decision failures live in the conscious deliberation layer. *He's thinking too much. She's not trusting her instincts. He's overanalyzing.* In a small number of cases this is correct. In most cases the bottleneck is *earlier* than that — in the LGN's attentional gate, in V1's feature extraction, in V5's motion processing, in the schema library that should have been retrieving a familiar pattern but instead is doing slow conscious search. Conscious deliberation is a symptom of upstream failure as often as it is a cause of slowness in itself. Treating the symptom with \"play with more confidence\" leaves the upstream broken.\n\nThe third mistake is conflating the routing system with the motor system. This is the mistake the existing literature on sport performance makes most consistently. Decision-making, action selection, and motor execution get blended into one undifferentiated \"reaction time,\" and as a result the available training interventions also get blended. The athlete is told to \"react faster\" without anyone specifying whether the bottleneck is in routing (this book), action gating (Book Three), or motor execution (also Book Three). They are different stages with different mechanisms, different timing, and different levers. You cannot fix a routing problem with a motor drill, and you cannot fix a motor problem with a perception drill, and the most common reason both kinds of drills look like they \"kind of work some of the time\" is that practitioners are aiming them at the wrong stage.\n\nThis book is a precision instrument for the routing stage.\n\nA *route* is a path the visual signal travels from the optic chiasm to the decision-release point in the prefrontal cortex. Along that path the signal passes through specific cortical and subcortical structures, undergoes specific transformations, gets compared against specific stored templates, and accumulates evidence toward a specific selected action. The total time elapsed between the signal crossing the chiasm and the decision being released to the motor system is the *routing latency*.\n\nFor an unskilled or untrained adult, routing latency for a moderately complex sport-relevant decision sits somewhere in the range of **300 to 500 milliseconds**. For an elite athlete in their domain, the same decision can complete in **150 to 220 milliseconds**. That difference — somewhere between 100 and 300 milliseconds — is, in most fast-action sport, the entire competitive margin. It is the difference between catching the puck cleanly and watching it deflect off the post. It is the difference between connecting on a fastball low and away and watching it land in the catcher's mitt. It is the difference between making the right read on a screen pass and watching the running back get there a beat too late.\n\nThe difference is not magic. It is the cumulative outcome of ten stations operating with better signal-to-noise, less conflict, faster pattern retrieval, and more accurate prediction. That is what this book is going to walk you through.\n\nThe organizing framework for the whole book — the model that links every chapter, every diagnostic question, and every clinical impression I will offer — is the **Decision Routing Matrix (DRM)**.\n\nThe DRM says that routing latency, for any decision, is the product of three variables that interact:\n\n**Signal Clarity** is the quality of the perceptual signal arriving from ACQUIRE. Degraded signal — from any of the ten acquisition-stage failure modes in Book One — forces the routing system to do more work to extract usable information, which adds latency at every downstream station. Per
