<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.R.E.S. ROUTE — The Decision Architecture: Chiasm to DLPFC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --lp: #221461; --lp-dark: #1a0f4d; --lp-light: #3d2a8a;
  --accent: #6B4FA0; --accent-light: #E8E0F7; --accent-glow: #8B6FC0;

  --sidebar-w: 300px; --topbar-h: 56px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; overflow: hidden; height: 100vh; }

.nav-act { padding: 0 16px; margin-bottom: 8px; }
.nav-act-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; padding: 8px; margin-bottom: 2px; }
.nav-chapter { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }

.nav-progress-ring circle { fill: none; stroke-width: 2; }
.nav-progress-bg { stroke: var(--border); }
.nav-progress-fill { stroke: var(--accent-glow); stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 0.5s ease; }
.nav-lock { width: 20px; height: 20px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 11px; }
.nav-ch-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
.nav-ch-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar-blocks { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }

.block-dot:hover::after { content: attr(data-label); position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-muted); white-space: nowrap; background: var(--bg-card); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); z-index: 5; }

        { id:"glossary", number:"Reference", title:"Glossary",
          type:"glossary",
          content:{
            intro:"Every key term from Book Two — chiasm to DLPFC decision release. Search by term or scan by category.",
            entries:[
              { term:"ROUTE", category:"framework", def:"The second stage of the A.R.E.S. Performance Loop. The neural pathway from the optic chiasm to the decision-release point in the prefrontal cortex." },
              { term:"The Routing Chain", category:"framework", def:"The ten-station chain from optic tracts to DLPFC decision release. Total signal fidelity is the product of every station." },
              { term:"Decision Routing Matrix (DRM)", category:"framework", def:"Routing latency ≈ (signal quality deficit) + (route depth) − (pre-loading benefit). Three variables that together produce decision latency." },
              { term:"Routing Latency", category:"framework", def:"Total elapsed time from chiasm to decision release. Elite: 150–220 ms. Untrained: 300–500 ms." },
              { term:"Signal Clarity", category:"framework", def:"DRM variable. Quality of the perceptual signal from ACQUIRE." },
              { term:"Route Depth", category:"framework", def:"DRM variable. Number of neural processing steps required. Shallow = schema-matched and fast." },
              { term:"Motor Pre-Loading", category:"framework", def:"DRM variable. Degree of motor priming before decision completion." },

              { term:"Optic Tracts", category:"anatomy", def:"White-matter cables carrying the signal from the chiasm to the LGN. Each carries the contralateral half of the visual world from both eyes." },
              { term:"Lateral Geniculate Nucleus (LGN)", category:"anatomy", def:"The thalamic gateway for vision. Six layers (magno/parvo/konio). Receives more input from cortex than from retina." },
              { term:"Thalamic Reticular Nucleus (TRN)", category:"anatomy", def:"Thin sheet of inhibitory neurons wrapping the thalamus. The master attentional filter for thalamic relay channels." },
              { term:"Optic Radiations", category:"anatomy", def:"Fibers carrying signal from LGN to V1. Upper through parietal; lower (Meyer's loop) through temporal lobe." },
              { term:"Primary Visual Cortex (V1)", category:"anatomy", def:"First cortical visual area. Feature extraction: orientation columns, simple/complex/hypercomplex cells, direction-selective cells." },
              { term:"V2, V3, V4", category:"anatomy", def:"Higher visual areas building progressively more complex feature representations. V4 specializes in color and complex shape." },
              { term:"V5/MT", category:"anatomy", def:"The brain's dedicated motion processing area. Velocity vectors, predictive tracking 50–300 ms ahead." },
              { term:"MST", category:"anatomy", def:"Just anterior to V5. Specializes in optic flow and self-motion estimation." },
              { term:"Dorsal Stream", category:"anatomy", def:"V1 → V3 → V5/MT → MST → PPC. Where and how. Fast, magnocellular-fed, action-oriented." },
              { term:"Ventral Stream", category:"anatomy", def:"V1 → V4 → IT. What. Slower, parvocellular-fed, identity-oriented." },
              { term:"Posterior Parietal Cortex (PPC)", category:"anatomy", def:"Dorsal-stream endpoint. Spatial action map, gaze control, scan-policy storage. Damage produces hemispatial neglect." },
              { term:"Lateral Intraparietal Area (LIP)", category:"anatomy", def:"PPC subregion. Attention and saccade planning." },
              { term:"Parietal Reach Region (PRR)", category:"anatomy", def:"PPC subregion. Reach-target encoding." },
              { term:"Anterior Intraparietal Area (AIP)", category:"anatomy", def:"PPC subregion. Grasp-target encoding." },
              { term:"Inferotemporal Cortex (IT)", category:"anatomy", def:"Ventral-stream endpoint. Object and pattern recognition." },
              { term:"Fusiform Face Area (FFA)", category:"anatomy", def:"IT subregion specialized for face recognition." },
              { term:"Parahippocampal Place Area (PPA)", category:"anatomy", def:"IT subregion specialized for scene and spatial layout recognition." },
              { term:"Hippocampus", category:"anatomy", def:"Medial temporal lobe structure. The *index* for the schema library distributed across cortex." },
              { term:"Cerebellum", category:"anatomy", def:"Subcortical structure containing ~80% of the brain's neurons. Runs forward models — motor and cognitive." },
              { term:"Anterior Cingulate Cortex (ACC)", category:"anatomy", def:"Medial frontal structure. Conflict monitor and error detector." },
              { term:"Dorsolateral Prefrontal Cortex (DLPFC)", category:"anatomy", def:"The decision integration endpoint of routing. Working memory, integration, top-down control, decision release." },
              { term:"Frontal Eye Fields (FEF)", category:"anatomy", def:"Prefrontal structure paired with PPC in the dorsal attention network. Drives volitional saccades." },

              { term:"Magnocellular Pathway (M)", category:"cells", def:"Fast, motion-sensitive, color-blind channel from retina through LGN to dorsal stream. ~30–40 ms head start over parvocellular." },
              { term:"Parvocellular Pathway (P)", category:"cells", def:"Slower, detail- and color-sensitive channel from retina through LGN to ventral stream." },
              { term:"Koniocellular Pathway (K)", category:"cells", def:"Third LGN channel handling short-wavelength and contextual signals." },
              { term:"Simple Cells (V1)", category:"cells", def:"Orientation-tuned, position-sensitive feature detectors." },
              { term:"Complex Cells (V1)", category:"cells", def:"Orientation-tuned but position-tolerant. First step toward invariant object recognition." },
              { term:"Hypercomplex / End-Stopped Cells (V1)", category:"cells", def:"Respond to bounded edges of preferred orientation. Begin extracting form." },
              { term:"Direction-Selective Cells", category:"cells", def:"Fire to motion in a preferred direction. First in retina, richly in V5/MT." },
              { term:"Pattern-Direction Cells (V5)", category:"cells", def:"Integrate local motion to compute true whole-object motion. Solve the aperture problem." },
              { term:"Purkinje Cells", category:"cells", def:"Principal output cells of cerebellar cortex. Integrate massive mossy-fiber input with sparse climbing-fiber error signals." },
              { term:"Climbing Fibers", category:"cells", def:"Cerebellar input from the inferior olive carrying prediction-error signals. Drive Purkinje-cell plasticity." },

              { term:"Attention (LGN-level)", category:"cognitive", def:"Cortical feedback through V1 layer 6 biases LGN cell gain by 20–40% at attended locations." },
              { term:"Corticothalamic Feedback", category:"cognitive", def:"Descending projections from cortex to thalamus. ~80% of LGN input. Carry attentional biasing and predictive signals." },
              { term:"Predictive Coding", category:"cognitive", def:"Framework in which the brain continuously generates predictions and processes errors between prediction and input." },
              { term:"Forward Model", category:"cognitive", def:"Internal simulation of what the body or world will do next. Cerebellar forward models predict 50–300 ms ahead." },
              { term:"Schema", category:"cognitive", def:"Abstract representation of a *class* of situations, with embedded relationships, predictions, and probable actions." },
              { term:"Schema Retrieval", category:"cognitive", def:"Pattern-matching process by which a current perceptual scene activates a stored expert template. ~100–150 ms in elite performers." },
              { term:"Schema Interference", category:"cognitive", def:"Old templates compete with new ones in retrieval, slowing decisions. Common after system / position / team changes." },
              { term:"Schema Poverty", category:"cognitive", def:"Insufficient library volume. Decisions fall back to slow deliberate processing." },
              { term:"Working Memory", category:"cognitive", def:"Capacity to hold and manipulate information actively. ~4–7 items. DLPFC-substrated." },
              { term:"Cognitive Load", category:"cognitive", def:"The amount of working memory consumed by a task. High load slows DLPFC integration." },
              { term:"Conflict Cost", category:"cognitive", def:"Latency added by ACC arbitration between competing options. 30–200 ms in lab paradigms." },
              { term:"Error-Related Negativity (ERN)", category:"cognitive", def:"Characteristic ACC signal following error. Drives post-error slowing and behavioral adjustment." },
              { term:"Post-Error Slowing", category:"cognitive", def:"Brief slowing of decisions immediately after a mistake. ACC-driven caution." },
              { term:"Reinvestment", category:"cognitive", def:"Reverting from automatic schema-driven processing to deliberate conscious DLPFC processing — typically under pressure. The canonical choke mechanism." },
              { term:"Operating Point", category:"cognitive", def:"Current combination of decision speed (ramp slope) and decision caution (threshold height). Modulable by context, trainable through experience." },

              { term:"Akinetopsia", category:"clinical", def:"Loss of motion perception. The world appears as a series of frozen snapshots. Produced by V5/MT damage." },
              { term:"Hemispatial Neglect", category:"clinical", def:"Acting as though one half of the visual world does not exist. Produced by posterior parietal damage, most commonly on the right." },
              { term:"Homonymous Hemianopsia", category:"clinical", def:"Loss of the same contralateral half of the visual field in both eyes. Produced by optic tract damage." },
              { term:"Stroop Effect", category:"clinical", def:"Classic conflict-monitoring task. Naming the color of ink while the word names a different color. 50–200 ms slowing on conflict trials." },
              { term:"Flanker Effect", category:"clinical", def:"Conflict-monitoring task. Responding to a central stimulus while ignoring flanking distractors that suggest different responses." },
              { term:"N-Back", category:"clinical", def:"Working memory task. Subject responds when the current stimulus matches one presented N items earlier." },
              { term:"Multiple Object Tracking (MOT)", category:"clinical", def:"Subject tracks several moving targets simultaneously among distractors. Probes attentional and predictive capacity." },
              { term:"Perception Span", category:"clinical", def:"Number of items perceived and held briefly from a single glance." },
              { term:"Reaction Time", category:"clinical", def:"Latency from stimulus to motor response. A composite of routing and execution latency." },

              { term:"Concussion-related routing deficits", category:"pathology", def:"Subtle V5, cerebellum, and parietal dysfunction that often passes standard cognitive testing but produces measurable deficits on sport-specific dynamic vision tasks." },
              { term:"Magnocellular Dysfunction", category:"pathology", def:"Weakness of the fast motion-sensitive pathway. Produces 'general slowness' that does not respond to schema training." },
              { term:"Aging-related decline", category:"pathology", def:"Measurable in V5 function, working memory capacity, and DLPFC integration starting in the late thirties. Partially compensable through rich schemas." },

              { term:"Decision Release", category:"boundary", def:"The moment the DLPFC produces a committed action signal handed to the motor system. The boundary between ROUTE and EXECUTE." },
              { term:"Supplementary Motor Area (SMA)", category:"boundary", def:"Receives decision release signal and converts it into a sequenced motor program. Belongs to EXECUTE — Book Three." },
              { term:"Basal Ganglia", category:"boundary", def:"Subcortical action selection gate downstream of decision release. Belongs to EXECUTE — Book Three." },
              { term:"Primary Motor Cortex (M1)", category:"boundary", def:"Generates muscle activation commands. Belongs to EXECUTE — Book Three." }
            ]
          }
        }
      ] }
  ]
};

const DB_NAME = "ares_acquire";
const DB_VERSION = 1;
function openDB() { return new Promise((resolve, reject) => { const req = indexedDB.open(DB_NAME, DB_VERSION); req.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains("progress")) db.createObjectStore("progress", { keyPath: "id" }); }; req.onsuccess = (e) => resolve(e.target.result); req.onerror = (e) => reject(e.target.error); }); }
async function saveProgress(id, data) { try { const db = await openDB(); const tx = db.transaction("progress", "readwrite"); tx.objectStore("progress").put({ id, ...data, updatedAt: Date.now() }); } catch (e) {} }

function renderRich(text, keyPrefix) {
  const nodes = [];
  const re = /(\*\*[^*]+\*\*|\*[^*]+\*)/g;
  let last = 0, m, i = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) nodes.push(text.slice(last, m.index));
    const seg = m[0];
    if (seg.startsWith("**")) nodes.push(<strong key={keyPrefix + "-b" + i}>{seg.slice(2, -2)}</strong>);
    else nodes.push(<em key={keyPrefix + "-i" + i}>{seg.slice(1, -1)}</em>);
    last = m.index + seg.length; i++;
  }
  if (last < text.length) nodes.push(text.slice(last));
  return nodes;
}

function applyHighlights(root, highlights) {
  if (!root) return;
  root.querySelectorAll(".ares-mark").forEach(mark => { const parent = mark.parentNode; while (mark.firstChild) parent.insertBefore(mark.firstChild, mark); parent.removeChild(mark); if (parent.normalize) parent.normalize(); });
  if (!highlights || highlights.length === 0) return;
  const sorted = highlights.slice().sort((a, b) => (b.text || "").length - (a.text || "").length);
  sorted.forEach(h => {
    if (!h.text || h.text.length < 3) return;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, { acceptNode: (n) => { if (n.parentNode && n.parentNode.closest && n.parentNode.closest(".ares-mark")) return NodeFilter.FILTER_REJECT; return NodeFilter.FILTER_ACCEPT; } });
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(node => {
      const text = node.textContent;
      const idx = text.indexOf(h.text);
      if (idx === -1) return;
      const before = text.slice(0, idx);
      const match = text.slice(idx, idx + h.text.length);
      const after = text.slice(idx + h.text.length);
      const parent = node.parentNode;
      if (before) parent.insertBefore(document.createTextNode(before), node);
      const mark = document.createElement("mark");
      mark.className = "ares-mark";
      mark.textContent = match;
      mark.dataset.hlId = h.id;
      parent.insertBefore(mark, node);
      if (after) parent.insertBefore(document.createTextNode(after), node);
      parent.removeChild(node);
    });
  });
}

function Prose({ text, highlights }) {
  const ref = useRef(null);
  useEffect(() => { applyHighlights(ref.current, highlights); }, [text, highlights]);
  return (<div className="prose" ref={ref}>{text.split("\n\n").map((para, i) => <p key={i}>{renderRich(para, "p" + i)}</p>)}</div>);
}

function ProgressRing({ progress = 0, size = 20, strokeWidth = 2 }) {

}

function extractYouTubeId(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;

  return m ? m[1] : null;
}

function getChapterSegments(chapter) {
  if (!chapter || !chapter.content) return [];

  if (chapter.type === "foreword" || chapter.type === "afterword") return [{ id: "opening", label: chapter.type === "afterword" ? "The First Crossing" : "Foreword", text: c.opening }];
  if (chapter.type === "framing") {
    return [c.opening && { id: "opening", label: "Opening", text: c.opening }, c.reframe && { id: "reframe", label: "The Reframe", text: c.reframe }, c.chain && { id: "chain", label: "The Acquisition Chain", text: c.chain }, c.handoff && { id: "handoff", label: "The Hand-Off", text: c.handoff }, c.callout && c.callout.clinical && { id: "clinical", label: "Clinical Lens", text: c.callout.clinical }, c.callout && c.callout.coaching && { id: "coaching", label: "Coaching Lens", text: c.callout.coaching }, c.summary && c.summary.length && { id: "summary", label: "Chapter Summary", text: c.summary.join(". ") }].filter(Boolean);
  }
  if (chapter.type === "science") {
    return [c.opening && { id: "opening", label: "Opening", text: c.opening }, c.mechanism && { id: "mechanism", label: "The Mechanism", text: c.mechanism }, c.sportTranslation && { id: "sport", label: "Sport Translation", text: c.sportTranslation }, c.aresConnection && { id: "ares", label: "A.R.E.S. Connection", text: c.aresConnection }, c.callout && c.callout.clinical && { id: "clinical", label: "Clinical Lens", text: c.callout.clinical }, c.callout && c.callout.coaching && { id: "coaching", label: "Coaching Lens", text: c.callout.coaching }, c.summary && c.summary.length && { id: "summary", label: "Chapter Summary", text: c.summary.join(". ") }].filter(Boolean);

}

function isNaturalVoice(v) { if (!v || !v.name) return false; return /natural|premium|enhanced|neural|online|wavenet|studio|siri/i.test(v.name) || /samantha|karen|moira|tessa|veena|fiona|alex|daniel|catherine|kate|serena|allison|ava/i.test(v.name); }
function voiceLabel(v) { if (!v) return ""; let n = v.name.replace(/Microsoft |Google |Apple /g, ""); if (isNaturalVoice(v)) n = "★ " + n; return n.slice(0, 30); }
function browserHint() { const ua = (typeof navigator !== "undefined" && navigator.userAgent) || ""; if (/Edg\//.test(ua)) return null; if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return { msg: "For more natural voices, try Microsoft Edge — it ships with high-quality Neural voices.", strong: "Tip" }; if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return { msg: "On macOS, premium voices like Samantha and Ava sound dramatically better — download via System Settings → Accessibility.", strong: "Tip" }; return { msg: "Microsoft Edge offers free Neural voices that sound dramatically more natural.", strong: "Tip" }; }

function AudiobookBar({ chapter, segments }) {
  const [status, setStatus] = useState("idle");
  const [segIdx, setSegIdx] = useState(0);
  const [rate, setRate] = useState(1.0);
  const [voices, setVoices] = useState([]);
  const [voiceURI, setVoiceURI] = useState("");
  const [tipDismissed, setTipDismissed] = useState(() => { try { return localStorage.getItem("ares_audio_tip_dismissed") === "1"; } catch (e) { return false; } });
  const segIdxRef = useRef(0);
  const isRestarting = useRef(false);
  const supported = typeof window !== "undefined" && "speechSynthesis" in window;
  useEffect(() => {
    if (!supported) return;
    const ss = window.speechSynthesis;
    const loadVoices = () => {
      const all = ss.getVoices();
      const en = all.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
      const list = en.length ? en : all;
      const sorted = list.slice().sort((a, b) => { const an = isNaturalVoice(a), bn = isNaturalVoice(b); if (an && !bn) return -1; if (!an && bn) return 1; return a.name.localeCompare(b.name); });
      setVoices(sorted);
      if (sorted.length && !voiceURI) { const stored = (() => { try { return localStorage.getItem("ares_audio_voice"); } catch (e) { return null; } })(); const fromStorage = stored && sorted.find(v => v.voiceURI === stored); const best = fromStorage || sorted.find(isNaturalVoice) || sorted[0]; if (best) setVoiceURI(best.voiceURI); }
    };
    loadVoices();
    ss.addEventListener("voiceschanged", loadVoices);
    return () => { ss.removeEventListener("voiceschanged", loadVoices); ss.cancel(); };
  }, [supported]);
  useEffect(() => { try { if (voiceURI) localStorage.setItem("ares_audio_voice", voiceURI); } catch (e) {} }, [voiceURI]);
  useEffect(() => { try { localStorage.setItem("ares_audio_rate", String(rate)); } catch (e) {} }, [rate]);
  useEffect(() => { try { const stored = parseFloat(localStorage.getItem("ares_audio_rate")); if (stored && !isNaN(stored)) setRate(stored); } catch (e) {} }, []);
  useEffect(() => { if (supported) window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; }, [chapter && chapter.id]);
  const strip = (t) => String(t).replace(/\*\*([^*]+)\*\*/g, "$1").replace(/\*([^*]+)\*/g, "$1").replace(/\s+/g, " ").trim();
  const speakSeg = (i) => { if (!supported) return; if (!segments || i >= segments.length) { setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; return; } setSegIdx(i); segIdxRef.current = i; const seg = segments[i]; const utter = new SpeechSynthesisUtterance(strip(seg.text)); utter.rate = rate; const v = voices.find(vv => vv.voiceURI === voiceURI); if (v) utter.voice = v; utter.onend = () => { if (!isRestarting.current) speakSeg(segIdxRef.current + 1); }; utter.onerror = () => { if (!isRestarting.current) speakSeg(segIdxRef.current + 1); }; window.speechSynthesis.speak(utter); };
  useEffect(() => { if (status !== "playing" || !supported) return; isRestarting.current = true; window.speechSynthesis.cancel(); const t = setTimeout(() => { isRestarting.current = false; speakSeg(segIdxRef.current); }, 80); return () => clearTimeout(t); }, [rate, voiceURI]);
  const start = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(0); };
  const pauseResume = () => { if (!supported) return; if (status === "playing") { window.speechSynthesis.pause(); setStatus("paused"); } else if (status === "paused") { window.speechSynthesis.resume(); setStatus("playing"); } };
  const stop = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("idle"); setSegIdx(0); segIdxRef.current = 0; };
  const skip = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.min(segments.length, segIdxRef.current + 1)); };
  const back = () => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(Math.max(0, segIdxRef.current - 1)); };
  const jumpTo = (i) => { if (!supported) return; window.speechSynthesis.cancel(); setStatus("playing"); speakSeg(i); };
  const dismissTip = () => { setTipDismissed(true); try { localStorage.setItem("ares_audio_tip_dismissed", "1"); } catch (e) {} };
  if (!supported || !segments || segments.length === 0) return null;
  const currentVoice = voices.find(v => v.voiceURI === voiceURI);
  const naturalCount = voices.filter(isNaturalVoice).length;
  const tip = !tipDismissed && naturalCount === 0 ? browserHint() : null;
  return (
    <React.Fragment>
      {tip && (<div className="ab-tip"><span><strong>{tip.strong}:</strong> {tip.msg}</span><button className="ab-tip-close" onClick={dismissTip}>×</button></div>)}
      {status === "idle" ? (
        <div className="audiobook-bar idle"><button className="ab-cta" onClick={start}><span className="ab-cta-ico">{"🎧"}</span> Listen to this chapter</button><span className="ab-hint">Reads aloud, section by section{currentVoice && isNaturalVoice(currentVoice) && " · natural voice"}</span></div>
      ) : (
        <div className="audiobook-bar active">
          <div className="ab-current"><div className="ab-current-label">Now playing · section {segIdx + 1} of {segments.length}</div><div className="ab-current-title">{segments[segIdx] && segments[segIdx].label}</div></div>
          <div className="ab-controls">
            <button className="ab-btn" onClick={back} title="Previous">{"⏮"}</button>
            <button className="ab-btn primary" onClick={pauseResume} title={status === "playing" ? "Pause" : "Resume"}>{status === "playing" ? "⏸" : "▶"}</button>
            <button className="ab-btn" onClick={skip} title="Next">{"⏭"}</button>
            <button className="ab-btn" onClick={stop} title="Stop">{"⏹"}</button>
            <select className="ab-jump" value={segIdx} onChange={e => jumpTo(parseInt(e.target.value))}>{segments.map((s, i) => <option key={s.id} value={i}>{(i + 1) + ". " + s.label}</option>)}</select>
            <select className="ab-speed" value={rate} onChange={e => setRate(parseFloat(e.target.value))}>{[0.75, 1.0, 1.25, 1.5, 2.0].map(r => <option key={r} value={r}>{r}×</option>)}</select>
            {voices.length > 1 && (<select className="ab-voice" value={voiceURI} onChange={e => setVoiceURI(e.target.value)} title="Voice (★ = natural)">{voices.slice(0, 18).map((v) => <option key={v.voiceURI} value={v.voiceURI}>{voiceLabel(v)}</option>)}</select>)}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

function HighlightActionPopup({ onHighlight, onNote }) {
  const [popup, setPopup] = useState(null);
  useEffect(() => {
    const handler = (e) => {
      if (e.target && e.target.closest && e.target.closest(".hl-popup")) return;
      setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) { setPopup(null); return; }
        const text = sel.toString().trim();
        if (text.length < 3 || text.length > 600) { setPopup(null); return; }
        const range = sel.getRangeAt(0);
        const container = range.commonAncestorContainer;
        const element = container.nodeType === 3 ? container.parentElement : container;
        if (!element || !element.closest(".prose")) { setPopup(null); return; }
        const rect = range.getBoundingClientRect();
        if (rect.width === 0) { setPopup(null); return; }
        setPopup({ text, x: rect.left + rect.width / 2, y: rect.top });
      }, 50);
    };
    const clear = () => setPopup(null);
    document.addEventListener("mouseup", handler);
    document.addEventListener("touchend", handler);
    document.addEventListener("scroll", clear, true);
    return () => { document.removeEventListener("mouseup", handler); document.removeEventListener("touchend", handler); document.removeEventListener("scroll", clear, true); };
  }, []);
  if (!popup) return null;
  return (<div className="hl-popup" style={{ left: popup.x, top: popup.y - 8 }}><button onClick={(e) => { e.stopPropagation(); onHighlight(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>★ Highlight</button><button onClick={(e) => { e.stopPropagation(); onNote(popup.text); window.getSelection().removeAllRanges(); setPopup(null); }}>+ Note</button></div>);
}

// === Ch2 — LGN Gateway ===
function LGNGateway() {
  const [attention, setAttention] = useState(50);
  const [arousal, setArousal] = useState(50);
  const [load, setLoad] = useState(30);
  const attBonus = (attention / 100) * 40;
  const arousalPenalty = Math.max(0, (arousal - 60) / 40) * 25;
  const loadPenalty = (load / 100) * 18;
  const attendedGain = Math.max(50, 100 + attBonus - arousalPenalty - loadPenalty);
  const aperture = 100 - (attention * 0.4) - Math.max(0, (arousal - 60)) * 0.7;
  const apertureClamped = Math.max(20, Math.min(100, aperture));
  const latency = Math.round(180 + loadPenalty * 4 + arousalPenalty * 3 + (60 - Math.min(60, attention)) * 1.2);
  const verdict = (() => {
    if (arousal > 80) return "Over-aroused: aperture collapsed, periphery lost";
    if (load > 70 && attention < 50) return "Overloaded + scattered: routing degraded";
    if (attendedGain > 125 && apertureClamped > 50) return "Optimal: cleanly amplified signal, periphery intact";
    if (attendedGain > 110) return "Good gain at the cost of some peripheral awareness";
    return "Baseline / scattered attention";
  })();
  return (
    <div className="lgn-wrap">
      <div className="lgn-controls">
        <div className="lgn-ctrl"><div className="lgn-ctrl-label"><span>Attention focus</span><span className="val">{attention}%</span></div><input type="range" min="0" max="100" value={attention} onChange={e => setAttention(parseInt(e.target.value))} /><div className="lgn-ctrl-sub">DLPFC/PPC top-down bias driving the corticothalamic loop.</div></div>
        <div className="lgn-ctrl"><div className="lgn-ctrl-label"><span>Arousal</span><span className="val">{arousal}%</span></div><input type="range" min="0" max="100" value={arousal} onChange={e => setArousal(parseInt(e.target.value))} /><div className="lgn-ctrl-sub">Sympathetic activation. Sweet spot ~40–60; over-arousal narrows the aperture.</div></div>
        <div className="lgn-ctrl"><div className="lgn-ctrl-label"><span>Cognitive load</span><span className="val">{load}%</span></div><input type="range" min="0" max="100" value={load} onChange={e => setLoad(parseInt(e.target.value))} /><div className="lgn-ctrl-sub">Working memory burden. High load degrades the top-down signal feeding the gate.</div></div>
      </div>
      <div className="lgn-diagram">
        <svg className="lgn-svg" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="100" width="80" height="40" rx="6" fill="#1E1745" stroke="#6B4FA0" />
          <text x="50" y="125" textAnchor="middle" fill="#A099B8" fontSize="11" fontFamily="Inter, sans-serif" fontWeight="600">Retina</text>
          <text x="50" y="160" textAnchor="middle" fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">~20% of LGN input</text>
          <line x1="90" y1="120" x2="240" y2="120" stroke="#6B4FA0" strokeWidth="2" markerEnd="url(#arrow)" />
          <ellipse cx="280" cy="120" rx="50" ry="34" fill="#221461" stroke="#8B6FC0" strokeWidth={1 + (attendedGain - 100) / 40} />

          <text x="505" y="65" textAnchor="middle" fill="#fff" fontSize="12" fontFamily="Inter, sans-serif" fontWeight="700">Cortex (V1 / PPC / DLPFC)</text>

          <text x="280" y="200" textAnchor="middle" fill="#A099B8" fontSize="10" fontFamily="Inter, sans-serif">peripheral aperture</text>
          <rect x="180" y="210" width="200" height="8" rx="4" fill="#0D0A1A" stroke="#3a3550" />
          <rect x="180" y="210" width={Math.max(8, 200 * apertureClamped / 100)} height="8" rx="4" fill={apertureClamped > 60 ? "#4ECDC4" : apertureClamped > 35 ? "#D4A843" : "#E24B4A"} />
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8B6FC0" /></marker>
            <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#D4A843" /></marker>
          </defs>
        </svg>
      </div>
      <div className="lgn-readout">
        <div className="lgn-stat"><div className="lgn-stat-label">Attended-location gain</div><div className={"lgn-stat-val " + (attendedGain > 125 ? "good" : attendedGain > 110 ? "warn" : "")}>{Math.round(attendedGain)}%</div><div className="lgn-stat-sub">Baseline = 100%. Top-down attention can amplify 20–40%.</div></div>
        <div className="lgn-stat"><div className="lgn-stat-label">Peripheral aperture</div><div className={"lgn-stat-val " + (apertureClamped > 60 ? "good" : apertureClamped > 35 ? "warn" : "crit")}>{Math.round(apertureClamped)}%</div><div className="lgn-stat-sub">Off-center awareness. Drops as attention narrows + arousal rises.</div></div>
        <div className="lgn-stat"><div className="lgn-stat-label">Routing-stage latency</div><div className={"lgn-stat-val " + (latency < 220 ? "good" : latency < 280 ? "warn" : "crit")}>{latency} ms</div><div className="lgn-stat-sub">Composite cost of routing through this gate, this moment.</div></div>
      </div>
      <div className="lgn-note"><strong>{verdict}.</strong> The LGN gate isn't doing anything by itself — every change here is a change in the descending signal from cortex. This is what trainable attention <em>looks like</em>: a measurable amplification of specific thalamic channels at the expense of others.</div>
    </div>
  );
}

// === Ch3 — V1 Orientation Columns ===
function V1Columns() {
  // User controls: orientation 0-180 deg, position offset, edge length
  const [orientation, setOrientation] = useState(45);
  const [posOffset, setPosOffset] = useState(0); // -50..+50
  const [length, setLength] = useState(80); // 20..120

  // Three cells with fixed preferences
  const SIMPLE_PREF = 45;       // preferred orientation
  const COMPLEX_PREF = 45;
  const HYPER_PREF = 45;
  const HYPER_MAX_LENGTH = 75;  // hypercomplex fires for bounded edges (shorter than its receptive field)

  // Cell firing rates
  // Simple: peaks at preferred orientation, SHARPLY sensitive to position offset
  const orientDelta = Math.min(Math.abs(orientation - SIMPLE_PREF), 180 - Math.abs(orientation - SIMPLE_PREF));
  const orientResponse = Math.max(0, Math.cos((orientDelta / 90) * Math.PI / 2));  // 1 at preferred, 0 at +-90
  const positionPenaltySimple = Math.exp(-Math.pow(posOffset / 18, 2)); // tight Gaussian
  const simpleRate = Math.round(orientResponse * positionPenaltySimple * 100);

  // Complex: same orientation tuning, position-TOLERANT (wide Gaussian)
  const positionPenaltyComplex = Math.exp(-Math.pow(posOffset / 60, 2));
  const complexRate = Math.round(orientResponse * positionPenaltyComplex * 100);

  // Hypercomplex: same orientation tuning, fires ONLY if edge is bounded (length <= HYPER_MAX_LENGTH)
  const lengthFactor = length <= HYPER_MAX_LENGTH ? 1 : Math.max(0, 1 - (length - HYPER_MAX_LENGTH) / 40);
  const hyperPositionPenalty = Math.exp(-Math.pow(posOffset / 50, 2));
  const hyperRate = Math.round(orientResponse * hyperPositionPenalty * lengthFactor * 100);

  // Visual: draw the edge stimulus
  const cx = 100, cy = 100;
  const halfLen = length / 2;
  const rad = (orientation * Math.PI) / 180;
  const dx = Math.cos(rad) * halfLen;
  const dy = Math.sin(rad) * halfLen;
  // Position offset perpendicular to edge orientation
  const perpRad = rad + Math.PI / 2;
  const offX = Math.cos(perpRad) * posOffset;
  const offY = Math.sin(perpRad) * posOffset;
  const x1 = cx + offX - dx, y1 = cy + offY - dy, x2 = cx + offX + dx, y2 = cy + offY + dy;

  // Diagnose
  const verdict = (() => {
    if (simpleRate < 30 && complexRate < 30) return { txt: "Edge orientation is far from this column's preference — none of these cells care.", cls: "warn" };
    if (length > HYPER_MAX_LENGTH + 30 && simpleRate > 50) return { txt: "Simple and complex cells fire, but the edge runs past the hypercomplex receptive field — form-extraction is silent.", cls: "warn" };
    if (simpleRate > 60 && complexRate > 60 && hyperRate > 50) return { txt: "All three cell classes engaged — V1 has cleanly decomposed the edge into orientation + position + form.", cls: "good" };
    if (Math.abs(posOffset) > 20 && complexRate > simpleRate + 20) return { txt: "Position-shifted edge — complex cells still fire, simple cells drop out. This is invariant feature extraction in action.", cls: "good" };
    return { txt: "Adjust orientation, position, and length to see how different V1 cell types respond.", cls: "" };
  })();

  return (
    <div className="v1-wrap">
      <div className="v1-controls">
        <div className="v1-ctrl"><div className="v1-ctrl-label"><span>Edge orientation</span><span className="val">{orientation}°</span></div><input type="range" min="0" max="180" value={orientation} onChange={e => setOrientation(parseInt(e.target.value))} /><div className="v1-ctrl-sub">This column prefers 45°. Other orientations have their own columns.</div></div>
        <div className="v1-ctrl"><div className="v1-ctrl-label"><span>Position offset</span><span className="val">{posOffset > 0 ? "+" : ""}{posOffset} px</span></div><input type="range" min="-50" max="50" value={posOffset} onChange={e => setPosOffset(parseInt(e.target.value))} /><div className="v1-ctrl-sub">Shifts the edge perpendicular to its orientation.</div></div>
        <div className="v1-ctrl"><div className="v1-ctrl-label"><span>Edge length</span><span className="val">{length} px</span></div><input type="range" min="20" max="160" value={length} onChange={e => setLength(parseInt(e.target.value))} /><div className="v1-ctrl-sub">Hypercomplex cells fire only when the edge is <em>bounded</em>.</div></div>
      </div>
      <div className="v1-stim-row">
        <div className="v1-stim">
          <div className="v1-stim-title">Stimulus (a single oriented edge)</div>
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="200" height="200" fill="#0D0A1A" />
            <rect x="40" y="40" width="120" height="120" fill="none" stroke="rgba(107,79,160,0.30)" strokeDasharray="3 4" />
            <text x="100" y="32" textAnchor="middle" fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">receptive field</text>
            <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#fff" strokeWidth="4" strokeLinecap="round" />
            {/* dot at center for reference */}
            <circle cx="100" cy="100" r="2" fill="#6B4FA0" />
          </svg>
        </div>
        <div className="v1-stim">
          <div className="v1-stim-title">Column preference (this column = 45°)</div>
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="200" height="200" fill="#0D0A1A" />
            {/* Orientation column preference fan */}
            {[0, 30, 60, 90, 120, 150].map(deg => {
              const r = (deg * Math.PI) / 180;
              const dxx = Math.cos(r) * 70, dyy = Math.sin(r) * 70;
              const active = Math.min(Math.abs(deg - SIMPLE_PREF), 180 - Math.abs(deg - SIMPLE_PREF)) < 15;
              return <line key={deg} x1={100 - dxx} y1={100 - dyy} x2={100 + dxx} y2={100 + dyy} stroke={active ? "#8B6FC0" : "#3a3550"} strokeWidth={active ? "3" : "1.5"} />;
            })}
            <text x="100" y="190" textAnchor="middle" fill="#6B6480" fontSize="9" fontFamily="Inter, sans-serif">each line = a column's preferred orientation</text>
          </svg>
        </div>
      </div>
      <div className="v1-cells">
        <div className={"v1-cell " + (simpleRate > 50 ? "firing" : "")}>
          <div className="v1-cell-name">Simple cell</div>
          <div className="v1-cell-pref">pref 45° · position-sensitive</div>
          <div className="v1-cell-rate">{simpleRate}<span className="v1-cell-rate-sub"> /100</span></div>
          <div className="v1-cell-bar"><div className="v1-cell-bar-fill" style={{ width: simpleRate + "%" }} /></div>
        </div>
        <div className={"v1-cell " + (complexRate > 50 ? "firing" : "")}>
          <div className="v1-cell-name">Complex cell</div>
          <div className="v1-cell-pref">pref 45° · position-tolerant</div>
          <div className="v1-cell-rate">{complexRate}<span className="v1-cell-rate-sub"> /100</span></div>
          <div className="v1-cell-bar"><div className="v1-cell-bar-fill" style={{ width: complexRate + "%" }} /></div>
        </div>
        <div className={"v1-cell " + (hyperRate > 50 ? "firing" : "")}>
          <div className="v1-cell-name">Hypercomplex</div>
          <div className="v1-cell-pref">pref 45° · end-stopped</div>
          <div className="v1-cell-rate">{hyperRate}<span className="v1-cell-rate-sub"> /100</span></div>
          <div className="v1-cell-bar"><div className="v1-cell-bar-fill" style={{ width: hyperRate + "%" }} /></div>
        </div>
      </div>
      <div className={"v1-note " + verdict.cls}>{verdict.txt}</div>
    </div>
  );
}

// === Ch4 — Two-Streams Race ===
function TwoStreamsRace() {
  const [stimulus, setStimulus] = useState("ball");
  const [magnoHealth, setMagnoHealth] = useState(100); // 0..100, lower = M-pathway weakness
  const [load, setLoad] = useState(20); // cognitive load affects ventral more
  const [dorsalProg, setDorsalProg] = useState(0); // 0..100
  const [ventralProg, setVentralProg] = useState(0);
  const [running, setRunning] = useState(false);
  const [winner, setWinner] = useState(null);
  const [elapsedDorsal, setElapsedDorsal] = useState(null);
  const [elapsedVentral, setElapsedVentral] = useState(null);
  const animRef = useRef(null);
  const startRef = useRef(0);

  // Stimulus latency tuning
  // ball (fast motion): dorsal arrives fastest
  // defender (kinematic pattern): both moderate
  // jersey (identity): ventral helps more
  const baseTimings = {
    ball:     { dorsal: 150, ventral: 220 },
    defender: { dorsal: 170, ventral: 210 },
    jersey:   { dorsal: 190, ventral: 200 }
  };
  const base = baseTimings[stimulus];

  // Compute effective timings
  const dorsalEffective = Math.round(base.dorsal + (100 - magnoHealth) * 1.2);
  const ventralEffective = Math.round(base.ventral + (load / 100) * 80);

  const run = () => {
    if (running) return;
    setDorsalProg(0); setVentralProg(0); setWinner(null); setElapsedDorsal(null); setElapsedVentral(null);
    setRunning(true);
    startRef.current = performance.now();
    const animDuration = Math.max(dorsalEffective, ventralEffective) + 60;
    const tick = (now) => {
      const elapsed = now - startRef.current;
      const dorsalP = Math.min(100, (elapsed / dorsalEffective) * 100);
      const ventralP = Math.min(100, (elapsed / ventralEffective) * 100);
      setDorsalProg(dorsalP);
      setVentralProg(ventralP);
      if (dorsalP >= 100 && elapsedDorsalRef.current === null) {
        elapsedDorsalRef.current = dorsalEffective;
        setElapsedDorsal(dorsalEffective);
      }
      if (ventralP >= 100 && elapsedVentralRef.current === null) {
        elapsedVentralRef.current = ventralEffective;
        setElapsedVentral(ventralEffective);
      }
      if (elapsed < animDuration) {
        animRef.current = requestAnimationFrame(tick);
      } else {
        setRunning(false);
        setWinner(dorsalEffective < ventralEffective ? "dorsal" : ventralEffective < dorsalEffective ? "ventral" : "tie");
      }
    };
    animRef.current = requestAnimationFrame(tick);
  };
  const elapsedDorsalRef = useRef(null);
  const elapsedVentralRef = useRef(null);
  useEffect(() => { elapsedDorsalRef.current = null; elapsedVentralRef.current = null; }, [running, magnoHealth, load, stimulus]);

  const reset = () => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    setRunning(false); setDorsalProg(0); setVentralProg(0); setWinner(null); setElapsedDorsal(null); setElapsedVentral(null);
    elapsedDorsalRef.current = null; elapsedVentralRef.current = null;
  };
  useEffect(() => () => { if (animRef.current) cancelAnimationFrame(animRef.current); }, []);

  const gap = ventralEffective - dorsalEffective; // positive = dorsal wins

  const verdict = (() => {
    if (magnoHealth < 50) return { txt: "M-pathway weakness has neutralized the dorsal head start. The athlete is forced to wait for ventral confirmation on every play — chronically late.", cls: "crit" };
    if (gap > 40) return { txt: "Healthy dorsal-ventral gap. The body can commit on dorsal output before consciousness finishes recognizing — the neural basis of 'feel.'", cls: "good" };
    if (gap < 10) return { txt: "Dorsal and ventral arriving almost simultaneously — the athlete is reliant on full ventral confirmation. Slower decisions, less vulnerability to fakes.", cls: "warn" };
    return { txt: "Moderate dorsal lead. Adjust the controls to see how M-pathway health and cognitive load shift the calibration.", cls: "" };
  })();

  return (
    <div className="ts-wrap">
      <div className="ts-controls">
        <div className="ts-ctrl">
          <div className="ts-ctrl-label"><span>Stimulus</span><span className="val">{stimulus}</span></div>
          <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
            {["ball", "defender", "jersey"].map(s => (
              <button key={s} onClick={() => { setStimulus(s); reset(); }} style={{ flex: 1, padding: "6px 8px", background: stimulus === s ? "var(--lp)" : "var(--bg-card)", color: stimulus === s ? "#fff" : "var(--text-muted)", border: "1px solid " + (stimulus === s ? "var(--accent-glow)" : "var(--border)"), borderRadius: 6, fontFamily: "inherit", fontSize: 11, cursor: "pointer", textTransform: "capitalize" }}>{s}</button>
            ))}
          </div>
          <div className="ts-ctrl-sub">Fast motion favors dorsal. Identity favors ventral.</div>
        </div>
        <div className="ts-ctrl">
          <div className="ts-ctrl-label"><span>Magnocellular health</span><span className="val">{magnoHealth}%</span></div>
          <input type="range" min="20" max="100" value={magnoHealth} onChange={e => { setMagnoHealth(parseInt(e.target.value)); reset(); }} />
          <div className="ts-ctrl-sub">100% = healthy M-pathway. Below 50% the dorsal head start collapses.</div>
        </div>
        <div className="ts-ctrl">
          <div className="ts-ctrl-label"><span>Cognitive load</span><span className="val">{load}%</span></div>
          <input type="range" min="0" max="100" value={load} onChange={e => { setLoad(parseInt(e.target.value)); reset(); }} />
          <div className="ts-ctrl-sub">High load slows ventral recognition disproportionately.</div>
        </div>
      </div>
      <div className="ts-race">
        <div className="ts-track dorsal">
          <span className="ts-track-label">DORSAL · where/how</span>
          <div className="ts-puck" style={{ left: `calc(${dorsalProg}% - ${dorsalProg * 0.3}px)` }}>{Math.round(dorsalProg)}%</div>
          <div className="ts-target"><span className="ts-target-label">motor planning</span></div>
          {elapsedDorsal !== null && <div className="ts-tick" style={{ right: 60 }}>{elapsedDorsal} ms</div>}
        </div>
        <div className="ts-track ventral">
          <span className="ts-track-label">VENTRAL · what</span>
          <div className="ts-puck" style={{ left: `calc(${ventralProg}% - ${ventralProg * 0.3}px)` }}>{Math.round(ventralProg)}%</div>
          <div className="ts-target"><span className="ts-target-label">recognition</span></div>
          {elapsedVentral !== null && <div className="ts-tick" style={{ right: 60 }}>{elapsedVentral} ms</div>}
        </div>
        <div className="ts-race-controls">
          <button className="ts-go" onClick={run} disabled={running}>{running ? "Racing…" : "Start race"}</button>
          <button className="ts-reset" onClick={reset}>Reset</button>
          {winner === "dorsal" && <span className="ts-result-pill dorsal">Dorsal won by {gap} ms</span>}
          {winner === "ventral" && <span className="ts-result-pill ventral">Ventral won by {-gap} ms</span>}
          {winner === "tie" && <span className="ts-result-pill dorsal">Photo finish</span>}
        </div>
      </div>
      <div className="ts-readout">
        <div className="ts-stat"><div className="ts-stat-label">Dorsal arrival</div><div className={"ts-stat-val " + (dorsalEffective < 200 ? "good" : "warn")}>{dorsalEffective} ms</div><div className="ts-stat-sub">Where + how — feeds motor planning.</div></div>
        <div className="ts-stat"><div className="ts-stat-label">Ventral arrival</div><div className={"ts-stat-val " + (ventralEffective < 240 ? "good" : "warn")}>{ventralEffective} ms</div><div className="ts-stat-sub">What — feeds conscious recognition.</div></div>
        <div className="ts-stat"><div className="ts-stat-label">Dorsal lead</div><div className={"ts-stat-val " + (gap > 30 ? "good" : gap > 10 ? "warn" : "crit")}>{gap > 0 ? "+" : ""}{gap} ms</div><div className="ts-stat-sub">The window for pre-recognition action.</div></div>
      </div>
      <div className={"ts-note " + verdict.cls}>{verdict.txt}</div>
    </div>
  );
}

    .ppc-note strong { color: var(--accent-glow); }
  `;
  document.head.appendChild(_sc);

// === Ch5 — V5 Trajectory Predictor ===
function V5Trajectory() {
  const [v5Health, setV5Health] = useState(85);     // 50–100, lower = noisier prediction
  const [predictWindow, setPredictWindow] = useState(150); // 50–300 ms ahead
  const [scenario, setScenario] = useState("fastball"); // fastball | crossing | screen
  const [t, setT] = useState(0);
  const animRef = useRef(null);
  const dirRef = useRef(1);

  // Scenarios: ball x position over time (0..1 of canvas width), speed parameter
  // Use sinusoidal ping-pong motion across the field
  const speedMap = { fastball: 1.4, crossing: 0.9, screen: 0.55 };
  const speed = speedMap[scenario];

  useEffect(() => {
    let last = performance.now();
    const tick = (now) => {
      const dt = (now - last) / 1000;
      last = now;
      setT(prev => {
        let next = prev + dt * speed * dirRef.current;
        if (next > 1) { next = 1; dirRef.current = -1; }
        if (next < 0) { next = 0; dirRef.current = 1; }
        return next;
      });
      animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [speed]);

  // Canvas dimensions
  const W = 560, H = 240;
  const x = 40 + t * (W - 80);
  const y = H / 2 + Math.sin(t * Math.PI * 2) * 30;
  // Velocity vector: derivative
  const dx = speed * (W - 80) * dirRef.current / 1000; // px per ms
  // Predicted future position
  const noiseScale = (100 - v5Health) / 100; // 0 healthy, 1 broken
  const noiseX = (Math.random() - 0.5) * noiseScale * predictWindow * 0.4;
  const noiseY = (Math.random() - 0.5) * noiseScale * predictWindow * 0.4;
  const predX = Math.max(30, Math.min(W - 30, x + dx * predictWindow + noiseX));
  const predY = Math.max(30, Math.min(H - 30, y + Math.cos(t * Math.PI * 2) * 30 * (predictWindow / 200) + noiseY));

  // Actual future position (what V5 SHOULD predict, idealized)
  const idealFutureT = Math.min(1, Math.max(0, t + (dx > 0 ? 1 : -1) * (predictWindow / 1000) * speed));
  const actualFutureX = 40 + idealFutureT * (W - 80);
  const actualFutureY = H / 2 + Math.sin(idealFutureT * Math.PI * 2) * 30;

  // Prediction error in pixels
  const predErr = Math.sqrt(Math.pow(predX - actualFutureX, 2) + Math.pow(predY - actualFutureY, 2));
  const predErrPct = Math.min(100, Math.round(predErr / 3));

  const verdict = (() => {
    if (v5Health < 60 && predictWindow > 200) return { txt: "Damaged V5 trying to predict deep into the future: error compounds catastrophically. The athlete is guessing.", cls: "crit" };
    if (v5Health < 60) return { txt: "V5 dysfunction. The crosshair drifts off-target — the body will arrive where the ball was, not where it's going.", cls: "crit" };
    if (predictWindow > 250) return { txt: "Looking too far ahead. Even healthy V5 can't predict beyond ~300 ms reliably. The further you reach, the more error.", cls: "warn" };
    if (predErrPct < 15) return { txt: "V5 locked in. Prediction nearly matches actual future position. This is what 'reading the play' looks like at the neural level.", cls: "good" };
    return { txt: "Moderate V5 accuracy. Adjust the window and V5 health to see the trade-off.", cls: "" };
  })();

  return (
    <div className="v5-wrap">
      <div className="v5-controls">
        <div className="v5-ctrl">
          <div className="v5-ctrl-label"><span>Scenario</span><span className="val">{scenario}</span></div>
          <div className="v5-stage-buttons" style={{marginTop:6, marginBottom:0}}>
            {["fastball","crossing","screen"].map(s => (
              <button key={s} className={"v5-btn " + (scenario === s ? "active" : "")} onClick={() => setScenario(s)}>{s}</button>
            ))}
          </div>
          <div className="v5-ctrl-sub">Different sport stimuli demand different prediction windows.</div>
        </div>
        <div className="v5-ctrl">
          <div className="v5-ctrl-label"><span>V5 health</span><span className="val">{v5Health}%</span></div>
          <input type="range" min="40" max="100" value={v5Health} onChange={e => setV5Health(parseInt(e.target.value))} />
          <div className="v5-ctrl-sub">100% = elite tracking. Concussion / disuse / aging push this down.</div>
        </div>
        <div className="v5-ctrl">
          <div className="v5-ctrl-label"><span>Prediction window</span><span className="val">{predictWindow} ms</span></div>
          <input type="range" min="50" max="300" value={predictWindow} onChange={e => setPredictWindow(parseInt(e.target.value))} />
          <div className="v5-ctrl-sub">How far ahead V5 projects. ~200–300 ms is the human ceiling.</div>
        </div>
      </div>
      <div className="v5-stage">
        <svg className="v5-svg" viewBox={"0 0 " + W + " " + H} xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width={W} height={H} fill="#0D0A1A" />
          {/* horizon line */}
          <line x1="0" y1={H/2} x2={W} y2={H/2} stroke="#3a3550" strokeDasharray="4 6" />
          <text x="20" y="20" fill="#A099B8" fontSize="10" fontFamily="Inter, sans-serif" fontWeight="700" letterSpacing="1.5">FIELD OF VIEW</text>
          {/* trajectory tail */}
          {[0.05, 0.1, 0.15, 0.2].map((tail, i) => {
            const tt = t - tail * dirRef.current;
            if (tt < 0 || tt > 1) return null;
            const tx = 40 + tt * (W - 80);
            const ty = H / 2 + Math.sin(tt * Math.PI * 2) * 30;
            return <circle key={i} cx={tx} cy={ty} r={6 - i*1.2} fill="#fff" opacity={0.35 - i*0.07} />;
          })}
          {/* Actual ball */}
          <circle cx={x} cy={y} r="10" fill="#fff" stroke="#8B6FC0" strokeWidth="2" />
          <text x={x} y={y - 16} textAnchor="middle" fill="#fff" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">BALL · now</text>
          {/* Actual future (where ball WILL be) — teal ghost */}
          <circle cx={actualFutureX} cy={actualFutureY} r="10" fill="none" stroke="#4ECDC4" strokeWidth="2" strokeDasharray="3 3" opacity="0.5" />
          <text x={actualFutureX} y={actualFutureY + 25} textAnchor="middle" fill="#4ECDC4" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">ACTUAL · +{predictWindow}ms</text>
          {/* V5 prediction crosshair */}
          <g transform={`translate(${predX} ${predY})`}>
            <circle r="14" fill="none" stroke="#D4A843" strokeWidth="2" />
            <line x1="-18" y1="0" x2="18" y2="0" stroke="#D4A843" strokeWidth="2" />
            <line x1="0" y1="-18" x2="0" y2="18" stroke="#D4A843" strokeWidth="2" />
          </g>
          <text x={predX} y={predY - 22} textAnchor="middle" fill="#D4A843" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">V5 PREDICTION</text>
        </svg>
      </div>
      <div className="v5-readout">
        <div className="v5-stat"><div className="v5-stat-label">Prediction error</div><div className={"v5-stat-val " + (predErrPct < 15 ? "good" : predErrPct < 35 ? "warn" : "crit")}>{predErrPct}%</div><div className="v5-stat-sub">Distance between V5's crosshair and where the ball actually arrives.</div></div>
        <div className="v5-stat"><div className="v5-stat-label">Forward window</div><div className={"v5-stat-val " + (predictWindow <= 200 ? "good" : "warn")}>{predictWindow} ms</div><div className="v5-stat-sub">~200 ms is the sweet spot for most sport-relevant prediction.</div></div>
        <div className="v5-stat"><div className="v5-stat-label">Tracking quality</div><div className={"v5-stat-val " + (v5Health > 80 ? "good" : v5Health > 60 ? "warn" : "crit")}>{v5Health}%</div><div className="v5-stat-sub">Elite trained V5 vs. post-concussion / aging baseline.</div></div>
      </div>
      <div className="v5-note"><strong>{verdict.txt}</strong></div>
    </div>
  );
}

// === Ch6 — PPC Scan Map ===
function PPCScan() {
  const [scanQuality, setScanQuality] = useState(75); // 0..100 — random scan to elite policy
  const [load, setLoad] = useState(25);                // 0..100 — cognitive/arousal load
  const [tick, setTick] = useState(0);
  const tickRef = useRef(null);

  useEffect(() => {
    tickRef.current = setInterval(() => setTick(t => t + 1), 900);
    return () => clearInterval(tickRef.current);
  }, []);

  // Define a basketball half-court scene with cues at fixed positions
  const W = 560, H = 280;
  const cues = [
    { id: "ball",        x: 280, y: 200, label: "BALL",        importance: 1.0, type: "ball" },
    { id: "primary",     x: 290, y: 175, label: "primary def.", importance: 0.9, type: "def" },
    { id: "weakhelp",    x: 410, y: 140, label: "help def.",   importance: 0.85, type: "def" },
    { id: "strongCut",   x: 150, y: 130, label: "cutter",      importance: 0.95, type: "cut" },
    { id: "weakSpot",    x: 470, y: 200, label: "weak spot",   importance: 0.7, type: "spot" },
    { id: "openLane",    x: 230, y: 90,  label: "open lane",   importance: 0.75, type: "lane" }
  ];

  // Aperture shrinks as load rises
  const aperture = Math.max(70, 240 - load * 1.6);
  // Scan: based on quality, athlete fixates on either the ball (low quality / high load) or a sampled cue (high quality / low load)
  // Build a 6-fixation sequence cycling on tick
  const seq = [];
  for (let i = 0; i < 6; i++) {
    const localTick = (tick + i) % 6;
    if (scanQuality < 30 || load > 75) {
      // Mostly ball
      seq.push(cues[0]);
    } else {
      // Sample by importance with some randomness governed by scanQuality
      // Higher quality = covers more cues, especially high-importance ones
      const idx = (localTick * 2 + Math.floor((100 - scanQuality) / 30)) % cues.length;
      seq.push(cues[idx]);
    }
  }
  // Deduplicate consecutive
  const dedupedSeq = seq.filter((c, i) => i === 0 || c.id !== seq[i-1].id);

  // Coverage: how many distinct cues attended in last 6 fixations
  const coveredIds = new Set(seq.map(c => c.id));
  const coveragePct = Math.round((coveredIds.size / cues.length) * 100);

  // Importance covered weight
  let impCovered = 0;
  cues.forEach(c => { if (coveredIds.has(c.id)) impCovered += c.importance; });
  const impTotal = cues.reduce((s, c) => s + c.importance, 0);
  const impPct = Math.round((impCovered / impTotal) * 100);

  // Current fixation = first of seq
  const currentFix = dedupedSeq[0];

  const verdict = (() => {
    if (scanQuality < 30 || load > 75) return { txt: "Ball-watching collapse: PPC aperture has narrowed to a single target. Cuts and rotations are invisible.", cls: "crit" };
    if (impPct > 80 && coveragePct > 60) return { txt: "Elite scan policy active. PPC is sampling the high-importance cues on a learned schedule — the spatial action map is updated continuously.", cls: "good" };
    if (impPct > 60) return { txt: "Good coverage of high-importance cues. The athlete is reading the scene, not just watching the ball.", cls: "warn" };
    return { txt: "Adjust scan policy quality and load to see the parietal aperture in action.", cls: "" };
  })();

  return (
    <div className="ppc-wrap">
      <div className="ppc-controls">
        <div className="ppc-ctrl">
          <div className="ppc-ctrl-label"><span>Scan policy quality</span><span className="val">{scanQuality}%</span></div>
          <input type="range" min="0" max="100" value={scanQuality} onChange={e => setScanQuality(parseInt(e.target.value))} />
          <div className="ppc-ctrl-sub">0% = random / ball-fixated. 100% = elite learned scan policy.</div>
        </div>
        <div className="ppc-ctrl">
          <div className="ppc-ctrl-label"><span>Cognitive / arousal load</span><span className="val">{load}%</span></div>
          <input type="range" min="0" max="100" value={load} onChange={e => setLoad(parseInt(e.target.value))} />
          <div className="ppc-ctrl-sub">High load narrows the parietal aperture. Above ~75% the athlete defaults to ball-watching.</div>
        </div>
      </div>
      <div className="ppc-stage">
        <svg className="ppc-svg" viewBox={"0 0 " + W + " " + H} xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width={W} height={H} fill="#0D0A1A" />
          {/* Half-court */}
          <rect x="40" y="40" width={W-80} height={H-60} fill="#16472e" opacity="0.20" stroke="#3a3550" strokeWidth="1" />
          <circle cx={W/2} cy={210} r="48" fill="none" stroke="#3a3550" strokeWidth="1" />
          <line x1="40" y1="210" x2={W-40} y2="210" stroke="#3a3550" strokeWidth="1" />
          <text x="20" y="22" fill="#A099B8" fontSize="10" fontFamily="Inter, sans-serif" fontWeight="700" letterSpacing="1.5">VIEW · HALF COURT</text>
          {/* Aperture circle around current fixation */}
          {currentFix && (
            <circle cx={currentFix.x} cy={currentFix.y} r={aperture/2} fill="rgba(139,111,192,0.05)" stroke="#8B6FC0" strokeWidth="1" strokeDasharray="3 3" opacity="0.6" />
          )}
          {/* Draw cues */}
          {cues.map(c => {
            const attended = coveredIds.has(c.id);
            const inAperture = currentFix && Math.sqrt(Math.pow(c.x - currentFix.x, 2) + Math.pow(c.y - currentFix.y, 2)) <= aperture / 2;
            const color = c.type === "ball" ? "#D4A843" : c.type === "def" ? "#E24B4A" : c.type === "cut" ? "#4ECDC4" : "#8B6FC0";
            return (
              <g key={c.id}>
                <circle cx={c.x} cy={c.y} r="8" fill={color} opacity={inAperture ? 1 : 0.3} stroke={attended ? "#fff" : "transparent"} strokeWidth="2" />
                <text x={c.x} y={c.y - 14} textAnchor="middle" fill={inAperture ? "#fff" : "#5D5670"} fontSize="9" fontFamily="Inter, sans-serif" fontWeight="600">{c.label}</text>
              </g>
            );
          })}
          {/* Scan sequence arrows */}
          {dedupedSeq.slice(0, 5).map((c, i) => {
            if (i === 0) return null;
            const prev = dedupedSeq[i-1];
            return <line key={i} x1={prev.x} y1={prev.y} x2={c.x} y2={c.y} stroke="#fff" strokeWidth="1.5" opacity={0.5 - i*0.08} strokeDasharray="4 4" />;
          })}
          {/* Current fixation marker */}
          {currentFix && (
            <g>
              <circle cx={currentFix.x} cy={currentFix.y} r="16" fill="none" stroke="#fff" strokeWidth="2" />
              <text x={currentFix.x} y={currentFix.y + 30} textAnchor="middle" fill="#fff" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="700">FOVEA</text>
            </g>
          )}
        </svg>
      </div>
      <div className="ppc-readout">
        <div className="ppc-stat"><div className="ppc-stat-label">Aperture diameter</div><div className={"ppc-stat-val " + (aperture > 180 ? "good" : aperture > 130 ? "warn" : "crit")}>{Math.round(aperture)}px</div><div className="ppc-stat-sub">Peripheral attention window around the current fixation.</div></div>
        <div className="ppc-stat"><div className="ppc-stat-label">Cue coverage</div><div className={"ppc-stat-val " + (coveragePct > 75 ? "good" : coveragePct > 50 ? "warn" : "crit")}>{coveragePct}%</div><div className="ppc-stat-sub">Fraction of available cues sampled in last 6 fixations.</div></div>
        <div className="ppc-stat"><div className="ppc-stat-label">Importance-weighted coverage</div><div className={"ppc-stat-val " + (impPct > 80 ? "good" : impPct > 60 ? "warn" : "crit")}>{impPct}%</div><div className="ppc-stat-sub">Did the scan hit the cues that actually matter?</div></div>
      </div>
      <div className="ppc-note"><strong>{verdict.txt}</strong> The fixation hops every 0.9 s — adjust the sliders and watch the aperture and coverage respond.</div>
    </div>
  );
}
