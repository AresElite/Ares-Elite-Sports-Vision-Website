 is bottlenecked and applying a structured intervention to that specific bottleneck. The math is not complicated. What is hard is the willingness to do the diagnostic work in the first place.\n\nThat diagnostic work is, in some sense, the entire point of this book.\n\nI want to be honest about a tension I feel in writing it. There is a version of this material that frames every elite athlete as a transformation case waiting to happen — that every Noah West and every Andretti cohort is the rule rather than the exception. That framing is not quite right. The truth is that the gains depend on the headroom, and the headroom depends on what the athlete brings to the table, what the upstream acquisition system delivers, what the genetic and developmental ceilings allow. Some athletes have enormous routing headroom and they produce enormous gains. Some athletes are already operating near their personal ceiling and they produce small gains. The system is real and the work is real, but the magnitudes vary.\n\nWhat is consistent is the *direction*. Athletes who are evaluated against an appropriate routing battery and trained against the specific bottlenecks the battery identifies improve on the metrics the battery measures. That improvement is, in most cases, durable. And the improvement on the underlying routing capacities, by everything we know about the neural systems involved, should translate to faster, more accurate decision-making in competition.\n\nThe athletes who will benefit most from this work are not the ones whose surface performance is the most broken. They are the ones whose surface performance is *almost* there — the athletes who are skilled, who are seeing the game, who are physically prepared, but who are leaving milliseconds on the table at one or two specific routing stations. Find those stations. Train them. The math will do the rest.\n\nThe decision-release point is not the end of the signal's journey. It is the end of *this* book's journey. Past the DLPFC, the signal becomes a motor command. Past the motor command, it becomes a muscle activation. Past the muscle activation, it becomes a movement. That movement is the subject of Book Three.\n\nEXECUTE walks the signal from the decision-release point through the supplementary motor area, the basal ganglia's gating circuits, the primary motor cortex, the corticospinal tract, the spinal motor neurons, and the muscle fibers themselves. It is, in its own way, the next anatomical journey — the one that turns a decided action into the actual movement that wins or loses the play.\n\nRead this book once for the science. Read it again with an athlete in your mind. Then start watching tape with the ten-station diagnostic in your head, and start asking *which station* every time you see a decision-speed problem. You will surprise yourself with how quickly the language of the sideline starts translating into specific routing addresses, and how much faster the conversation about intervention becomes when the diagnosis is mechanical instead of psychological.\n\nThe photon arrived in Book One. The signal crossed the chiasm. From here, in this book, it traveled ten more stations to the prefrontal cortex and was released as a decision. In Book Three it becomes movement. In Book Four it becomes integrated, multi-system performance. In Book Five it becomes the applied training architecture that turns the whole pipeline from a model into a practice.\n\nStay with me. The signal is on its way to the muscles.\n\n— **Dr. Joe LaPlaca, OD**\nAres Elite Sports Vision"};

function _segmentsFromFullText(chapterId, chapterTitle) {
  const text = FULL_CHAPTER_TEXT[chapterId];
  if (!text) return [];
  const paras = text.split(/\n\n+/).filter(p => p.trim().length > 0);
  if (paras.length === 0) return [];
  const segments = [];
  const PER = 4;
  for (let i = 0; i < paras.length; i += PER) {
    const chunk = paras.slice(i, i + PER).join("\n\n");
    const idx = Math.floor(i / PER) + 1;
    const total = Math.ceil(paras.length / PER);
    segments.push({ id: "section_" + idx, label: "Section " + idx + " of " + total, text: chunk });
  }
  return segments;
}

const _origGetSeg = getChapterSegments;
getChapterSegments = function(chapter) {
  if (chapter && FULL_CHAPTER_TEXT[chapter.id]) return _segmentsFromFullText(chapter.id, chapter.title);
  return _origGetSeg(chapter);
};

function _FullProseReadB2({ chapter, highlights, isFraming, onExplore }) {
  const c = chapter.content || {};
  const fullText = FULL_CHAPTER_TEXT[chapter.id] || "";
  const segments = getChapterSegments(chapter);
  const partLabel = isFraming ? "Part One — Why This Matters"
    : (chapter.id === "ch12" ? "Part Three — The Hand-Off"
    : (chapter.id === "ch13" || chapter.id === "ch14" ? "Part Four — When Routing Breaks"
    : "Part Two — The Journey of the Signal"));
  return (
    <div>
      <div className="chapter-header">
        <div className="chapter-act-label">{partLabel}</div>
        <div className="chapter-number">{chapter.number}</div>
        <div className="chapter-title">{chapter.title}</div>
        {c.hook && <div className="chapter-hook">{c.hook}</div>}
      </div>
      <AudiobookBar chapter={chapter} segments={segments} />
      <div className="content-block">
        <div className="block-label">A · The Full Chapter</div>
        <Prose text={fullText} highlights={highlights} />
      </div>
      {chapter.interactive && (
        <div className="content-block">
          <ExploreTeaser icon={"⚙"} title={"Explore: " + (chapter.interactiveLabel || chapter.title)} sub={chapter.exploreSub || "Open the interactive."} onExplore={onExplore} />
        </div>
      )}
      <div className="content-block">
        <div className="block-label">B · A.R.E.S. Connection</div>
        <AresPipeline activeStage={chapter.aresStage || "route"} />
      </div>
      {c.callout && (
        <div className="content-block">
          <div className="block-label">C · Clinical / Coaching Insight</div>
          <CalloutBlock content={c.callout} />
        </div>
      )}
      {c.summary && c.summary.length > 0 && (
        <div className="content-block">
          <div className="block-label">D · Chapter Summary</div>
          <ul className="summary-list">
            {c.summary.map((item, i) => (<li className="summary-item" key={i}><div className="summary-bullet" /><span>{item}</span></li>))}
          </ul>
        </div>
      )}
      {c.quiz && c.quiz.length > 0 && (
        <div className="content-block">
          <div className="block-label">Comprehension Check</div>
          <QuizBlock questions={c.quiz} />
        </div>
      )}
    </div>
  );
}

const _OrigFramingChapter = FramingChapter;
FramingChapter = function({ chapter, pathway, setPathway, registerRefs, highlights }) {
  if (pathway === "Read" && FULL_CHAPTER_TEXT[chapter.id]) {
    return <_FullProseReadB2 chapter={chapter} highlights={highlights} isFraming={true} onExplore={() => setPathway("Explore")} />;
  }
  return _OrigFramingChapter({ chapter, pathway, setPathway, registerRefs, highlights });
};

const _OrigScienceChapter = ScienceChapter;
ScienceChapter = function({ chapter, pathway, setPathway, registerRefs, highlights }) {
  if (pathway === "Read" && FULL_CHAPTER_TEXT[chapter.id]) {
    return <_FullProseReadB2 chapter={chapter} highlights={highlights} isFraming={false} onExplore={() => setPathway("Explore")} />;
  }
  return _OrigScienceChapter({ chapter, pathway, setPathway, registerRefs, highlights });
};

const _OrigGetBlocks = getBlocks;
getBlocks = function(chapter) {
  if (!chapter) return [];
  if (FULL_CHAPTER_TEXT[chapter.id] && (chapter.type === "framing" || chapter.type === "science")) {
    const blocks = [{ id: "opening", label: "A · Full Chapter" }, { id: "ares", label: "B · A.R.E.S." }];
    if (chapter.content && chapter.content.callout) blocks.push({ id: "callout", label: "C · Insight" });
    if (chapter.content && chapter.content.summary) blocks.push({ id: "summary", label: "D · Summary" });
    return blocks;
  }
  return _OrigGetBlocks(chapter);
};

</script>
